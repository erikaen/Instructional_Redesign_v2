        const playSuccessTone = () => {
            try {
                const ctx = createAudioContext();
                [523.25, 659.25, 783.99].forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.frequency.value = freq; osc.type = 'sine';
                    const t = ctx.currentTime + i * 0.1;
                    gain.gain.setValueAtTime(0, t);
                    gain.gain.linearRampToValueAtTime(0.3, t + 0.02);
                    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
                    osc.start(t); osc.stop(t + 0.25);
                });
                setTimeout(() => ctx.close(), 600);
            } catch(e) {}
        };

            // Phase 4: probe-rent
            const [invoiceShown, setInvoiceShown] = useState(false);
            const [q1Selected, setQ1Selected] = useState(null);
            const [q1Correct, setQ1Correct] = useState(false);

            // Phase: deposits (customer receipts)
            const [notebookShown, setNotebookShown] = useState(false);
            const [depositsAutoActive, setDepositsAutoActive] = useState(false);
            const [depositsAutoDone,   setDepositsAutoDone]   = useState(false);
            const [autoFilledDeposits, setAutoFilledDeposits] = useState({}); // { d3: true, ... } — answers populated by autocomplete (suppresses verbose Anna commentary)
            const [depositAnswers, setDepositAnswers] = useState({ d1: null, d2: null, d3: null, d4: null, d5: null, d6: null, d7: null, d8: null });

            // Phase: deposits — the Jones beat (a promise with no deposit → leave it off)
            const [jonesAnswer, setJonesAnswer] = useState(null);       // 'on' | 'off'; correct = 'off'
            const [jonesResolved, setJonesResolved] = useState(false);

            // Phase: card-sort — the card statement, sorted repair vs personal (analogous to the bank)
            const [cardClass, setCardClass] = useState({});             // { cardLineId: 'repair'|'personal' }
            const [cardExpandedId, setCardExpandedId] = useState(null);
            const [cardSortChecked, setCardSortChecked] = useState(false);
            const [cardSortAutoActive, setCardSortAutoActive] = useState(false);
            const [cardSortAutoDone, setCardSortAutoDone] = useState(false);

            // Phase: name-it — Assets & Liabilities earned at the close
            const [assetsNamed, setAssetsNamed] = useState(false);
            const [rouRevealed, setRouRevealed] = useState(false);      // the "Right of Use" asset is added
            const [liabilitiesNamed, setLiabilitiesNamed] = useState(false);

            // Welcome: Excel outline groups on the Things workbook (collapsed by default)
            const [thingsExpanded, setThingsExpanded] = useState({});   // { EQUIPMENT: true, ... }
            // Promises-tab page: which Excel sheet tab is active (Things | Promises)
            const [excelTab, setExcelTab] = useState('promises');

            // ============================================================
            const phaseOrder = ['welcome', 'bank-sort', 'cash-records', 'deposits', 'card-sort', 'promises-tab', 'prepaid-rent', 'name-it', 'complete'];

            // Derived state
            const progress = Math.round((phaseOrder.indexOf(phase) / (phaseOrder.length - 1)) * 100);
            const shopCount = Object.values(classifications).filter(c => c === 'shop').length;
            const personalCount = Object.values(classifications).filter(c => c === 'personal').length;
            const unsortedCount = txns.length - shopCount - personalCount;
            const allClassified = unsortedCount === 0;
            const wrongSortIds = txns
                .filter(tx => classifications[tx.id] && classifications[tx.id] !== tx.cat)
                .map(tx => tx.id);
            const sortAllCorrect = sortChecked && wrongSortIds.length === 0;
            const allDepositsCorrect = deposits.every(d => depositAnswers[d.id] === d.correct);

            // Per-receipt autocomplete trigger — once the student has classified a few
            // correctly AND has surfaced both categories (the lesson: not all receipts
            // tell the same story), they can fill in the rest.
            const correctDeposits        = deposits.filter(d => depositAnswers[d.id] === d.correct);
            const depHasDoneCorrect      = correctDeposits.some(d => d.correct === 'done');
            const depHasTocomeCorrect    = correctDeposits.some(d => d.correct === 'tocome');
            const depositsTriggerMet     =
                correctDeposits.length >= 3 &&
                depHasDoneCorrect && depHasTocomeCorrect &&
                !allDepositsCorrect && !depositsAutoActive && !depositsAutoDone;
            // Sort autocomplete trigger (5 correct + 1 of each category)
            const correctClassifiedTxns = txns.filter(tx => classifications[tx.id] === tx.cat);
            const sortHasShop     = correctClassifiedTxns.some(tx => tx.cat === 'shop');
            const sortHasPersonal = correctClassifiedTxns.some(tx => tx.cat === 'personal');
            const sortTriggerMet =
                correctClassifiedTxns.length >= 5 &&
                sortHasShop && sortHasPersonal &&
                !allClassified && !sortAutoActive && !sortAutoDone;

            // Card-sort derived (analogous to the bank sort)
            const cardRepairCount   = Object.values(cardClass).filter(c => c === 'repair').length;
            const cardPersonalCount = Object.values(cardClass).filter(c => c === 'personal').length;
            const cardUnsorted      = cardTxns.length - cardRepairCount - cardPersonalCount;
            const cardAllClassified = cardUnsorted === 0;
            const cardWrongIds      = cardTxns.filter(t => cardClass[t.id] && cardClass[t.id] !== t.cat).map(t => t.id);
            const cardSortAllCorrect = cardSortChecked && cardWrongIds.length === 0;
            const cardCorrectClassified = cardTxns.filter(t => cardClass[t.id] === t.cat);
            const cardSortTriggerMet =
                cardCorrectClassified.length >= 4 &&
                cardCorrectClassified.some(t => t.cat === 'repair') &&
                cardCorrectClassified.some(t => t.cat === 'personal') &&
                !cardAllClassified && !cardSortAutoActive && !cardSortAutoDone;
            const cardRepairCharges = cardTxns.filter(t => t.cat === 'repair' && t.kind === 'charge').reduce((s, t) => s + t.amt, 0); // 2030
            const cardPersonalCharges = cardTxns.filter(t => t.cat === 'personal' && t.kind === 'charge').reduce((s, t) => s + t.amt, 0); // 230
            const cardPaydowns = cardTxns.filter(t => t.kind === 'payment').reduce((s, t) => s + t.amt, 0); // 800
            const cardBusinessOwes = cardRepairCharges - cardPaydowns; // 1230

            // ============================================================
            // HANDLERS
            // ============================================================
            const handleHeaderClick = () => {
                const n = headerClickCount + 1;
                setHeaderClickCount(n);
                if (n >= 3) { setDevMode(!devMode); setHeaderClickCount(0); }
            };

            const handleRestart = () => {
                playContinueClick();
                setPhase('welcome'); setStep(0);
                setExpandedDescId(null); setClassifications({}); setSortChecked(false);
                setSortAutoActive(false); setSortAutoDone(false);
                setInvoiceShown(false); setQ1Selected(null); setQ1Correct(false);
                setNotebookShown(false);
                setDepositAnswers({ d1: null, d2: null, d3: null, d4: null, d5: null, d6: null, d7: null, d8: null });
                setDepositsAutoActive(false); setDepositsAutoDone(false); setAutoFilledDeposits({});
                setCashLossSelected(null); setCashLossCorrect(false);
                setJonesAnswer(null); setJonesResolved(false);
                setCardClass({}); setCardExpandedId(null); setCardSortChecked(false);
                setCardSortAutoActive(false); setCardSortAutoDone(false);
                setAssetsNamed(false); setRouRevealed(false); setLiabilitiesNamed(false);
                setThingsExpanded({}); setExcelTab('promises');
            };

            // Deposit autocomplete — fill in the receipts the student hasn't classified yet.
            const handleDepositsAutocomplete = () => {
                if (depositsAutoActive || depositsAutoDone) return;
                playContinueClick();
                setDepositsAutoActive(true);
                const remaining = deposits.filter(d => depositAnswers[d.id] !== d.correct);
                remaining.forEach((dep, i) => {
                    setTimeout(() => {
                        setDepositAnswers(prev => ({ ...prev, [dep.id]: dep.correct }));
                        setAutoFilledDeposits(prev => ({ ...prev, [dep.id]: true }));
                        if (i === remaining.length - 1) {
                            setTimeout(() => {
                                setDepositsAutoActive(false);
                                setDepositsAutoDone(true);
                                playSuccessTone();
                            }, 250);
                        }
                    }, i * 120);
                });
            };

            // Autocomplete handler — stream remaining unclassified txns into their
            // correct categories at ~60ms intervals. Wrong manual classifications
            // are left alone for the existing "Check my sort" flow to surface.
            const handleSortAutocomplete = () => {
                if (sortAutoActive || sortAutoDone) return;
                playContinueClick();
                setSortAutoActive(true);
                setExpandedDescId(null);
                const unclassified = txns.filter(tx => !classifications[tx.id]);
                unclassified.forEach((tx, i) => {
                    setTimeout(() => {
                        setClassifications(prev => ({ ...prev, [tx.id]: tx.cat }));
                        if (i === unclassified.length - 1) {
                            setTimeout(() => {
                                setSortAutoActive(false);
                                setSortAutoDone(true);
                                playSuccessTone();
                            }, 250);
                        }
                    }, i * 60);
                });
            };

            const toggleDesc = (id) => setExpandedDescId(expandedDescId === id ? null : id);

            const classify = (id, kind) => {
                setClassifications({ ...classifications, [id]: kind });
                setExpandedDescId(null);
            };

            // ── Card-sort handlers (analogous to the bank sort) ──
            const toggleCardDesc = (id) => setCardExpandedId(cardExpandedId === id ? null : id);
            const cardClassify = (id, kind) => { setCardClass(prev => ({ ...prev, [id]: kind })); setCardExpandedId(null); };
            const cardUnclassify = (id) => { setCardClass(prev => { const n = { ...prev }; delete n[id]; return n; }); };
            const handleCardAutocomplete = () => {
                if (cardSortAutoActive || cardSortAutoDone) return;
                playContinueClick();
                setCardSortAutoActive(true);
                setCardExpandedId(null);
                const unclassified = cardTxns.filter(t => !cardClass[t.id]);
                unclassified.forEach((t, i) => {
                    setTimeout(() => {
                        setCardClass(prev => ({ ...prev, [t.id]: t.cat }));
                        if (i === unclassified.length - 1) {
                            setTimeout(() => { setCardSortAutoActive(false); setCardSortAutoDone(true); playSuccessTone(); }, 250);
                        }
                    }, i * 60);
                });
            };
            const unclassify = (id) => {
                const next = { ...classifications };
                delete next[id];
                setClassifications(next);
            };

            const handleQ1 = (id) => {
                if (q1Correct) return;
                setQ1Selected(id);
                if (id === 'b') { playSuccessTone(); setQ1Correct(true); }
                else playSoftNope();
            };

            const handleCashLoss = (id) => {
                if (cashLossCorrect) return;
                setCashLossSelected(id);
                if (id === 'c') { playSuccessTone(); setCashLossCorrect(true); }
                else playSoftNope();
            };

            const answerDeposit = (depId, choice) => {
                const dep = deposits.find(d => d.id === depId);
                if (depositAnswers[depId] === dep.correct) return;
                setDepositAnswers({ ...depositAnswers, [depId]: choice });
                if (choice === dep.correct) playSuccessTone();
                else playSoftNope();
            };

            // ============================================================
            // REUSABLE COMPONENTS
            // ============================================================
            const Header = () => (
                <div className="rounded-lg p-4 mb-4" style={{ backgroundColor: colors.primary }}>
                    <div className="flex justify-between items-start">
                        <div onClick={handleHeaderClick} style={{ cursor: 'pointer' }}>
                            <h1 className="text-lg font-bold text-white">Tutorial 1.3: Anna and the Bank Statement</h1>
                            <p className="text-sm mt-1" style={{ color: colors.earthLight }}>
                                Bicycle repair shop &middot; ~20 min
                            </p>
                        </div>
                        <div className="flex items-center gap-2">
                            <a href="index.html"
                               className="p-2 rounded-lg hover:bg-white/10 text-white text-xl border-0 bg-transparent cursor-pointer no-underline inline-flex items-center justify-center"
                               title="Return to Main" aria-label="Return to Main">🏠</a>
                            <button onClick={() => setShowGlossary(true)}
                                    className="p-2 rounded-lg hover:bg-white/10 text-white text-xl border-0 bg-transparent cursor-pointer"
                                    title="Glossary" aria-label="Open glossary">📖</button>
                            <button onClick={handleRestart}
                                    className="p-2 rounded-lg hover:bg-white/10 text-white text-xl border-0 bg-transparent cursor-pointer"
                                    title="Restart tutorial" aria-label="Restart tutorial">↺</button>
                        </div>
                    </div>
                    <div className="mt-4">
                        <div className="flex justify-between text-xs mb-1" style={{ color: 'rgba(255,255,255,0.7)' }}>
                            <span>Progress</span><span>{progress}%</span>
                        </div>
                        <div className="h-2 rounded-full" style={{ backgroundColor: 'rgba(255,255,255,0.2)' }}
                             role="progressbar" aria-valuenow={progress} aria-valuemin={0} aria-valuemax={100}>
                            <div className="h-full rounded-full transition-all duration-500"
                                 style={{ width: `${progress}%`, backgroundColor: colors.accent }} />
                        </div>
                    </div>
                    {devMode && (
                        <div className="mt-3 pt-3" style={{ borderTop: '1px solid rgba(255,255,255,0.2)' }}>
                            <p className="text-xs mb-2" style={{ color: 'rgba(255,255,255,0.7)' }}>Dev: skip to phase</p>
                            <div className="flex flex-wrap gap-1">
                                {phaseOrder.map(p => (
                                    <button key={p} onClick={() => { setStep(0); setPhase(p); }}
                                            className="px-2 py-1 rounded text-xs border-0 cursor-pointer"
                                            style={{
                                                backgroundColor: phase === p ? 'white' : 'rgba(255,255,255,0.2)',
                                                color: phase === p ? colors.primary : 'white'
                                            }}>{p}</button>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );

            const NarrativeBlock = ({ children }) => (
                <div className="p-4 rounded-lg mb-4 italic"
                     style={{ backgroundColor: colors.sand, borderLeft: `4px solid ${colors.accent}`, color: '#374151' }}>
                    {children}
                </div>
            );

            const InsightPanel = ({ children }) => (
                <div className="p-4 rounded-lg border-2 mb-4"
                     style={{ backgroundColor: colors.successBg, borderColor: colors.success }}>
                    <div className="flex items-start gap-2">
                        <span className="text-lg mt-0.5 flex-shrink-0" style={{ color: colors.success }}>✓</span>
                        <div style={{ color: '#166534' }}>{children}</div>
                    </div>
                </div>
            );

            const KeyInsightBox = ({ children }) => (
                <div className="p-4 rounded-lg border-2 mb-4"
                     style={{ backgroundColor: '#fef9e7', borderColor: colors.accent }}>
                    <div className="flex items-start gap-3">
                        <span className="text-lg flex-shrink-0 mt-0.5" style={{ color: colors.accent }}>💡</span>
                        <div style={{ color: colors.earthDark }}>{children}</div>
                    </div>
                </div>
            );

            const AnnaBox = ({ children }) => (
                <div className="rounded-lg p-4 mb-3 border-2"
                     style={{ borderColor: colors.clayDark, backgroundColor: 'white' }}>
                    <p className="text-xs font-bold mb-2 tracking-wide" style={{ color: colors.primary }}>ANNA</p>
                    <div className="text-sm italic" style={{ color: colors.earthDark }}>{children}</div>
                </div>
            );

            const YouBox = ({ children }) => (
                <div className="rounded-lg p-3 mb-3"
                     style={{ borderLeft: `4px solid ${colors.earth}`, backgroundColor: '#fafaf7' }}>
                    <p className="text-xs font-bold mb-1 tracking-wide" style={{ color: colors.earth }}>YOU</p>
                    <div className="text-sm italic" style={{ color: colors.earthDark }}>{children}</div>
                </div>
            );

            const ContinueButton = ({ onClick, children = 'Continue', disabled = false, asLink = null }) => {
                if (asLink) {
                    return (
                        <a href={asLink}
                           className="w-full py-3 rounded-lg font-bold flex items-center justify-center gap-2 border-0 cursor-pointer no-underline"
                           style={{ backgroundColor: colors.primary, color: 'white' }}>
                            {children} →
                        </a>
                    );
                }
                return (
                    <button onClick={() => { if (!disabled) { playContinueClick(); onClick(); } }}
                            disabled={disabled}
                            className="w-full py-3 rounded-lg font-bold flex items-center justify-center gap-2 border-0 cursor-pointer disabled:cursor-not-allowed"
                            style={{
                                backgroundColor: disabled ? colors.earth : colors.primary,
                                color: 'white',
                                opacity: disabled ? 0.5 : 1,
                            }}>
                        {children} →
                    </button>
                );
            };

            const GlossaryModal = () => (
                <div className="fixed inset-0 flex items-center justify-center p-4 z-50"
                     style={{ backgroundColor: 'rgba(0,0,0,0.5)' }}>
                    <div className="bg-white rounded-xl max-w-md w-full" style={{ maxHeight: '80vh', overflowY: 'auto' }}>
                        <div className="p-4 border-b flex justify-between items-center sticky top-0 bg-white"
                             style={{ borderColor: colors.earthLight }}>
                            <h3 className="font-bold" style={{ color: colors.primary }}>📖 Glossary</h3>
                            <button onClick={() => setShowGlossary(false)}
                                    className="text-gray-500 hover:text-gray-700 text-2xl font-light border-0 bg-transparent cursor-pointer"
                                    aria-label="Close glossary">✕</button>
                        </div>
                        <div className="p-4 space-y-3">
                            {glossaryTerms.map((item, i) => (

                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );

            // Bank statement table (reused in statement-view and sort)
            const BankStatementTable = ({ interactive }) => (
                <div className="rounded-lg overflow-hidden mb-4" style={{ border: `1px solid ${colors.earthLight}`, backgroundColor: 'white' }}>
                    <div className="flex justify-between items-end p-5 border-b-2" style={{ borderColor: colors.primary }}>
                        <div>
                            <h1 className="text-xl font-bold tracking-tight" style={{ color: colors.primary }}>ELM CITY BANK</h1>
                            <p className="text-xs mt-1" style={{ color: colors.earth }}>Personal Checking &middot; account ending &bull;&bull;&bull;&bull; 8814</p>
                        </div>
                        <div className="text-right">
                            <p className="text-xs" style={{ color: colors.earth }}>Statement period</p>
                            <p className="text-sm font-medium" style={{ color: colors.earthDark }}>May 1 – May 31, 2026</p>
                        </div>
                    </div>
                    <div className="flex justify-between px-5 py-3 text-sm border-b"
                         style={{ borderColor: colors.earthLight, backgroundColor: colors.sand }}>
                        <span style={{ color: colors.earthDark }}>Beginning balance (May 1)</span>
                        <span className="mono font-medium" style={{ color: colors.earthDark }}>$2,500.00</span>
                    </div>
                    <div>
                        <div className="grid items-center text-xs uppercase tracking-wide font-semibold px-3 py-2 border-b"
                             style={{
                                 color: colors.earth, borderColor: colors.earthLight,
                                 gridTemplateColumns: interactive ? '3px 60px 1fr 80px 80px 90px 30px' : '60px 1fr 80px 80px 90px',
                             }}>
                            {interactive && <span></span>}
                            <span>Date</span><span>Description</span>
                            <span className="text-right">Withdrawal</span>
                            <span className="text-right">Deposit</span>
                            <span className="text-right">Balance</span>
                            {interactive && <span></span>}
                        </div>
                        {txns.map((tx, i) => {
                            const isExpanded = interactive && expandedDescId === tx.id;
                            const cls = classifications[tx.id];
                            const isClassified = cls !== undefined;
                            const isWrongMark = interactive && sortChecked && isClassified && cls !== tx.cat;
                            const baseStripe = cls === 'shop' ? colors.primary : (cls === 'personal' ? colors.earth : 'transparent');
                            const stripe = isWrongMark ? colors.warning : baseStripe;
                            const rowBg = i % 2 === 1 ? '#fafaf7' : 'white';
                            return (
                                <div key={tx.id}>
                                    <div className="grid items-center text-sm px-3 py-2"
                                         style={{
                                             backgroundColor: rowBg,
                                             gridTemplateColumns: interactive ? '3px 60px 1fr 80px 80px 90px 30px' : '60px 1fr 80px 80px 90px',
                                             borderBottom: isExpanded ? 'none' : `1px solid ${colors.sand}`,
                                         }}>
                                        {interactive && <div style={{ backgroundColor: stripe, height: '100%', minHeight: '24px' }}></div>}
                                        <span className="mono" style={{ color: colors.earthDark }}>{tx.date}</span>
                                        <span style={{ color: colors.earthDark }}>
                                            {tx.desc}
                                            {interactive && isClassified && (
                                                <span className="ml-2 text-xs px-1.5 py-0.5 rounded font-semibold"
                                                      style={{
                                                          backgroundColor: cls === 'shop' ? colors.clayLight : colors.sand,
                                                          color: cls === 'shop' ? colors.primary : colors.earthDark,
                                                          border: `1px solid ${cls === 'shop' ? colors.primary : colors.earth}`,
                                                      }}>
                                                    {cls === 'shop' ? 'Shop' : 'Personal'}
                                                </span>
                                            )}
                                            {isWrongMark && (
                                                <span className="ml-2 text-xs px-1.5 py-0.5 rounded font-semibold"
                                                      style={{
                                                          backgroundColor: colors.warningBg,
                                                          color: '#92400e',
                                                          border: `1px solid ${colors.warning}`,
                                                      }}>
                                                    ↻ rethink
                                                </span>
                                            )}
                                        </span>
                                        <span className="mono text-right" style={{ color: tx.w > 0 ? colors.error : 'transparent' }}>
                                            {tx.w > 0 ? fmt(tx.w) : '—'}
                                        </span>
                                        <span className="mono text-right" style={{ color: tx.d > 0 ? colors.success : 'transparent' }}>
                                            {tx.d > 0 ? fmt(tx.d) : '—'}
                                        </span>
                                        <span className="mono text-right" style={{ color: colors.earthDark }}>{fmt(tx.bal)}</span>
                                        {interactive && (
                                            <button onClick={() => toggleDesc(tx.id)}
                                                    className="border-0 bg-transparent cursor-pointer text-base leading-none flex items-center justify-center ml-1"
                                                    style={{ color: isExpanded ? colors.primary : colors.earth }}
                                                    title="More info" aria-expanded={isExpanded}>ⓘ</button>
                                        )}
                                    </div>
                                    {interactive && isExpanded && (
                                        <div className="px-3 py-3"
                                             style={{ backgroundColor: rowBg, borderBottom: `1px solid ${colors.sand}`, paddingLeft: '63px' }}>
                                            <p className="text-sm mb-3 italic" style={{ color: colors.earthDark }}>{tx.info}</p>
                                            <div className="flex gap-2 items-center">
                                                <span className="text-xs uppercase tracking-wide" style={{ color: colors.earth }}>Classify:</span>
                                                <button onClick={() => classify(tx.id, 'shop')}
                                                        className="px-3 py-1 rounded font-semibold text-xs border-0 cursor-pointer"
                                                        style={{
                                                            backgroundColor: cls === 'shop' ? colors.primary : colors.clayLight,
                                                            color: cls === 'shop' ? 'white' : colors.primary,
                                                        }}>Shop-related</button>
                                                <button onClick={() => classify(tx.id, 'personal')}
                                                        className="px-3 py-1 rounded font-semibold text-xs border-0 cursor-pointer"
                                                        style={{
                                                            backgroundColor: cls === 'personal' ? colors.earth : colors.sand,
                                                            color: cls === 'personal' ? 'white' : colors.earthDark,
                                                        }}>Personal</button>
                                                {isClassified && (
                                                    <button onClick={() => unclassify(tx.id)}
                                                            className="px-2 py-1 rounded text-xs border-0 cursor-pointer ml-2"
                                                            style={{ backgroundColor: 'transparent', color: colors.earth }}>Clear</button>
                                                )}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                    <div className="flex justify-between px-5 py-3 text-sm border-t-2"
                         style={{ borderColor: colors.primary, backgroundColor: colors.sand }}>
                        <span className="font-bold" style={{ color: colors.earthDark }}>Ending balance (May 31)</span>
                        <span className="mono font-bold" style={{ color: colors.earthDark }}>$3,274.00</span>
                    </div>
                </div>
            );

            // Compact transaction card (used in probes)
            const TxCard = ({ txId, gold }) => {
                const tx = txns.find(t => t.id === txId);
                return (
                    <div className="rounded-lg border-2 px-4 py-3 mb-4"
                         style={{ borderColor: gold ? colors.accent : colors.earthLight, backgroundColor: 'white' }}>
                        <div className="flex items-center justify-between">
                            <div>
                                <p className="text-xs mono" style={{ color: colors.earth }}>{tx.date} &middot; {tx.desc.split(' — ')[0] || tx.desc}</p>
                                <p className="text-sm font-medium" style={{ color: colors.primary }}>
                                    {tx.desc.includes(' — ') ? tx.desc.split(' — ').slice(1).join(' — ') : tx.desc}
                                </p>
                            </div>
                            <p className="text-base font-bold mono"
                               style={{ color: tx.w > 0 ? colors.error : colors.success }}>
                                {tx.w > 0 ? '−$' + fmt(tx.w) : '+$' + fmt(tx.d)}
                            </p>
                        </div>
                    </div>
                );

                                {deposits.map(dep => {
                                    const myAnswer = depositAnswers[dep.id];
                                    const locked = myAnswer === dep.correct;
                                    const autoFilled = autoFilledDeposits[dep.id];
                                    return (
                                        <div key={dep.id} className="rounded-lg border-2 p-4 mb-3"
                                             style={{ borderColor: locked ? colors.success : colors.earthLight, backgroundColor: 'white' }}>
                                            <div className="flex items-center justify-between mb-3">
                                                <div>
                                                    <p className="text-xs mono" style={{ color: colors.earth }}>{dep.date} &middot; {dep.payment} deposit</p>
                                                    <p className="text-sm font-medium" style={{ color: colors.primary }}>Customer payment</p>
                                                </div>
                                                <p className="text-base font-bold mono" style={{ color: colors.success }}>+${dep.amount}.00</p>
                                            </div>
                                            <div className="rounded p-3 mb-3"
                                                 style={{ backgroundColor: '#fffbe6', border: `1px solid ${colors.earthLight}` }}>
                                                <div className="flex justify-between items-baseline mb-2">
                                                    <p className="text-xs uppercase tracking-wide font-bold" style={{ color: colors.earth }}>
                                                        Customer receipt {dep.receiptNum}
                                                    </p>
                                                    <p className="text-xs mono" style={{ color: colors.earth }}>{dep.date}, 2026 &middot; {dep.payment}</p>
                                                </div>
                                                <table className="w-full text-sm">
                                                    <tbody>
                                                        {dep.lineItems.map((li, i) => (
                                                            <tr key={i} style={{ borderBottom: `1px solid ${colors.earthLight}` }}>
                                                                <td className="py-1" style={{ color: colors.earthDark }}>{li.name}</td>
                                                                <td className="py-1 text-right mono" style={{ color: colors.earthDark }}>${li.amount}.00</td>
                                                            </tr>
                                                        ))}
                                                        <tr style={{ borderTop: `2px solid ${colors.earthDark}` }}>
                                                            <td className="pt-1 font-bold" style={{ color: colors.earthDark }}>Total</td>
                                                            <td className="pt-1 text-right font-bold mono" style={{ color: colors.earthDark }}>${dep.amount}.00</td>
                                                        </tr>
                                                    </tbody>
                                                </table>
                                                {dep.note && (
                                                    <p className="text-xs italic mt-2" style={{ color: colors.earth }}>{dep.note}</p>
                                                )}
                                            </div>
                                            <div className="grid grid-cols-3 gap-2 mb-2">
                                                {['done', 'tocome', 'notsure'].map(choice => {
                                                    const isMine = myAnswer === choice;
                                                    const isRight = choice === dep.correct;
                                                    const showAsCorrect = locked && isMine;
                                                    const showAsWrong = !locked && isMine;
                                                    let bg = 'white', border = colors.earthLight, fg = colors.earthDark;
                                                    if (showAsCorrect) { bg = colors.successBg; border = colors.success; fg = '#166534'; }
                                                    else if (showAsWrong) { bg = colors.errorBg; border = colors.error; fg = '#991b1b'; }
                                                    else if (isMine) { bg = colors.sand; border = colors.primary; fg = colors.earthDark; }
                                                    return (
                                                        <button key={choice}
                                                                onClick={() => answerDeposit(dep.id, choice)}
                                                                disabled={locked}
                                                                className="p-2 rounded text-sm font-semibold border-2 cursor-pointer disabled:cursor-default"
                                                                style={{ backgroundColor: bg, borderColor: border, color: fg }}>
                                                            {optionLabels[choice].label}
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                            {myAnswer && !autoFilled && (
                                                <div className="rounded p-3 mt-2"
                                                     style={{
                                                         backgroundColor: locked ? colors.successBg : colors.warningBg,
                                                         border: `1px solid ${locked ? colors.success : colors.warning}`,
                                                     }}>
                                                    <p className="text-xs font-bold tracking-wide mb-1" style={{ color: colors.primary }}>ANNA</p>
                                                    <p className="text-sm italic" style={{ color: locked ? '#166534' : '#92400e' }}>
                                                        {dep.annaSays[myAnswer]}
                                                    </p>
                                                </div>
                                            )}
                                            {autoFilled && locked && (
                                                <div className="rounded p-2 mt-2 flex items-center gap-2"
                                                     style={{ backgroundColor: colors.successBg, border: `1px solid ${colors.success}` }}>
                                                    <span style={{ color: colors.success }}>✓</span>
                                                    <span className="text-xs font-semibold" style={{ color: '#166534' }}>
                                                        {dep.correct === 'tocome' ? 'Work to come — deposit on an obligation.' : 'Same shape as the others — work done, earnings.'}
                                                    </span>
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}

                                {/* Per-receipt autocomplete trigger */}
                                {depositsTriggerMet && (
                                    <div className="rounded-lg p-3 mb-4 border-2"
                                         style={{ backgroundColor: '#fef9e7', borderColor: colors.accent }}>
                                        <p className="text-sm mb-2" style={{ color: colors.earthDark }}>
                                            <strong>You've got the rule.</strong> Most of these are work done. The
                                            one outlier is Smith's deposit. Apply it to the rest of the receipts.
                                        </p>
                                        <button onClick={handleDepositsAutocomplete}
                                                className="w-full py-3 rounded-lg font-bold text-white border-0 cursor-pointer"
                                                style={{ backgroundColor: colors.primary }}>
                                            Sort the rest →
                                        </button>
                                    </div>
                                )}

                                {/* Autocomplete-in-progress beat */}
                                {depositsAutoActive && (
                                    <div className="rounded-lg p-4 mb-4 system-sorting"
                                         style={{ backgroundColor: colors.primary, color: 'white', textAlign: 'center' }}>
                                        <p className="text-base font-bold">⚙ Working through the rest of the receipts&hellip;</p>
                                        <p className="text-xs mt-1" style={{ color: 'rgba(255,255,255,0.8)' }}>
                                            Applying the work-done vs. work-to-come rule.
                                        </p>
                                    </div>
                                )}
                            </>
                        )}
                        {allDepositsCorrect && (
                            <>
                                <AnnaBox>
                                    "So you found two kinds. Seven of them &mdash; the Venmo deposits &mdash; were for
                                    work you'd <strong>already finished</strong>. That money's yours to keep. Smith's
                                    check is the odd one out: he paid you, but you haven't built his frame yet."
                                </AnnaBox>
                                <YouBox>
                                    "Right &mdash; I <em>promised</em> Smith a custom frame. He put $220 down. I still
                                    owe him the work."
                                </YouBox>
                                <AnnaBox>
                                    "Then that's a <strong>promise</strong> &mdash; something you owe. Your priced list
                                    doesn't show it anywhere. You need a second list for promises like this. Start it
                                    with Smith's $220."
                                </AnnaBox>

                                {/* The two-places beat — Smith's $220 is cash you HAVE and a promise you OWE */}
                                <div className="rounded-lg border-2 p-4 mb-4" style={{ borderColor: colors.accent, backgroundColor: '#fef9e7' }}>
                                    <p className="text-sm font-bold mb-3" style={{ color: colors.primary }}>Smith's $220 lands in two places at once</p>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                        <div className="rounded p-3" style={{ backgroundColor: 'white', border: `1px solid ${colors.success}` }}>
                                            <p className="text-xs font-bold tracking-wide mb-1" style={{ color: '#166534' }}>WHAT YOU HAVE</p>
                                            <p className="text-sm" style={{ color: colors.earthDark }}>The $220 cash is sitting in your account.</p>
                                        </div>
                                        <div className="rounded p-3" style={{ backgroundColor: 'white', border: `1px solid ${colors.earthDark}` }}>
                                            <p className="text-xs font-bold tracking-wide mb-1" style={{ color: colors.earthDark }}>WHAT YOU OWE</p>
                                            <p className="text-sm" style={{ color: colors.earthDark }}>You still owe Smith the frame &mdash; a promise.</p>
                                        </div>
                                    </div>
                                    <p className="text-xs italic mt-3" style={{ color: colors.earth }}>
                                        The same $220 shows up on both sides at once.
                                    </p>
                                </div>

                                {/* The Promises list is born — Smith only (the card comes next) */}
                                <div className="rounded-lg overflow-hidden mb-4" style={{ border: `2px solid ${colors.earthDark}`, backgroundColor: 'white' }}>
                                    <div className="px-4 py-2 border-b-2" style={{ borderColor: colors.earthDark, backgroundColor: '#fafaf7' }}>
                                        <p className="text-sm font-bold tracking-tight" style={{ color: colors.earthDark }}>📋 PROMISES &mdash; what I owe <span className="text-xs font-normal italic">(new list)</span></p>
                                    </div>
                                    <div className="p-3">
                                        <div className="flex justify-between items-start gap-3 py-1">
                                            <span className="text-sm" style={{ color: colors.earthDark }}>Smith's frame &mdash; paid $220 up front, not built yet</span>
                                            <span className="text-sm mono font-bold flex-shrink-0" style={{ color: colors.earthDark }}>$220</span>
                                        </div>
                                    </div>
                                </div>

                                {/* Jones beat — a promise with NO deposit → leave it off (the recognition test) */}
                                <YouBox>
                                    "Hang on &mdash; Jones came by last week and asked me to build <em>him</em> a frame
                                    too. I told him I'd do it. Does that go on the Promises list?"
                                </YouBox>
                                <AnnaBox>"Did he put any money down?"</AnnaBox>
                                <YouBox>"No. We just talked about it."</YouBox>
                                <div className="rounded-lg p-4 mb-3 border-2" style={{ borderColor: colors.clayDark, backgroundColor: 'white' }}>
                                    <p className="text-sm font-medium mb-3" style={{ color: colors.primary }}>Does Jones's frame go on the Promises list?</p>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-2">
                                        <button onClick={() => { setJonesAnswer('on'); playSoftNope(); }}
                                                disabled={jonesResolved}
                                                className="p-3 rounded-lg border-2 text-left cursor-pointer text-sm disabled:cursor-default"
                                                style={{ borderColor: (jonesAnswer === 'on' && !jonesResolved) ? colors.error : colors.earthLight, backgroundColor: (jonesAnswer === 'on' && !jonesResolved) ? colors.errorBg : 'white', color: colors.earthDark }}>
                                            Add it &mdash; I promised him a frame
                                        </button>
                                        <button onClick={() => { setJonesAnswer('off'); setJonesResolved(true); playSuccessTone(); }}
                                                disabled={jonesResolved}
                                                className="p-3 rounded-lg border-2 text-left cursor-pointer text-sm disabled:cursor-default"
                                                style={{ borderColor: jonesResolved ? colors.success : colors.earthLight, backgroundColor: jonesResolved ? colors.successBg : 'white', color: colors.earthDark }}>
                                            Leave it off &mdash; nothing's committed yet
                                        </button>
                                    </div>
                                    {jonesAnswer === 'on' && !jonesResolved && (
                                        <div className="p-3 rounded-lg mt-3" style={{ backgroundColor: colors.warningBg }}>
                                            <p className="text-sm" style={{ color: '#92400e' }}>
                                                Anna: "Careful. Smith backed his promise with $220 &mdash; you've got his cash,
                                                you owe the work, it's real. Jones just talked. Would you actually start cutting
                                                tubes before he puts money down? &hellip; Right. Nothing's <em>happened</em> yet
                                                &mdash; so there's nothing to write down. Try the other one."
                                            </p>
                                        </div>
                                    )}
                                </div>

                                {jonesResolved && (
                                    <>
                                        <InsightPanel>
                                            Smith's promise is real &mdash; he backed it with cash, so you owe the work.
                                            Jones's is just talk: no deposit, nothing's happened yet. Don't forget him &mdash;
                                            but he stays <em>off</em> the list until he commits. <em>A promise gets written
                                            down when something actually happens to create it &mdash; not when it's just intended.</em>
                                        </InsightPanel>
                                        <AnnaBox>
                                            "Now &mdash; the <em>other</em> big promise. That credit card: every charge on it
                                            is money you owe the bank. Same trouble as the checking account, though &mdash; it's
                                            got your personal spending mixed in. Let's sort it the exact same way."
                                        </AnnaBox>
                                        <ContinueButton onClick={() => { setStep(0); setPhase('card-sort'); }}>
                                            Sort the credit card
                                        </ContinueButton>
                                    </>
                                )}
                            </>
                        )}
                    </div>
                </div>
            );

            // ── Phase: name-it ───────────────────────────────────────────────
            // Scene close — the names are EARNED. The have-list has grown past Maria's
            // "insurable property" (it now holds cash + the prepaid month) → name it Assets.
            // The owe-list (the student's "Promises") → name it Liabilities.
            const renderNameIt = () => {
                const dollars = (n) => '$' + n.toLocaleString('en-US');
                const assetsTabLabel = assetsNamed ? 'Assets' : 'Things';
                const liabTabLabel = liabilitiesNamed ? 'Liabilities' : 'Promises';
                return (
                    <div className="min-h-screen" style={{ backgroundColor: colors.sand }}>
                        <div className="p-4 max-w-3xl mx-auto">
                            <Header />
                            <NarrativeBlock>
                                Late afternoon. You and Anna have been at it for hours, and your workbook has a few
                                tabs now &mdash; what you have, what you owe, and the cash you pulled. Time to give the
                                have-and-owe lists their proper names.
                            </NarrativeBlock>

                            {renderExcelWorkbook(
                                excelTab,
                                [{ id: 'things', label: assetsTabLabel }, { id: 'promises', label: liabTabLabel }, { id: 'cash', label: 'Cash' }],
                                setExcelTab,
                                excelTab === 'cash' ? renderCashSheet() : excelTab === 'things' ? (assetsNamed ? renderAssetsSheet() : renderThingsSheet()) : renderPromisesSheet()
                            )}

                            {!assetsNamed ? (
                                <>
                                    <AnnaBox>
                                        "Start with this first sheet &mdash; everything you have, priced. Accountants
                                        have a word for that whole list: your <strong>Assets</strong>."
                                    </AnnaBox>
                                    <button onClick={() => { playContinueClick(); setExcelTab('things'); setAssetsNamed(true); }}
                                            className="w-full py-3 rounded-lg font-bold text-white border-0 cursor-pointer mb-4"
                                            style={{ backgroundColor: colors.primary }}>
                                        Rename the Things tab "Assets" →
                                    </button>
                                </>
                            ) : !rouRevealed ? (
                                <>
                                    <AnnaBox>
                                        "Now &mdash; accountants think about assets more expansively than just
                                        <em> things</em>. An asset is a <strong>present right to an economic benefit</strong>
                                        &mdash; anything that will do you economic good down the road, whether or not you
                                        can put your hands on it. By that definition, your list is missing one."
                                    </AnnaBox>
                                    <button onClick={() => { playContinueClick(); setExcelTab('things'); setRouRevealed(true); setThingsExpanded(prev => ({ ...prev, 'RIGHT OF USE': true })); }}
                                            className="w-full py-3 rounded-lg font-bold text-white border-0 cursor-pointer mb-4"
                                            style={{ backgroundColor: colors.primary }}>
                                        What's missing? →
                                    </button>
                                </>
                            ) : !liabilitiesNamed ? (
                                <>
                                    <AnnaBox>
                                        "There it is. Remember the last month of rent you already paid? You can't touch
                                        it &mdash; but you hold the <strong>right to occupy the space</strong> that month.
                                        That's a real economic benefit coming to you, so it counts as an asset. It isn't a
                                        thing, though, so it gets its own category: <strong>Right of Use</strong>. With that,
                                        your assets come to <strong>{dollars(ASSETS_TOTAL)}</strong>.
                                        <span className="block mt-2">Now the other sheet &mdash; your Promises. Accountants
                                        call those <strong>Liabilities</strong>: pay-it-or-do-it-later, just their word for it."</span>
                                    </AnnaBox>
                                    <button onClick={() => { playContinueClick(); setExcelTab('promises'); setLiabilitiesNamed(true); }}
                                            className="w-full py-3 rounded-lg font-bold border-2 cursor-pointer mb-4"
                                            style={{ backgroundColor: 'white', borderColor: colors.primary, color: colors.primary }}>
                                        Rename the Promises tab "Liabilities" →
                                    </button>
                                </>
                            ) : (
                                <>
                                    <InsightPanel>
                                        Two sheets, two names. <strong>Assets</strong> ({dollars(ASSETS_TOTAL)}) &mdash;
                                        everything you have, including the right to that prepaid month.
                                        <strong> Liabilities</strong> ({dollars(LIABILITIES_TOTAL)}) &mdash; everything you owe.
                                        And you learned an asset is a <em>right to an economic benefit</em>, not just a thing.
                                    </InsightPanel>
                                    <ContinueButton onClick={() => { setStep(0); setPhase('complete'); }}>
                                        Finish up
                                    </ContinueButton>
                                </>
                            )}
                        </div>
                    </div>
                );
            };

            const renderComplete = () => (
                <div className="min-h-screen" style={{ backgroundColor: colors.sand }}>
                    <div className="p-4 max-w-3xl mx-auto">
                        <Header />
                        <div className="text-center mb-6">
                            <div className="inline-flex items-center justify-center w-20 h-20 rounded-full mb-4"
                                 style={{ backgroundColor: colors.accent }}>
                                <span className="text-4xl">🏆</span>
                            </div>
                            <h2 className="text-2xl font-bold" style={{ color: colors.primary }}>Tutorial Complete!</h2>
                        </div>
                        <div className="rounded-lg p-4 mb-4 border-2"
                             style={{ backgroundColor: 'white', borderColor: colors.success }}>
                            <h3 className="font-bold mb-3" style={{ color: colors.primary }}>What You Discovered</h3>
                            <ol className="space-y-2 text-sm" style={{ color: colors.earthDark }}>
                                <li className="flex gap-2">
                                    <span style={{ color: colors.success }}>✓</span>
                                    <span>The bank statement is the <em>bank's</em> record, mixed in with your personal life.
                                    You had to pull the repair work's cash out of it &mdash; net &minus;$960 for the month.</span>
                                </li>
                                <li className="flex gap-2">
                                    <span style={{ color: colors.success }}>✓</span>
                                    <span>Not all money <em>in</em> is yours to keep: Smith's $220 was an advance &mdash; cash
                                    you have <em>and</em> a promise you owe. It started a second list: <strong>Promises</strong>.</span>
                                </li>
                                <li className="flex gap-2">
                                    <span style={{ color: colors.success }}>✓</span>
                                    <span>A promise only goes on the list when something <em>happens</em> to create it: Jones
                                    asked for a frame too, but put nothing down &mdash; so it stayed <em>off</em>.</span>
                                </li>
                                <li className="flex gap-2">
                                    <span style={{ color: colors.success }}>✓</span>
                                    <span>The credit card is a promise to pay &mdash; you sorted it just like the bank
                                    ($2,030 repair charges &minus; $800 paid down = $1,230 owed).</span>
                                </li>
                                <li className="flex gap-2">
                                    <span style={{ color: colors.success }}>✓</span>
                                    <span>Not all money <em>out</em> is gone: half the rent bought a future month &mdash;
                                    a prepaid asset you still hold.</span>
                                </li>
                                <li className="flex gap-2">
                                    <span style={{ color: colors.success }}>✓</span>
                                    <span>Your two lists earned their names: <strong>Assets</strong> ($3,410) and
                                    <strong> Liabilities</strong> ($1,450).</span>
                                </li>
                            </ol>
                        </div>
                        <KeyInsightBox>
                            <p className="font-semibold mb-2">The deeper point</p>
                            <p>
                                A list of cash going in and out isn't the same as what you <em>have</em> and
                                <em> owe</em>. You had to <em>interpret</em> the bank's record &mdash; separate the
                                repair from the personal, tell an advance from money earned, split a rent payment into
                                used-up and paid-ahead &mdash; to see your real picture. That interpretation is what
                                turns a bank statement into a set of Assets and Liabilities. The records and the
                                economic reality are not the same thing.
                            </p>
                        </KeyInsightBox>
                        <div className="rounded-lg p-4 mb-4" style={{ backgroundColor: colors.clayLight }}>
                            <h3 className="font-bold mb-2" style={{ color: colors.primary }}>Coming Next</h3>
                            <p className="text-sm mb-2" style={{ color: colors.earthDark }}>
                                Your two lists won't sit still &mdash; they change every week as you work. The amounts
                                tell you <em>what</em> changed, but never <em>why</em>. Next, you'll set up a way to keep
                                the reasons alongside the numbers.
                            </p>
                            <p className="font-bold" style={{ color: colors.primary }}>
                                Next: Tutorial 1.4 &mdash; Keeping the Reasons
                            </p>
                        </div>
                        <a href="14-keeping-reasons.html"
                           className="w-full py-3 rounded-lg font-bold text-white flex items-center justify-center gap-2 mb-3 border-0 cursor-pointer no-underline"
                           style={{ backgroundColor: colors.primary }}>
                            Next Tutorial →
                        </a>
                        <button onClick={handleRestart}
                                className="w-full py-3 rounded-lg font-bold flex items-center justify-center gap-2 cursor-pointer"
                                style={{
                                    border: `2px solid ${colors.primary}`,
                                    color: colors.primary,
                                    backgroundColor: 'transparent'
                                }}>
                            ↺ Restart Tutorial
                        </button>
                    </div>
                </div>
            );

            // ============================================================
            // PHASE ROUTER
            // ============================================================
            const renderPhase = () => {
                if (phase === 'welcome') return renderWelcome();
                if (phase === 'bank-sort') return renderSort();
                if (phase === 'cash-records') return renderCashRecords();
                if (phase === 'deposits') return renderProbeCustomers();
                if (phase === 'card-sort') return renderCardSort();
                if (phase === 'promises-tab') return renderPromisesTab();
                if (phase === 'prepaid-rent') return renderProbeRent();
                if (phase === 'name-it') return renderNameIt();
                if (phase === 'complete') return renderComplete();
                return null;
            };

            return (
                <div className="min-h-screen" style={{ backgroundColor: colors.sand }}>
                    {renderPhase()}
                    {showGlossary && <GlossaryModal />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TutorialApp />);
    </script>
</body>
</html>
