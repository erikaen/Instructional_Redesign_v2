<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Format the Statement</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Open+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="page pg-33-3">
  <div class="prework-wrap">

    <div class="phase-title-row">
      <div class="phase-title"></div>
      <button class="icon-btn" title="Glossary" aria-label="Open glossary" onclick="openGlossary()"><i data-lucide="book-open"></i></button>
    </div>

    <div class="narrative-block">
      <p>The Working Tab holds the season&rsquo;s GENERATED rows, now grouped: <strong>Revenue $6,020</strong>; <strong>Parts Used $1,200</strong>; <strong>Rent $1,950</strong>; and <strong>Depreciation $230</strong>. The detail is ready. Now format the sheet.</p>
    </div>

    <div class="xlwb" id="workbookShell">
      <div class="xlwb-bar">
        <div class="xlwb-bar-title"><i data-lucide="sheet" class="licon"></i> <span class="mono">Bike-Repair.xlsx</span></div>
        <div class="xlwb-bar-sheet" id="workbookSheetLabel">Working Tab</div>
      </div>
      <div class="wb-grid-wrap">
        <div id="statementBuild"></div>
        <div id="referenceGrid" hidden></div>
      </div>
      <div class="xlwb-tabs" id="workbookTabs" aria-label="Workbook tabs"></div>
    </div>

    <div id="statementBuild-controls"></div>
    <div id="anna"></div>
    <div id="tie"></div>
    <div id="controls"></div>

  </div>
</div>

<div class="glossary-overlay" id="glossaryOverlay" onclick="if(event.target===this) closeGlossary()">
  <div class="glossary-panel">
    <div class="glossary-panel-head">
      <div class="glossary-panel-title"><i data-lucide="book-open" class="licon"></i> Glossary</div>
      <button class="glossary-close-btn" aria-label="Close" onclick="closeGlossary()">&times;</button>
    </div>
    <div class="glossary-list" id="glossaryList"></div>
  </div>
</div>

<script src="bike-repair-job-records.js"></script>
<script src="bike-repair-parts-purchases.js"></script>
<script src="bike-repair-workbook.js"></script>
<script src="shared.js"></script>
<script src="bike-repair-statement-steps.generated.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script>
if(window.lucide) lucide.createIcons();

var audioCtx=null;
function ac(){ if(!audioCtx){ try{audioCtx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } return audioCtx; }
function tone(f,d,t,v){ var c=ac(); if(!c)return; var o=c.createOscillator(),g=c.createGain(); o.type=t||'sine'; o.frequency.value=f; o.connect(g); g.connect(c.destination); g.gain.setValueAtTime(v||0.05,c.currentTime); g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+d); o.start(); o.stop(c.currentTime+d); }
function playSuccess(){ tone(523,0.12); setTimeout(function(){tone(659,0.12);},90); setTimeout(function(){tone(784,0.16);},180); }
function playClick(){ tone(600,0.08,'sine',0.04); }

function annaBox(inner){ return '<div class="dialog-box anna"><div class="dialog-label">ANNA</div><div class="dialog-text">'+inner+'</div></div>'; }
function insightBox(label,inner){ return '<div class="insight-box"><div class="insight-label"><i data-lucide="lightbulb" class="licon"></i> '+label+'</div>'+inner+'</div>'; }

var LEDGER_WORKBOOK_KEY='bike-repair-module-3-3';
var BUILD_WORKBOOK_KEY='income-statement-steps';
var REVENUE=6020, EXPENSES=3380, NET_INCOME=2640;
var completed=false, referenceMountSerial=0;

function cloneSheet(sheet){ return JSON.parse(JSON.stringify(sheet)); }
function sheetOf(namePart){
  var sheets=BR_STMT_DATA.workbooks[LEDGER_WORKBOOK_KEY].sheets;
  for(var i=0;i<sheets.length;i++){
    if(sheets[i].name.indexOf(namePart)>=0){
      var copy=cloneSheet(sheets[i]);
      (copy.cells||[]).forEach(function(cell){
        if(typeof cell.value==='string') cell.value=cell.value.replace(/Members['’] Capital/g,"Member's Capital");
      });
      return copy;
    }
  }
  return null;
}

/* The authored Balance Sheet stores amounts in column C. The workbook grid
   gives amount formatting to column D, so move those display cells on a copy. */
function balanceSheetView(){
  var sheet=sheetOf('Balance Sheet');
  (sheet.cells||[]).forEach(function(cell){ if(cell.c===3) cell.c=4; });
  if(sheet.cols && sheet.cols[3] && sheet.cols[2]) sheet.cols[3].width=sheet.cols[2].width;
  return sheet;
}

function setWorkbookChrome(activeKey){
  var tabs=[
    {key:'Assets',label:'Assets'},
    {key:'Liabilities',label:'Liabilities'},
    {key:'Reasons',label:'Reasons'},
    {key:'Balance Sheet',label:'Balance Sheet'},
    {key:'Statement',label:completed?'Income Statement':'Working Tab'}
  ];
  document.getElementById('workbookTabs').innerHTML=tabs.map(function(tab){
    var active=tab.key===activeKey;
    var kind=tab.key==='Statement'?(completed?' tk-stmt':' tk-temp'):'';
    return '<button class="xlwb-tab'+kind+(active?' active':'')+'" type="button" data-workbook-tab="'+tab.key+'"'
      +(active?' aria-current="page"':'')+' onclick="showWorkbookTab33(\''+tab.key+'\')">'+tab.label+'</button>';
  }).join('');
  document.getElementById('workbookSheetLabel').textContent=activeKey==='Statement'
    ?(completed?'Income Statement':'Working Tab'):activeKey;
}

function showWorkbookTab33(name){
  var build=document.getElementById('statementBuild');
  var reference=document.getElementById('referenceGrid');
  playClick();
  if(name==='Statement'){
    build.hidden=false;
    reference.hidden=true;
  } else {
    build.hidden=true;
    reference.hidden=false;
    var sheet=name==='Balance Sheet'?balanceSheetView():sheetOf(name);
    BRW.mountGrid('referenceGrid',sheet,{
      gridId:'format-statement-reference-'+name.toLowerCase().replace(/[^a-z]+/g,'-')+'-'+(++referenceMountSerial)
    });
    BRW.markDatedRows('referenceGrid');
  }
  setWorkbookChrome(name);
  if(window.lucide) lucide.createIcons();
}

function renderTie(){
  document.getElementById('tie').innerHTML=completed
    ?'<div class="narrative-block"><p><strong>The ruled lines agree.</strong> On the Reasons tab, GENERATED reads <strong>$170</strong> on June 1 and <strong>$2,810</strong> on August 31. The <strong>$2,640</strong> movement is exactly the number on the formatted sheet.</p></div>'
    :'';
}

function renderTalk(){
  var anna='', controls='';
  if(!completed){
    anna=annaBox('The sorting work is done. Format the grouped sheet: fold Revenue to one line, keep one line for each expense kind, and rule the totals.');
    controls=insightBox('The format carries the answer',
      '<p>Revenue becomes one <strong>$6,020</strong> line. The expense kinds become <strong>Parts Used $1,200</strong>, <strong>Rent $1,950</strong>, and <strong>Depreciation $230</strong>.</p>');
  } else {
    anna=annaBox('I promised the income statement would show the three depreciation entries together as one <strong>$230</strong> line. There it is. Now call the formatted sheet the <strong>Income Statement</strong>. Revenue is <strong>'+BRW.dol(REVENUE)+'</strong>, Total expenses are <strong>'+BRW.dol(EXPENSES)+'</strong>, and Net income is <strong>'+BRW.dol(NET_INCOME)+'</strong>.');
    controls=insightBox('The tab earns its name',
      '<p><strong>Working Tab</strong> becomes <strong>Income Statement</strong>, and its tab changes from amber to purple. The sheet says <strong>'+BRW.dol(NET_INCOME)+'</strong>. The dated GENERATED lines say <strong>'+BRW.dol(2810)+' &minus; '+BRW.dol(170)+' = '+BRW.dol(NET_INCOME)+'</strong>. The formatted sheet summarizes the rows between those dates; it does not move them.</p>')
      +'<div class="next-phase-msg">Net income is <strong>'+BRW.dol(NET_INCOME)+'</strong>, while Cash reads <strong>$620</strong>, down from <strong>$1,300</strong> on June 1. Both numbers are true because they answer different questions.</div>'
      +'';
  }
  document.getElementById('anna').innerHTML=anna;
  document.getElementById('controls').innerHTML=controls;
  renderTie();
  document.getElementById('statementBuild').hidden=false;
  document.getElementById('referenceGrid').hidden=true;
  setWorkbookChrome('Statement');
  if(window.lucide) lucide.createIcons();
}

var glossaryTerms=[
  {term:'Income Statement',def:'A report that summarizes Revenue and Expenses between chosen dates. Here, it formats the season&rsquo;s GENERATED rows on the Income Statement tab.'},
  {term:'Net income',def:'Revenue minus Expenses between the chosen dates: $6,020 minus $3,380 = $2,640.'},
  {term:'Depreciation',def:'The recorded reduction for wear and obsolescence during the period. The three detailed amounts fold to one $230 line on this statement.'}
];
function openGlossary(){
  document.getElementById('glossaryList').innerHTML=glossaryTerms.map(function(g){
    return '<div class="glossary-entry"><div class="glossary-entry-term">'+g.term+'</div><div class="glossary-entry-def">'+g.def+'</div></div>';
  }).join('');
  document.getElementById('glossaryOverlay').classList.add('open');
}
function closeGlossary(){ document.getElementById('glossaryOverlay').classList.remove('open'); }
function nav(url){ playClick(); window.location.href=url; }
function restart(){ playClick(); var b=document.querySelector('#statementBuild-controls .brw-step-back'); for(var i=0;i<6&&b;i++){ b.click(); b=document.querySelector('#statementBuild-controls .brw-step-back'); } window.scrollTo(0,0); }
document.addEventListener('keydown',function(event){ if(event.key==='Escape') closeGlossary(); });

window.devFill=function(){
  var advance=document.querySelector('#statementBuild-controls .brw-step-advance');
  if(advance) advance.click();
};
BR_WB.mountStatementBuild('statementBuild',BUILD_WORKBOOK_KEY,{
  startAt:4,
  stopAt:5,
  gridOpts:{gridId:'format-statement-build-grid'},
  onStep:function(order){
    BRW.markDatedRows('statementBuild');
    var was=completed;
    completed=(order===5);
    if(completed&&!was){
      renderTalk();
      playSuccess();
      window.scrollTo(0,0);
    } else if(was&&!completed){
      renderTalk();
    }
  }
});
BRW.markDatedRows('statementBuild');
renderTalk();
</script>
<script src="dev.js"></script>
</body>
</html>
