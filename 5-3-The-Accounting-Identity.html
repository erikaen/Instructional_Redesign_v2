<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light dark">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Module 5 — The Accounting Identity</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Open+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="page">
  <div class="prework-wrap">

    <div class="tut-header">
      <div class="tut-header-main">
        <h1>Module 5: Naming What You Built</h1>
        <p class="tut-header-sub">Bicycle repair shop &middot; ~15 min</p>
      </div>
      <div class="tut-header-actions">
        <button class="icon-btn" title="Glossary" aria-label="Open glossary" onclick="openGlossary()"><i data-lucide="book-open"></i></button>
        <button class="icon-btn" title="Restart" aria-label="Restart this section" onclick="restart()"><i data-lucide="rotate-ccw"></i></button>
      </div>
    </div>
    <div class="phase-title" id="phaseTitle"></div>

    <div id="identityBody"></div>

  </div>
</div>

<!-- ===== Glossary overlay ===== -->
<div class="glossary-overlay" id="glossaryOverlay" onclick="if(event.target===this) closeGlossary()">
  <div class="glossary-panel">
    <div class="glossary-panel-head">
      <div class="glossary-panel-title"><i data-lucide="book-open" class="licon"></i> Glossary</div>
      <button class="glossary-close-btn" aria-label="Close" onclick="closeGlossary()">&times;</button>
    </div>
    <div class="glossary-list" id="glossaryList"></div>
  </div>
</div>

<script src="https://unpkg.com/lucide@latest"></script>
<script>
if (window.lucide) lucide.createIcons();

var PHASE_INDEX = 2;
var PHASE_TITLE = 'The Accounting Identity';

/* ===== sound ===== */
var audioCtx = null;
function ac(){ if(!audioCtx){ try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return audioCtx; }
function tone(f,d,t,v){ var c=ac(); if(!c)return; var o=c.createOscillator(),g=c.createGain(); o.type=t||'sine'; o.frequency.value=f; o.connect(g); g.connect(c.destination); g.gain.setValueAtTime(v||0.05,c.currentTime); g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+d); o.start(); o.stop(c.currentTime+d); }
function playSuccess(){ tone(523,0.12); setTimeout(function(){tone(659,0.12);},90); setTimeout(function(){tone(784,0.16);},180); }
function playClick(){ tone(600,0.08,'sine',0.04); }

/* ===== data ===== */
var ASSETS_SNAPSHOT = [
  { cat:'EQUIPMENT', amount:1200, note:'Tools, stand, compressor, the contributed gear' },
  { cat:'COMPUTER EQUIPMENT', amount:610, note:'Laptop' },
  { cat:'SUPPLIES', amount:200, note:'Parts on the shelf' },
  { cat:'FIXTURES', amount:750, note:'Desk, shelving, display, pegboard' },
  { cat:'CASH', amount:0, note:'Repair cash on hand (May 31)' },
  { cat:'RIGHT OF USE', amount:650, note:'The prepaid last month — a right to occupy the space' }
];
var ASSETS_TOTAL = ASSETS_SNAPSHOT.reduce(function(s,c){return s+c.amount;},0); // 3410

var LIABILITIES_SNAPSHOT = [
  { label:"Smith's frame — paid $220 up front, not built yet", amount:220 },
  { label:'What you owe on the bike-repair credit card', amount:1230 }
];
var LIABILITIES_TOTAL = LIABILITIES_SNAPSHOT.reduce(function(s,l){return s+l.amount;},0); // 1450
var NET = ASSETS_TOTAL - LIABILITIES_TOTAL; // 1960

var CONTRIBUTED_ROWS = [
  { account:'Cash',      delta:960, reason:'You put in $960 of your own money to get going.' },
  { account:'Laptop',    delta:610, reason:'You brought your laptop from home.' },
  { account:'Equipment', delta:220, reason:'You brought gear you already owned.' }
];
var GENERATED_ROWS = [
  { account:'Cash', delta:340, reason:'Finished a repair — customer paid $340.' },
  { account:'Cash', delta:180, reason:'Finished a repair — customer paid $180.' },
  { account:'Cash', delta:80,  reason:'Finished a repair — customer paid $80.' },
  { account:'Cash', delta:140, reason:'Finished a repair — customer paid $140.' },
  { account:'Cash', delta:130, reason:'Finished a repair — customer paid $130.' },
  { account:'Cash', delta:100, reason:'Finished a repair — customer paid $100.' },
  { account:'Cash', delta:150, reason:'Finished a repair — customer paid $150.' },
  { account:'Supplies',     delta:-300, reason:'Used $300 of parts finishing jobs.' },
  { account:'Right of Use', delta:-650, reason:'Used the space for May ($650).' }
];
var CONTRIBUTED_TOTAL = CONTRIBUTED_ROWS.reduce(function(s,r){return s+r.delta;},0); // 1790
var GENERATED_TOTAL = GENERATED_ROWS.reduce(function(s,r){return s+r.delta;},0);     // 170
var REASONS_TOTAL = CONTRIBUTED_TOTAL + GENERATED_TOTAL;                             // 1960

var CASH_FLOWS = [
  { date:'May 1',  desc:'Your own money, put in to get going', amount:960 },
  { date:'May 1',  desc:'Rent paid in advance', amount:-1300 },
  { date:'May 3',  desc:'Park Tool stand', amount:-200 },
  { date:'May 7',  desc:'Repair finished — customer paid', amount:340 },
  { date:'May 10', desc:'Repair finished — customer paid', amount:180 },
  { date:'May 12', desc:'Repair finished — customer paid', amount:80 },
  { date:'May 14', desc:'Repair finished — customer paid', amount:140 },
  { date:'May 16', desc:'Card paydown', amount:-400 },
  { date:'May 19', desc:'Repair finished — customer paid', amount:130 },
  { date:'May 22', desc:'Smith deposit', amount:220 },
  { date:'May 23', desc:'Repair finished — customer paid', amount:100 },
  { date:'May 27', desc:'Repair finished — customer paid', amount:150 },
  { date:'May 28', desc:'Card paydown', amount:-400 }
];

var glossaryTerms = [
  { term:'Asset', def:'Something you have — a present right to an economic benefit. The gear, the parts, the prepaid month, cash.' },
  { term:'Liability', def:'Something you owe — a present obligation to transfer an economic benefit later. The card balance, Smith&rsquo;s frame.' },
  { term:'Equities', def:'The definitional residual: recorded Assets minus recorded Liabilities. Plural, to keep it from sounding like one thing the owner has. It&rsquo;s a difference, not a pile of cash.' },
  { term:'Accounting identity', def:'Assets − Liabilities = Equities. Not an equation to solve — it holds by construction, for every entity, every time.' },
  { term:'Balance sheet', def:'The one page that lays out Assets, Liabilities, and the residual between them — built around the identity, not assembled to satisfy one.' },
  { term:'Entity', def:'The subject of a set of books — a perspective you draw a boundary around and adopt for a purpose. You make it; you don&rsquo;t find it.' },
  { term:'Net Assets', def:'What an entity with no owners calls its residual (Assets − Liabilities). Same definition as Equities; the label differs because accountability runs to mission and donors, not owners.' },
  { term:'Double-entry', def:'The centuries-old method in which every change has two sides. Still how every number on every financial statement gets there.' },
  { term:'Contributed', def:'The part of the residual you put in from outside the work — your own cash, gear you already owned.' },
  { term:'Generated', def:'The part of the residual the work itself produced and you kept — customer work, less what it used up.' }
];

/* ===== formatters ===== */
function d(v){ return (v<0?'−$':'$') + Math.abs(v).toLocaleString('en-US'); }
function sd(v){ return (v>=0?'+$':'−$') + Math.abs(v).toLocaleString('en-US'); }
function catLabel(cat){ return cat==='RIGHT OF USE' ? 'Right of Use' : (cat.charAt(0)+cat.slice(1).toLowerCase()); }

/* ===== state ===== */
var excelTab = 'reasons';
var reasonsExpanded = { contributed:false, generated:false };
var curWbContainer = null;
var idStage = 0;

/* ===== Excel workbook ===== */
function assetsSheet(){
  var html = '<div class="xl-row xl-head"><div class="xl-gutter"></div><div class="xl-rownum"></div><div class="xl-c">Assets — what I have</div><div class="xl-v">Value</div></div>';
  var n=0;
  ASSETS_SNAPSHOT.forEach(function(c){ n++;
    html += '<div class="xl-row xl-item"><div class="xl-gutter"></div><div class="xl-rownum">'+n+'</div><div class="xl-c">'+catLabel(c.cat)+' &mdash; '+c.note+'</div><div class="xl-v">'+d(c.amount)+'</div></div>';
  });
  html += '<div class="xl-row xl-total"><div class="xl-gutter"></div><div class="xl-rownum"></div><div class="xl-c">Total Assets — what the records show</div><div class="xl-v">'+d(ASSETS_TOTAL)+'</div></div>';
  return html;
}
function liabilitiesSheet(){
  var html = '<div class="xl-row xl-head"><div class="xl-gutter"></div><div class="xl-rownum"></div><div class="xl-c">Liabilities — what I owe</div><div class="xl-v">Amount</div></div>';
  LIABILITIES_SNAPSHOT.forEach(function(l,i){
    html += '<div class="xl-row xl-item"><div class="xl-gutter"></div><div class="xl-rownum">'+(i+1)+'</div><div class="xl-c">'+l.label+'</div><div class="xl-v">'+d(l.amount)+'</div></div>';
  });
  html += '<div class="xl-row xl-total"><div class="xl-gutter"></div><div class="xl-rownum"></div><div class="xl-c">Total Liabilities — what the records show</div><div class="xl-v">'+d(LIABILITIES_TOTAL)+'</div></div>';
  return html;
}
function cashSheet(){
  var inflows = CASH_FLOWS.filter(function(f){return f.amount>0;});
  var outflows = CASH_FLOWS.filter(function(f){return f.amount<0;});
  var totalIn = inflows.reduce(function(s,f){return s+f.amount;},0);
  var totalOut = outflows.reduce(function(s,f){return s+f.amount;},0);
  var onHand = totalIn + totalOut;
  var html = '<div class="cash-sheet-head"><div class="cash-sheet-title">Repair cash — May</div></div>';
  html += '<div class="cash-group in"><div class="cash-group-label">Cash in</div>';
  inflows.forEach(function(f){ html += '<div class="cash-line"><span><span class="cash-line-date">'+f.date+'</span>'+f.desc+'</span><span class="cash-line-amt">+'+d(f.amount)+'</span></div>'; });
  html += '<div class="cash-subtotal"><span>Total in</span><span class="cash-line-amt">'+d(totalIn)+'</span></div></div>';
  html += '<div class="cash-group out"><div class="cash-group-label">Cash out</div>';
  outflows.forEach(function(f){ html += '<div class="cash-line"><span><span class="cash-line-date">'+f.date+'</span>'+f.desc+'</span><span class="cash-line-amt">'+d(f.amount)+'</span></div>'; });
  html += '<div class="cash-subtotal"><span>Total out</span><span class="cash-line-amt">'+d(totalOut)+'</span></div></div>';
  html += '<div class="cash-net"><span class="cash-net-label">Cash on hand (May 31)</span><span class="cash-net-val">'+d(onHand)+'</span></div>';
  return html;
}
function reasonsGroup(key, title, rows, total){
  var open = reasonsExpanded[key];
  var html = '<div class="xl-row xl-cat"><div class="xl-gutter"><button class="xl-toggle" onclick="toggleReasonsCat(\''+key+'\')" aria-expanded="'+open+'">'+(open?'−':'+')+'</button></div><div class="xl-rownum"></div><div class="xl-c">'+title+' ('+rows.length+')</div><div class="xl-v">'+sd(total)+'</div></div>';
  if(open){
    rows.forEach(function(r){
      html += '<div class="xl-row xl-item"><div class="xl-gutter"></div><div class="xl-rownum"></div><div class="xl-c">'+r.account+' &mdash; '+r.reason+'</div><div class="xl-v">'+sd(r.delta)+'</div></div>';
    });
  }
  return html;
}
function reasonsSheet(){
  var html = '<div class="xl-row xl-head"><div class="xl-gutter"></div><div class="xl-rownum"></div><div class="xl-c">Reasons — why your net moved (two kinds)</div><div class="xl-v">Change</div></div>';
  html += reasonsGroup('contributed', 'CONTRIBUTED', CONTRIBUTED_ROWS, CONTRIBUTED_TOTAL);
  html += reasonsGroup('generated', 'GENERATED', GENERATED_ROWS, GENERATED_TOTAL);
  html += '<div class="xl-row xl-total"><div class="xl-gutter"></div><div class="xl-rownum"></div><div class="xl-c">TOTAL — the reasons</div><div class="xl-v">'+sd(REASONS_TOTAL)+'</div></div>';
  return html;
}
function renderWorkbook(containerId){
  curWbContainer = containerId;
  var tabs = [{id:'assets',label:'Assets'},{id:'liabilities',label:'Liabilities'},{id:'cash',label:'Cash'},{id:'reasons',label:'Reasons'}];
  var body;
  if(excelTab==='assets') body = assetsSheet();
  else if(excelTab==='liabilities') body = liabilitiesSheet();
  else if(excelTab==='cash') body = cashSheet();
  else body = reasonsSheet();
  var activeLabel = tabs.find(function(t){return t.id===excelTab;}).label;
  var tabsHtml = tabs.map(function(t){ return '<button class="xlwb-tab'+(t.id===excelTab?' active':'')+'" onclick="setTab(\''+t.id+'\')">'+t.label+'</button>'; }).join('');
  var html = '<div class="xlwb">'+
    '<div class="xlwb-bar"><span class="xlwb-bar-title"><i data-lucide="file-spreadsheet" class="licon"></i> <span class="mono">Bike-Repair.xlsx</span></span><span class="xlwb-bar-sheet">'+activeLabel+' sheet</span></div>'+
    '<div>'+body+'</div>'+
    '<div class="xlwb-tabs">'+tabsHtml+'<span class="xlwb-tab-add"><i data-lucide="plus" class="licon"></i></span></div></div>';
  document.getElementById(containerId).innerHTML = html;
  if(window.lucide) lucide.createIcons();
}
function setTab(id){ playClick(); excelTab = id; if(curWbContainer) renderWorkbook(curWbContainer); }
function toggleReasonsCat(k){ playClick(); reasonsExpanded[k] = !reasonsExpanded[k]; if(curWbContainer) renderWorkbook(curWbContainer); }

/* ===== identity (staged reveal) ===== */
function annaBox(inner){ return '<div class="dialog-box anna"><div class="dialog-label">ANNA</div><div class="dialog-text">'+inner+'</div></div>'; }
function insightBox(label, inner){ return '<div class="insight-box"><div class="insight-label"><i data-lucide="lightbulb" class="licon"></i> '+label+'</div>'+inner+'</div>'; }
function continueBtn(label){ return '<button class="btn-continue btn-block" onclick="identityNext()">'+label+' &rarr;</button>'; }

function matchDisplay(){
  return '<div class="identity-bar">'+
    '<div class="id-group"><span class="id-label">Have &minus; Owe</span><span class="id-num">'+d(NET)+'</span></div>'+
    '<span class="id-op">=</span>'+
    '<div class="id-group"><span class="id-label">Contributed + Generated</span><span class="id-num">'+d(CONTRIBUTED_TOTAL)+' + '+d(GENERATED_TOTAL)+'</span></div>'+
    '<span class="id-op">=</span>'+
    '<div class="id-group"><span class="id-num">'+d(REASONS_TOTAL)+' <i data-lucide="check" class="licon"></i></span></div>'+
    '</div>';
}
function identityFormula(){
  return '<div class="eq-compare"><div class="eq-panel">'+
    '<div class="eq-panel-tag">The accounting identity</div>'+
    '<div class="eq-panel-row"><span class="eq-term a">Assets</span><span class="eq-op">&minus;</span><span class="eq-term l">Liabilities</span><span class="eq-op">=</span><span class="eq-term e">Equities</span></div>'+
    '<div class="eq-panel-caption">An identity, not something to solve. It holds by definition, for every entity, every time.</div>'+
    '</div></div>';
}
function balanceSheet(){
  return '<div class="acct-col">'+
    '<div class="bs-header"><div class="bs-header-title">THE BALANCE SHEET</div><div class="bs-header-date">Your repair work &middot; May 31</div></div>'+
    '<div class="acct-line"><span>Assets</span><span class="acct-val">'+d(ASSETS_TOTAL)+'</span></div>'+
    '<div class="acct-line"><span>&minus; Liabilities</span><span class="acct-val">'+d(LIABILITIES_TOTAL)+'</span></div>'+
    '<div class="acct-total"><span>= Equities</span><span>'+d(NET)+'</span></div>'+
    '<div class="acct-line"><span>Contributed &mdash; what you put in</span><span class="acct-val">'+d(CONTRIBUTED_TOTAL)+'</span></div>'+
    '<div class="acct-line"><span>Generated &mdash; what the work made</span><span class="acct-val">'+d(GENERATED_TOTAL)+'</span></div>'+
    '</div>';
}

function renderIdentity(){
  var c = document.getElementById('identityBody');
  var html = '';
  if(idStage===0){
    html += annaBox('&ldquo;You found your net two ways waiting to happen. One: Assets minus Liabilities, '+d(NET)+'. Now the other: total the <strong>Reasons</strong> that moved your net &mdash; the contributed pile and the generated pile. Add them up.&rdquo;');
    html += '<div id="identityWb"></div>';
    html += continueBtn('Total the Reasons');
    c.innerHTML = html;
    excelTab = 'reasons'; reasonsExpanded = { contributed:true, generated:true };
    renderWorkbook('identityWb');
    if(window.lucide) lucide.createIcons();
    return;
  }
  html += matchDisplay();
  if(idStage===1){
    html += insightBox('They match &mdash; and they always will', '<p>This is not a coincidence. Your net is what remains after subtracting what you owe from what you have.</p><p>The reasons that changed your net must add up to the same amount. This works <strong>by construction</strong>, every time, for any set of books.</p>');
    html += continueBtn('Name what you just matched');
  } else if(idStage===2){
    html += annaBox('&ldquo;That residual &mdash; what you have minus what you owe &mdash; has a name: <strong>Equities</strong>.<br><br>It is plural on purpose. This is a <em>difference</em>, not a pile of cash the owner can pocket. It means recorded Assets minus recorded Liabilities, including all the gaps and estimates. The plural keeps us honest.&rdquo;');
    html += continueBtn('Write it down');
  } else if(idStage===3){
    html += identityFormula();
    html += balanceSheet();
    html += insightBox('This page is the balance sheet', '<p>It&rsquo;s built <em>around</em> the identity, not assembled to satisfy one. You list Assets, take out Liabilities, and Equities falls out as the difference &mdash; split into where it came from: <strong>contributed</strong> and <strong>generated</strong>. The fact that it lines up isn&rsquo;t a result. It&rsquo;s the construction.</p>');
    html += continueBtn('Interpret the balance sheet');
  } else if(idStage===4){
    html += balanceSheet();
    html += annaBox('&ldquo;Before you trust this page, remember one thing: every item on it has <strong>evidence</strong> &mdash; a receipt, a statement, or a price you can point to. That is what makes it a <strong>record</strong>. A record only includes things that meet that standard.&rdquo;');
    html += insightBox('The records show less than you have', '<p>Look at what is <em>not</em> on the page: your skill at the bench, the regular customers who keep coming back, and the name you are building on Whalley Ave.</p>'+
      '<p>All of those are real, and they matter to the repair work. But none of them has a receipt or a clear price you can point to, so none of them appears on this list.</p>'+
      '<p>So read &ldquo;Assets, '+d(ASSETS_TOTAL)+'&rdquo; as <strong>what the records show</strong> &mdash; not everything the repair work is worth. The list shows what it can show. You <strong>have</strong> more than the list shows, but that is not a mistake. That is how records work.</p>'+
      '<p>It is also why <strong>Equities</strong> is not your personal net worth. It is the difference between two <em>recorded</em> lists: recorded Assets minus recorded Liabilities.</p>');
    html += '<div class="next-phase-msg">You&rsquo;ve finished this section &mdash; click <strong>Next</strong> to continue.</div>';
  }
  c.innerHTML = html;
  if(window.lucide) lucide.createIcons();
}
function identityNext(){
  idStage++;
  if(idStage===1) playSuccess(); else playClick();
  window.scrollTo(0,0);
  renderIdentity();
}

/* ===== restart ===== */
function restart(){
  idStage=0; excelTab='reasons'; reasonsExpanded={ contributed:false, generated:false };
  renderIdentity();
  window.scrollTo(0,0);
}

/* ===== glossary ===== */
function openGlossary(){
  document.getElementById('glossaryList').innerHTML = glossaryTerms.map(function(g){
    return '<div class="glossary-entry"><div class="glossary-entry-term">'+g.term+'</div><div class="glossary-entry-def">'+g.def+'</div></div>';
  }).join('');
  document.getElementById('glossaryOverlay').classList.add('open');
}
function closeGlossary(){ document.getElementById('glossaryOverlay').classList.remove('open'); }

/* ===== progress ===== */
function renderSegProgress(){
  document.getElementById('phaseTitle').textContent = PHASE_TITLE;
}

/* ===== init ===== */
renderSegProgress();
idStage = 0;
renderIdentity();
</script>
</body>
</html>
