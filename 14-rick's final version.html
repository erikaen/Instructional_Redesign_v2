            new (window.AudioContext || window.webkitAudioContext)();

        const playSuccessTone = () => {
            try {
                const ctx = createAudioContext();
                [523.25, 659.25, 783.99].forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.frequency.value = freq; osc.type = 'sine';
                    const t = ctx.currentTime + i * 0.1;
                    gain.gain.setValueAtTime(0, t);
                    gain.gain.linearRampToValueAtTime(0.3, t + 0.02);
                    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
                    osc.start(t); osc.stop(t + 0.25);
                });
                setTimeout(() => ctx.close(), 600);
            } catch(e) {}
        };

        const playSoftNope = () => {
            try {

                    const gain = ctx.createGain();
                    osc.connect(gain); gain.connect(ctx.destination);

            { id: 'e_v1', win: 'cash', rowId: 'w_ca_v1', otherWin: null, cat: 'earned', ev: null, reason: 'Finished a repair — customer paid $340 (May 7).' },

            { id: 'e_v3', win: 'cash', rowId: 'w_ca_v3', otherWin: null, cat: 'earned', ev: null, reason: 'Finished a repair — customer paid $80 (May 12).' },
            { id: 'e_v4', win: 'cash', rowId: 'w_ca_v4', otherWin: null, cat: 'earned', ev: null, reason: 'Finished a repair — customer paid $140 (May 14).' },
            { id: 'e_v5', win: 'cash', rowId: 'w_ca_v5', otherWin: null, cat: 'earned', ev: null, reason: 'Finished a repair — customer paid $130 (May 19).' },
            { id: 'e_v6', win: 'cash', rowId: 'w_ca_v6', otherWin: null, cat: 'earned', ev: null, reason: 'Finished a repair — customer paid $100 (May 23).' },
            { id: 'e_v7', win: 'cash', rowId: 'w_ca_v7', otherWin: null, cat: 'earned', ev: null, reason: 'Finished a repair — customer paid $150 (May 27).' },
            // the ex-post 12th solo — created only at the DISCOVERY in walk-cash (never upfront)
            { id: 'e_plug', win: 'cash', rowId: 'w_ca_plug', otherWin: null, cat: 'contributed', ev: null, reason: 'My personal self covered what the work drew down — I only see it now, tallying up.' },
        ];
        const EV_BY_ID = {};
        PAIR_EVENTS.forEach(e => { EV_BY_ID[e.id] = e; });
        const SOLO_EVENT_IDS = PAIR_EVENTS.filter(e => !e.otherWin).map(e => e.id);
        const PAIR_EVENT_COUNT = PAIR_EVENTS.filter(e => e.otherWin).length;
        // Workbook row → the event it belongs to. side 1 = where the reason gets CREATED;
        // side 2 = the second half (a record someone else kept) — answering it REUSES the reason.
        const ROW_EVENT = {};
        PAIR_EVENTS.forEach(e => {
            ROW_EVENT[e.rowId] = { id: e.id, side: 1 };

        });
        WINROW_BY_ID['w_ca_plug'] = { id: 'w_ca_plug', label: 'From your personal self — covering what the work drew down', delta: 960 };
        // v3 — receipt group → the reason (event) answering it creates; chip labels for the lists.
        const GROUP_TO_EVENT = { g_stand: 'e_stand', g_tools: 'e_tools', g_compressor: 'e_comp', g_washer: 'e_wash', g_truing: 'e_tru', g_gear: 'e_gear', g_laptop: 'e_laptop', g_fixtures: 'e_fix' };
        const LIST_LABEL = { equipment: 'Equipment', computer: 'Computer Equip.', supplies: 'Supplies', fixtures: 'Fixtures', rou: 'Right of Use', liab: 'Liabilities', cash: 'Cash' };


        const xlDollars = (v) => (v < 0 ? '−$' : '$') + Math.abs(v).toLocaleString('en-US');
        const signedDollars = (v) => (v >= 0 ? '+' : '−') + '$' + Math.abs(v).toLocaleString('en-US');

        // ============================================================
        // App
        // ============================================================
        const App = () => {
            const [phase, setPhase] = useState('welcome');
            const [step, setStep] = useState(0);
            const [activeTab, setActiveTab] = useState('assets');
            const [assetsExpanded, setAssetsExpanded] = useState({});

            // Equipment item-level walk (Increment 1): "how did each item come in?"
            const [eqItemRecorded, setEqItemRecorded] = useState({});   // item name -> recorded source
            const [eqActiveItem, setEqActiveItem]     = useState(null); // item being answered
            const [eqItemAttempts, setEqItemAttempts] = useState({});   // item name -> wrong-attempt count
            const [eqItemNudge, setEqItemNudge]       = useState(null); // { item, attempted }
            const [eqReceipt, setEqReceipt]           = useState(null); // group id whose receipt popup is open
            const [eqAutoActive, setEqAutoActive]     = useState(false);
            const [eqAutoDone, setEqAutoDone]         = useState(false);

            // Supplies pool walk (Increment 2): bought + used, with the observed-vs-inferred beat
            // Supplies — item-level (parallel to Equipment). Each part: purchase reason + use reason.
            const [supActiveItem, setSupActiveItem] = useState(null);   // item name being recorded
            const [supItemBought, setSupItemBought] = useState({});     // name → source ('card')
            const [supItemUsed, setSupItemUsed]     = useState({});     // name → true (use recorded)
            const [supItemAtt, setSupItemAtt]       = useState({});     // name → { bought, used }
            const [supNudge, setSupNudge]           = useState(null);   // { item, step: 'bought'|'used' }
            const [supAutoActive, setSupAutoActive] = useState(false);
            const [supAutoDone, setSupAutoDone]     = useState(false);
            const [supReceipt, setSupReceipt]       = useState(null);   // 'qbp' | 'used'

            // Right of Use pool walk (Increment 3, the foil): paid + used, used is KNOWN (calendar)
            const [rouActive, setRouActive]   = useState(null);  // 'paid' | 'used'
            const [rouPaid, setRouPaid]       = useState(null);  // recorded source ('cash')
            const [rouUsed, setRouUsed]       = useState(false); // recorded
            const [rouPaidAtt, setRouPaidAtt] = useState(0);
            const [rouUsedAtt, setRouUsedAtt] = useState(0);
            const [rouNudge, setRouNudge]     = useState(null);  // 'paid' | 'used'
            const [rouReceipt, setRouReceipt] = useState(null);  // 'lease' | 'used'

            // v3 walk-liab / walk-cash — walking records OTHERS kept (the statement; the bank's flows).
            // One row mechanic: side-1 rows CREATE reasons; side-2 rows REUSE them (⟷).
            const [rowActive, setRowActive] = useState(null);  // workbook row id being answered
            const [rowAtt, setRowAtt]       = useState({});    // row id -> wrong-attempt count
            const [rowNudge, setRowNudge]   = useState(null);  // row id
            const [rowAuto, setRowAuto]     = useState(null);  // 'liab' | 'cash' while autocompleting
            const [liabReceipt, setLiabReceipt] = useState(null);  // 'card' | 'smith' (evidence modal)

            // Crossout phase (v3): cross out the ⟷ reasons — they only shuffled
            const [xOut, setXOut]   = useState({});    // event id -> true (crossed out)
            const [xAuto, setXAuto] = useState(false);

            // Sort phase (v3): the surviving solos into Contributed / Generated
            const [categoryAssignments, setCategoryAssignments] = useState({});
            const [sortAutoActive, setSortAutoActive] = useState(false);
            const [sortAutoDone, setSortAutoDone] = useState(false);
            const [sortNudge, setSortNudge] = useState(null);

            // ★ The discovery (walk-cash): the ex-post $960 — recognized, never upfront
            const [plugDone, setPlugDone]   = useState(false);
            const [plugAtt, setPlugAtt]     = useState(0);
            const [plugNudge, setPlugNudge] = useState(false);

            const [showGlossary, setShowGlossary] = useState(false);
            const [devMode, setDevMode] = useState(false);

            // ----- Derived -----
            const phaseOrder = ['welcome', 'walk-equipment', 'walk-computer', 'walk-supplies', 'walk-fixtures', 'walk-rou', 'walk-liab', 'walk-cash', 'crossout', 'sort', 'complete'];
            const progress = Math.round((phaseOrder.indexOf(phase) / (phaseOrder.length - 1)) * 100);

            const createdSolos = SOLO_EVENT_IDS.filter(id => r3Created.includes(id));
            const correctlyAssignedCount = Object.keys(categoryAssignments).length;
            const allSorted = createdSolos.length > 0 && correctlyAssignedCount === createdSolos.length;
            const sortTriggerMet = correctlyAssignedCount >= 2 && !allSorted && !sortAutoActive && !sortAutoDone;

            // v3: Cash lives ON the Assets tab — born in the welcome, repaired at the discovery.
            const cashLineVisible = phase !== 'welcome' || wcAnswered;
            const cashFlowRows = [
                ...CASH_FLOWS.map((f, i) => ({ id: CASH_ROW_IDS[i], name: `${f.date} — ${f.desc}`, amount: f.amount })),
                ...(plugDone ? [{ id: 'w_ca_plug', name: 'From your personal self — covering what the work drew down', amount: 960 }] : []),

            const cashBalance = cashFlowRows.reduce((s, r) => s + r.amount, 0); // −960 → 0

            // ----- Handlers -----
            const handleHeaderClick = () => {

            const handleRestart = () => {

                setEqItemNudge(null); setEqReceipt(null); setEqAutoActive(false); setEqAutoDone(false);

                setSupItemAtt({}); setSupNudge(null); setSupAutoActive(false); setSupAutoDone(false); setSupReceipt(null);
                setRouActive(null); setRouPaid(null); setRouUsed(false);

            const createReason = (id) =>
                setR3Created(prev => (prev.includes(id) ? prev : [...prev, id]));
            const recordGroup = (groupId) => {
                const members = [...EQUIP_ITEMS, ...COMP_ITEMS, ...FIX_ITEMS].filter(it => it.group === groupId);
                setEqItemRecorded(prev => {
                    const next = { ...prev };
                    members.forEach(it => { next[it.name] = it.source; });

                createReason(GROUP_TO_EVENT[groupId]);

            const handleEqItemAnswer = (name, source) => {

            // v3 row mechanic (walk-liab + walk-cash): side-1 rows create, side-2 rows reuse.
            const rowDone = (rowId) => {

            };
            const recordRow = (rowId) => {
                const re = ROW_EVENT[rowId];
                if (re.side === 1) createReason(re.id);
                else setR3Paired(prev => ({ ...prev, [re.id]: true }));

            const handleRowClick = (rowId) => {

            const handleRowAnswer = (rowId, ok) => {
                if (ok) { playSuccessTone(); recordRow(rowId); setRowActive(null); setRowNudge(null); }
                else {
                    const n = (rowAtt[rowId] || 0) + 1;

                    }, i * 180);

            // Stable reuse candidates: the correct reason + two other not-yet-paired ones (backfilled

            const reuseCandidates = (correctId) => {

                if (others.length < 2) {
                    others = others.concat(r3Created.filter(id => id !== correctId && !others.includes(id)).slice(0, 2 - others.length));

            const handleCrossClick = (id) => {

                remaining.forEach((id, i) => {

                        setXOut(prev => ({ ...prev, [id]: true }));

                    }, i * 160);
                });

            // Sort handlers — the surviving solos into Contributed / Generated
            const handleCategoryAssign = (id, category) => {
                if (phase !== 'sort' || sortAutoActive || sortAutoDone) return;
                if (categoryAssignments[id]) return;
                if (EV_BY_ID[id].cat === category) {
                    playSuccessTone();
                    setCategoryAssignments(prev => ({ ...prev, [id]: category }));

                    setSortNudge({ id, attempted: category });

            };
            const handleSortAutocomplete = () => {
                if (sortAutoActive || sortAutoDone) return;
                playContinueClick(); setSortAutoActive(true); setSortNudge(null);
                const unassigned = createdSolos.filter(id => !categoryAssignments[id]);
                unassigned.forEach((id, i) => {
                    setTimeout(() => {
                        setCategoryAssignments(prev => ({ ...prev, [id]: EV_BY_ID[id].cat }));
                        if (i === unassigned.length - 1) {
                            setTimeout(() => { setSortAutoActive(false); setSortAutoDone(true); playSuccessTone(); }, 300);

                    }, i * 160);

            const handlePlugAnswer = (choice) => {
                if (choice === 'pocket') { playSuccessTone(); createReason('e_plug'); setPlugDone(true); setPlugNudge(false); }
                else {

            const handleWcAnswer = (choice) => {
                if (choice === 'benefit') { playSuccessTone(); setWcAnswered(true); setWcNudge(false); setActiveTab('assets'); }
                else {

            // ============================================================

            const Header = () => (

                            <p className="text-sm mt-1" style={{ color: colors.earthLight }}>
                                Bicycle repair shop &middot; ~15 min
                            </p>

                        <div className="flex items-center gap-2">

                               className="p-2 rounded-lg hover:bg-white/10 text-white text-xl border-0 bg-transparent cursor-pointer no-underline inline-flex items-center justify-center"

                      {allDone && !rowAuto && !plugDone && (
                        <div className="rounded-lg p-3 mb-3 border-2" style={{ backgroundColor: 'white', borderColor: colors.clayDark }}>
                          <p className="text-sm font-semibold mb-2" style={{ color: colors.primary }}>
                            The work ran <span style={{ color: '#92400e' }}>$960</span> more out than in — yet your bank
                            account never went negative. You covered it. <span style={{ color: colors.earthDark }}>Did you
                            pay it to yourself?</span>
                          </p>
                          <div className="flex flex-col gap-2">
                            <button onClick={() => handlePlugAnswer('samepocket')} className="text-left px-3 py-2 rounded-lg text-sm border-2 cursor-pointer" style={{ backgroundColor: 'white', borderColor: colors.primary, color: colors.primary }}>Yes — same pocket. It cancels out; nothing really happened</button>
                            <button onClick={() => handlePlugAnswer('pocket')} className="text-left px-3 py-2 rounded-lg text-sm border-2 cursor-pointer" style={{ backgroundColor: 'white', borderColor: colors.primary, color: colors.primary }}>No — my personal self paid my bike-repair self</button>
                            <button onClick={() => handlePlugAnswer('loan')} className="text-left px-3 py-2 rounded-lg text-sm border-2 cursor-pointer" style={{ backgroundColor: 'white', borderColor: colors.primary, color: colors.primary }}>It's a loan — the repair work owes me $960 back</button>
                          </div>
                          {plugNudge && plugAtt < 3 && (
                            <div className="mt-2 p-2 rounded" style={{ backgroundColor: colors.warningBg }}>
                              <p className="text-sm" style={{ color: '#92400e' }}><strong>Hint {plugAtt}/2:</strong> {plugAtt === 1
                                  ? 'If nothing really happened, why does the line read −$960? These lists keep score for the repair work — and the cash that filled the gap came from outside them.'
                                  : 'A loan binds — you never set terms or promised yourself repayment, so there\'s no obligation. Smith and the card already have their lines. Whose pocket is left?'}</p>
                            </div>
                          )}
                        </div>
                      )}
                      {plugDone && (
                        <>
                          <AnnaBox>
                            "There it is. Over May, your <strong>personal self</strong> quietly paid your
                            {' '}<strong>bike-repair self</strong> $960 — and you never decided to. You only see it now,
                            tallying up. Look at the list: the cash line repairs to <strong>$0</strong>, and the total
                            reads <strong>$3,410</strong> again. You just drew a line through the middle of your own
                            wallet — making that line official is the next module's job."
                          </AnnaBox>
                          <KeyInsightBox>
                            <p className="font-semibold mb-2">The −$960 was never an error. It was a boundary, waiting to be seen.</p>
                            <p>The lists keep score for <em>the repair work</em> — and from where they stand, your own
                               other pocket is <strong>outside</strong>. The minus sign was the records telling you a line
                               runs through the middle of your wallet: one account, two selves.</p>
                          </KeyInsightBox>
                          <ContinueButton onClick={() => { setStep(0); setPhase('crossout'); }}>
                            One last look at the Reasons tab
                          </ContinueButton>
                        </>
                      )}
                    </div>
                    <GlossaryModal />
                  </div>
                );
            };

            const renderComplete = () => (
                <div className="min-h-screen" style={{ backgroundColor: colors.sand }}>
                    <div className="p-4 max-w-3xl mx-auto">
                        <Header />
                        <div className="text-center mb-6">
                            <p className="text-5xl mb-2">🏆</p>
                            <p className="text-xl font-bold" style={{ color: colors.primary }}>Tutorial 1.4 complete</p>
                        </div>
                        <div className="rounded-lg p-4 mb-4" style={{ backgroundColor: 'white', border: `1px solid ${colors.earthLight}` }}>
                            <h3 className="font-bold mb-3" style={{ color: colors.primary }}>What You Discovered</h3>
                            <ul className="space-y-2 text-sm" style={{ color: colors.earthDark }}>
                                <li className="flex gap-2"><span style={{ color: colors.success }}>✓</span><span>You kept a <strong>Reasons</strong> window next to every list — one row for the why behind each change.</span></li>
                                <li className="flex gap-2"><span style={{ color: colors.success }}>✓</span><span>Most reasons live in <strong>two windows</strong> — same event, two changes. You didn't arrange that, and half the second rows came from records others kept: the statement, the bank.</span></li>
                                <li className="flex gap-2"><span style={{ color: colors.success }}>✓</span><span>The matched pairs just <strong>shuffle</strong> — have and owe move together, so your <strong>net</strong> doesn't budge.</span></li>
                                <li className="flex gap-2"><span style={{ color: colors.success }}>✓</span><span>The reasons that <strong>move your net</strong> are two plain kinds: what you <strong>contributed</strong> and what the work <strong>generated</strong>.</span></li>
                                <li className="flex gap-2"><span style={{ color: colors.success }}>✓</span><span>And one only showed up when you tallied: the <strong>$960</strong> of your own cash the work quietly drew down — the first real line between the repair work and you.</span></li>
                            </ul>
                        </div>
                        <div className="rounded-lg p-4 mb-4" style={{ backgroundColor: colors.clayLight }}>
                            <h3 className="font-bold mb-2" style={{ color: colors.primary }}>Coming Next</h3>
                            <p className="text-sm mb-2" style={{ color: colors.earthDark }}>
                                You have three things now: what you have, what you owe, and the reasons your net moved.
                                In 1.5 you'll lay them out on one page, watch how they fit together — and the names you've
                                been circling finally arrive.
                            </p>
                            <p className="font-bold" style={{ color: colors.primary }}>Next: Tutorial 1.5 &mdash; Naming What You Built</p>
                        </div>
                        <div className="mb-3"><ContinueButton asLink="15-naming-what-you-built.html">Continue to Tutorial 1.5</ContinueButton></div>
                        <button onClick={handleRestart}
                                className="block w-full py-3 rounded-lg font-bold border-2 cursor-pointer mb-3"
                                style={{ backgroundColor: 'white', borderColor: colors.primary, color: colors.primary }}>
                            ↺ Restart tutorial
                        </button>
                    </div>
                    <GlossaryModal />
                </div>
            );

            // ============================================================
            // Router
            // ============================================================
            if (phase === 'welcome')        return renderWelcome();
            if (phase === 'walk-equipment') return renderWalkEquipment();
            if (phase === 'walk-computer')  return renderWalkComputer();
            if (phase === 'walk-supplies')  return renderWalkSupplies();
            if (phase === 'walk-fixtures')  return renderWalkFixtures();
            if (phase === 'walk-rou')       return renderWalkRoU();
            if (phase === 'walk-liab')      return renderWalkLiab();
            if (phase === 'walk-cash')      return renderWalkCash();
            if (phase === 'crossout')     return renderCrossout();
            if (phase === 'sort')         return renderSort();
            if (phase === 'complete')     return renderComplete();
            return null;
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
