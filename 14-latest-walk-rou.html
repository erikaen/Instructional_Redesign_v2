<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light dark">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tutorial 1.4 · Walk Right of Use</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Open+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="page">
  <div class="prework-wrap">

    <div class="tut-header">
      <div class="tut-header-main">
        <h1>Tutorial 1.4: Keeping the Reasons</h1>
        <div class="tut-header-sub">Phase 6 of 11 — Walk Right of Use</div>
      </div>
      <div class="tut-header-actions">
        <button class="icon-btn" title="Glossary" aria-label="Open glossary" onclick="openGlossary()"><i data-lucide="book-open"></i></button>
      </div>
    </div>

    <div class="phase active" id="phase-walk-rou"></div>

  </div>
</div>

<div class="glossary-overlay" id="glossaryOverlay" onclick="if(event.target===this) closeGlossary()">
  <div class="glossary-panel">
    <div class="glossary-panel-head">
      <div class="glossary-panel-title"><i data-lucide="book-open" class="licon"></i> Glossary</div>
      <button class="glossary-close-btn" aria-label="Close" onclick="closeGlossary()">&times;</button>
    </div>
    <div class="glossary-list" id="glossaryList"></div>
  </div>
</div>

<div class="glossary-overlay" id="evidenceOverlay" onclick="if(event.target===this) closeEvidence()">
  <div class="glossary-panel" id="evidencePanel"></div>
</div>

<script src="14-shared.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script>
window.WB_PHASE = 'walk-rou';
window.WB_WC_ANSWERED = true;
window.WB_ASSETS_EXPANDED = { 'RIGHT OF USE': true };

/* Phase state */
var rouPaid = false;       /* false until paid recorded */
var rouUsed = false;
var rouActive = null;       /* 'line' or null */
var rouPaidAtt = 0;
var rouUsedAtt = 0;
var rouNudge = null;        /* 'paid' or 'used' or null */
/* Cumulative reasons: equipment (6) + computer (1) + supplies (2) + fixtures (1) = 10 */
var r3Created = ['e_stand','e_tools','e_comp','e_wash','e_tru','e_gear','e_laptop','e_parts','e_partsused','e_fix'];

function createReason(id){ if(r3Created.indexOf(id) === -1) r3Created.push(id); }

function handleRouLineClick(ev){
  if(ev && ev.target && ev.target.closest && ev.target.closest('.xl-info, .xl-toggle')) return;
  if(rouPaid && rouUsed) return;
  playClick();
  rouActive = 'line';
  rouNudge = null;
  render();
}

function handleRouPaidAnswer(source){
  if(source === 'cash'){
    playSuccess(); createReason('e_rent'); rouPaid = 'cash'; rouNudge = null;
  } else {
    rouPaidAtt++; playNope();
    if(rouPaidAtt >= 3){ createReason('e_rent'); rouPaid = 'cash'; rouNudge = null; }
    else rouNudge = 'paid';
  }
  render();
}

function handleRouUsedAnswer(choice){
  if(choice === 'known'){
    playSuccess(); createReason('e_rentused'); rouUsed = true; rouActive = null; rouNudge = null;
  } else {
    rouUsedAtt++; playNope();
    if(rouUsedAtt >= 3){ createReason('e_rentused'); rouUsed = true; rouActive = null; rouNudge = null; }
    else rouNudge = 'used';
  }
  render();
}

function showRouReceipt(kind, evt){
  if(evt && evt.stopPropagation) evt.stopPropagation();
  var html = '';
  if(kind === 'lease'){
    var rows = ROU_LEASE.items.map(function(it){ return '<tr><td>'+esc(it.name)+'</td><td class="num">$'+it.amt+'</td></tr>'; }).join('');
    html =
      '<div class="glossary-panel-head"><div class="glossary-panel-title"><i data-lucide="file-text" class="licon"></i> Evidence &mdash; lease</div><button class="glossary-close-btn" aria-label="Close" onclick="closeEvidence()">&times;</button></div>'+
      '<div class="dep-receipt">'+
        '<div class="dep-receipt-head"><span class="dep-receipt-label">'+esc(ROU_LEASE.vendor)+'</span><span class="dep-receipt-meta">'+esc(ROU_LEASE.meta)+'</span></div>'+
        '<table class="dep-receipt-table"><tbody>'+rows+'<tr class="total"><td>Paid in advance</td><td class="num">$1,300</td></tr></tbody></table>'+
        '<div class="dep-receipt-note"><strong>Paid:</strong> '+esc(ROU_LEASE.paid)+'</div>'+
      '</div>';
  } else { /* 'used' explainer */
    html =
      '<div class="glossary-panel-head"><div class="glossary-panel-title"><i data-lucide="calendar" class="licon"></i> Why rent-used is KNOWN (not inferred)</div><button class="glossary-close-btn" aria-label="Close" onclick="closeEvidence()">&times;</button></div>'+
      '<div class="dep-receipt">'+
        '<p class="prose">You prepaid <strong>two</strong> months ($650 each). By May 31, <strong>one</strong> of them &mdash; May &mdash; has been used up. So $650 is used and $650 (the last month) is still held.</p>'+
        '<div class="dep-receipt-note">You didn&rsquo;t have to count anything or back it out of a leftover &mdash; the <strong>calendar</strong> tells you directly. Contrast Supplies, where &ldquo;used&rdquo; had to be <em>inferred</em> (bought &minus; what&rsquo;s on the shelf). Same ledger shape; different kind of evidence.</div>'+
      '</div>';
  }
  document.getElementById('evidencePanel').innerHTML = html;
  document.getElementById('evidenceOverlay').classList.add('open');
  if(window.lucide) lucide.createIcons();
}

function renderAssetsSheetWithRou(){
  var html = '<div class="xlwb">'+
    '<div class="xlwb-bar"><span class="xlwb-bar-title"><i data-lucide="file-spreadsheet" class="licon"></i> <span class="mono">Bike-Repair.xlsx:1</span></span><span class="xlwb-bar-sheet">Assets sheet</span></div>'+
    '<div>';
  html += '<div class="xl-row xl-head"><div class="xl-gutter"></div><div class="xl-rownum"></div><div class="xl-c">A&nbsp;&nbsp;Asset</div><div class="xl-v">B&nbsp;&nbsp;Value</div></div>';
  var n = 0;
  ASSETS_SNAPSHOT.forEach(function(cat){
    if(cat.cat === 'CASH') return;
    var label = cat.cat === 'RIGHT OF USE' ? 'Right of Use' : (cat.cat.charAt(0) + cat.cat.slice(1).toLowerCase());
    var open = (cat.cat === 'RIGHT OF USE');
    n++;
    html += '<div class="xl-row xl-cat"><div class="xl-gutter"></div><div class="xl-rownum">'+n+'</div><div class="xl-c">'+label+'</div><div class="xl-v">'+xlDollars(cat.subtotal)+'</div></div>';
    if(open){
      cat.items.forEach(function(it){
        n++;
        var rec = !!(rouPaid && rouUsed);
        var act = rouActive === 'line';
        var canClick = !rec;
        var rowClass = 'xl-row xl-item' + (act ? ' selected' : '');
        var rowOnclick = canClick ? ' onclick="handleRouLineClick(event)"' : '';
        var checkPrefix = rec ? '<i data-lucide="check" class="licon"></i> ' : '';
        var infoBtn = '<button type="button" class="xl-info" title="See the lease" onclick="event.stopPropagation(); showRouReceipt(\'lease\');"><i data-lucide="info" class="licon"></i></button>';
        html += '<div class="'+rowClass+'"'+rowOnclick+'>'+
          '<div class="xl-gutter"></div>'+
          '<div class="xl-rownum">'+n+'</div>'+
          '<div class="xl-c">'+checkPrefix+'<span class="xl-item-name">'+esc(it.name)+'</span>'+infoBtn+'</div>'+
          '<div class="xl-v">'+xlDollars(it.amount)+'</div></div>';
      });
    }
  });
  n++;
  html += '<div class="xl-row xl-item"><div class="xl-gutter"></div><div class="xl-rownum">'+n+'</div><div class="xl-c"><strong>Cash</strong> &mdash; repair cash on hand (May 31) &nbsp;<i data-lucide="alert-triangle" class="licon"></i> <em>shouldn&rsquo;t be possible</em></div><div class="xl-v">'+xlDollars(CASH_NET)+'</div></div>';
  html += '<div class="xl-row xl-total"><div class="xl-gutter"></div><div class="xl-rownum"></div><div class="xl-c">TOTAL — what I have</div><div class="xl-v">'+xlDollars(ASSETS_TOTAL+CASH_NET)+'</div></div>';
  html += '</div>';
  html += '<div class="xlwb-tabs">'+
    '<button class="xlwb-tab active" type="button">Assets</button>'+
    '<button class="xlwb-tab" type="button">Liabilities</button>'+
    '<button class="xlwb-tab" type="button">Cash</button>'+
    '<button class="xlwb-tab" type="button">Reasons <span class="xl-new-tag">new</span></button>'+
  '</div>';
  html += '</div>';
  return html;
}

function renderReasonsWindowHTML(){
  var html = '<div class="xlwb">'+
    '<div class="xlwb-bar"><span class="xlwb-bar-title"><i data-lucide="file-spreadsheet" class="licon"></i> <span class="mono">Bike-Repair.xlsx:2</span></span><span class="xlwb-bar-sheet">Reasons &mdash; side by side</span></div>'+
    '<div>'+
    '<div class="xl-row xl-head"><div class="xl-gutter"></div><div class="xl-rownum"></div><div class="xl-c">Reason</div><div class="xl-v">Δ</div></div>';
  r3Created.forEach(function(id){
    var e = EV_BY_ID[id];
    var d = WINROW_BY_ID[e.rowId].delta;
    html += '<div class="xl-row xl-item"><div class="xl-gutter"></div><div class="xl-rownum"></div>'+
      '<div class="xl-c"><strong>'+LIST_LABEL[e.win]+'</strong> &mdash; '+esc(e.reason)+'</div>'+
      '<div class="xl-v">'+signedDollars(d)+'</div></div>';
  });
  html += '<div class="xl-row xl-total"><div class="xl-gutter"></div><div class="xl-rownum"></div><div class="xl-c">'+r3Created.length+' reasons so far</div><div class="xl-v"></div></div>';
  html += '</div></div>';
  return html;
}

function render(){
  var bothDone = rouPaid && rouUsed;
  var part = rouActive === 'line' ? (!rouPaid ? 'paid' : (!rouUsed ? 'used' : null)) : null;

  var html = '';
  html += annaBox(
    'Next: <strong>Right of Use</strong> &mdash; the rent you paid ahead. Same as the parts: this line&rsquo;s number is what&rsquo;s <em>left</em> after two things happened. Click the item, and select the two reasons. Watch the second one! It isn&rsquo;t the same kind of number as the parts.',
    true
  );

  html += '<div class="walk-pane">'+renderAssetsSheetWithRou()+renderReasonsWindowHTML()+'</div>';

  if(part === 'paid'){
    html += '<div class="mcq-card">'+
      '<div class="mcq-question">Reason 1 of 2 &mdash; the right to the space came in at <strong>$1,300</strong> (two months, paid ahead). How did it get paid?</div>'+
      '<div class="mcq-choices">'+
        '<button class="mcq-choice" onclick="handleRouPaidAnswer(\'card\')">On the card</button>'+
        '<button class="mcq-choice" onclick="handleRouPaidAnswer(\'cash\')">Paid cash (from the bank)</button>'+
        '<button class="mcq-choice" onclick="handleRouPaidAnswer(\'none\')">Nothing paid yet &mdash; pay each month as it comes</button>'+
        '<button class="mcq-choice" onclick="showRouReceipt(\'lease\', event)"><i data-lucide="info" class="licon"></i> See the lease</button>'+
      '</div>';
    if(rouNudge === 'paid' && rouPaidAtt < 3){
      html += '<div class="mcq-fb err show"><strong>Hint '+rouPaidAtt+'/2:</strong> Open the lease (<i data-lucide="info" class="licon"></i>) &mdash; first and last month, $1,300, went out of the bank up front. Not the card, and not pay-as-you-go.</div>';
    }
    html += '</div>';
  } else if(part === 'used'){
    html += '<div class="mcq-card">'+
      '<div class="mcq-question">Reason 2 of 2 &mdash; you paid <strong>$1,300</strong> for two months, but the line says <strong>$650</strong>. Where did the other month go? The parts you had to <em>infer</em> &mdash; is this the same?</div>'+
      '<div class="mcq-choices">'+
        '<button class="mcq-choice" onclick="handleRouUsedAnswer(\'inferred\')">I must have used it &mdash; back it out: $1,300 &minus; $650, like the parts</button>'+
        '<button class="mcq-choice" onclick="handleRouUsedAnswer(\'known\')">No inferring needed &mdash; May is over. One of the two prepaid months is gone; the calendar says so</button>'+
        '<button class="mcq-choice" onclick="showRouReceipt(\'used\', event)"><i data-lucide="info" class="licon"></i> Why used is known</button>'+
      '</div>';
    if(rouNudge === 'used' && rouUsedAtt < 3){
      html += '<div class="mcq-fb err show"><strong>Hint '+rouUsedAtt+'/2:</strong> The math works either way ($1,300 &minus; $650) &mdash; but unlike the parts, you don&rsquo;t have to guess. Rent is time: two months prepaid, May has passed. You <em>know</em> it directly.</div>';
    }
    html += '</div>';
  }

  if(bothDone){
    html += insightBox('Same shape, different evidence.',
      '<p>You <em>inferred</em> used parts(counted what&rsquo;s left, backed out the rest: &ldquo;I must have used them&rdquo;). You <em>know</em> used rents directly: the calendar says one of the two prepaid months is gone. Both are &ldquo;used up,&rdquo; but <strong>not every &ldquo;used&rdquo; is a guess.</strong></p>'
    );
  }

  html += '<button class="btn-continue btn-block" type="button">Next &mdash; Liabilities &rarr;</button>';

  document.getElementById('phase-walk-rou').innerHTML = html;
  if(window.lucide) lucide.createIcons();
}

render();
if(window.lucide) lucide.createIcons();
</script>
</body>
</html>
