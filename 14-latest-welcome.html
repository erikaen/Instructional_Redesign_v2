<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light dark">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tutorial 1.4 · Welcome</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Open+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="page">
  <div class="prework-wrap">

    <div class="tut-header">
      <div class="tut-header-main">
        <h1>Tutorial 1.4: Keeping the Reasons</h1>
        <div class="tut-header-sub">Phase 1 of 11 — Welcome</div>
      </div>
      <div class="tut-header-actions">
        <button class="icon-btn" title="Glossary" aria-label="Open glossary" onclick="openGlossary()"><i data-lucide="book-open"></i></button>
      </div>
    </div>

    <div class="phase active" id="phase-welcome"></div>

  </div>
</div>

<div class="glossary-overlay" id="glossaryOverlay" onclick="if(event.target===this) closeGlossary()">
  <div class="glossary-panel">
    <div class="glossary-panel-head">
      <div class="glossary-panel-title"><i data-lucide="book-open" class="licon"></i> Glossary</div>
      <button class="glossary-close-btn" aria-label="Close" onclick="closeGlossary()">&times;</button>
    </div>
    <div class="glossary-list" id="glossaryList"></div>
  </div>
</div>

<div class="glossary-overlay" id="evidenceOverlay" onclick="if(event.target===this) closeEvidence()">
  <div class="glossary-panel" id="evidencePanel"></div>
</div>

<script src="14-shared.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script>
window.WB_PHASE = 'welcome';
window.WB_WC_ANSWERED = false;
window.WB_ASSETS_EXPANDED = {};
window.WB_ACTIVE_TAB = 'cash'; /* welcome opens on Cash so the −$960 mystery is front-and-center */

var wcAtt = 0;
var wcNudge = false;

function renderWelcome(){
  var html = '';
  html += '<div class="narrative-block">'+
    '<p>Anna&rsquo;s back, coffee in hand. Your workbook is open to the two lists that earned their names in your last sit-down: <strong>Assets</strong> (what you have: $3,410) and <strong>Liabilities</strong> (what you owe: $1,450). And off to the side, still its own tab: <strong>Cash</strong> &mdash; the repair flows you pulled out of the bank statement together, netting <strong>&minus;$960</strong> for the month.</p>'+
    '<p>She studies the tab strip for a moment, then taps the screen. &ldquo;That Cash tab has been bugging me since we built it. It&rsquo;s just&hellip; sitting there, off to the side.&rdquo;</p>'+
    '</div>';

  html += '<div id="wbWelcome"></div>';

  if(!window.WB_WC_ANSWERED){
    html += '<div class="mcq-card">'+
      '<div class="dialog-label">ANNA</div>'+
      '<div class="mcq-question">&ldquo;Everything on the Assets list earned its place by <strong> being useful to the work </strong>. Remember, an asset is a <em>right to a benefit</em>, not just a thing. So, does the money in the Cash tab belong on the Assets list itself?&rdquo;</div>'+
      '<div class="mcq-choices">'+
        '<button class="mcq-choice" onclick="handleWcAnswer(\'notbenefit\')">No &mdash; money isn&rsquo;t a benefit. It&rsquo;s just money.</button>'+
        '<button class="mcq-choice" onclick="handleWcAnswer(\'benefit\')">Yes &mdash; it&rsquo;s a right to future benefits. It gets me the next box of parts.</button>'+
      '</div>'+
      (wcNudge && wcAtt < 3
        ? '<div class="mcq-fb err show"><strong>Hint '+wcAtt+'/2:</strong> '+(wcAtt===1
            ? 'Think back to the lease: the prepaid month was an asset before you ever used the space &mdash; because of what it would do for you later. What does cash do for you later?'
            : 'The bills themselves aren&rsquo;t the benefit. What they can get you is &mdash; parts, rent, tools. A right to future benefits, held now.')+'</div>'
        : '')+
    '</div>';
  } else {
    html += annaBox(
      '&ldquo;Right. Money isn&rsquo;t useful by itself, it&rsquo;s useful for what it gets you <em>later</em>. It is a right to future benefits, held now. So it doesn&rsquo;t belong off to the side.&rdquo; Anna drags the Cash tab into the Assets list. &ldquo;There &mdash; the tab&rsquo;s gone. Cash is a line like everything else now, with the bank&rsquo;s rows tucked under it.&rdquo;'+
      '<br><br>'+
      '&ldquo;But now look at it. <strong>&minus;$960</strong> &mdash; the same number we pulled out of the bank statement, but it&rsquo;s sitting <em>on a list of things you have (Assets)</em>. They are rights to benefits. You can&rsquo;t hold a <em>negative</em> right. That line can&rsquo;t be right as it stands.&rdquo; She frowns at it, then shrugs. &ldquo;Leave it. The minus sign is trying to tell us something. By the end of today you&rsquo;ll know what.&rdquo;',
      false
    );

    html += '<div class="section-card">'+
      '<div class="card-title">What You&rsquo;ll Discover</div>'+
      '<ul class="bullet-list">'+
        '<li>The amount tells you <em>what moved</em>; only the <strong>reason</strong> tells you <em>what happened</em>.</li>'+
        '<li>Once the reasons are written down, a pattern shows up on its own: most of them touch <strong>two</strong> lists.</li>'+
        '<li>And that <strong>&minus;$960</strong> shouldn&rsquo;t be able to exist? No amount on these lists can explain it &mdash; but a reason can.</li>'+
      '</ul>'+
    '</div>';
  }

  document.getElementById('phase-welcome').innerHTML = html;
  renderWorkbook('wbWelcome');
  if(window.lucide) lucide.createIcons();
}

function handleWcAnswer(choice){
  if(window.WB_WC_ANSWERED) return;
  if(choice === 'benefit'){
    playSuccess();
    window.WB_WC_ANSWERED = true;
    window.WB_ACTIVE_TAB = 'assets';
    renderWelcome();
  } else {
    wcAtt++;
    wcNudge = true;
    if(wcAtt >= 3){
      playSuccess();
      window.WB_WC_ANSWERED = true;
      window.WB_ACTIVE_TAB = 'assets';
    } else {
      playNope();
    }
    renderWelcome();
  }
}

renderWelcome();
if(window.lucide) lucide.createIcons();
</script>
</body>
</html>
