<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light dark">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tutorial 1.4 · Walk Supplies</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Open+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="page">
  <div class="prework-wrap">

    <div class="tut-header">
      <div class="tut-header-main">
        <h1>Tutorial 1.4: Keeping the Reasons</h1>
        <div class="tut-header-sub">Phase 4 of 11 — Walk Supplies</div>
      </div>
      <div class="tut-header-actions">
        <button class="icon-btn" title="Glossary" aria-label="Open glossary" onclick="openGlossary()"><i data-lucide="book-open"></i></button>
      </div>
    </div>

    <div class="phase active" id="phase-walk-supplies"></div>

  </div>
</div>

<div class="glossary-overlay" id="glossaryOverlay" onclick="if(event.target===this) closeGlossary()">
  <div class="glossary-panel">
    <div class="glossary-panel-head">
      <div class="glossary-panel-title"><i data-lucide="book-open" class="licon"></i> Glossary</div>
      <button class="glossary-close-btn" aria-label="Close" onclick="closeGlossary()">&times;</button>
    </div>
    <div class="glossary-list" id="glossaryList"></div>
  </div>
</div>

<div class="glossary-overlay" id="evidenceOverlay" onclick="if(event.target===this) closeEvidence()">
  <div class="glossary-panel" id="evidencePanel"></div>
</div>

<script src="14-shared.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script>
window.WB_PHASE = 'walk-supplies';
window.WB_WC_ANSWERED = true;
window.WB_ASSETS_EXPANDED = { SUPPLIES: true };

/* Phase state */
var supItemBought = {};   /* name -> 'card' once recorded */
var supItemUsed   = {};   /* name -> true once recorded */
var supActiveItem = null;
var supItemAtt    = {};   /* name -> { bought: n, used: n } */
var supNudge      = null; /* { item, step } */
/* Reasons recorded in prior phases: equipment (6) + computer (1) = 7 */
var r3Created = ['e_stand','e_tools','e_comp','e_wash','e_tru','e_gear','e_laptop'];

function shortName(n){ return n.replace(' (on shelf)', ''); }

function createReason(id){
  if(r3Created.indexOf(id) === -1) r3Created.push(id);
}

function recordSupBought(){
  createReason('e_parts');
  SUP_ITEMS.forEach(function(it){ supItemBought[it.name] = 'card'; });
}
function recordSupUsed(){
  createReason('e_partsused');
  SUP_ITEMS.forEach(function(it){ supItemUsed[it.name] = true; });
}

function handleSupItemClick(name, ev){
  if(ev && ev.target && ev.target.closest && ev.target.closest('.xl-info, .xl-toggle')) return;
  if(supItemBought[name] && supItemUsed[name]) return;
  playClick();
  supActiveItem = name;
  supNudge = null;
  render();
}

function handleSupBoughtAnswer(name, source){
  if(source === 'card'){
    playSuccess(); recordSupBought(); supNudge = null;
  } else {
    var att = supItemAtt[name] || { bought:0, used:0 };
    att.bought = (att.bought || 0) + 1;
    supItemAtt[name] = att;
    playNope();
    if(att.bought >= 3){ recordSupBought(); supNudge = null; }
    else supNudge = { item:name, step:'bought' };
  }
  render();
}

function handleSupUsedAnswer(name, choice){
  if(choice === 'used'){
    playSuccess(); recordSupUsed(); supActiveItem = null; supNudge = null;
  } else {
    var att = supItemAtt[name] || { bought:0, used:0 };
    att.used = (att.used || 0) + 1;
    supItemAtt[name] = att;
    playNope();
    if(att.used >= 3){ recordSupUsed(); supActiveItem = null; supNudge = null; }
    else supNudge = { item:name, step:'used' };
  }
  render();
}

function showSupReceipt(kind, evt){
  if(evt && evt.stopPropagation) evt.stopPropagation();
  var html = '';
  if(kind === 'qbp'){
    var rows = SUP_QBP.items.map(function(it){ return '<tr><td>'+esc(it.name)+'</td><td class="num">$'+it.amt+'</td></tr>'; }).join('');
    html =
      '<div class="glossary-panel-head"><div class="glossary-panel-title"><i data-lucide="receipt" class="licon"></i> Evidence &mdash; invoice</div><button class="glossary-close-btn" aria-label="Close" onclick="closeEvidence()">&times;</button></div>'+
      '<div class="dep-receipt">'+
        '<div class="dep-receipt-head"><span class="dep-receipt-label">'+esc(SUP_QBP.vendor)+'</span><span class="dep-receipt-meta">'+esc(SUP_QBP.meta)+'</span></div>'+
        '<table class="dep-receipt-table"><tbody>'+rows+'<tr class="total"><td>Total</td><td class="num">$500</td></tr></tbody></table>'+
        '<div class="dep-receipt-note"><strong>Paid:</strong> '+esc(SUP_QBP.paid)+'</div>'+
      '</div>';
  } else if(kind === 'shelfcount'){
    var lines = SUP_ITEMS.map(function(it){ return '<tr><td>'+esc(shortName(it.name))+'</td><td class="num">'+esc(it.qty)+'</td></tr>'; }).join('');
    html =
      '<div class="glossary-panel-head"><div class="glossary-panel-title"><i data-lucide="clipboard-list" class="licon"></i> Evidence &mdash; the shelf count (Document 13)</div><button class="glossary-close-btn" aria-label="Close" onclick="closeEvidence()">&times;</button></div>'+
      '<div class="dep-receipt">'+
        '<div class="dep-receipt-head"><span class="dep-receipt-label">Parts left on shelf &mdash; 5/31</span><span class="dep-receipt-meta">counted by hand</span></div>'+
        '<table class="dep-receipt-table"><tbody>'+lines+'</tbody></table>'+
        '<div class="dep-receipt-note">This is what you <strong>counted</strong> &mdash; just the quantities left. &ldquo;Used&rdquo; is then backed out on the Excel sheet: bought $500 &minus; shelf $200 = used $300.</div>'+
      '</div>';
  } else { /* 'used' explainer */
    html =
      '<div class="glossary-panel-head"><div class="glossary-panel-title"><i data-lucide="help-circle" class="licon"></i> Why &ldquo;used&rdquo; is inferred</div><button class="glossary-close-btn" aria-label="Close" onclick="closeEvidence()">&times;</button></div>'+
      '<div class="dep-receipt">'+
        '<p class="prose">There&rsquo;s no receipt for &ldquo;used.&rdquo; You reach it by counting what&rsquo;s left and backing it out:</p>'+
        '<table class="dep-receipt-table"><tbody>'+
          '<tr><td>Bought (QBP invoice)</td><td class="num">$500</td></tr>'+
          '<tr><td>On the shelf (counted &mdash; Doc 13)</td><td class="num">&minus; $200</td></tr>'+
          '<tr class="total"><td>Used (inferred)</td><td class="num">$300</td></tr>'+
        '</tbody></table>'+
        '<div class="dep-receipt-note"><strong>Worked example &mdash; chains:</strong> you bought a box for $100, and $50 is still on the shelf. So $50 must have been used &mdash; you didn&rsquo;t <em>count</em> &ldquo;used,&rdquo; you inferred it.</div>'+
      '</div>';
  }
  document.getElementById('evidencePanel').innerHTML = html;
  document.getElementById('evidenceOverlay').classList.add('open');
  if(window.lucide) lucide.createIcons();
}

function renderAssetsSheetWithSupplies(){
  var html = '<div class="xlwb">'+
    '<div class="xlwb-bar"><span class="xlwb-bar-title"><i data-lucide="file-spreadsheet" class="licon"></i> <span class="mono">Bike-Repair.xlsx:1</span></span><span class="xlwb-bar-sheet">Assets sheet</span></div>'+
    '<div>';
  html += '<div class="xl-row xl-head"><div class="xl-gutter"></div><div class="xl-rownum"></div><div class="xl-c">A&nbsp;&nbsp;Asset</div><div class="xl-v">B&nbsp;&nbsp;Value</div></div>';
  var n = 0;
  ASSETS_SNAPSHOT.forEach(function(cat){
    if(cat.cat === 'CASH') return;
    var label = cat.cat === 'RIGHT OF USE' ? 'Right of Use' : (cat.cat.charAt(0) + cat.cat.slice(1).toLowerCase());
    var open = (cat.cat === 'SUPPLIES');
    n++;
    html += '<div class="xl-row xl-cat"><div class="xl-gutter"></div><div class="xl-rownum">'+n+'</div><div class="xl-c">'+label+'</div><div class="xl-v">'+xlDollars(cat.subtotal)+'</div></div>';
    if(open){
      cat.items.forEach(function(it){
        n++;
        var rec = !!(supItemBought[it.name] && supItemUsed[it.name]);
        var act = supActiveItem === it.name;
        var canClick = !rec;
        var rowClass = 'xl-row xl-item' + (act ? ' selected' : '');
        var rowOnclick = canClick ? ' onclick="handleSupItemClick(\''+it.name.replace(/'/g, "\\'")+'\', event)"' : '';
        var checkPrefix = rec ? '<i data-lucide="check" class="licon"></i> ' : '';
        var infoBtn = '<button type="button" class="xl-info" title="See the invoice" onclick="event.stopPropagation(); showSupReceipt(\'qbp\');"><i data-lucide="info" class="licon"></i></button>';
        html += '<div class="'+rowClass+'"'+rowOnclick+'>'+
          '<div class="xl-gutter"></div>'+
          '<div class="xl-rownum">'+n+'</div>'+
          '<div class="xl-c">'+checkPrefix+'<span class="xl-item-name">'+esc(it.name)+'</span>'+infoBtn+'</div>'+
          '<div class="xl-v">'+xlDollars(it.amount)+'</div></div>';
      });
    }
  });
  n++;
  html += '<div class="xl-row xl-item"><div class="xl-gutter"></div><div class="xl-rownum">'+n+'</div><div class="xl-c"><strong>Cash</strong> &mdash; repair cash on hand (May 31) &nbsp;<i data-lucide="alert-triangle" class="licon"></i> <em>shouldn&rsquo;t be possible</em></div><div class="xl-v">'+xlDollars(CASH_NET)+'</div></div>';
  html += '<div class="xl-row xl-total"><div class="xl-gutter"></div><div class="xl-rownum"></div><div class="xl-c">TOTAL — what I have</div><div class="xl-v">'+xlDollars(ASSETS_TOTAL+CASH_NET)+'</div></div>';
  html += '</div>';
  html += '<div class="xlwb-tabs">'+
    '<button class="xlwb-tab active" type="button">Assets</button>'+
    '<button class="xlwb-tab" type="button">Liabilities</button>'+
    '<button class="xlwb-tab" type="button">Cash</button>'+
    '<button class="xlwb-tab" type="button">Reasons <span class="xl-new-tag">new</span></button>'+
  '</div>';
  html += '</div>';
  return html;
}

function renderReasonsWindowHTML(){
  var html = '<div class="xlwb">'+
    '<div class="xlwb-bar"><span class="xlwb-bar-title"><i data-lucide="file-spreadsheet" class="licon"></i> <span class="mono">Bike-Repair.xlsx:2</span></span><span class="xlwb-bar-sheet">Reasons &mdash; side by side</span></div>'+
    '<div>'+
    '<div class="xl-row xl-head"><div class="xl-gutter"></div><div class="xl-rownum"></div><div class="xl-c">Reason</div><div class="xl-v">Δ</div></div>';
  r3Created.forEach(function(id){
    var e = EV_BY_ID[id];
    var d = WINROW_BY_ID[e.rowId].delta;
    html += '<div class="xl-row xl-item"><div class="xl-gutter"></div><div class="xl-rownum"></div>'+
      '<div class="xl-c"><strong>'+LIST_LABEL[e.win]+'</strong> &mdash; '+esc(e.reason)+'</div>'+
      '<div class="xl-v">'+signedDollars(d)+'</div></div>';
  });
  html += '<div class="xl-row xl-total"><div class="xl-gutter"></div><div class="xl-rownum"></div><div class="xl-c">'+r3Created.length+' reasons so far</div><div class="xl-v"></div></div>';
  html += '</div></div>';
  return html;
}

function render(){
  var allDone = SUP_ITEMS.every(function(it){ return supItemBought[it.name] && supItemUsed[it.name]; });
  var active = supActiveItem ? SUP_BY_NAME[supActiveItem] : null;
  var part = active ? (!supItemBought[active.name] ? 'bought' : (!supItemUsed[active.name] ? 'used' : null)) : null;
  var att = active ? (supItemAtt[active.name] || {}) : {};

  var html = '';
  html += annaBox(
    'Now <strong>Supplies</strong>. Same gesture, but watch closely: a parts line isn&rsquo;t one event. Each number here is what&rsquo;s <em>left</em> after two things happened &mdash; parts came <em>in</em>, and some got <em>used up</em>. Click any part and scroll down the page to select <strong>two reasons</strong> live behind it.',
    true
  );

  html += '<div class="walk-pane">'+renderAssetsSheetWithSupplies()+renderReasonsWindowHTML()+'</div>';

  if(active && part === 'bought'){
    html += '<div class="mcq-card">'+
      '<div class="mcq-question">Reason 1 of 2 &mdash; <strong>'+esc(shortName(active.name))+'</strong> arrived with the rest of the QBP order ($500 of parts). How did they come in?</div>'+
      '<div class="mcq-choices">'+
        '<button class="mcq-choice" onclick="handleSupBoughtAnswer(\''+active.name.replace(/'/g, "\\'")+'\', \'card\')">On the card</button>'+
        '<button class="mcq-choice" onclick="handleSupBoughtAnswer(\''+active.name.replace(/'/g, "\\'")+'\', \'cash\')">Paid cash (debit)</button>'+
        '<button class="mcq-choice" onclick="handleSupBoughtAnswer(\''+active.name.replace(/'/g, "\\'")+'\', \'home\')">Brought from home</button>'+
        '<button class="mcq-choice" onclick="showSupReceipt(\'qbp\', event)"><i data-lucide="info" class="licon"></i> See the invoice</button>'+
      '</div>';
    if(supNudge && supNudge.item === active.name && supNudge.step === 'bought' && (att.bought || 0) < 3){
      html += '<div class="mcq-fb err show"><strong>Hint '+att.bought+'/2:</strong> Open the invoice (<i data-lucide="info" class="licon"></i>) &mdash; QBP billed the whole order to the Harborline Visa.</div>';
    }
    html += '</div>';
  } else if(active && part === 'used'){
    html += '<div class="mcq-card">'+
      '<div class="mcq-question">Reason 2 of 2 &mdash; the invoice says <strong>$500</strong> of parts came in, but the shelf only holds <strong>$200</strong>. What happened to the other <strong>$300</strong>?</div>'+
      '<div class="mcq-choices">'+
        '<button class="mcq-choice" onclick="handleSupUsedAnswer(\''+active.name.replace(/'/g, "\\'")+'\', \'used\')">I must have used them doing repair work &mdash; $500 in &minus; $200 left = $300</button>'+
        '<button class="mcq-choice" onclick="handleSupUsedAnswer(\''+active.name.replace(/'/g, "\\'")+'\', \'returned\')">Returned to QBP for a refund</button>'+
        '<button class="mcq-choice" onclick="handleSupUsedAnswer(\''+active.name.replace(/'/g, "\\'")+'\', \'counted\')">Nothing &mdash; I just counted $300 of used parts</button>'+
        '<button class="mcq-choice" onclick="showSupReceipt(\'shelfcount\', event)"><i data-lucide="info" class="licon"></i> See the shelf count (Doc 13)</button>'+
      '</div>';
    if(supNudge && supNudge.item === active.name && supNudge.step === 'used' && (att.used || 0) < 3){
      html += '<div class="mcq-fb err show"><strong>Hint '+att.used+'/2:</strong> '+((att.used || 0) === 1
        ? 'There&rsquo;s no receipt for &ldquo;used&rdquo; &mdash; used parts are gone into finished jobs.'
        : 'You can&rsquo;t count what&rsquo;s gone; you back it out: what came in minus what&rsquo;s left on the shelf.')+'</div>';
    }
    html += '</div>';
  }

  if(allDone){
    html += insightBox('Seven parts &mdash; two reasons, and one of them you can&rsquo;t point to.',
      '<p>The <strong>$500</strong> bought you can point to (the QBP invoice). The <strong>$300</strong> used has no document &mdash; you <em>inferred</em> it from the shelf count: what came in minus what&rsquo;s left. The <strong>$200</strong> on the shelf is what remains after both. Both reasons sit in the books; <strong>they don&rsquo;t rest on the same kind of evidence</strong>.</p>'
    );
  }

  html += '<button class="btn-continue btn-block" type="button">Next &mdash; Fixtures &rarr;</button>';

  document.getElementById('phase-walk-supplies').innerHTML = html;
  if(window.lucide) lucide.createIcons();
}

render();
if(window.lucide) lucide.createIcons();
</script>
</body>
</html>
