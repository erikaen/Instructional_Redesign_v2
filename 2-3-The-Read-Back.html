<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light dark">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Module 2 — The Read-Back</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Open+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="page">
  <div class="prework-wrap">

    <div class="phase-title-row">
      <div class="phase-title" id="phaseTitle"></div>
      <button class="icon-btn" title="Glossary" aria-label="Open glossary" onclick="openGlossary()"><i data-lucide="book-open"></i></button>
    </div>

    <!-- ===== Phase: maria-readback ===== -->
    <div class="phase active" id="phase-maria-readback">
      <div class="narrative-block"><p>By late afternoon the form is done. Maria runs her finger down each column.</p></div>
      <div class="totals-card">
        <div class="totals-label">INSURABLE TOTALS</div>
        <div id="readbackRows"></div>
      </div>
      <div class="dialog-box maria" id="readbackMaria"></div>
      <div class="narrative-block"><p>Maria packs up, hands you a copy of the form, and heads out. The doorbell jingles closed behind her.</p></div>
      <div class="next-phase-msg">You&rsquo;ve finished this section &mdash; click <strong>Next</strong> to continue.</div>
    </div>

  </div>
</div>

<!-- ===== Glossary overlay ===== -->
<div class="glossary-overlay" id="glossaryOverlay" onclick="if(event.target===this) closeGlossary()">
  <div class="glossary-panel">
    <div class="glossary-panel-head">
      <div class="glossary-panel-title"><i data-lucide="book-open" class="licon"></i> Glossary</div>
      <button class="glossary-close-btn" aria-label="Close" onclick="closeGlossary()">&times;</button>
    </div>
    <div class="glossary-list" id="glossaryList"></div>
  </div>
</div>

<script src="https://unpkg.com/lucide@latest"></script>
<script>
if (window.lucide) lucide.createIcons();

/* ===== sound ===== */
var audioCtx = null;
function ac(){ if(!audioCtx){ try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return audioCtx; }
function tone(f,d,t,v){ var c=ac(); if(!c)return; var o=c.createOscillator(),g=c.createGain(); o.type=t||'sine'; o.frequency.value=f; o.connect(g); g.connect(c.destination); g.gain.setValueAtTime(v||0.05,c.currentTime); g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+d); o.start(); o.stop(c.currentTime+d); }
function playClick(){ tone(600,0.08,'sine',0.04); }

/* ===== data ===== */
var items = [
  { id:'stand', name:'Park Tool repair stand', category:'equipment', cost:200, sourced:'receipt' },
  { id:'conewr', name:'Cone wrench set', category:'equipment', cost:65, sourced:'receipt' },
  { id:'torque', name:'Torque wrench', category:'equipment', cost:95, sourced:'receipt' },
  { id:'hex', name:'Hex / Allen key set', category:'equipment', cost:45, sourced:'receipt' },
  { id:'cutters', name:'Cable cutters', category:'equipment', cost:40, sourced:'receipt' },
  { id:'breaker', name:'Chain breaker', category:'equipment', cost:35, sourced:'receipt' },
  { id:'levers', name:'Tire levers', category:'equipment', cost:20, sourced:'receipt' },
  { id:'compressor', name:'Air compressor', category:'equipment', cost:180, sourced:'credit-card' },
  { id:'washer', name:'Parts washer', category:'equipment', cost:130, sourced:'credit-card' },
  { id:'truing', name:'Wheel-truing stand', category:'equipment', cost:170, sourced:'credit-card' },
  { id:'grinder', name:'Bench grinder', category:'equipment', cost:90, sourced:'estimate' },
  { id:'headset', name:'Headset press', category:'equipment', cost:70, sourced:'estimate' },
  { id:'vacuum', name:'Shop vacuum', category:'equipment', cost:60, sourced:'estimate' },
  { id:'laptop', name:'Laptop', category:'computer', cost:610, sourced:'estimate' },
  { id:'desk', name:'Desk', category:'fixtures', cost:250, sourced:'receipt' },
  { id:'shelves', name:'Shelving units', category:'fixtures', cost:200, sourced:'receipt' },
  { id:'display', name:'Display rack', category:'fixtures', cost:180, sourced:'receipt' },
  { id:'pegboard', name:'Pegboard + hooks', category:'fixtures', cost:120, sourced:'receipt' },
  { id:'chains', name:'Box of chains', category:'supplies', cost:50, sourced:'receipt', paidAmount:100, countLeft:'½ box left' },
  { id:'pads', name:'Box of brake pads', category:'supplies', cost:40, sourced:'receipt', paidAmount:80, countLeft:'½ box left' },
  { id:'cables', name:'Box of derailleur cables', category:'supplies', cost:20, sourced:'receipt', paidAmount:40, countLeft:'½ box left' },
  { id:'cassettes', name:'Cassettes', category:'supplies', cost:40, sourced:'receipt', paidAmount:80, countLeft:'½ left' },
  { id:'bbs', name:'Bottom brackets', category:'supplies', cost:20, sourced:'receipt', paidAmount:80, countLeft:'¼ left' },
  { id:'spokes', name:'Spokes', category:'supplies', cost:20, sourced:'receipt', paidAmount:80, countLeft:'¼ left' },
  { id:'tubes', name:'Tubes', category:'supplies', cost:10, sourced:'receipt', paidAmount:40, countLeft:'¼ left' }
];
function findItem(id){ return items.find(function(i){ return i.id===id; }); }
var categoryDefs = [
  { id:'equipment', label:'EQUIPMENT', sub:'durable tools and gear' },
  { id:'computer', label:'COMPUTER EQUIPMENT', sub:'computers and devices' },
  { id:'supplies', label:'SUPPLIES', sub:'parts and consumables' },
  { id:'fixtures', label:'FIXTURES', sub:'drawers, storage, built-ins' }
];
var glossaryGroups = [
  { module:'Module 2 &mdash; Insurance and Maria', terms:[
    { term:'Property Policy', def:'Insurance that pays out if covered things are damaged or destroyed. Doesn&rsquo;t cover cash, or things you don&rsquo;t own (like the rented space).' },
    { term:'Market Value', def:'What a comparable one sells for today (e.g. recent used &ldquo;eBay comp&rdquo; prices); the basis used to value the pre-owned laptop. One way to arrive at an asset&rsquo;s value &mdash; a choice, not the only one.' }
  ] },
  { module:'Module 3 &mdash; Anna and the Bank Statement', terms:[
    { term:'Asset', def:'Something you have &mdash; a present right to an economic benefit (the gear, the parts, the prepaid month, cash). &ldquo;Right to,&rdquo; not &ldquo;owns&rdquo;: a leased item is an asset.' },
    { term:'Noncash Asset', def:'An asset that isn&rsquo;t cash: equipment, parts on the shelf, fixtures, or a future right like prepaid rent.' },
    { term:'Liability', def:'Something you owe &mdash; a present obligation to transfer an economic benefit later (the card balance; Smith&rsquo;s deposit, where what&rsquo;s owed is the work, not money).' },
    { term:'Prepaid Rent', def:'Rent already paid for a future month; a present right (an asset) until the month is used, then it becomes a cost.' },
    { term:'Promise', def:'Something you&rsquo;ve agreed to do or pay later. The plain word used before the term &ldquo;Liability.&rdquo;' },
    { term:'Deposit', def:'Money paid in advance for something not yet received. For the receiver it&rsquo;s a liability (you owe the goods/work, or the money back), not earnings yet.' }
  ] },
  { module:'Module 4 &mdash; Keeping the Reasons', terms:[
    { term:'Reason', def:'The why behind a change in a Noncash Asset, Liability, or Cash. One row per side of the change; every change has two sides (the felt beginning of double-entry).' },
    { term:'Contributed', def:'Resources that came into the entity from outside its own repair work (owner cash, equipment, items from home). Formal name later: Contributed Capital.' },
    { term:'Generated', def:'What the repair work produced, net of its costs (from running the repair work). Formal name later: Retained Earnings.' },
    { term:'Cost of Repairs Done', def:'The value of parts/resources consumed in finished customer jobs; a reason that makes parts-on-the-shelf go down.' }
  ] },
  { module:'Module 5 &mdash; Naming What You Built', terms:[
    { term:'Entity', def:'A perspective you adopt by deciding what counts as &ldquo;in&rdquo; (your repair work) vs. &ldquo;out&rdquo; (your personal life), for a purpose. The line is drawn, not found.' },
    { term:'Accounting Identity', def:'Assets &minus; Liabilities = Equities. An identity, not an equation; it holds by definition for every entity.' },
    { term:'Equities', def:'The definitional residual for a for-profit: A &minus; L = Equities. Plural by choice. Not &ldquo;net worth,&rdquo; not &ldquo;what the owner would walk away with,&rdquo; not the value of the business &mdash; a computed difference, not a pot of cash.' },
    { term:'Net Assets', def:'The residual for an entity with no owners (charity, university): A &minus; L = Net Assets; split by donor-restriction status. Same &ldquo;definitional difference, not net worth&rdquo; caution as Equities.' },
    { term:'Donor Restrictions', def:'For a nonprofit, strings a donor attaches to a gift. Not liabilities; recorded inside Net Assets.' }
  ] }
];
function fmt(n){ return '$' + Number(n).toLocaleString('en-US'); }

/* ===== state ===== */
var phaseOrder = ['welcome','form','maria-readback','complete'];
var placements = {};
var values = {};
var placeable = items.slice();

/* ===== totals ===== */
function subtotalForCat(catId){
  return placeable.filter(function(i){ return placements[i.id]===catId; })
    .reduce(function(s,i){ return s + (Number(values[i.id])||0); }, 0);
}
function totalInsurable(){ return categoryDefs.reduce(function(s,c){ return s + subtotalForCat(c.id); }, 0); }

/* ===== phase nav ===== */
function goto(p){ playClick(); }

/* ===== readback ===== */
function renderReadback(){
  var rows = categoryDefs.map(function(cat){
    return '<div class="totals-row"><span>'+cat.label+'</span><span class="mono">'+fmt(subtotalForCat(cat.id))+'</span></div>';
  }).join('');
  rows += '<div class="totals-row total"><span>TOTAL (insurable)</span><span class="mono">'+fmt(totalInsurable())+'</span></div>';
  document.getElementById('readbackRows').innerHTML = rows;
  document.getElementById('readbackMaria').innerHTML = '<div class="dialog-label">MARIA</div><div class="dialog-text">&ldquo;OK. Equipment '+fmt(subtotalForCat('equipment'))+'. Computer equipment '+fmt(subtotalForCat('computer'))+'. Supplies '+fmt(subtotalForCat('supplies'))+'. Fixtures '+fmt(subtotalForCat('fixtures'))+'. Total of '+fmt(totalInsurable())+'. That is what you have on hand now. Property policy goes on that. Paperwork in the mail.&rdquo;</div>';
}

/* ===== glossary ===== */
function openGlossary(){
  document.getElementById('glossaryList').innerHTML = glossaryGroups.map(function(grp){
    return '<div class="glossary-module">'+grp.module+'</div>'+grp.terms.map(function(g){
      return '<div class="glossary-entry"><div class="glossary-entry-term">'+g.term+'</div><div class="glossary-entry-def">'+g.def+'</div></div>';
    }).join('');
  }).join('');
  document.getElementById('glossaryOverlay').classList.add('open');
}
function closeGlossary(){ document.getElementById('glossaryOverlay').classList.remove('open'); }

/* ===== standalone-phase overrides ===== */
function goto(){ /* cross-phase navigation disabled — this file is standalone */ }
function restart(){ window.location.reload(); }

/* ===== segmented progress ===== */
var PHASE_INDEX = 2;
var PHASE_TITLE = 'The Read-Back';
function renderSegProgress(){
  document.getElementById('phaseTitle').textContent = PHASE_TITLE;
}

/* ===== init: pre-fill completed form state ===== */
renderSegProgress();
items.forEach(function(item){
  placements[item.id] = item.category;
  values[item.id] = String(item.cost);
});
renderReadback();
</script>
</body>
</html>
