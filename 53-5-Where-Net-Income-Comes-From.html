<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Where Net Income Comes From</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=Open+Sans:wght@400;600;700;800&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    .cvs-scope {
      --cvs-paper:#ffffff;
      --cvs-panel:#f8fafc;
      --cvs-ink:#263746;
      --cvs-muted:#657583;
      --cvs-primary:#155b86;
      --cvs-rule:#c8d4dc;
      --cvs-rule-strong:#708592;
      --cvs-warm:#fff8df;
      --cvs-accent:#d5a528;
      --cvs-shadow:rgba(32,55,72,0.09);
    }
    .cvs-doc-wrap { overflow-x:auto; padding:2px 2px 8px; }
    .cvs-doc-card, .cvs-snapshot {
      background:var(--cvs-paper);
      color:var(--cvs-ink);
      border:1px solid var(--cvs-rule);
      border-radius:12px;
      box-shadow:0 8px 24px var(--cvs-shadow);
    }
    .cvs-doc-card { max-width:820px; min-width:610px; margin:0 auto; padding:24px; }
    .cvs-kicker {
      margin:0 0 5px;
      color:var(--cvs-muted);
      font-size:11px;
      font-weight:700;
      letter-spacing:.1em;
      text-transform:uppercase;
    }
    .cvs-doc-title, .cvs-snapshot-title { margin:0; color:var(--cvs-primary); }
    .cvs-doc-title { font-size:20px; }
    .cvs-snapshot-title { font-size:17px; }
    .cvs-subline { margin:3px 0 0; color:var(--cvs-muted); font-size:12px; font-style:italic; }
    .cvs-table { margin-top:18px; font-size:13px; }
    .cvs-row {
      display:grid;
      grid-template-columns:minmax(300px,1fr) 7rem 7rem;
      column-gap:10px;
      align-items:baseline;
      padding:3px 0;
    }
    .cvs-row-head { border-bottom:1px solid var(--cvs-rule); color:var(--cvs-primary); font-weight:700; }
    .cvs-value { text-align:right; font-family:"JetBrains Mono",monospace; font-variant-numeric:tabular-nums; }
    .cvs-section { grid-column:1 / -1; margin-top:10px; color:var(--cvs-primary); font-weight:800; }
    .cvs-subtotal { font-weight:600; }
    .cvs-total { margin-top:4px; padding-top:6px; border-top:1px solid var(--cvs-rule-strong); color:var(--cvs-primary); font-weight:800; }
    .cvs-identity {
      margin-top:18px;
      padding:13px 15px;
      border:1px solid var(--cvs-accent);
      border-radius:9px;
      background:var(--cvs-warm);
      color:var(--cvs-ink);
    }
    .cvs-identity-title { margin:0 0 6px; font-weight:800; }
    .cvs-identity-line { margin:3px 0; font-family:"JetBrains Mono",monospace; font-size:12px; }
    .cvs-split.main-grid { align-items:stretch; }
    .cvs-split.main-grid > * { min-width:0; }
    .cvs-snapshot-wrap { min-width:0; overflow-x:auto; padding:2px 2px 8px; }
    .cvs-snapshot { min-width:285px; height:100%; padding:18px; box-sizing:border-box; }
    .cvs-snapshot-table { margin-top:15px; font-size:12px; }
    .cvs-snapshot-row {
      display:grid;
      grid-template-columns:minmax(185px,1fr) 6rem;
      column-gap:8px;
      align-items:baseline;
      padding:3px 0;
    }
    .cvs-snapshot-row.cvs-section { display:block; }
    .cvs-gap {
      min-height:230px;
      display:flex;
      align-items:center;
      justify-content:center;
      box-sizing:border-box;
      padding:24px 18px;
      border:2px dashed var(--cvs-accent);
      border-radius:12px;
      background:var(--cvs-warm);
      color:var(--cvs-muted);
      text-align:center;
      font-size:13px;
      font-style:italic;
      line-height:1.55;
    }

    .cvs-compact-row {
      display:grid;
      grid-template-columns:minmax(175px,1fr) 5.6rem;
      column-gap:8px;
      align-items:baseline;
      padding:4px 6px;
      border-left:3px solid transparent;
    }
    .cvs-compact-row.cvs-compact-total {
      margin-top:4px;
      padding-top:6px;
      border-top:1px solid var(--cvs-rule-strong);
      color:var(--cvs-primary);
      font-weight:800;
    }
    .cvs-compact-row.cvs-equity-first { margin-top:10px; border-top:1px solid var(--cvs-rule); }
    .cvs-compact-row.cvs-lit {
      border-left-color:var(--cvs-accent);
      background:var(--cvs-warm);
      color:var(--cvs-primary);
      font-weight:700;
    }
    .cvs-compact-spacer { height:7px; }
    .cvs-restricted-note { margin:0 6px 3px 18px; color:var(--cvs-primary); font-size:10px; font-style:italic; }
    .cvs-check { margin:10px 4px 0; color:var(--cvs-muted); font-family:"JetBrains Mono",monospace; font-size:10px; text-align:right; }

    .cvs-question {
      min-height:100%;
      box-sizing:border-box;
      display:flex;
      flex-direction:column;
      justify-content:center;
      padding:22px;
      border:2px dashed var(--cvs-accent);
      border-radius:12px;
      background:var(--cvs-warm);
      color:var(--cvs-ink);
      box-shadow:0 8px 24px var(--cvs-shadow);
    }
    .cvs-question h2 { margin:2px 0 14px; color:var(--cvs-primary); font-size:20px; line-height:1.25; }
    .cvs-question-figure { color:var(--cvs-primary); font-family:"JetBrains Mono",monospace; font-size:27px; font-weight:800; }
    .cvs-question-label { margin:3px 0 14px; color:var(--cvs-muted); font-size:11px; font-weight:700; text-transform:uppercase; }
    .cvs-question-setup { margin:0; color:var(--cvs-ink); font-size:12px; font-style:italic; line-height:1.55; }
    .cvs-question-footer { margin:15px 0 0; padding-top:11px; border-top:1px solid var(--cvs-rule); color:var(--cvs-primary); font-size:11px; font-weight:700; line-height:1.45; }

    .cvs-is-card { max-width:900px; min-width:700px; }
    .cvs-statement-4 .cvs-row { grid-template-columns:minmax(330px,1fr) repeat(3,6.3rem); }
    .cvs-statement-2 .cvs-row { grid-template-columns:minmax(330px,1fr) 7rem; }
    .cvs-statement-row-label { min-width:0; line-height:1.35; }
    .cvs-nci-split { max-width:680px; min-width:500px; }
    .cvs-nci-note { margin:14px 0 0; padding:10px 12px; border-left:3px solid var(--cvs-accent); background:var(--cvs-warm); color:var(--cvs-ink); font-size:12px; font-style:italic; }
    .cvs-ci-card { max-width:800px; min-width:610px; }
    .cvs-ci-section { margin-top:12px; color:var(--cvs-primary); font-weight:800; }

    .cvs-bucket-strip {
      max-width:880px;
      margin:0 auto;
      padding:20px;
      border:2px solid var(--cvs-accent);
      border-radius:12px;
      background:var(--cvs-panel);
      color:var(--cvs-ink);
      box-shadow:0 8px 24px var(--cvs-shadow);
    }
    .cvs-bucket-grid { display:grid; grid-template-columns:2fr 1fr; gap:16px; margin-top:13px; }
    .cvs-bucket { padding:15px; border:1px solid var(--cvs-rule); border-radius:9px; background:var(--cvs-paper); }
    .cvs-bucket h3 { margin:0 0 9px; color:var(--cvs-primary); font-size:15px; }
    .cvs-running-row { display:grid; grid-template-columns:minmax(180px,1fr) 5.5rem; gap:10px; padding:3px 0; align-items:baseline; font-size:12px; }
    .cvs-running-row.cvs-running-total { margin-top:5px; padding-top:7px; border-top:1px solid var(--cvs-rule-strong); color:var(--cvs-primary); font-weight:800; }
    .cvs-destination { margin:0 0 5px; color:var(--cvs-muted); font-size:10px; font-style:italic; }
    .cvs-strip-foot { margin:12px 0 0; color:var(--cvs-muted); font-size:11px; font-style:italic; }

    .cvs-center-card { min-width:285px; padding:18px; }
    .cvs-center-table { margin-top:13px; font-size:11px; }
    .cvs-center-row { display:grid; grid-template-columns:minmax(165px,1fr) 5.2rem; gap:8px; align-items:baseline; padding:4px 0; }
    .cvs-center-row.cvs-center-total { margin-top:3px; padding-top:6px; border-top:1px solid var(--cvs-rule-strong); color:var(--cvs-primary); font-weight:800; }
    .cvs-center-oci { margin-top:12px; padding-top:10px; border-top:1px dashed var(--cvs-accent); }
    .cvs-flow-arrow { color:var(--cvs-accent); font-weight:800; }

    @media (max-width:760px) {
      .cvs-split.main-grid { grid-template-columns:1fr; }
      .cvs-gap { min-height:170px; }
      .cvs-bucket-grid { grid-template-columns:1fr; }
    }
      </style>
</head>
<body>
<div class="page">
  <div class="prework-wrap">

    <div class="phase-title-row">
      <div class="phase-title"></div>
      <button class="icon-btn" title="Glossary" aria-label="Open glossary" onclick="openGlossary()"><i data-lucide="book-open"></i></button>
    </div>

    <div id="beats"></div>
    <div id="mainGrid"></div>
    <div id="tail"></div>
    <div id="controls"></div>

  </div>
</div>

<!-- ===== Glossary overlay ===== -->
<div class="glossary-overlay" id="glossaryOverlay" onclick="if(event.target===this) closeGlossary()">
  <div class="glossary-panel">
    <div class="glossary-panel-head">
      <div class="glossary-panel-title"><i data-lucide="book-open" class="licon"></i> Glossary</div>
      <button class="glossary-close-btn" aria-label="Close" onclick="closeGlossary()">&times;</button>
    </div>
    <div class="glossary-list" id="glossaryList"></div>
  </div>
</div>

<script src="cvs-10k-data.js"></script>
<script src="shared.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script>
if(window.lucide) lucide.createIcons();

/* ===== sound ===== */
var audioCtx=null;
function ac(){ if(!audioCtx){ try{audioCtx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } return audioCtx; }
function tone(f,d,t,v){ var c=ac(); if(!c)return; var o=c.createOscillator(),g=c.createGain(); o.type=t||'sine'; o.frequency.value=f; o.connect(g); g.connect(c.destination); g.gain.setValueAtTime(v||0.05,c.currentTime); g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+d); o.start(); o.stop(c.currentTime+d); }
function playSuccess(){ tone(523,0.12); setTimeout(function(){tone(659,0.12);},90); setTimeout(function(){tone(784,0.16);},180); }
function playClick(){ tone(600,0.08,'sine',0.04); }

var step=0;
var TOTAL_STEPS=8;
var revealCount=0;
var expandedRows=true;

function escapeHTML(value){
  return String(value).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function fmt(v){
  if(v===0) return '—';
  var a=Math.abs(v).toLocaleString('en-US');
  return v<0 ? '('+a+')' : a;
}
function money(v){ return '$'+fmt(v); }
function displayValue(row,year){
  if(row.dashFor && row.dashFor.indexOf(year)!==-1) return '—';
  return fmt(row[year]);
}
function rowClass(row,base){
  var cls=base;
  if(row.type==='subtotal') cls+=' cvs-subtotal';
  if(row.type==='total') cls+=' cvs-total';
  return cls;
}
function valueCell(value){ return '<div class="cvs-value">'+value+'</div>'; }

function compactRow(label,value,extra){
  return '<div class="cvs-compact-row'+(extra?' '+extra:'')+'"><div>'+label+'</div>'+valueCell(fmt(value))+'</div>';
}
function compactSnapshot(year,label,highlightEarned,highlightRestricted){
  var d=window.CVS_10K.compactBS[year];
  var yearText=year==='y2025'?'2025':'2024';
  var allOther=d.totalAssets-d.cash-d.otherCurrent-d.otherAssets;
  var h='<div class="cvs-snapshot-wrap"><div class="cvs-snapshot">';
  h+='<p class="cvs-kicker">'+label+'</p><h3 class="cvs-snapshot-title">Balance Sheet</h3>';
  h+='<p class="cvs-subline">December 31, '+yearText+' &middot; in $ millions</p><div class="cvs-snapshot-table">';
  h+=compactRow('Cash and cash equivalents',d.cash,'');
  h+=compactRow('Other current assets',d.otherCurrent,highlightRestricted?'cvs-lit':'');
  if(highlightRestricted) h+='<p class="cvs-restricted-note">&#8627; of which restricted cash: '+fmt(d.restrCurr)+'</p>';
  h+=compactRow('Other assets',d.otherAssets,highlightRestricted?'cvs-lit':'');
  if(highlightRestricted) h+='<p class="cvs-restricted-note">&#8627; of which restricted cash: '+fmt(d.restrOther)+'</p>';
  h+=compactRow('All other noncash assets',allOther,'');
  h+=compactRow('Total assets',d.totalAssets,'cvs-compact-total');
  h+='<div class="cvs-compact-spacer"></div>';
  h+=compactRow('&minus; Total liabilities',d.totalLiab,'');
  h+=compactRow('= Contributed',d.contributed,'cvs-equity-first');
  h+=compactRow('+ Earned and retained',d.earnedRetained,highlightEarned?'cvs-lit':'');
  h+=compactRow('+ Noncontrolling interests',d.nci,'');
  h+=compactRow('= Total shareholders&rsquo; equity',d.totalEq,'cvs-compact-total');
  h+='<p class="cvs-check">'+fmt(d.totalAssets)+' &minus; '+fmt(d.totalLiab)+' = '+fmt(d.totalEq)+' &#10003;</p>';
  return h+'</div></div></div>';
}

function questionCard(){
  var movement=window.CVS_10K.soce2025Aggregated[0];
  return '<div class="cvs-question"><p class="cvs-kicker">The question</p>'
    +'<h2>Where did Net Income come from?</h2>'
    +'<div class="cvs-question-figure">'+money(movement.retainedEarnings)+' million</div>'
    +'<div class="cvs-question-label">into Earned &amp; Retained</div>'
    +'<p class="cvs-question-setup">On the Statement of Shareholders&rsquo; Equity, Net income was a single movement row. Behind that one number sits a $402-billion year of operations.</p>'
    +'<p class="cvs-question-footer">The Income Statement traces how revenues and costs produced Net income.</p></div>';
}
function openingArchitecture(){
  return '<div class="cvs-scope"><div class="main-grid cvs-split">'
    +compactSnapshot('y2024','Beginning',true,false)+questionCard()+compactSnapshot('y2025','Ending',true,false)+'</div></div>';
}

function statementHeader(years,title,subline){
  var h='<p class="cvs-kicker">Index to Consolidated Financial Statements</p><h2 class="cvs-doc-title">'+title+'</h2>';
  h+='<p class="cvs-subline">'+subline+'</p><p class="cvs-subline">In millions, except per share amounts</p>';
  h+='<div class="cvs-table cvs-statement-'+(years.length+1)+'"><div class="cvs-row cvs-row-head"><div></div>';
  for(var i=0;i<years.length;i++) h+=valueCell(years[i].replace('y',''));
  return h+'</div>';
}
function dataRow(row,years,kind){
  var cls='cvs-row';
  if(kind==='subtotal') cls+=' cvs-subtotal';
  if(kind==='total') cls+=' cvs-total';
  var h='<div class="'+cls+'"><div class="cvs-statement-row-label">'+escapeHTML(row.label)+'</div>';
  for(var i=0;i<years.length;i++) h+=valueCell(displayValue(row,years[i]));
  return h+'</div>';
}
function sectionRows(section,years,full){
  var h='';
  if(full){
    h+='<div class="cvs-section">'+escapeHTML(section.header)+'</div>';
    for(var i=0;i<section.items.length;i++) h+=dataRow(section.items[i],years,'line');
  }
  h+=dataRow(section.subtotal,years,'subtotal');
  return h;
}
function incomeStatement(years,mode){
  var d=window.CVS_10K.is3Year;
  var h='<div class="cvs-scope"><div class="cvs-doc-wrap"><div class="cvs-doc-card cvs-is-card">';
  h+=statementHeader(years,'Consolidated Statements of Operations','For the Years Ended December 31,');
  if(mode==='full' || mode==='skeleton'){
    for(var s=0;s<d.sections.length;s++) h+=sectionRows(d.sections[s],years,mode==='full');
    h+=dataRow(d.operatingIncome,years,'subtotal');
    for(var i=0;i<d.nonOperating.length;i++) h+=dataRow(d.nonOperating[i],years,'line');
    h+=dataRow(d.incomeBeforeTax,years,'subtotal');
    h+=dataRow(d.incomeTax,years,'line');
  }
  h+=dataRow(d.netIncome,years,'subtotal');
  if(mode==='bottom'){
    h+='<div class="cvs-row"><div class="cvs-statement-row-label">'+escapeHTML(d.nciLine.label)+'</div>'+valueCell('+'+fmt(d.nciLine[years[0]]))+'</div>';
  } else {
    h+=dataRow(d.nciLine,years,'line');
  }
  h+=dataRow(d.netIncomeCVS,years,'total');
  if(mode==='bottom') h+='<p class="cvs-nci-note">Consolidated Net income plus the loss attributable to noncontrolling interests equals Net income attributable to CVS Health.</p>';
  return h+'</div></div></div></div>';
}

function comprehensiveStatement(){
  var d=window.CVS_10K.ci3Year;
  var years=['y2025'];
  var h='<div class="cvs-scope"><div class="cvs-doc-wrap"><div class="cvs-doc-card cvs-ci-card">';
  h+=statementHeader(years,'Consolidated Statements of Comprehensive Income','For the Year Ended December 31, 2025');
  h+=dataRow(d.netIncome,years,'subtotal');
  h+='<div class="cvs-ci-section">Other comprehensive income (loss), net of tax:</div>';
  for(var i=0;i<d.ociItems.length;i++) h+=dataRow(d.ociItems[i],years,'line');
  h+=dataRow(d.oci,years,'subtotal');
  h+=dataRow(d.comprehensiveIncome,years,'total');
  return h+'</div></div></div></div>';
}

function bucketStrip(){
  var r=window.CVS_10K.soce2025Aggregated[0];
  var h='<div class="cvs-scope"><div class="cvs-bucket-strip"><p class="cvs-kicker">From the Income Statement into the Statement of Shareholders&rsquo; Equity buckets</p>';
  h+='<div class="cvs-bucket-grid"><div class="cvs-bucket"><h3>Earned &amp; Retained</h3>';
  h+='<div class="cvs-running-row"><div>Net income attributable to CVS</div>'+valueCell(fmt(r.retainedEarnings))+'</div>';
  h+='<p class="cvs-destination">&#8627; Retained Earnings</p>';
  h+='<div class="cvs-running-row"><div>+ Other comprehensive income</div>'+valueCell(fmt(r.aoci))+'</div>';
  h+='<p class="cvs-destination">&#8627; AOCI</p>';
  h+='<div class="cvs-running-row cvs-running-total"><div>= Comprehensive income attributable to CVS Health</div>'+valueCell(fmt(r.totalCVS))+'</div>';
  h+='</div><div class="cvs-bucket"><h3>Noncontrolling interests</h3>';
  h+='<div class="cvs-running-row"><div>Net income attributable to NCI</div>'+valueCell(fmt(r.nci))+'</div>';
  h+='<p class="cvs-destination">&#8627; NCI bucket</p></div></div>';
  h+='<p class="cvs-strip-foot">'+escapeHTML(r.label)+': '+fmt(r.retainedEarnings)+' + '+fmt(r.aoci)+' = '+fmt(r.totalCVS)+' into Earned &amp; Retained; '+fmt(r.nci)+' into NCI.</p>';
  return h+'</div></div>';
}

function centerIncomeStatement(){
  var d=window.CVS_10K.is3Year;
  var ci=window.CVS_10K.ci3Year;
  var nonOperating=0;
  for(var i=0;i<d.nonOperating.length;i++) nonOperating+=d.nonOperating[i].y2025;
  function row(label,value,total){
    return '<div class="cvs-center-row'+(total?' cvs-center-total':'')+'"><div>'+label+'</div>'+valueCell(fmt(value))+'</div>';
  }
  var h='<div class="cvs-doc-card cvs-center-card"><p class="cvs-kicker">From the 10-K &middot; page 93</p>';
  h+='<h3 class="cvs-snapshot-title">Income Statement</h3><p class="cvs-subline">Year ended December 31, 2025 &middot; in $ millions</p><div class="cvs-center-table">';
  h+=row('Total revenues',d.sections[0].subtotal.y2025,false);
  h+='<div class="cvs-center-row"><div class="cvs-flow-arrow">&darr;</div><div></div></div>';
  h+=row('Total operating costs',d.sections[1].subtotal.y2025,false);
  h+=row('Operating income',d.operatingIncome.y2025,true);
  h+=row('Net non-operating items',nonOperating,false);
  h+=row('Income before tax',d.incomeBeforeTax.y2025,true);
  h+=row('Income tax provision',d.incomeTax.y2025,false);
  h+=row('Net income',d.netIncome.y2025,true);
  h+=row('Net (income) loss attributable to NCI',d.nciLine.y2025,false);
  h+=row('Net income attributable to CVS Health',d.netIncomeCVS.y2025,true);
  h+='<div class="cvs-center-oci"><p class="cvs-kicker">From page 94 &middot; Comprehensive Income</p>';
  h+=row('Other comprehensive income',ci.oci.y2025,false);
  h+=row('Comprehensive income attributable to CVS',ci.ciCVS.y2025,true);
  return h+'</div></div></div>';
}
function finalArchitecture(){
  return '<div class="cvs-scope"><div class="main-grid cvs-split">'
    +compactSnapshot('y2024','Beginning',false,false)+centerIncomeStatement()+compactSnapshot('y2025','Ending',false,false)+'</div></div>';
}

var narratives=[
  'The architecture holds &mdash; bucketed Balance Sheets on either side &mdash; but the highlight moves to the Earned &amp; Retained rows, the bucket Net income lands in. One more question, one level deeper.',
  'Here is CVS&rsquo;s Consolidated Statements of Operations &mdash; the Income Statement &mdash; as it appears on page 93 of the 10-K. The Balance Sheets step aside. Revenue at the top ($402 billion in 2025), operating costs in the middle, non-operating items below, then Net income at the bottom &mdash; split between CVS shareholders and noncontrolling interests. Three years of data, all line items.',
  'Same move as the Cash Flow Statement and the Statement of Shareholders&rsquo; Equity: the 2025 column covers the span between our two Balance Sheets (January 1 through December 31, 2025). The other two columns cover earlier spans that don&rsquo;t connect anything we&rsquo;re holding. Drop them out of the picture.',
  'Inside the 2025 column, the line items collapse. What remains is the skeleton: Total revenues, Total operating costs, Operating income, then non-operating items, Income before tax, Income tax, and Net income &mdash; followed by the NCI line and Net income attributable to CVS Health.',
  'Even the operating subtotals fall away. Three numbers remain: Net income $1,728 (the consolidated total), Net (income) loss attributable to NCI $40 (the loss CVS&rsquo;s subsidiaries&rsquo; minority owners absorbed), and Net income attributable to CVS Health $1,768. The $40 NCI piece is what we flagged back on the Statement of Shareholders&rsquo; Equity &mdash; here it is, on the Income Statement, where it formally lives.',
  'Net income is not the whole story of equity-affecting earnings. The separate Statement of Comprehensive Income (page 94 of the 10-K) adds five OCI items &mdash; unrealized investment gains, foreign currency, hedges, pensions &mdash; summing to $526 of Other Comprehensive Income. Net income plus OCI equals Comprehensive income of $2,254. The $526 of OCI is what landed in AOCI on the Balance Sheet and in the AOCI column of the Statement of Shareholders&rsquo; Equity.',
  'The Income Statement narrows to a strip showing where each piece lands in the equity buckets: $1,768 of Net income attributable to CVS goes into Earned &amp; Retained (specifically Retained Earnings); $526 of OCI also goes into Earned &amp; Retained (specifically AOCI). Together $2,294 lands in Earned &amp; Retained &mdash; exactly the Comprehensive income attributable to CVS Health. Separately, &minus;$40 of Net income attributable to NCI goes into the NCI bucket.',
  'Strips give way to the architecture. The 2025 Income Statement slots into the middle between the two Balance Sheets. Each Balance Sheet shows its bucketed equity rows; the Income Statement shows the path from Revenue ($402 billion) down to Net income attributable to CVS Health ($1,768), plus the OCI piece ($526). The Cash Flow Statement and the Statement of Shareholders&rsquo; Equity we explored earlier still belong in this middle column &mdash; but the Income Statement is the focus now.'
];

function render(){
  renderBeats(step);
  renderGrid(step);
  renderTail(step);
  renderControls(step);
  if(window.lucide) lucide.createIcons();
}
function renderBeats(currentStep){
  document.getElementById('beats').innerHTML='<div class="narrative-block"><p>'+narratives[currentStep]+'</p></div>';
}
function renderGrid(currentStep){
  var h='';
  if(currentStep===0) h=openingArchitecture();
  else if(currentStep===1) h=incomeStatement(['y2025','y2024','y2023'],'full');
  else if(currentStep===2) h=incomeStatement(['y2025'],'full');
  else if(currentStep===3) h=incomeStatement(['y2025'],'skeleton');
  else if(currentStep===4) h=incomeStatement(['y2025'],'bottom');
  else if(currentStep===5) h=comprehensiveStatement();
  else if(currentStep===6) h=bucketStrip();
  else h=finalArchitecture();
  document.getElementById('mainGrid').innerHTML=h;
}
function renderTail(currentStep){ document.getElementById('tail').innerHTML=''; }
function renderControls(currentStep){
  var h='<div class="nav-buttons">';
  if(step>0) h+='<button class="btn-back" onclick="back()">&larr; Back</button>';
  if(step<TOTAL_STEPS-1) h+='<button class="btn-next" onclick="advance()">Next &rarr;</button>';
  else h+='<button class="btn-next" onclick="playClick();window.location.href=\'53-6-The-Full-Architecture.html\'">Next: The Full Architecture &rarr;</button>';
  h+='</div>';
  document.getElementById('controls').innerHTML=h;
}
function advance(){
  playClick();
  step=Math.min(step+1,TOTAL_STEPS-1);
  render();
  window.scrollTo(0,0);
}
function back(){
  playClick();
  step=Math.max(step-1,0);
  render();
  window.scrollTo(0,0);
}

var glossaryTerms=[
  {term:'Income Statement',def:'The Consolidated Statements of Operations: revenues minus costs, ending in Net income for the period.'},
  {term:'Operating income',def:'Total revenues minus total operating costs, before non-operating items and tax.'},
  {term:'Comprehensive income',def:'Net income plus Other Comprehensive Income (OCI) &mdash; gains and losses that bypass Net income but still change equity.'},
  {term:'Noncontrolling interests',def:'Outside minority owners of consolidated subsidiaries; their share of income is split out from Net income attributable to CVS Health.'}
];
function openGlossary(){
  document.getElementById('glossaryList').innerHTML=glossaryTerms.map(function(item){
    return '<div class="glossary-entry"><div class="glossary-entry-term">'+item.term+'</div><div class="glossary-entry-def">'+item.def+'</div></div>';
  }).join('');
  document.getElementById('glossaryOverlay').classList.add('open');
}
function closeGlossary(){ document.getElementById('glossaryOverlay').classList.remove('open'); }
function restart(){ window.location.reload(); }
document.addEventListener('keydown',function(e){ if(e.key==='Escape') closeGlossary(); });

window.devFill=function(){
  step=TOTAL_STEPS-1;
  revealCount=99;
  expandedRows=true;
  render();
};
render();
</script>
<script src="dev.js"></script>
</body>
