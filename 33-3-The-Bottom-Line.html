<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tutorial 3.3: Depreciation &middot; The Bottom Line</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Open+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="page">
  <div class="prework-wrap">

    <div class="tut-header">
      <div class="tut-header-main">
        <h1>Tutorial 3: Depreciation</h1>
        <p class="tut-header-sub">Module 3 &middot; The Story Between the Snapshots &middot; ~10 min &middot; Phase 3 of 3</p>
      </div>
      <div class="tut-header-actions">
        <button class="icon-btn" title="Glossary" aria-label="Open glossary" onclick="openGlossary()"><i data-lucide="book-open"></i></button>
      </div>
    </div>
    <div class="phase-title" id="phaseTitle">The Bottom Line</div>

    <div id="stepProg"></div>

    <div class="narrative-block">
      <p>The Expenses tab is complete. Before the bottom line, one look at what the wear did to the <em>other</em> side of the books.</p>
    </div>

    <div id="wb"></div>
    <div id="anna"></div>
    <div id="controls"></div>

  </div>
</div>

<!-- ===== Glossary overlay ===== -->
<div class="glossary-overlay" id="glossaryOverlay" onclick="if(event.target===this) closeGlossary()">
  <div class="glossary-panel">
    <div class="glossary-panel-head">
      <div class="glossary-panel-title"><i data-lucide="book-open" class="licon"></i> Glossary</div>
      <button class="glossary-close-btn" aria-label="Close" onclick="closeGlossary()">&times;</button>
    </div>
    <div class="glossary-list" id="glossaryList"></div>
  </div>
</div>
<script src="shared.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script>
if (window.lucide) lucide.createIcons();

/* ===== sound ===== */
var audioCtx=null;
function ac(){ if(!audioCtx){ try{audioCtx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } return audioCtx; }
function tone(f,d,t,v){ var c=ac(); if(!c)return; var o=c.createOscillator(),g=c.createGain(); o.type=t||'sine'; o.frequency.value=f; o.connect(g); g.connect(c.destination); g.gain.setValueAtTime(v||0.05,c.currentTime); g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+d); o.start(); o.stop(c.currentTime+d); }
function playSuccess(){ tone(523,0.12); setTimeout(function(){tone(659,0.12);},90); setTimeout(function(){tone(784,0.16);},180); }
function playClick(){ tone(600,0.08,'sine',0.04); }

function annaBox(inner){ return '<div class="dialog-box anna"><div class="dialog-label">ANNA</div><div class="dialog-text">'+inner+'</div></div>'; }
function insightBox(label,inner){ return '<div class="insight-box"><div class="insight-label"><i data-lucide="lightbulb" class="licon"></i> '+label+'</div>'+inner+'</div>'; }

/* ===== the completed income statement, read off the two period tabs ===== */
var REVENUE = 6020, PARTS = 1200, RENT = 1950, DEP_TOOLS = 200, DEP_LAPTOP = 30;
var EXPENSES = PARTS + RENT + DEP_TOOLS + DEP_LAPTOP;   // 3,380
var NET_INCOME = REVENUE - EXPENSES;                     // 2,640

/* ===== state ===== */
var step = 0;
var snap = BR_WB.snapshot({ tabbed:true, withReceivable:true, withDepreciation:true });

function renderTalk(){
  if (window.renderStepProgress) renderStepProgress('stepProg', step + 1, 2);
  var anna='', ctrl='';
  if(step===0){
    anna = annaBox('Look at the <strong>Laptop</strong> line: cost <strong>$610</strong>, this season&rsquo;s wear <strong>&minus;$30</strong> &mdash; the records carry it at <strong>$580</strong> now. That number has a name: <strong>carrying value</strong>, also called <strong>book value</strong> &mdash; what&rsquo;s left of the cost after the depreciation charged so far. Be clear about what it is: a cost walking down a <em>chosen path</em>. You could ask the market instead &mdash; comparable laptops fetch something on eBay tonight &mdash; and the records <em>deliberately don&rsquo;t</em>: chasing that price every season isn&rsquo;t worth the effort, and it isn&rsquo;t what depreciation is. The cost walks its chosen path; the market answers its own question. Don&rsquo;t expect book and market to agree. Hold onto that &mdash; it matters later.');
    ctrl = insightBox('Carrying value is a path, not a price',
        '<p>Cost, minus the depreciation charged so far. It tells you where the number has <em>been</em> &mdash; not what the laptop would fetch. And unlike rent &mdash; where a lapsed month is simply gone &mdash; a fully depreciated tool is still on the bench, and may still be worth something. The path runs out; the thing doesn&rsquo;t.</p>')
      + '<button class="btn-continue btn-block" onclick="finishStatement()">Finish the income statement &rarr;</button>';
  } else {
    anna = annaBox('There it is &mdash; the bottom line, at last: <strong>Net income, '+BRW.dol(NET_INCOME)+'</strong>. The shop delivered <strong>'+BRW.dol(REVENUE)+'</strong> of work this season and used up <strong>'+BRW.dol(EXPENSES)+'</strong> getting it done &mdash; parts, months of space, and wear. Every kind of used-up counted. Nothing left open.');
    ctrl = insightBox('How the season went &mdash; answered',
        '<p>One statement, read straight off the two period tabs: Revenue '+BRW.dol(REVENUE)+' &minus; Expenses '+BRW.dol(EXPENSES)+' = <strong>Net income '+BRW.dol(NET_INCOME)+'</strong>. This is the answer the jumbled pile couldn&rsquo;t give &mdash; and it&rsquo;s complete now.</p>')
      + '<div class="next-phase-msg">One loose thread, though. A '+BRW.dol(NET_INCOME)+' season &mdash; and the Cash line reads <strong>$620</strong>, down from <strong>$1,300</strong> on opening day. Profitable, and poorer in cash. Both true. The next tutorial pulls that apart.</div>'
      + '<div class="btn-row"><button class="btn-reset" onclick="unFinish()"><i data-lucide="arrow-left" class="licon"></i> Back</button><button class="btn-continue" style="margin-left:auto;" onclick="nav(\'34-1-The-Cash-Puzzle.html\')">Next: profit vs. cash &rarr;</button></div>';
  }
  document.getElementById('anna').innerHTML = anna;
  document.getElementById('controls').innerHTML = ctrl;
  if(window.lucide) lucide.createIcons();
}

function finishStatement(){
  playClick(); playSuccess();
  step = 1;
  snap.incomeNew = true;
  snap.tabs = snap.tabs.concat(BR_WB.statementTabs(['income']));
  BRW.update('wb', snap);
  BRW.tab('wb', 'income');
  renderTalk();
  window.scrollTo(0, document.body.scrollHeight);
}
function unFinish(){
  playClick();
  step = 0;
  snap = BR_WB.snapshot({ tabbed:true, withReceivable:true, withDepreciation:true });   // statement tab back off
  BRW.update('wb', snap);
  BRW.tab('wb', 'assets');
  renderTalk();
}

/* ===== glossary / nav ===== */
var glossaryTerms=[
  { term:'Carrying value (book value)', def:'What the records show is left of a thing&rsquo;s cost: cost minus the depreciation charged so far. A path the books walk down by rule &mdash; not what the thing would fetch. The thing can outlive its path: fully depreciated, still on the bench.' },
  { term:'Net income', def:'Revenue &minus; Expenses for the period: $6,020 &minus; $3,380 = $2,640. Complete now that every kind of used-up &mdash; directly observed, time-lapsed, and allocated &mdash; is counted.' },
  { term:'Depreciation', def:'A season&rsquo;s share of a long-lived thing&rsquo;s cost, by a chosen rule. An allocation &mdash; a convention standing in for time, wear and tear, and judgment together.' }
];
function openGlossary(){
  document.getElementById('glossaryList').innerHTML = glossaryTerms.map(function(g){
    return '<div class="glossary-entry"><div class="glossary-entry-term">'+g.term+'</div><div class="glossary-entry-def">'+g.def+'</div></div>';
  }).join('');
  document.getElementById('glossaryOverlay').classList.add('open');
}
function closeGlossary(){ document.getElementById('glossaryOverlay').classList.remove('open'); }
function nav(url){ playClick(); window.location.href=url; }
function restart(){ window.location.reload(); }
document.addEventListener('keydown', function(e){ if(e.key==='Escape'){ closeGlossary(); } });

/* ===== init — the workbook with the wear recorded, open on the Laptop ledger ===== */
window.devFill = function(){ if(step===0) finishStatement(); };
BR_WB.registerSeasonSheets();
BR_WB.registerStatementSheets();
BRW.mount('wb', snap);
BRW.tab('wb', 'assets');
BRW.x('wb', 'a', 6);   // open the Laptop line
renderTalk();
</script>
  <script src="dev.js"></script>
</body>
</html>
