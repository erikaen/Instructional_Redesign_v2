<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light dark">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tutorial 4: The Entity's Own Number &middot; Form SS-4</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Open+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="page">
  <div class="prework-wrap">

    <!-- ===== Header ===== -->
    <div class="tut-header">
      <div class="tut-header-main">
        <h1>Tutorial 4: The Entity&rsquo;s Own Number</h1>
        <p class="tut-header-sub">Module 2 &middot; Getting Formal &middot; ~10 min &middot; Phase 2 of 5</p>
      </div>
      <div class="tut-header-actions">
        <button class="icon-btn" title="Glossary" aria-label="Open glossary" onclick="openGlossary()"><i data-lucide="book-open"></i></button>
        <button class="icon-btn" title="Reset this phase" aria-label="Reset this phase" onclick="restart()"><i data-lucide="rotate-ccw"></i></button>
      </div>
    </div>
    <div class="phase-title" id="phaseTitle">Form SS-4</div>

    <!-- ===== ein ===== -->
    <div class="phase active" id="phase-ein">
      <div id="einArea"></div>
    </div>

  </div>
</div>

<!-- ===== Glossary overlay ===== -->
<div class="glossary-overlay" id="glossaryOverlay" onclick="if(event.target===this) closeGlossary()">
  <div class="glossary-panel">
    <div class="glossary-panel-head">
      <div class="glossary-panel-title"><i data-lucide="book-open" class="licon"></i> Glossary</div>
      <button class="glossary-close-btn" aria-label="Close" onclick="closeGlossary()">&times;</button>
    </div>
    <div class="glossary-list" id="glossaryList"></div>
  </div>
</div>

<script src="https://unpkg.com/lucide@latest"></script>
<script>
if (window.lucide) lucide.createIcons();

/* ===== sound ===== */
var audioCtx = null;
function ac(){ if(!audioCtx){ try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return audioCtx; }
function tone(f,d,t,v){ var c=ac(); if(!c)return; var o=c.createOscillator(),g=c.createGain(); o.type=t||'sine'; o.frequency.value=f; o.connect(g); g.connect(c.destination); g.gain.setValueAtTime(v||0.05,c.currentTime); g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+d); o.start(); o.stop(c.currentTime+d); }
function playClick(){ tone(600,0.08,'sine',0.04); }
function playStamp(){ tone(180,0.25,'triangle',0.3); }

/* ===== glossary (shared across all phases of 2.4) ===== */
var glossaryTerms = [
  { term:"EIN", def:"Employer Identification Number &mdash; the entity&rsquo;s own tax ID with the IRS, like a Social Security number for a business. The bank needs it to open an account in the LLC&rsquo;s name." },
  { term:"Co-mingling", def:"Running business and personal money through the same account, so they have to be sorted apart by hand. Opening the LLC&rsquo;s own account ends it." },
  { term:"Capital contribution", def:"Money (or property) an owner puts into the company. Your $500 in cash is one: it raises the LLC&rsquo;s cash and its members&rsquo; capital by $500." },
  { term:"Disregarded entity", def:"For federal income tax, a single-member LLC is &ldquo;looked through&rdquo; to its owner &mdash; even though it holds its own EIN for every other purpose. Different lines drawn for different purposes." },
  { term:"Counterparty", def:"The other party to a transaction or contract. With its own EIN and accounts, the LLC is a counterparty in its own right &mdash; it deals with banks, customers, and the IRS in its own name, and can owe and be owed (even sue and be sued) as itself, not as you." }
];
function openGlossary(){
  document.getElementById('glossaryList').innerHTML = glossaryTerms.map(function(g){
    return '<div class="glossary-entry"><div class="glossary-entry-term">'+g.term+'</div><div class="glossary-entry-def">'+g.def+'</div></div>';
  }).join('');
  document.getElementById('glossaryOverlay').classList.add('open');
}
function closeGlossary(){ document.getElementById('glossaryOverlay').classList.remove('open'); }

/* ===== navigation / reset ===== */
function nav(url){ playClick(); window.location.href = url; }
function restart(){ window.location.reload(); }

/* ===== member name + escaping ===== */
var memberName = '';
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function memberDisplay(){ return memberName.trim() || "[Your Name]"; }
function llcName(){ return memberDisplay() + "’s Bike Repairs, LLC"; }

/* ===== state (phase-local) ===== */
var einFiled = false;

/* ===== Form SS-4 ===== */
function ss4Lines(){
  var en = esc(llcName()), dn = esc(memberDisplay());
  return [
    ['1','Legal name of entity:',en],
    ['7a','Responsible party:',dn],
    ['8a','Is this for an LLC?','Yes &middot; 1 member'],
    ['9a','Type of entity:','Other &rarr; Disregarded entity (single-member LLC)'],
    ['10','Reason for applying:','Started a new business &rarr; bicycle repair services'],
    ['12','Closing month of accounting year:','December']
  ];
}
function ss4RowsHtml(){
  return ss4Lines().map(function(l){
    return '<div style="display:flex;border:1px solid #d8d8d8;border-top:none">'+
      '<div style="flex:0 0 30px;background:#f4f4f1;border-right:1px solid #d8d8d8;text-align:center;font-weight:700;padding:5px 0;font-size:11px;color:#374151">'+l[0]+'</div>'+
      '<div style="flex:1;padding:5px 8px"><span style="color:#374151">'+l[1]+'</span> <span style="font-weight:700;color:#10243f">'+l[2]+'</span></div></div>';
  }).join('');
}
function ss4Form(stamped){
  var stamp = stamped ? '<div style="position:absolute;top:16px;right:16px;border:3px solid #15803d;color:#15803d;border-radius:8px;padding:3px 10px;font-weight:800;font-size:12px;letter-spacing:0.04em;transform:rotate(-8deg)">EIN&nbsp;88-3729104</div>' : '';
  return '<div class="doc-modal" style="margin:0 auto 20px;font-family:Inter,sans-serif">'+stamp+
    '<div style="display:flex;align-items:flex-end;justify-content:space-between;border-bottom:2px solid #374151;padding-bottom:6px;margin-bottom:10px">'+
      '<div><span style="font-size:11px;color:#6b6b6b">Form</span><div style="font-size:26px;font-weight:800;color:#374151;line-height:1">SS-4</div></div>'+
      '<div style="font-size:13px;font-weight:700;color:#374151;text-align:right">Application for Employer<br>Identification Number</div>'+
    '</div>'+
    '<div style="font-size:13px;border-top:1px solid #d8d8d8">'+ss4RowsHtml()+'</div></div>';
}
/* ===== ein phase ===== */
function renderEin(){
  var html = '<div class="narrative-block"><p>To get the EIN, you file one IRS form: <strong>Form SS-4</strong>. Review it, then file.</p></div>';
  html += ss4Form(einFiled);
  if(!einFiled){
    html += '<button class="btn-continue btn-block" onclick="fileEin()">File Form SS-4 with the IRS</button>';
  } else {
    html += '<div class="insight-box"><div class="insight-label"><i data-lucide="badge-check" class="licon"></i> EIN issued</div>'+
      '<p>The IRS issues an EIN for '+esc(llcName())+': <span class="mono">EIN 88-3729104</span>, filed June 1, 2026. Now the LLC has an identifying number the bank can use. You no longer need to use your Social Security number to open accounts for the business.</p></div>';
    html += '<button class="btn-continue btn-block" onclick="nav(\'24-3-account.html\')">Continue &rarr;</button>';
  }
  document.getElementById('einArea').innerHTML = html;
  if(window.lucide) lucide.createIcons();
}
function fileEin(){ einFiled=true; playStamp(); renderEin(); }

document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeGlossary(); });

/* ===== init ===== */
try{ var n = localStorage.getItem('m2Member'); if(n) memberName = n; }catch(e){}
renderEin();
</script>
</body>
</html>
