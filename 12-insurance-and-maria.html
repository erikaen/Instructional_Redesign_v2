        const { useState } = React;

        /**
         * Tutorial 1.2 (redesign): Insurance and Anna — Mockup
         * CMU METALS Accounting Prework — Module 1, Activity 2
         *
         * @version 2.0-mockup
         * @date 2026-05-25
         * @description Rebuilt to align with 1.1 v3's location-based redesign:
         *   - Pre-entity language throughout. "Repair work," not "shop work."
         *     Entity words ("shop", "the business") stay off the page until
         *     they appear deliberately as wrong-answer trap material later.
         *   - Welcome + Maria's arrival combined into one step.
         *   - Two-sheet form structure:
         *       Sheet 1 — categorize (Equipment / Supplies / Fixtures). No $.
         *       Sheet 2 — value (receipts + credit card statement). $.
         *   - Both sheets reuse v3's autocomplete pattern: student does a few,
         *     system handles the volume. Same move, applied to a categorization
         *     rule (sheet 1) and a documents-to-dollars rule (sheet 2).
         *   - Sidebar shows the first ~8 of ~31 items + "+23 more" indicator.
         *     The full list streams into the bins after autocomplete fires.
         *   - Not-on-form items (rented space, cash) surface during sheet 1
         *     through Maria's nudges. They stay on the broader list, picked
         *     up by Anna in step 4 (cash) or left as a learning moment (space).
         *   - Anna names Liabilities. The Things and Promises lists get
         *     renamed to Assets and Liabilities. "Equities" and "Entity"
         *     wait for 1.5.
         */

        // ============================================================
        // Color palette
        // ============================================================
        const colors = {
            primary: '#00356b',

        // ============================================================
        // Glossary
        // ============================================================
        const glossaryTerms = [
            { term: 'Insurable property', definition: 'The insurer’s name for what goes on a property policy: things you own and could lose. Not cash, and not what you don’t own.' },
            { term: 'Property policy', definition: 'Insurance that pays the owner if covered things are damaged or destroyed. Doesn’t cover cash, and doesn’t cover what you don’t own.' },
            { term: 'Replacement cost', definition: 'What it would cost today to buy a brand-new version of the thing.' },
            { term: 'Receipt', definition: 'The document a seller gives you when you buy something — it shows what you paid.' },
            { term: 'Supplier', definition: 'A company you buy from.' },
        ];

        // ============================================================
        // Sound functions (Web Audio API)
        // ============================================================
        const createAudioContext = () =>
            new (window.AudioContext || window.webkitAudioContext)();

        const playSuccessTone = () => {
            try {
                const ctx = createAudioContext();
                [523.25, 659.25, 783.99].forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.frequency.value = freq; osc.type = 'sine';
                    const t = ctx.currentTime + i * 0.1;
                    gain.gain.setValueAtTime(0, t);
                    gain.gain.linearRampToValueAtTime(0.3, t + 0.02);
                    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
                    osc.start(t); osc.stop(t + 0.25);
                });
                setTimeout(() => ctx.close(), 600);
            } catch(e) {}
        };

        const playSoftNope = () => {
            try {
                const ctx = createAudioContext();
                [400, 300].forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.frequency.value = freq; osc.type = 'sine';
                    const t = ctx.currentTime + i * 0.12;
                    gain.gain.setValueAtTime(0, t);
                    gain.gain.linearRampToValueAtTime(0.2, t + 0.02);
                    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.12);
                    osc.start(t); osc.stop(t + 0.17);
                });
                setTimeout(() => ctx.close(), 400);
            } catch(e) {}
        };

        const playBuzzer = () => {
            try {
                const ctx = createAudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.frequency.value = 150; osc.type = 'sawtooth';
                const t = ctx.currentTime;
                gain.gain.setValueAtTime(0.25, t);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
                osc.start(t); osc.stop(t + 0.35);
                setTimeout(() => ctx.close(), 400);
            } catch(e) {}
        };

        const playContinueClick = () => {
            try {
                const ctx = createAudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.frequency.value = 600; osc.type = 'sine';
                const t = ctx.currentTime;
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(0.15, t + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.08);
                osc.start(t); osc.stop(t + 0.1);
                setTimeout(() => ctx.close(), 150);
            } catch(e) {}
        };

        // ============================================================
        // Data
        // ============================================================
        // 31 items carried from 1.1 v3's repair-related Things list. Each is
        // mapped to one of Maria's three insurable categories (Equipment /
        // Supplies / Fixtures), to "not-on-form" with a rejectType, or
        // distinguished from the form entirely. Costs are tuned so the
        // category subtotals land on clean round numbers:
        //   Equipment $2,200  |  Supplies $1,200  |  Fixtures $750
        //   Total insurable     $4,150
        //   + Cash extra        $50
        //   Total assets        $4,200
        // (Supplies dropped from $1,400 → $1,200 because Parts asset value is
        // $300 on-shelf, not the $500 originally paid. The $200 difference
        // went into customer jobs — picked up by Anna's bridge line at the
        // end and analyzed in 1.3.)
        //
        // `sourced` controls how the value appears in sheet 2:
        //   'receipt'      — student types the amount, validating against a visible receipt
        //   'credit-card'  — student types the amount, validating against the CC statement
        //   'estimate'     — not entered by hand; rolled up under "+X more (estimate)"
        // Only items with `sourced` of 'receipt' or 'credit-card' appear by
        // name in sheet 2's form; everything else is aggregated.
        // ITEMS — the 1.1 repair Things that ARE insurable property. Matches the 1.1
        // sort exactly, minus the two non-fit Things (cash drawer, customer receipts);
        // there are NO not-on-form items in 1.2 anymore. Costs tie to the locked
        // manifest: Equipment $1,810 (incl. laptop $610), Fixtures $750, Supplies $200
        // on-shelf (bought $500, $300 used in jobs). `sourced`: 'receipt'/'credit-card'
        // = bought (has a document); 'estimate' = pre-owned, valued by eBay comp
        // (laptop + the three contributed machines: grinder, headset press, vacuum).
        const items = [
            // EQUIPMENT — durable tools & gear (subtotal $1,200)
            { id: 'stand',     name: 'Park Tool repair stand',  category: 'equipment', cost: 200, sourced: 'receipt'      },
            { id: 'conewr',    name: 'Cone wrench set',          category: 'equipment', cost: 65,  sourced: 'receipt'      },
            { id: 'torque',    name: 'Torque wrench',            category: 'equipment', cost: 95,  sourced: 'receipt'      },
            { id: 'hex',       name: 'Hex / Allen key set',      category: 'equipment', cost: 45,  sourced: 'receipt'      },
            { id: 'cutters',   name: 'Cable cutters',            category: 'equipment', cost: 40,  sourced: 'receipt'      },
            { id: 'breaker',   name: 'Chain breaker',            category: 'equipment', cost: 35,  sourced: 'receipt'      },
            { id: 'levers',    name: 'Tire levers',              category: 'equipment', cost: 20,  sourced: 'receipt'      },
            { id: 'compressor',name: 'Air compressor',           category: 'equipment', cost: 180, sourced: 'credit-card' },
            { id: 'washer',    name: 'Parts washer',             category: 'equipment', cost: 130, sourced: 'credit-card' },
            { id: 'truing',    name: 'Wheel-truing stand',       category: 'equipment', cost: 170, sourced: 'credit-card' },
            { id: 'grinder',   name: 'Bench grinder',            category: 'equipment', cost: 90,  sourced: 'estimate'    },
            { id: 'headset',   name: 'Headset press',            category: 'equipment', cost: 70,  sourced: 'estimate'    },
            { id: 'vacuum',    name: 'Shop vacuum',              category: 'equipment', cost: 60,  sourced: 'estimate'    },

            // COMPUTER EQUIPMENT — its own category (subtotal $610)
            { id: 'laptop',    name: 'Laptop',                   category: 'computer',  cost: 610, sourced: 'estimate'    },

            // FIXTURES — storage & built-ins (subtotal $750)
            { id: 'desk',      name: 'Desk',                     category: 'fixtures',  cost: 250, sourced: 'receipt'      },
            { id: 'shelves',   name: 'Shelving units',           category: 'fixtures',  cost: 200, sourced: 'receipt'      },
            { id: 'display',   name: 'Display rack',             category: 'fixtures',  cost: 180, sourced: 'receipt'      },
            { id: 'pegboard',  name: 'Pegboard + hooks',         category: 'fixtures',  cost: 120, sourced: 'receipt'      },

            // SUPPLIES — parts on the shelf (subtotal $200; bought $500, $300 used in jobs).
            // `paidAmount` = QBP receipt price; `cost` = what's on the shelf NOW.
            { id: 'chains',    name: 'Box of chains',            category: 'supplies',  cost: 50, sourced: 'receipt', valueLabel: 'on shelf', paidAmount: 100, countLeft: '½ box left' },
            { id: 'pads',      name: 'Box of brake pads',        category: 'supplies',  cost: 40, sourced: 'receipt', valueLabel: 'on shelf', paidAmount: 80,  countLeft: '½ box left' },
            { id: 'cables',    name: 'Box of derailleur cables', category: 'supplies',  cost: 20, sourced: 'receipt', valueLabel: 'on shelf', paidAmount: 40,  countLeft: '½ box left' },
            { id: 'cassettes', name: 'Cassettes',                category: 'supplies',  cost: 40, sourced: 'receipt', valueLabel: 'on shelf', paidAmount: 80,  countLeft: '½ left' },
            { id: 'bbs',       name: 'Bottom brackets',          category: 'supplies',  cost: 20, sourced: 'receipt', valueLabel: 'on shelf', paidAmount: 80,  countLeft: '¼ left' },
            { id: 'spokes',    name: 'Spokes',                   category: 'supplies',  cost: 20, sourced: 'receipt', valueLabel: 'on shelf', paidAmount: 80,  countLeft: '¼ left' },
            { id: 'tubes',     name: 'Tubes',                    category: 'supplies',  cost: 10, sourced: 'receipt', valueLabel: 'on shelf', paidAmount: 40,  countLeft: '¼ left' },
        ];

        // Items the student sees in the sidebar during sheet 1 — all from the 1.1
        // Things list. Every item fits the form now (no non-fit items in 1.2).
        const visibleIds = ['stand', 'compressor', 'laptop', 'chains', 'pegboard', 'desk'];

        // The Things the welcome screen displays — a representative subset; the rest
        // are alluded to with a "+ more…" indicator so the volume is visible.
        const welcomeVisibleIds = ['stand', 'conewr', 'chains', 'pegboard', 'compressor', 'desk'];

        const categoryDefs = [
            { id: 'equipment', label: 'EQUIPMENT',          sub: 'durable tools and gear',       targetSubtotal: 1200 },
            { id: 'computer',  label: 'COMPUTER EQUIPMENT', sub: 'computers and devices',         targetSubtotal: 610  },
            { id: 'supplies',  label: 'SUPPLIES',           sub: 'parts and consumables',         targetSubtotal: 200  },
            { id: 'fixtures',  label: 'FIXTURES',           sub: 'drawers, storage, built-ins',   targetSubtotal: 750  },
        ];

        // Sheet 1 miscat nudges — keyed off the item's correct category (robust to the item set).
        const miscatNudge = (item, attemptedCategory) => {
            if (item.category === 'equipment') return `${item.name} is Equipment — a durable tool, not parts you use up and not a storage piece.`;
            if (item.category === 'computer')  return `${item.name} is Computer Equipment — a computer or device, kept separate from your hand tools.`;
            if (item.category === 'supplies')  return `${item.name} is Supplies — something you go through on jobs, not a tool you keep.`;
            return `${item.name} is Fixtures — storage or built-ins, not a tool and not parts.`;
        };

        // Receipts — sourced from Source-Documents/source-documents.html (the canonical facsimiles).
        // Each receipt is multi-line; `forItem` is the tutorial-form item this receipt is the document for.
        const receipts = [
            {
                id: 'parktool',
                forItem: 'stand',
                vendor: 'Cyclesport Supply',
                vendorSub: 'professional bike tools & equipment',
                receiptNum: 'Sales Receipt  #SR-4471',
                date: 'May 3, 2026',
                paidWith: 'Personal debit card',
                paidLast4: '•••• 6620',
                paidNote: 'Not charged to the bike-repair credit card — paid from personal funds.',
                lineItems: [
                    { name: 'Park Tool PRS-25 Team Issue Repair Stand', amount: 200 },
                ],
                total: 200,
            },
            {
                id: 'tools',
                forItem: 'conewr',
                vendor: 'Cyclesport Supply',
                vendorSub: 'professional bike tools & equipment',
                receiptNum: 'Sales Receipt  #SR-4488',
                date: 'May 5, 2026',
                paidWith: 'Bike-Repair Visa',
                paidLast4: '•••• 3902',
                lineItems: [
                    { name: 'Cone wrench set', amount: 65 },
                    { name: 'Torque wrench', amount: 95 },
                    { name: 'Hex / Allen key set', amount: 45 },
                    { name: 'Cable cutters', amount: 40 },
                    { name: 'Chain breaker', amount: 35 },
                    { name: 'Tire levers (set)', amount: 20 },
                ],
                total: 300,
            },
            {
                id: 'fixtures',
                forItem: 'pegboard',
                vendor: 'Workspace Outfitters',
                vendorSub: 'store fixtures & furnishings',
                receiptNum: 'Invoice  #WO-20518',
                date: 'May 5, 2026',
                paidWith: 'Bike-Repair Visa',
                paidLast4: '•••• 3902',
                lineItems: [
                    { name: 'Work desk', amount: 250 },
                    { name: 'Shelving units (×2)', amount: 200 },
                    { name: 'Display rack', amount: 180 },
                    { name: 'Pegboard panel + hook set', amount: 120 },
                ],
                total: 750,
            },
            {
                id: 'qbp',
                forItem: ['chains', 'cables'],
                vendor: 'QBP',
                vendorSub: 'Quality Bicycle Products — wholesale parts distributor',
                receiptNum: 'Invoice  #QBP-887341  ·  Ship: UPS Ground',
                date: 'May 15, 2026',
                paidWith: 'Bike-Repair Visa',
                paidLast4: '•••• 3902',
                lineItems: [
                    { name: 'Chains (box)', amount: 100 },
                    { name: 'Brake pads (box)', amount: 80 },
                    { name: 'Derailleur cables (box)', amount: 40 },
                    { name: 'Cassettes (×4)', amount: 80 },
                    { name: 'Bottom brackets (assorted)', amount: 80 },
                    { name: 'Spokes (bundle)', amount: 80 },
                    { name: 'Tubes (box)', amount: 40 },
                ],
                total: 500,
            },
        ];

        // Credit card statement — sourced from Source-Documents/source-documents.html (Doc 6).
        const creditCard = {
            issuer: 'Harborline Visa',
            sub: 'Personal card · repair and personal charges co-mingled',
            last4: '•••• 3902',
            period: 'May 1 – May 31, 2026',
            opened: 'Statement opened May 1, 2026',
            previousBalance: 0,
            chargesTotal: 2260,
            paymentsTotal: 800,
            newBalance: 1460,
            transactions: [
                { date: '05/03', desc: 'Stop & Shop — groceries', charge: 85, payment: null },
                { date: '05/05', desc: 'Workspace Outfitters — fixtures', charge: 750, payment: null },
                { date: '05/05', desc: 'Cyclesport Supply — hand tools', charge: 300, payment: null },
                { date: '05/08', desc: 'Compressor Depot — air compressor', charge: 180, payment: null },
                { date: '05/09', desc: 'Restaurant — dinner', charge: 55, payment: null },
                { date: '05/10', desc: 'Industrial Supply — parts washer', charge: 130, payment: null },
                { date: '05/12', desc: 'Cyclesport Supply — wheel-truing stand', charge: 170, payment: null },
                { date: '05/14', desc: 'Gas station', charge: 48, payment: null },
                { date: '05/15', desc: 'QBP — parts order', charge: 500, payment: null },
                { date: '05/16', desc: 'ACH payment received — thank you', charge: null, payment: 400 },
                { date: '05/18', desc: 'Streaming service', charge: 16, payment: null },
                { date: '05/22', desc: 'Pharmacy', charge: 26, payment: null },
                { date: '05/28', desc: 'ACH payment received — thank you', charge: null, payment: 400 },
            ],
        };

        const fmt = (n) => '$' + Number(n).toLocaleString('en-US');

        // ============================================================
        // App
        // ============================================================
        const App = () => {
            // Navigation
            const [phase, setPhase] = useState('welcome');

            // UI overlays
            const [showGlossary, setShowGlossary] = useState(false);
            const [devMode, setDevMode] = useState(false);
            const [headerClickCount, setHeaderClickCount] = useState(0);

            // Combined form state — drag OR click to categorize AND value on one form
            const [s1DraggedId, setS1DraggedId] = useState(null);
            const [s1SelectedId, setS1SelectedId] = useState(null);     // click-to-place: selected sidebar item (verifiable alt to drag)
            const [s1Placements, setS1Placements] = useState({});       // { itemId: categoryId }
            const [s1Nudge, setS1Nudge] = useState(null);               // { type: 'miscat', itemId, message } for a wrong drop
            const [s1FlashFeedback, setS1FlashFeedback] = useState(null); // 'correct' | 'wrong' drop-zone border flash
            const [formFilling, setFormFilling] = useState(false);      // "Do the rest" animation in progress
            const [formDone, setFormDone] = useState(false);            // "Do the rest" completed

            // Valuation — entered on the SAME form. No pre-fill: each number comes from evidence.
            const [s2Values, setS2Values] = useState({});               // { itemId: '250' } insured / on-shelf value
            const [paidValues, setPaidValues] = useState({});           // { itemId: '100' } supplies "paid (receipt)" value
            const [openReceipt, setOpenReceipt] = useState(null);       // { type: 'receipt'|'creditCard', data } popup
            const [openEbay, setOpenEbay] = useState(false);            // eBay-comp popup (the laptop is the one live look-up)
            const ebayComps = [520, 610, 585, 640, 515];               // used-laptop sold listings (Doc 9)

            // Locked category totals (target value displayed once the rest is autocompleted)
            const CATEGORY_TARGETS = { equipment: 1200, computer: 610, supplies: 200, fixtures: 750 };

            const openDocFor = (item) => {
                if (item.sourced === 'receipt') {
                    const r = receipts.find(rr =>
                        Array.isArray(rr.forItem) ? rr.forItem.includes(item.id) : rr.forItem === item.id
                    );
                    if (r) setOpenReceipt({ type: 'receipt', data: r, item });
                } else if (item.sourced === 'credit-card') {
                    setOpenReceipt({ type: 'creditCard', data: creditCard, item });
                }
            };

            // ============================================================
            // Constants
            // ============================================================
            const phaseOrder = [
                'welcome',
                'form',
                'maria-readback',
                'complete',
            ];

            // ============================================================
            // Derived state
            // ============================================================
            const progress = Math.round(
                (phaseOrder.indexOf(phase) / (phaseOrder.length - 1)) * 100
            );

            // ---- Combined-form derived state ----
            const placeable = items.filter(i => i.category !== null);
            const s1Visible = visibleIds.map(id => items.find(i => i.id === id)).filter(Boolean);
            const s1HiddenCount = items.length - s1Visible.length;
            const s1SidebarRemaining = s1Visible.filter(i => !s1Placements[i.id]);

            // Value correctness (entered against evidence; no pre-fill).
            const isS2Correct = (id) => {
                const item = items.find(i => i.id === id);
                return item && item.cost != null && Number(s2Values[id]) === item.cost;
            };
            const isS2Wrong = (id) => {
                const v = Number(s2Values[id]);
                return v > 0 && !isS2Correct(id);
            };
            // Supplies "paid (receipt)" sub-value.
            const isPaidCorrect = (id) => {
                const item = items.find(i => i.id === id);
                return item && item.paidAmount != null && Number(paidValues[id]) === item.paidAmount;
            };
            const isPaidWrong = (id) => {
                const v = Number(paidValues[id]);
                return v > 0 && !isPaidCorrect(id);
            };

            // A category is "proven" once one placed item there is hand-valued from its evidence.
            // Supplies needs BOTH the paid (receipt) amount AND the on-shelf count.
            const catHandValued = (catId) => {
                const placed = placeable.filter(i => s1Placements[i.id] === catId);
                if (catId === 'supplies') return placed.some(i => isS2Correct(i.id) && isPaidCorrect(i.id));
                return placed.some(i => isS2Correct(i.id));
            };
            const formTriggerMet = categoryDefs.every(c => catHandValued(c.id));

            // Subtotals/total read straight off the entered values (auto-filled rows included).
            const subtotalForCat = (catId) =>
                placeable.filter(i => s1Placements[i.id] === catId)
                         .reduce((s, i) => s + (Number(s2Values[i.id]) || 0), 0);

            const totalInsurable = categoryDefs.reduce((s, c) => s + subtotalForCat(c.id), 0);

            // ============================================================
            // Handlers
            // ============================================================
            const handleHeaderClick = () => {
                const n = headerClickCount + 1;
                setHeaderClickCount(n);
                if (n >= 3) { setDevMode(!devMode); setHeaderClickCount(0); }
            };

            const handleRestart = () => {
                playContinueClick();
                setPhase('welcome');
                setS1DraggedId(null); setS1SelectedId(null); setS1Placements({});
                setS1Nudge(null); setS1FlashFeedback(null);
                setFormFilling(false); setFormDone(false);
                setS2Values({}); setPaidValues({}); setOpenReceipt(null); setOpenEbay(false);
            };

            const handleS1DragStart = (e, id) => {
                setS1DraggedId(id);
                e.dataTransfer.effectAllowed = 'move';
                e.dataTransfer.setData('text/plain', id);
            };
            const handleS1DragEnd = () => setS1DraggedId(null);
            const handleDragOver = (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; };

            // Shared placement logic — used by BOTH drag-drop and click-to-place.
            const placeItem = (id, categoryId) => {
                const item = items.find(i => i.id === id);
                if (!item) return;
                if (item.category !== categoryId) {
                    setS1Nudge({ type: 'miscat', itemId: item.id, message: miscatNudge(item, categoryId) });
                    setS1FlashFeedback('wrong');
                    playSoftNope();
                } else {
                    setS1Placements(prev => ({ ...prev, [item.id]: categoryId }));
                    setS1Nudge(null);
                    setS1FlashFeedback('correct');
                    playSuccessTone();
                }
                setTimeout(() => setS1FlashFeedback(null), 800);
            };

            const handleFormDrop = (e, categoryId) => {
                e.preventDefault();
                const id = e.dataTransfer.getData('text/plain') || s1DraggedId;
                setS1DraggedId(null);
                if (id) placeItem(id, categoryId);
            };

                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Maria's nudge for a wrong drop */}
                        {s1Nudge && !formDone && (
                            <MariaBox prefix="(glancing over)">&ldquo;{s1Nudge.message}&rdquo;</MariaBox>
                        )}

                        {/* Laptop has no receipt — prompt the eBay look-up once it's placed but not yet valued */}
                        {s1Placements['laptop'] === 'computer' && !isS2Correct('laptop') && !formDone && (
                            <MariaBox prefix="(looking over)">
                                &ldquo;That laptop&rsquo;s got no receipt &mdash; you&rsquo;ve had it for years. For
                                something used, we put down what it would <strong>sell for now</strong>. Tap
                                <em> eBay comp</em> next to it, look at a few comparable ones, and write down a fair number.&rdquo;
                            </MariaBox>
                        )}

                        {/* "A few hours later" — the rest of the list gets worked the same way */}
                        {formFilling && (
                            <div className="rounded-lg p-4 mb-3 system-sorting"
                                 style={{ backgroundColor: colors.primary, color: 'white', textAlign: 'center' }}>
                                <p className="text-base font-bold">⚙ A few hours later&hellip;</p>
                                <p className="text-xs mt-1" style={{ color: 'rgba(255,255,255,0.8)' }}>
                                    You worked down the rest of the list the same way &mdash; receipts read across, the shelf counted.
                                </p>
                            </div>
                        )}

                        {/* Gating checklist + locked "Do the rest" */}
                        {!formTriggerMet && !formFilling && !formDone && (
                            <div className="rounded-lg p-3 mb-3 text-xs"
                                 style={{ backgroundColor: 'white', border: `1px solid ${colors.earthLight}`, color: colors.earthDark }}>
                                <p className="font-bold mb-1" style={{ color: colors.primary }}>
                                    Value one item in each section &mdash; from its own evidence &mdash; to unlock the rest:
                                </p>
                                <ul className="space-y-0.5">
                                    {categoryDefs.map(cat => (
                                        <li key={cat.id} className="flex gap-2">
                                            <span>{catHandValued(cat.id) ? '✓' : '·'}</span>
                                            <span>{cat.label}{cat.id === 'supplies' ? ' — both paid (receipt) and on-shelf' : ''}</span>
                                        </li>
                                    ))}
                                </ul>
                                <button disabled
                                        className="w-full py-3 mt-3 rounded-lg font-bold text-white text-base border-0"
                                        style={{ backgroundColor: colors.primary, opacity: 0.35, cursor: 'not-allowed' }}>
                                    Do the rest →
                                </button>
                            </div>
                        )}

                        {/* Unlocked affordance */}
                        {formTriggerMet && !formFilling && !formDone && (
                            <div className="rounded-lg p-3 mb-3 border-2"
                                 style={{ backgroundColor: '#fef9e7', borderColor: colors.accent }}>
                                <p className="text-sm mb-2" style={{ color: colors.earthDark }}>
                                    <strong>The pattern&rsquo;s clear.</strong> You&rsquo;ve valued one item in every
                                    section, each from its own evidence. You can finish the rest of the list the same
                                    way &mdash; should be a few hours of work.
                                </p>
                                <button onClick={handleDoTheRest}
                                        className="w-full py-3 rounded-lg font-bold text-white border-0 cursor-pointer"
                                        style={{ backgroundColor: colors.primary }}>
                                    Do the rest →
                                </button>
                            </div>
                        )}

                        {/* Done — the supplies gap + the provenance insight, then continue */}
                        {formDone && (
                            <>
                                <MariaBox prefix="(quietly)">
                                    &ldquo;And notice the supplies &mdash; you <strong>bought $500</strong> of parts,
                                    but only <strong>$200</strong> is still on the shelf to insure. The rest went into
                                    jobs. That gap comes back soon.&rdquo;
                                </MariaBox>
                                <InsightPanel>
                                    Every line has a number &mdash; and you can see <em>where each one came from</em>:
                                    a <strong>receipt</strong> for what you bought, an <strong>eBay comp</strong> for the
                                    gear you&rsquo;d owned a while, and a <strong>shelf count</strong> for the supplies.
                                </InsightPanel>
                                <ContinueButton onClick={() => setPhase('maria-readback')}>
                                    Maria reads it back
                                </ContinueButton>
                            </>
                        )}

                        {/* eBay-comp popup — comparable used-laptop listings (Doc 9) */}
                        {openEbay && (
                            <div onClick={() => setOpenEbay(false)} style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, backgroundColor: 'rgba(0,0,0,0.55)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 50, padding: '1rem' }}>
                                <div onClick={(e) => e.stopPropagation()} className="rounded-md w-full" style={{ backgroundColor: 'white', border: '1px solid #d8d8d8', boxShadow: '0 10px 30px rgba(0,0,0,0.25)', maxWidth: '30rem', padding: '1.5rem 1.75rem', position: 'relative', color: '#1a1a1a' }}>
                                    <span style={{ position: 'absolute', top: '-11px', left: '18px', backgroundColor: colors.primary, color: 'white', fontSize: '11px', letterSpacing: '0.04em', textTransform: 'uppercase', padding: '3px 9px', borderRadius: '11px' }}>eBay — sold listings</span>
                                    <button onClick={() => setOpenEbay(false)} className="border-0 bg-transparent cursor-pointer leading-none" style={{ position: 'absolute', top: '8px', right: '12px', fontSize: '18px', color: '#6b6b6b', padding: 0 }} aria-label="Close">✕</button>
                                    <div style={{ fontSize: '16px', fontWeight: 700 }}>Used laptop &mdash; &ldquo;like yours&rdquo;, good condition</div>
                                    <p style={{ fontSize: '12.5px', color: '#6b6b6b', marginTop: '2px', marginBottom: '12px' }}>Recent sold prices for comparable used laptops:</p>
                                    <div style={{ display: 'flex', flexWrap: 'wrap', gap: '8px', marginBottom: '12px' }}>
                                        {ebayComps.map((p, i) => (
                                            <span key={i} style={{ fontFamily: 'Consolas, Menlo, monospace', fontSize: '14px', padding: '4px 10px', borderRadius: '6px', backgroundColor: '#f7f7f4', border: '1px solid #e5e5e0' }}>{fmt(p)}</span>
                                        ))}
                                    </div>
                                    <p style={{ fontSize: '13px' }}>They cluster around <strong>$610</strong>. Close this and put that on the form.</p>
                                </div>
                            </div>
                        )}

                        {/* Receipt / credit-card popup — facsimile drawn from Source-Documents */}
                        {openReceipt && (
                            <div
                                onClick={() => setOpenReceipt(null)}
                                style={{
                                    position: 'fixed', top: 0, left: 0, right: 0, bottom: 0,
                                    backgroundColor: 'rgba(0,0,0,0.55)',
                                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                                    zIndex: 50, padding: '1rem', overflow: 'auto',
                                }}>
                                <div
                                    onClick={(e) => e.stopPropagation()}
                                    className="rounded-md w-full"
                                    style={{
                                        backgroundColor: 'white',
                                        border: '1px solid #d8d8d8',
                                        boxShadow: '0 10px 30px rgba(0,0,0,0.25)',
                                        maxWidth: '36rem',
                                        padding: '2rem 2.25rem',
                                        position: 'relative',
                                        color: '#1a1a1a',
                                    }}>
                                    <span style={{
                                        position: 'absolute', top: '-11px', left: '18px',
                                        backgroundColor: colors.primary, color: 'white',
                                        fontSize: '11px', letterSpacing: '0.04em', textTransform: 'uppercase',
                                        padding: '3px 9px', borderRadius: '11px',
                                    }}>
                                        {openReceipt.type === 'creditCard' ? 'Credit card statement' : 'Receipt'}
                                    </span>
                                    <button
                                        onClick={() => setOpenReceipt(null)}
                                        className="border-0 bg-transparent cursor-pointer leading-none"
                                        style={{
                                            position: 'absolute', top: '8px', right: '12px',
                                            fontSize: '18px', color: '#6b6b6b', padding: 0,
                                        }}
                                        aria-label="Close">
                                        ✕
                                    </button>

                                    {openReceipt.type === 'receipt' && (() => {
                                        const r = openReceipt.data;
                                        return (
                                            <>
                                                <div style={{ fontSize: '20px', fontWeight: 700, letterSpacing: '0.01em' }}>
                                                    {r.vendor}
                                                    {r.vendorSub && (
                                                        <span style={{ fontSize: '12px', fontWeight: 400, color: '#6b6b6b', marginLeft: '6px' }}>
                                                            · {r.vendorSub}
                                                        </span>
                                                    )}
                                                </div>
                                                <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '12.5px', color: '#6b6b6b', marginTop: '4px', marginBottom: '14px' }}>
                                                    <span>{r.receiptNum}</span>
                                                    <span>{r.date}</span>
                                                </div>
                                                <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '14px' }}>
                                                    <thead>
                                                        <tr style={{ borderBottom: '1px solid #d8d8d8' }}>
                                                            <th style={{ textAlign: 'left', padding: '7px 8px', fontWeight: 600 }}>Item</th>
                                                            <th style={{ textAlign: 'right', padding: '7px 8px', fontWeight: 600, fontFamily: 'Consolas, Menlo, monospace' }}>Amount</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody>
                                                        {r.lineItems.map((li, i) => (
                                                            <tr key={i} style={{ borderBottom: '1px solid #d8d8d8' }}>
                                                                <td style={{ padding: '7px 8px' }}>{li.name}</td>
                                                                <td style={{ padding: '7px 8px', textAlign: 'right', fontFamily: 'Consolas, Menlo, monospace' }}>{fmt(li.amount)}</td>
                                                            </tr>
                                                        ))}
                                                        <tr style={{ borderTop: '2px solid #1a1a1a', fontWeight: 700 }}>
                                                            <td style={{ padding: '7px 8px' }}>Total</td>
                                                            <td style={{ padding: '7px 8px', textAlign: 'right', fontFamily: 'Consolas, Menlo, monospace' }}>{fmt(r.total)}</td>
                                                        </tr>
                                                    </tbody>
                                                </table>
                                                <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '13px', marginTop: '14px', paddingTop: '10px', borderTop: '1px dashed #d8d8d8' }}>
                                                    <span><strong>Paid:</strong> {r.paidWith}</span>
                                                    <span style={{ color: '#6b6b6b' }}>{r.paidLast4}</span>
                                                </div>
                                                {r.paidNote && (
                                                    <p style={{ fontSize: '12.5px', color: '#6b6b6b', marginTop: '8px', fontStyle: 'italic' }}>
                                                        {r.paidNote}
                                                    </p>
                                                )}
                                            </>
                                        );
                                    })()}

                                    {openReceipt.type === 'creditCard' && (() => {
                                        const c = openReceipt.data;
                                        return (
                                            <>
                                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: '16px', marginBottom: '14px' }}>
                                                    <div>
                                                        <div style={{ fontSize: '18px', fontWeight: 700 }}>{c.issuer}</div>
                                                        <div style={{ fontSize: '12.5px', color: '#6b6b6b' }}>{c.sub}</div>
                                                    </div>
                                                    <div style={{ fontSize: '12.5px', textAlign: 'right' }}>
                                                        <div><strong>Statement period:</strong></div>
                                                        <div>{c.period}</div>
                                                        <div style={{ color: '#6b6b6b' }}>Account {c.last4}</div>
                                                        <div style={{ color: '#6b6b6b' }}>{c.opened}</div>
                                                    </div>
                                                </div>
                                                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: '8px', marginBottom: '14px' }}>
                                                    {[
                                                        { k: 'Previous balance', v: fmt(c.previousBalance) },
                                                        { k: 'Charges', v: fmt(c.chargesTotal) },
                                                        { k: 'Payments', v: fmt(c.paymentsTotal) },
                                                        { k: 'New balance', v: fmt(c.newBalance), highlight: true },
                                                    ].map((cell, i) => (
                                                        <div key={i} style={{
                                                            padding: '8px 10px',
                                                            backgroundColor: cell.highlight ? '#fffbe6' : '#f7f7f4',
                                                            border: cell.highlight ? `1px solid ${colors.accent}` : '1px solid #e5e5e0',
                                                            borderRadius: '4px',
                                                        }}>
                                                            <div style={{ fontSize: '11px', color: '#6b6b6b', textTransform: 'uppercase', letterSpacing: '0.04em' }}>{cell.k}</div>
                                                            <div style={{ fontSize: '14px', fontWeight: 700, fontFamily: 'Consolas, Menlo, monospace' }}>{cell.v}</div>
                                                        </div>
                                                    ))}
                                                </div>
                                                <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '13.5px' }}>
                                                    <thead>
                                                        <tr style={{ borderBottom: '1px solid #d8d8d8' }}>
                                                            <th style={{ textAlign: 'left', padding: '6px 8px', fontWeight: 600 }}>Date</th>
                                                            <th style={{ textAlign: 'left', padding: '6px 8px', fontWeight: 600 }}>Description</th>
                                                            <th style={{ textAlign: 'right', padding: '6px 8px', fontWeight: 600 }}>Charges</th>
                                                            <th style={{ textAlign: 'right', padding: '6px 8px', fontWeight: 600 }}>Payments</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody>
                                                        {c.transactions.map((t, i) => (
                                                            <tr key={i} style={{ borderBottom: '1px solid #d8d8d8' }}>
                                                                <td style={{ padding: '6px 8px', fontFamily: 'Consolas, Menlo, monospace' }}>{t.date}</td>
                                                                <td style={{ padding: '6px 8px' }}>{t.desc}</td>
                                                                <td style={{ padding: '6px 8px', textAlign: 'right', fontFamily: 'Consolas, Menlo, monospace' }}>{t.charge != null ? fmt(t.charge) : '—'}</td>
                                                                <td style={{ padding: '6px 8px', textAlign: 'right', fontFamily: 'Consolas, Menlo, monospace' }}>{t.payment != null ? fmt(t.payment) : '—'}</td>
                                                            </tr>
                                                        ))}
                                                        <tr style={{ borderTop: '2px solid #1a1a1a', fontWeight: 700 }}>
                                                            <td style={{ padding: '6px 8px' }}></td>
                                                            <td style={{ padding: '6px 8px' }}>Totals</td>
                                                            <td style={{ padding: '6px 8px', textAlign: 'right', fontFamily: 'Consolas, Menlo, monospace' }}>{fmt(c.chargesTotal)}</td>
                                                            <td style={{ padding: '6px 8px', textAlign: 'right', fontFamily: 'Consolas, Menlo, monospace' }}>{fmt(c.paymentsTotal)}</td>
                                                        </tr>
                                                    </tbody>
                                                </table>
                                            </>
                                        );
                                    })()}
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            const renderMariaReadback = () => (
                <div className="p-4 max-w-2xl mx-auto">
                    <Header />

                    <NarrativeBlock>
                        By late afternoon the form is done. Maria runs her finger down each column.
                    </NarrativeBlock>

                    <div className="rounded-lg p-4 mb-4"
                         style={{ border: `1px solid ${colors.earthLight}`, backgroundColor: 'white' }}>
                        <p className="text-xs font-bold mb-2 tracking-wide" style={{ color: colors.primary }}>INSURABLE TOTALS</p>
                        <div className="space-y-1 mono text-sm" style={{ color: colors.earthDark }}>
                            {categoryDefs.map(cat => (
                                <div key={cat.id} className="flex justify-between">
                                    <span>{cat.label}</span>
                                    <span>{fmt(subtotalForCat(cat.id))}</span>
                                </div>
                            ))}
                            <div className="flex justify-between pt-2 mt-2 border-t-2 font-bold"
                                 style={{ borderColor: colors.earthDark }}>
                                <span>TOTAL (insurable)</span>
                                <span>{fmt(totalInsurable)}</span>
                            </div>
                        </div>
                    </div>

                    <MariaBox>
                        &ldquo;OK. Equipment {fmt(subtotalForCat('equipment'))}. Computer equipment {fmt(subtotalForCat('computer'))}.
                        Supplies {fmt(subtotalForCat('supplies'))}. Fixtures {fmt(subtotalForCat('fixtures'))}. Total of
                        {fmt(totalInsurable)} &mdash; what you have on hand now. Property policy goes on that. Paperwork in the mail.&rdquo;
                    </MariaBox>

                    <NarrativeBlock>
                        Maria packs up, hands you a copy of the form, and heads out. The doorbell jingles closed
                        behind her.
                    </NarrativeBlock>

                    <ContinueButton onClick={() => setPhase('complete')}>
                        Finish up
                    </ContinueButton>
                </div>
            );

            const renderComplete = () => {
                // Deterministic end-of-tutorial summary — the insurable-property inventory only.
                // 1.2 names just Maria's slice ("insurable property"); "Assets" / "Liabilities" /
                // the Promises list are Anna's, in 1.3. Subtotals from the locked category targets.
                const summary = categoryDefs.map(c => ({ label: c.label, amount: CATEGORY_TARGETS[c.id] || 0 }));
                const summaryTotal = summary.reduce((s, c) => s + c.amount, 0); // $2,760

                return (
                    <div className="p-4 max-w-2xl mx-auto">
                        <Header />

                        <div className="text-center mb-6">
                            <div className="inline-flex items-center justify-center w-20 h-20 rounded-full mb-4"
                                 style={{ backgroundColor: colors.accent }}>
                                <span className="text-4xl">🏆</span>
                            </div>
                            <h2 className="text-2xl font-bold" style={{ color: colors.primary }}>
                                Tutorial Complete!
                            </h2>
                        </div>

                        {/* The finished form — insurable property, by category */}
                        <div className="rounded-lg p-4 mb-4"
                             style={{ backgroundColor: 'white', border: `1px solid ${colors.earthLight}` }}>
                            <p className="text-xs font-bold tracking-wide mb-1" style={{ color: colors.primary }}>📌 INSURABLE PROPERTY</p>
                            <p className="text-xs italic mb-3" style={{ color: colors.earth }}>Maria&rsquo;s form &mdash; what you own and could lose</p>
                            <ul className="space-y-1 text-sm" style={{ color: colors.earthDark }}>
                                {summary.map((c, i) => (
                                    <li key={i} className="flex justify-between gap-2">
                                        <span>{c.label}</span>
                                        <span className="mono flex-shrink-0">{fmt(c.amount)}</span>
                                    </li>
                                ))}
                                <li className="flex justify-between gap-2 pt-2 mt-1 font-bold border-t-2"
                                    style={{ borderColor: colors.earthDark }}>
                                    <span>Total insurable</span>
                                    <span className="mono">{fmt(summaryTotal)}</span>
                                </li>
                            </ul>
                        </div>

                        <div className="rounded-lg p-4 mb-4 border-2"
                             style={{ backgroundColor: 'white', borderColor: colors.success }}>
                            <h3 className="font-bold mb-3" style={{ color: colors.primary }}>What You Discovered</h3>
                            <ul className="space-y-2 text-sm" style={{ color: colors.earthDark }}>
                                <li className="flex gap-2"><span style={{ color: colors.success }}>✓</span>
                                    Every Thing on your list got a dollar amount &mdash; but the amounts didn&rsquo;t all
                                    come from the same place: a <strong>receipt</strong> for what you bought, an
                                    <strong> eBay comp</strong> for the gear you&rsquo;d owned a while, a
                                    <strong> shelf count</strong> for the supplies.</li>
                                <li className="flex gap-2"><span style={{ color: colors.success }}>✓</span>
                                    Maria has her own name for the list &mdash; <strong>insurable property</strong>:
                                    only what you own and could lose. You bought $500 of parts, but only the
                                    <strong> $200</strong> still on the shelf goes on it.</li>
                                <li className="flex gap-2"><span style={{ color: colors.success }}>✓</span>
                                    You valued one item in each section by hand, then finished the rest in one pass.
                                    <em> Same move as last time</em> &mdash; once the pattern&rsquo;s clear, the volume is easy.</li>
                            </ul>
                        </div>

                        <KeyInsightBox>
                            <p className="font-semibold mb-2">The deeper point</p>
                            <p>
                                This is the same list of Things from last time &mdash; now sorted into categories with a
                                number on every line. But it&rsquo;s only <em>one</em> slice of it: the part an insurer
                                cares about. Other people will look at the very same list and see something different.
                                The bigger picture it all belongs to is still being built &mdash; it&rsquo;ll have a name
                                by the end of the module.
                            </p>
                        </KeyInsightBox>

                        <div className="rounded-lg p-4 mb-4" style={{ backgroundColor: colors.clayLight }}>
                            <h3 className="font-bold mb-2" style={{ color: colors.primary }}>Coming Next</h3>
                            <p className="text-sm mb-2" style={{ color: colors.earthDark }}>
                                Anna&rsquo;s stopping by &mdash; your friend who kept the books at City Cycle for years.
                                She&rsquo;ll have her own way of looking at this list, and a couple of names for what&rsquo;s on it.
                            </p>
                            <p className="font-bold" style={{ color: colors.primary }}>
                                Next: Tutorial 1.3 &mdash; Anna and the Bank Statement
                            </p>
                        </div>

                        <a href="13-anna-and-the-bank-statement.html"
                           className="block w-full py-3 rounded-lg font-bold text-white text-center no-underline mb-3"
                           style={{ backgroundColor: colors.primary }}>
                            Next Tutorial →
                        </a>
                        <button onClick={handleRestart}
                                className="w-full py-3 rounded-lg font-bold cursor-pointer"
                                style={{ border: `2px solid ${colors.primary}`, color: colors.primary, backgroundColor: 'transparent' }}>
                            ↺ Restart
                        </button>
                    </div>
                );
            };

            // ============================================================
            // Phase router
            // ============================================================
            const renderPhase = () => {
                if (phase === 'welcome')            return renderWelcome();
                if (phase === 'form')               return renderForm();
                if (phase === 'maria-readback')     return renderMariaReadback();
                if (phase === 'complete')           return renderComplete();
                return null;
            };

            return (
                <div className="min-h-screen" style={{ backgroundColor: colors.sand }}>
                    {renderPhase()}
                    {showGlossary && <GlossaryModal />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
