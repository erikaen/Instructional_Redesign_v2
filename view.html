<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Module Viewer</title>
  <style>
    html, body { margin: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
    #bar { height: 54px; box-sizing: border-box; display: flex; align-items: center; gap: 10px;
           padding: 0 14px; border-bottom: 1px solid #e2e6ee; background: #f7f9fc; }
    #bar .title { flex: 1; text-align: center; min-width: 0; }
    #bar .title .mod { font-weight: 700; color: #00329d; font-size: .98rem; }
    #bar .title .pg { color: #6b7280; font-weight: 400; font-size: .82rem; margin-left: 6px; }
    .navbtn { padding: 8px 15px; border: 1px solid #c7ccd6; border-radius: 8px; background: #fff;
              cursor: pointer; font-size: .9rem; color: #1a1a2e; text-decoration: none; white-space: nowrap; }
    .navbtn:hover:not([disabled]) { background: #eef2f8; }
    .navbtn[disabled] { opacity: .35; cursor: default; }
    .idxwrap { position: relative; }
    .idx { padding: 8px 12px; border: 1px solid #c7ccd6; border-radius: 8px; background: #fff;
           color: #286dc0; font-size: .85rem; cursor: pointer; }
    .idx:hover { background: #eef2f8; }
    .idxmenu { position: absolute; top: calc(100% + 6px); left: 0; z-index: 50; background: #fff;
               border: 1px solid #c7ccd6; border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,.16);
               max-height: 74vh; overflow-y: auto; min-width: 270px; padding: 6px 0; }
    .idxmenu .gh { font-weight: 800; color: #00329d; font-size: .82rem; letter-spacing: .02em;
                   padding: 11px 14px 4px; border-bottom: 1px solid #e2e6ee; margin-bottom: 2px; }
    .idxmenu .mh { font-weight: 700; color: #286dc0; font-size: .76rem; letter-spacing: .02em;
                   padding: 9px 14px 3px 22px; }
    .idxmenu a { display: block; padding: 5px 14px 5px 38px; font-size: .88rem; color: #1a1a2e;
                 text-decoration: none; cursor: pointer; }
    .idxmenu a:hover { background: #eef2f8; }
    .idxmenu a.cur { background: #e8eefc; color: #00329d; font-weight: 600; }
    #frame { width: 100%; height: calc(100% - 55px); border: 0; display: block; background: #fff; }
  </style>
</head>
<body>
  <div id="bar">
    <button class="navbtn" id="prev">&larr; Back</button>
    <div class="idxwrap">
      <button class="idx" id="idxBtn" aria-haspopup="true" aria-expanded="false">Index &#9662;</button>
      <div class="idxmenu" id="idxMenu" hidden></div>
    </div>
    <div class="title" id="title"></div>
    <button class="navbtn" id="next">Next &rarr;</button>
  </div>
  <iframe id="frame" title="Module page"></iframe>

  <script>
  var PAGES = [

    {f:'2-4-Module-Complete.html',          g:'Module 1', m:'Tutorial 2: Insurance and Maria',        t:'Module Complete'},
    {f:'3-1-Meet-Anna.html',                g:'Module 1', m:'Tutorial 3: Anna and the Bank Statement',t:'Meet Anna'},
    {f:'3-2-The-Bank-Statement.html',       g:'Module 1', m:'Tutorial 3: Anna and the Bank Statement',t:'The Bank Statement'},
    {f:'3-3-The-Cash-Movement.html',        g:'Module 1', m:'Tutorial 3: Anna and the Bank Statement',t:'The Cash Movement'},
    {f:'3-4-The-Customer-Payments.html',    g:'Module 1', m:'Tutorial 3: Anna and the Bank Statement',t:'The Customer Payments'},
    {f:'3-5-The-Credit-Card-Statement.html',g:'Module 1', m:'Tutorial 3: Anna and the Bank Statement',t:'The Credit Card Statement'},
    {f:'3-6-The-Promises.html',             g:'Module 1', m:'Tutorial 3: Anna and the Bank Statement',t:'The Promises'},
    {f:'3-7-The-Rent-Payment.html',         g:'Module 1', m:'Tutorial 3: Anna and the Bank Statement',t:'The Rent Payment'},
    {f:'3-8-Naming-the-Lists.html',         g:'Module 1', m:'Tutorial 3: Anna and the Bank Statement',t:'Naming the Lists'},
    {f:'3-9-Module-Complete.html',          g:'Module 1', m:'Tutorial 3: Anna and the Bank Statement',t:'Module Complete'},
    {f:'14-1-welcome.html',         g:'Module 1', m:'Tutorial 4: Keeping the Reasons',        t:'Why Keep the Reasons'},
    {f:'14-2-walk-equipment.html',  g:'Module 1', m:'Tutorial 4: Keeping the Reasons',        t:'Walk: Equipment'},
    {f:'14-3-walk-computer.html',   g:'Module 1', m:'Tutorial 4: Keeping the Reasons',        t:'Walk: Computer Equipment'},
    {f:'14-4-walk-supplies.html',   g:'Module 1', m:'Tutorial 4: Keeping the Reasons',        t:'Walk: Supplies'},
    {f:'14-5-walk-fixtures.html',   g:'Module 1', m:'Tutorial 4: Keeping the Reasons',        t:'Walk: Fixtures'},
    {f:'14-6-walk-rou.html',        g:'Module 1', m:'Tutorial 4: Keeping the Reasons',        t:'Walk: Right of Use'},
    {f:'14-7-walk-liab.html',       g:'Module 1', m:'Tutorial 4: Keeping the Reasons',        t:'Walk: Liabilities'},
    {f:'14-8-walk-cash.html',       g:'Module 1', m:'Tutorial 4: Keeping the Reasons',        t:'Walk: Cash'},
    {f:'14-9-crossout.html',        g:'Module 1', m:'Tutorial 4: Keeping the Reasons',        t:'Pairs That Cancel'},
    {f:'14-10-sort.html',           g:'Module 1', m:'Tutorial 4: Keeping the Reasons',        t:'The Net Movers'},
    {f:'14-11-complete.html',       g:'Module 1', m:'Tutorial 4: Keeping the Reasons',        t:'Module Complete'},
    {f:'5-1-Bringing-It-Together.html',     g:'Module 1', m:'Tutorial 5: Naming What You Built',      t:'Bringing It Together'},
    {f:'5-2-Find-the-Net.html',             g:'Module 1', m:'Tutorial 5: Naming What You Built',      t:'Find the Net'},
    {f:'5-3-The-Accounting-Identity.html',  g:'Module 1', m:'Tutorial 5: Naming What You Built',      t:'The Accounting Identity'},
    {f:'5-4-The-Entity.html',               g:'Module 1', m:'Tutorial 5: Naming What You Built',      t:'The Entity'},
    {f:'5-5-Net-Assets.html',               g:'Module 1', m:'Tutorial 5: Naming What You Built',      t:'Net Assets'},
    {f:'5-6-Double-Entry.html',             g:'Module 1', m:'Tutorial 5: Naming What You Built',      t:'Double-Entry'},
    {f:'5-7-Module-Complete.html',          g:'Module 1', m:'Tutorial 5: Naming What You Built',      t:'Module Complete'},
    {f:'21-1-welcome.html',     g:'Module 2', m:'Tutorial 1: The Two Yous',                 t:'The Call from Maria'},
    {f:'21-2-exposure.html',    g:'Module 2', m:'Tutorial 1: The Two Yous',                 t:'Follow the Claim'},
    {f:'21-3-whoSeesTwo.html',  g:'Module 2', m:'Tutorial 1: The Two Yous',                 t:'Who Sees Two?'},
    {f:'21-4-twoHats.html',     g:'Module 2', m:'Tutorial 1: The Two Yous',                 t:'Same Head, Two Hats'},
    {f:'21-5-complete.html',    g:'Module 2', m:'Tutorial 1: The Two Yous',                 t:'Complete'},
    {f:'22-1-welcome.html',     g:'Module 2', m:'Tutorial 2: Filing for a Legal Body',      t:"Anna’s Advice"},
    {f:'22-2-name.html',        g:'Module 2', m:'Tutorial 2: Filing for a Legal Body',      t:'Name the LLC'},
    {f:'22-3-file.html',        g:'Module 2', m:'Tutorial 2: Filing for a Legal Body',      t:'File the Certificate'},
    {f:'22-4-whatChanged.html', g:'Module 2', m:'Tutorial 2: Filing for a Legal Body',      t:'What Changed?'},
    {f:'22-5-complete.html',    g:'Module 2', m:'Tutorial 2: Filing for a Legal Body',      t:'Complete'},
    {f:'23-1-welcome.html',     g:'Module 2', m:'Tutorial 3: The Rules and the Two Signatures', t:'The Operating Agreement'},
    {f:'23-2-agreement.html',   g:'Module 2', m:'Tutorial 3: The Rules and the Two Signatures', t:'The Two Signatures'},
    {f:'23-3-contribution.html',g:'Module 2', m:'Tutorial 3: The Rules and the Two Signatures', t:'What You Put In'},
    {f:'23-4-wall.html',        g:'Module 2', m:'Tutorial 3: The Rules and the Two Signatures', t:'The Wall'},
    {f:'23-5-keystone.html',    g:'Module 2', m:'Tutorial 3: The Rules and the Two Signatures', t:'When Did It Become Real?'},
    {f:'23-6-complete.html',    g:'Module 2', m:'Tutorial 3: The Rules and the Two Signatures', t:'Complete'},

    // {f:'24-5-complete.html',    g:'Module 2', m:"Tutorial 4: The Entity’s Own Number",      t:'Complete'},
    // {f:'25-1-welcome.html',     g:'Module 2', m:"Tutorial 5: The LLC’s Balance Sheet",      t:'The Entity Is Formal'},
    // {f:'25-2-capstone.html',    g:'Module 2', m:"Tutorial 5: The LLC’s Balance Sheet",      t:"The LLC’s Balance Sheet"},
    // {f:'25-3-complete.html',    g:'Module 2', m:"Tutorial 5: The LLC’s Balance Sheet",      t:'Complete'}
  ];

  function qp(name){
    var m = new RegExp('[?&]' + name + '=([^&]*)').exec(window.location.search);
    return m ? decodeURIComponent(m[1]) : null;
  }
  function startIndex(){
    var i = qp('i'); if (i !== null) { i = parseInt(i, 10); if (!isNaN(i)) return Math.max(0, Math.min(PAGES.length-1, i)); }
    var p = qp('p'); if (p) { for (var k=0;k<PAGES.length;k++){ if(PAGES[k].f===p) return k; } }
    return 0;
  }
  var idx = startIndex();
  var frame = document.getElementById('frame'), titleEl = document.getElementById('title');
  var prevB = document.getElementById('prev'), nextB = document.getElementById('next');
  var idxBtn = document.getElementById('idxBtn'), menu = document.getElementById('idxMenu');

  function buildMenu(){
    var html = '', lastGrp = '', lastMod = '';
    for (var k = 0; k < PAGES.length; k++){
      if (PAGES[k].g !== lastGrp){ html += '<div class="gh">' + PAGES[k].g + '</div>'; lastGrp = PAGES[k].g; lastMod = ''; }
      if (PAGES[k].m !== lastMod){ html += '<div class="mh">' + PAGES[k].m + '</div>'; lastMod = PAGES[k].m; }
      html += '<a data-i="' + k + '">' + PAGES[k].t + '</a>';
    }
    menu.innerHTML = html;
    var links = menu.querySelectorAll('a');
    for (var j = 0; j < links.length; j++){
      links[j].onclick = function(){ idx = parseInt(this.getAttribute('data-i'), 10); render(); closeMenu(); };
    }
  }
  function openMenu(){
    menu.hidden = false; idxBtn.setAttribute('aria-expanded', 'true');
    var links = menu.querySelectorAll('a'), cur = null;
    for (var j = 0; j < links.length; j++){
      var on = parseInt(links[j].getAttribute('data-i'), 10) === idx;
      links[j].classList.toggle('cur', on); if (on) cur = links[j];
    }
    if (cur) cur.scrollIntoView({ block: 'nearest' });
  }
  function closeMenu(){ menu.hidden = true; idxBtn.setAttribute('aria-expanded', 'false'); }

  function render(){
    var pg = PAGES[idx];
    frame.src = pg.f;
    titleEl.innerHTML = '<span class="mod">' + pg.g + ' &middot; ' + pg.m + '</span><span class="pg">&middot; ' + pg.t + ' &middot; ' + (idx+1) + ' / ' + PAGES.length + '</span>';
    prevB.disabled = (idx === 0);
    nextB.disabled = (idx === PAGES.length - 1);
    document.title = pg.g + ' — ' + pg.m + ' — ' + pg.t;
    try { history.replaceState(null, '', 'view.html?i=' + idx); } catch (e) { /* file:// preview */ }
  }
  function go(d){ var n = idx + d; if (n>=0 && n<PAGES.length){ idx = n; render(); } }
  prevB.onclick = function(){ go(-1); };
  nextB.onclick = function(){ go(1); };
  idxBtn.onclick = function(e){ e.stopPropagation(); if (menu.hidden) openMenu(); else closeMenu(); };
  menu.onclick = function(e){ e.stopPropagation(); };
  document.addEventListener('click', closeMenu);
  document.addEventListener('keydown', function(e){
    if (e.key === 'Escape') { closeMenu(); return; }
    if (e.key === 'ArrowLeft')  go(-1);
    if (e.key === 'ArrowRight') go(1);
  });
  buildMenu();
  render();
  </script>
</body>
</html>
