<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Investor Asks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=Open+Sans:wght@400;600;700;800&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    .statement-step { margin-top:14px; }
    .stmt-paper .brw-hint {
      justify-content: flex-end;
      text-align: right;
      white-space: nowrap;
      font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace;
      font-variant-numeric: tabular-nums;
      font-size: var(--font-s);
      color: inherit;
    }
  </style>
</head>
<body>
<div class="page">
  <div class="prework-wrap">

    <div class="phase-title-row">
      <div class="phase-title"></div>
      <button class="icon-btn" title="Glossary" aria-label="Open glossary" onclick="openGlossary()"><i data-lucide="book-open"></i></button>
    </div>
    <div class="phase-sub" id="phaseTitle">Reading the Statements</div>

    <div id="beats"></div>
    <div id="controls"></div>

  </div>
</div>

<div class="glossary-overlay" id="glossaryOverlay" onclick="if(event.target===this) closeGlossary()">
  <div class="glossary-panel">
    <div class="glossary-panel-head">
      <div class="glossary-panel-title"><i data-lucide="book-open" class="licon"></i> Glossary</div>
      <button class="glossary-close-btn" aria-label="Close" onclick="closeGlossary()">&times;</button>
    </div>
    <div class="glossary-list" id="glossaryList"></div>
  </div>
</div>

<script src="bike-repair-job-records.js"></script>
<script src="bike-repair-parts-purchases.js"></script>
<script src="bike-repair-workbook.js"></script>
<script src="shared.js"></script>
<script src="bike-repair-statement-steps.generated.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script>
if(window.lucide) lucide.createIcons();

var audioCtx=null;
function ac(){ if(!audioCtx){ try{audioCtx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } return audioCtx; }
function tone(f,d,t,v){ var c=ac(); if(!c)return; var o=c.createOscillator(),g=c.createGain(); o.type=t||'sine'; o.frequency.value=f; o.connect(g); g.connect(c.destination); g.gain.setValueAtTime(v||0.05,c.currentTime); g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+d); o.start(); o.stop(c.currentTime+d); }
function playClick(){ tone(600,0.08,'sine',0.04); }

function annaBox(inner){ return '<div class="dialog-box anna"><div class="dialog-label">ANNA</div><div class="dialog-text">'+inner+'</div></div>'; }
function freddieBox(inner){ return '<div class="dialog-box freddie"><div class="dialog-label">FREDDIE</div><div class="dialog-text">'+inner+'</div></div>'; }

function sheetOf(name){
  var sheets=BR_STMT_DATA.workbooks['bike-repair-end'].sheets;
  for(var i=0;i<sheets.length;i++) if(sheets[i].name===name) return sheets[i];
  return null;
}

function statementPaper(gridId, caption){
  return '<figure class="stmt-paper">'
    + '<div class="stmt-paper-sheet"><div id="'+gridId+'"></div></div>'
    + '<figcaption class="stmt-paper-cap">'+caption+'</figcaption>'
    + '</figure>';
}

var IDENTITY_HTML =
  '<div class="dual-identity-bar">'
  + '<div class="dib-side"><span class="dib-tag">June 1 Balance Sheet</span><div class="dib-eq">'
    + '<div class="dib-group"><span class="dib-label">Assets</span><span class="dib-val">$4,710</span></div>'
    + '<span class="dib-op">&minus;</span>'
    + '<div class="dib-group"><span class="dib-label">Liabilities</span><span class="dib-val">$2,250</span></div>'
    + '<span class="dib-op">=</span>'
    + '<div class="dib-group"><span class="dib-label">Member&rsquo;s Capital</span><span class="dib-val">$2,460</span></div>'
  + '</div></div>'
  + '<div class="dib-divider"></div>'
  + '<div class="dib-side"><span class="dib-tag">August 31 Balance Sheet</span><div class="dib-eq">'
    + '<div class="dib-group"><span class="dib-label">Assets</span><span class="dib-val">$4,500</span></div>'
    + '<span class="dib-op">&minus;</span>'
    + '<div class="dib-group"><span class="dib-label">Liabilities</span><span class="dib-val">$0</span></div>'
    + '<span class="dib-op">=</span>'
    + '<div class="dib-group"><span class="dib-label">Member&rsquo;s Capital</span><span class="dib-val">$4,500</span></div>'
  + '</div></div>'
  + '</div>';

var step=0;
function render(){
  var h='';
  h += annaBox('The season&rsquo;s income statement is finished, and an investor named Freddie wants to look at the shop.');
  h += freddieBox('I&rsquo;ve been watching this place all summer. I&rsquo;m thinking about putting money in to help it grow. Before we talk about any of that, I&rsquo;d like to see the financial statements.');

  if(step>=1){
    h += '<div class="narrative-block"><p>You hand Freddie the <strong>June 1 and August 31 Balance Sheets</strong> from the workbook.</p></div>';
    h += '<div class="section-card"><div class="card-title">June 1 and August 31 Balance Sheets</div>'
      + statementPaper('balanceGrid41','Printed from Bike-Repair.xlsx &middot; Balance Sheet tab') + IDENTITY_HTML + '</div>';
    h += freddieBox('Member&rsquo;s Capital was $2,460 on June 1 and $4,500 on August 31. I can see where the shop stood on each date. I still can&rsquo;t see how it got from one to the other.');
  }

  if(step>=2){
    h += '<div class="narrative-block statement-step"><p>You hand Freddie the other statement already in the workbook: the <strong>Income Statement</strong>.</p></div>';
    h += '<div class="section-card"><div class="card-title">Income Statement</div>'
      + statementPaper('incomeGrid41','Printed from Bike-Repair.xlsx &middot; Income Statement tab') + '</div>';
    h += freddieBox('Revenue was $6,020. Expenses were $3,380, including one Depreciation line of $230. Net income was $2,640. That tells me the result. Now I want to know: who did all this work?');
  }

  document.getElementById('beats').innerHTML=h;
  if(step>=1) BRW.mountGrid('balanceGrid41',sheetOf('Balance Sheet'),{gridId:'investor-balance-grid'});
  if(step>=2) BRW.mountGrid('incomeGrid41',sheetOf('Income Statement'),{gridId:'investor-income-grid'});
  renderControls();
  if(window.lucide) lucide.createIcons();
}

function renderControls(){
  var c='<div class="nav-buttons">';
  if(step>0) c += '<button class="btn-back" onclick="back()">&larr; Back</button>';
  if(step===0) c += '<button class="btn-next" onclick="advance()">Hand over the balance sheets &rarr;</button>';
  else if(step===1) c += '<button class="btn-next" onclick="advance()">Hand over the income statement &rarr;</button>';
  else c += '';
  c += '</div>';
  document.getElementById('controls').innerHTML=c;
}

function advance(){ playClick(); step=Math.min(2,step+1); render(); window.scrollTo(0,document.body.scrollHeight); }
function back(){ if(step===0) return; playClick(); step--; render(); window.scrollTo(0,0); }

var glossaryTerms=[
  { term:'Balance sheet', def:'A statement of Assets, Liabilities, and Member&rsquo;s Capital at a date.' },
  { term:'Accounting identity', def:'Assets minus Liabilities equals Member&rsquo;s Capital. It holds on both balance-sheet dates shown here.' },
  { term:'Member&rsquo;s Capital', def:'The Operating Agreement&rsquo;s name for the difference between Assets and Liabilities.' },
  { term:'Income statement', def:'Revenue minus Expenses for the period: $6,020 &minus; $3,380 = $2,640.' }
];
function openGlossary(){
  document.getElementById('glossaryList').innerHTML=glossaryTerms.map(function(g){ return '<div class="glossary-entry"><div class="glossary-entry-term">'+g.term+'</div><div class="glossary-entry-def">'+g.def+'</div></div>'; }).join('');
  document.getElementById('glossaryOverlay').classList.add('open');
}
function closeGlossary(){ document.getElementById('glossaryOverlay').classList.remove('open'); }
function nav(url){ playClick(); window.location.href=url; }
function restart(){ window.location.reload(); }
document.addEventListener('keydown',function(e){ if(e.key==='Escape') closeGlossary(); });

window.devFill=function(){ step=2; render(); };
render();
</script>
<script src="dev.js"></script>
</body>
</html>
