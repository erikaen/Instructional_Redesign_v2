<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="color-scheme" content="light dark">

  <title>Tutorial 1.4 · Sort</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Open+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<body>
<div class="page">

</div>

<script src="14-shared.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script>
window.WB_PHASE = 'sort';
window.WB_WC_ANSWERED = true;
window.WB_ASSETS_EXPANDED = {};
window.WB_ACTIVE_TAB = 'reasons';

document.getElementById('phase-sort').innerHTML =
  annaBox('Twelve net-movers; two kinds &mdash; <strong>Contributed</strong> (you put it in) vs. <strong>Generated</strong> (the work generated it). Sort each into the right bin. Placeholder for now.', true) +
  '<div id="wbSort"></div>' +
  '<div class="section-card"><div class="card-title">Sort the net-movers</div>'+
    '<p class="prose">Contributed totals $1,790 (cash plug + laptop + gear). Generated totals $170 (customer payments minus parts and rent used). The sorting reveals the two ways a learner&rsquo;s stake grew.</p>'+
  '</div>';

renderWorkbook('wbSort');
if(window.lucide) lucide.createIcons();
</script>
