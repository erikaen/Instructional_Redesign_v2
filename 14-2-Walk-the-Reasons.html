<script>
if (window.lucide) lucide.createIcons();

/* ===== sound ===== */
var audioCtx=null;
function ac(){ if(!audioCtx){ try{audioCtx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } return audioCtx; }
function tone(f,d,t,v){ var c=ac(); if(!c)return; var o=c.createOscillator(),g=c.createGain(); o.type=t||'sine'; o.frequency.value=f; o.connect(g); g.connect(c.destination); g.gain.setValueAtTime(v||0.05,c.currentTime); g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+d); o.start(); o.stop(c.currentTime+d); }
function playSuccess(){ tone(523,0.12); setTimeout(function(){tone(659,0.12);},90); setTimeout(function(){tone(784,0.16);},180); }
function playNope(){ tone(400,0.12,'sine',0.05); setTimeout(function(){tone(300,0.12,'sine',0.05);},120); }
function playClick(){ tone(600,0.08,'sine',0.04); }

/* ===== formatters ===== */
function dol(v){ return (v<0?'−$':'$')+Math.abs(v).toLocaleString('en-US'); }
function signed(v){ var cls=v>=0?'stmt-dep':'stmt-with'; return '<span class="'+cls+'">'+(v>=0?'+':'−')+'$'+Math.abs(v).toLocaleString('en-US')+'</span>'; }
function catLabel(cat){ return cat==='RIGHT OF USE' ? 'Right of Use' : (cat.charAt(0)+cat.slice(1).toLowerCase()); }

/* ============================================================================
   THE RULE this page teaches (Rick, 2026-07-08):
   Every change in an Asset or a Liability gets either a MATCH or a REASON.
   A match is the other line that moved with it, same transaction — the pair
   explains itself, and Assets − Liabilities does not move (Asset up +
   Liability up, or one Asset up + another Asset down). A change with NO match
   moved the difference — its why lives outside the sheets, so it gets written
   on the Reasons tab. The reasons alone carry every move in the difference.
   ========================================================================== */

/* ===== every May change in an Asset or a Liability =====
   side: 'a'|'l'; cat: pane grouping; delta: signed; ans: what else moved
   ('card'|'cash'|'promise'|'none'); pair: transaction id shared with the
   counterpart line(s); group: receipt evidence; reason: the jot when ans none. */
var CHANGES = [

  { id:'truing',  cat:'EQUIPMENT', side:'a', label:'Wheel-truing stand',     delta:170,  ans:'card', pair:'p_truing', group:'g_truing' },
  { id:'grinder', cat:'EQUIPMENT', side:'a', label:'Bench grinder',          delta:90,   ans:'none', group:'g_gear', reason:'Brought the bench grinder from home.' },
  { id:'press',   cat:'EQUIPMENT', side:'a', label:'Headset press',          delta:70,   ans:'none', group:'g_gear', reason:'Brought the headset press from home.' },
  { id:'vacuum',  cat:'EQUIPMENT', side:'a', label:'Shop vacuum',            delta:60,   ans:'none', group:'g_gear', reason:'Brought the shop vacuum from home.' },
  /* COMPUTER EQUIPMENT */
  { id:'laptop',  cat:'COMPUTER EQUIPMENT', side:'a', label:'Laptop', delta:610, ans:'none', group:'g_laptop', reason:'Brought the laptop from home.' },
  /* FIXTURES — four lines, ONE card charge */
  { id:'desk',    cat:'FIXTURES', side:'a', label:'Desk',            delta:250, ans:'card', pair:'p_fixt', group:'g_fixtures' },
  { id:'shelving',cat:'FIXTURES', side:'a', label:'Shelving units',  delta:200, ans:'card', pair:'p_fixt', group:'g_fixtures' },
  { id:'rack',    cat:'FIXTURES', side:'a', label:'Display rack',    delta:180, ans:'card', pair:'p_fixt', group:'g_fixtures' },
  { id:'pegboard',cat:'FIXTURES', side:'a', label:'Pegboard + hooks',delta:120, ans:'card', pair:'p_fixt', group:'g_fixtures' },
  /* SUPPLIES — bought AND used, item by item (bought − used = the shelf, line for line) */
  { id:'bChains', cat:'SUPPLIES', side:'a', label:'Chains bought (QBP order)',            delta:120, ans:'card', pair:'p_parts', group:'g_parts' },
  { id:'bPads',   cat:'SUPPLIES', side:'a', label:'Brake pads bought (QBP order)',        delta:90,  ans:'card', pair:'p_parts', group:'g_parts' },
  { id:'bCables', cat:'SUPPLIES', side:'a', label:'Derailleur cables bought (QBP order)', delta:50,  ans:'card', pair:'p_parts', group:'g_parts' },
  { id:'bCass',   cat:'SUPPLIES', side:'a', label:'Cassettes bought (QBP order)',         delta:90,  ans:'card', pair:'p_parts', group:'g_parts' },

  { id:'bTubes',  cat:'SUPPLIES', side:'a', label:'Tubes bought (QBP order)',             delta:50,  ans:'card', pair:'p_parts', group:'g_parts' },
  { id:'uChains', cat:'SUPPLIES', side:'a', label:'Chains used on customer jobs',            delta:-70, ans:'none', reason:'Used $70 of chains finishing customer jobs.' },
  { id:'uPads',   cat:'SUPPLIES', side:'a', label:'Brake pads used on customer jobs',        delta:-50, ans:'none', reason:'Used $50 of brake pads finishing customer jobs.' },
  { id:'uCables', cat:'SUPPLIES', side:'a', label:'Derailleur cables used on customer jobs', delta:-30, ans:'none', reason:'Used $30 of derailleur cables finishing customer jobs.' },
  { id:'uCass',   cat:'SUPPLIES', side:'a', label:'Cassettes used on customer jobs',         delta:-50, ans:'none', reason:'Used $50 of cassettes finishing customer jobs.' },
  { id:'uBB',     cat:'SUPPLIES', side:'a', label:'Bottom brackets used on customer jobs',   delta:-30, ans:'none', reason:'Used $30 of bottom brackets finishing customer jobs.' },
  { id:'uSpokes', cat:'SUPPLIES', side:'a', label:'Spokes used on customer jobs',            delta:-30, ans:'none', reason:'Used $30 of spokes finishing customer jobs.' },
  { id:'uTubes',  cat:'SUPPLIES', side:'a', label:'Tubes used on customer jobs',             delta:-40, ans:'none', reason:'Used $40 of tubes finishing customer jobs.' },
  /* RIGHT OF USE — paid AND used */
  { id:'rouPay',  cat:'RIGHT OF USE', side:'a', label:'Rent paid in advance &mdash; two months&rsquo; right to the space', delta:1300, ans:'cash', pair:'p_rou', group:'g_rent' },
  { id:'rouUse',  cat:'RIGHT OF USE', side:'a', label:'May&rsquo;s month, used', delta:-650, ans:'none', reason:'Used the workspace for May.' },
  /* LIABILITIES — Smith's deposit (the card's rows are matched from the asset side) */
  { id:'smith',   cat:'SMITH', side:'l', label:'Smith&rsquo;s deposit &mdash; a frame owed, not built yet', delta:220, ans:'cash', pair:'p_smith', group:'g_smith' },
  /* CASH — the ledger; most rows matched from the other side already */
  { id:'cRent',   cat:'CASH', side:'a', label:'<span class="cash-line-date">May 1</span>Rent paid in advance', delta:-1300, ans:'cash', pair:'p_rou' },
  { id:'cStand',  cat:'CASH', side:'a', label:'<span class="cash-line-date">May 3</span>Park Tool stand', delta:-200, ans:'cash', pair:'p_stand' },
  { id:'rep1',    cat:'CASH', side:'a', label:'<span class="cash-line-date">May 7</span>Repair finished &mdash; customer paid', delta:340, ans:'none', reason:'Finished a repair &mdash; customer paid $340.' },
  { id:'rep2',    cat:'CASH', side:'a', label:'<span class="cash-line-date">May 10</span>Repair finished &mdash; customer paid', delta:180, ans:'none', reason:'Finished a repair &mdash; customer paid $180.' },
  { id:'rep3',    cat:'CASH', side:'a', label:'<span class="cash-line-date">May 12</span>Repair finished &mdash; customer paid', delta:80,  ans:'none', reason:'Finished a repair &mdash; customer paid $80.' },
  { id:'rep4',    cat:'CASH', side:'a', label:'<span class="cash-line-date">May 14</span>Repair finished &mdash; customer paid', delta:140, ans:'none', reason:'Finished a repair &mdash; customer paid $140.' },
  { id:'rep5',    cat:'CASH', side:'a', label:'<span class="cash-line-date">May 19</span>Repair finished &mdash; customer paid', delta:130, ans:'none', reason:'Finished a repair &mdash; customer paid $130.' },
  { id:'cSmith',  cat:'CASH', side:'a', label:'<span class="cash-line-date">May 22</span>Smith&rsquo;s deposit received', delta:220, ans:'cash', pair:'p_smith' },
  { id:'rep6',    cat:'CASH', side:'a', label:'<span class="cash-line-date">May 23</span>Repair finished &mdash; customer paid', delta:100, ans:'none', reason:'Finished a repair &mdash; customer paid $100.' },
  { id:'rep7',    cat:'CASH', side:'a', label:'<span class="cash-line-date">May 27</span>Repair finished &mdash; customer paid', delta:150, ans:'none', reason:'Finished a repair &mdash; customer paid $150.' },
  /* hidden until the tally discovery */
  { id:'cover',   cat:'CASH', side:'a', label:'<span class="cash-line-date">&mdash;</span>From your personal self &mdash; covering what the work drew down', delta:160, ans:'none', hidden:true, reason:'Covered $160 from your personal self &mdash; found only by tallying.' }
];
var BY_ID={}; CHANGES.forEach(function(c){ BY_ID[c.id]=c; });

/* the credit card's own rows — each is the OTHER LINE of purchases walked on the asset side */
var CARD_ROWS = [
  { label:'Hand tools (one charge, six tools)', amt:300, pair:'p_tools' },
  { label:'Air compressor', amt:180, pair:'p_compr' },
  { label:'Parts washer', amt:130, pair:'p_washer' },
  { label:'Wheel-truing stand', amt:170, pair:'p_truing' },
  { label:'Fixtures (desk, shelving, rack, pegboard)', amt:750, pair:'p_fixt' },
  { label:'Parts (QBP order)', amt:500, pair:'p_parts' }
];

/* receipts (the evidence behind each transaction) */
var GROUPS = {
  g_stand: { kind:'receipt', vendor:'Cyclesport Supply', meta:'Sales Receipt #SR-4471 · May 3, 2026', paid:'Personal debit card •••• 6620', total:200, items:[{name:'Park Tool PRS-25 Repair Stand', amt:200}] },
  g_tools: { kind:'receipt', vendor:'Cyclesport Supply', meta:'Sales Receipt #SR-4488 · May 5, 2026', paid:'Harborline Visa •••• 3902', total:300, items:[{name:'Cone wrench set', amt:65},{name:'Torque wrench', amt:95},{name:'Hex / Allen key set', amt:45},{name:'Cable cutters', amt:40},{name:'Chain breaker', amt:35},{name:'Tire levers', amt:20}] },
  g_compressor: { kind:'receipt', vendor:'Compressor Depot', meta:'Sales Receipt #CD-2208 · May 8, 2026', paid:'Harborline Visa •••• 3902', total:180, items:[{name:'Portable air compressor — 6 gal', amt:180}] },
  g_washer: { kind:'receipt', vendor:'Industrial Supply', meta:'Invoice #IS-30742 · May 10, 2026', paid:'Harborline Visa •••• 3902', total:130, items:[{name:'Parts washer — 20-gal solvent tank', amt:130}] },
  g_truing: { kind:'receipt', vendor:'Cyclesport Supply', meta:'Sales Receipt #SR-4502 · May 12, 2026', paid:'Harborline Visa •••• 3902', total:170, items:[{name:'Wheel-truing stand — shop grade', amt:170}] },
  g_gear: { kind:'ebay', vendor:'eBay — comparable sold listings', meta:'Pre-owned · valued by market comp', paid:'Brought from home — no purchase', total:220, items:[{name:'Bench grinder', amt:90},{name:'Headset press', amt:70},{name:'Shop vacuum', amt:60}] },
  g_laptop: { kind:'ebay', vendor:'eBay — comparable sold listings', meta:'Pre-owned · valued by market comp', paid:'Brought from home — no purchase', total:610, items:[{name:'Laptop (used)', amt:610}] },
  g_fixtures: { kind:'receipt', vendor:'Workspace Outfitters', meta:'Invoice #WO-20518 · May 5, 2026 — ONE charge', paid:'Harborline Visa •••• 3902', total:750, items:[{name:'Work desk', amt:250},{name:'Shelving units (×2)', amt:200},{name:'Display rack', amt:180},{name:'Pegboard + hooks', amt:120}] },
  g_parts: { kind:'receipt', vendor:'QBP — Quality Bicycle Products', meta:'Invoice #QBP-887341 · May 15, 2026 — ONE charge', paid:'Harborline Visa •••• 3902', total:500, items:[{name:'Chains (box)', amt:100},{name:'Brake pads (box)', amt:80},{name:'Derailleur cables (box)', amt:40},{name:'Cassettes (×4)', amt:80},{name:'Bottom brackets (assorted)', amt:80},{name:'Spokes (bundle)', amt:80},{name:'Tubes (box)', amt:40}] },
  g_rent: { kind:'receipt', vendor:'Landlord — 142 Whalley Avenue, Unit B', meta:'Rent receipt · May 1, 2026', paid:'Personal check #1041', total:1300, items:[{name:'May — right to use the space', amt:650},{name:'Final month — paid in advance', amt:650}] },
  g_smith: { kind:'receipt', vendor:'Smith — check deposit', meta:'May 22, 2026 · custom frame build, 4–6 weeks', paid:'Check, deposited', total:220, items:[{name:'Deposit received up front', amt:220}] }
};

/* ===== the walk: beats in story order; Cash comes last (the tally discovery) ===== */
var BEATS = [
  { key:'EQUIPMENT', tab:'assets',
    anna:'There&rsquo;s your new <strong>Reasons</strong> tab, open in a second window. Here&rsquo;s the discipline: for every change on these sheets, ask <strong>what else moved?</strong> Go down <strong>Equipment</strong>, item by item &mdash; click one and answer. The receipt is the clue. If something moved with it, say what. If nothing did &mdash; that&rsquo;s the kind we have to write down.',
    done:'<strong>Equipment</strong>: ten changes had a match &mdash; the card, or Cash &mdash; and Assets &minus; Liabilities never moved. Three had <strong>no match</strong>: the gear from home. Those three are on the Reasons tab now, because nothing on these sheets explains them.' },
  { key:'COMPUTER EQUIPMENT', tab:'assets',
    anna:'Next, the <strong>laptop</strong>. Same question: when it came in, what else moved?',
    done:'The <strong>laptop</strong> &mdash; no match anywhere on the sheets. The difference between Assets and Liabilities moved by $610, and only the Reasons tab says why.' },
  { key:'FIXTURES', tab:'assets',
    anna:'Now <strong>Fixtures</strong> &mdash; desk, shelving, rack, pegboard. Watch what they all point at.',
    done:'Four asset lines &mdash; and <strong>one</strong> line on the card: a single $750 charge, invoice WO-20518. Matches live at the <em>transaction</em>: four things can share one match. Nothing to write down; the pair explains itself.' },
  { key:'SUPPLIES', tab:'assets',
    anna:'<strong>Supplies</strong> moved all month &mdash; parts came <em>in</em> from one QBP order, and parts left the shelf as jobs got done. Item by item, same question: what else moved?',
    done:'Every part <em>bought</em> matched the card &mdash; seven kinds of parts, <strong>one</strong> $500 charge; the difference never moved. Every part <em>used</em> matched <strong>nothing</strong>: $300 left the shelf with no other line moving. The difference went <em>down</em> $300 &mdash; the first moves downward, each written with its why.' },
  { key:'RIGHT OF USE', tab:'assets',
    anna:'<strong>Right of Use</strong> &mdash; the rent story. Two changes again: the right was <em>paid for</em>, and May&rsquo;s month got <em>used</em>.',
    done:'Paying $1,300 bought a right &mdash; one Asset up, Cash down: matched, difference unmoved. But May&rsquo;s month, once used, matched nothing: the difference moved down $650. Money moving is one thing; the difference moving is another.' },
  { key:'SMITH', tab:'liabilities',
    anna:'Flip to <strong>Liabilities</strong>. The card&rsquo;s rows you&rsquo;ve already met &mdash; every charge there is the <em>match</em> of something you walked on the Assets side. That leaves <strong>Smith&rsquo;s deposit</strong>: a promise went up $220. What else moved?',
    done:'Cash up $220, a promise up $220 &mdash; matched; the difference never moved. And note what&rsquo;s coming: the day you hand Smith the frame, this promise drops to <strong>zero</strong> &mdash; and <em>nothing will move with it</em>. No match. That change will need a <strong>reason</strong>. Same rule, every time, for every Asset and every Liability.' },
  { key:'CASH', tab:'assets',
    anna:'Last: open <strong>Cash</strong> itself. Most of its rows you&rsquo;ve already matched from the other side &mdash; see the check marks. What&rsquo;s left is the money that came <em>in</em>. Same question, row by row: what else moved?',
    done:'' }
];
var ORDERED_KEYS = BEATS.map(function(b){ return b.key; });

/* ===== state ===== */
var TABS = [{id:'assets',label:'Assets'},{id:'liabilities',label:'Liabilities'},{id:'reasons',label:'Reasons',isNew:true}];
var paneTab = { left:'assets', right:'reasons' };
var beatIndex = 0;
var assetsOpen = { EQUIPMENT:true };
var explained = {};       // change id -> 'match'|'reason'
var matchedPairs = {};    // pair id -> true
var reasonsCreated = [];  // change ids in recorded order
var activeChange = null;
var attempts = {};
var lastFlash = null;
var autoActive = false;
var coverFound = false;
var tallyPhase = false;   // cash rows done, discovery pending
var explainedAt = {};     // change id -> beatIndex when recorded (per-page reset)
var tallySel = null, tallySubmitted = false;

function beat(){ return beatIndex < BEATS.length ? BEATS[beatIndex] : null; }
function beatChanges(k){ return CHANGES.filter(function(c){ return c.cat===k && !c.hidden; }); }
function beatDone(k){ return beatChanges(k).every(function(c){ return explained[c.id]; }); }
function reasonsTotal(){ return reasonsCreated.reduce(function(s,id){ return s+BY_ID[id].delta; },0); }
function matchedCount(){ return Object.keys(explained).filter(function(id){ return explained[id]==='match'; }).length; }

/* ===== shared builders ===== */
function annaBox(inner){ return '<div class="dialog-box anna"><div class="dialog-label">ANNA</div><div class="dialog-text">'+inner+'</div></div>'; }
function insightBox(label,inner){ return '<div class="insight-box"><div class="insight-label"><i data-lucide="lightbulb" class="licon"></i> '+label+'</div>'+inner+'</div>'; }

/* ===== the walk-progress card (top, same format as the other sorts) ===== */
function walkTriggerMet(){
  var b = beat(); if(!b) return false;
  var changes = beatChanges(b.key);
  var recCount = changes.filter(function(c){ return explained[c.id]; }).length;
  var allRec = recCount===changes.length;
  var hasM = changes.some(function(c){ return explained[c.id]==='match'; });
  var hasR = changes.some(function(c){ return explained[c.id]==='reason'; });
  var mixed = changes.some(function(c){ return c.ans==='none'; }) && changes.some(function(c){ return c.ans!=='none'; });
  return !allRec && !activeChange && !autoActive && recCount>=3 && (!mixed || (hasM && hasR));
}
function ruleStrip(){
  var un = CHANGES.filter(function(c){ return !c.hidden && !explained[c.id]; }).length;
  var b = beat();
  var btnLabel = b ? 'Walk the rest of '+catLabel(b.key==='SMITH'?'LIABILITIES':b.key) : 'Walk the rest';
  var btn = '<button class="btn-continue btn-block"'+(walkTriggerMet()?' onclick="recordRest()"':' disabled')+'>'+btnLabel+'</button>';
  return '<div class="sortprog"><div class="sortprog-title">The rule: every change gets a match or a reason</div>'+
    '<p class="sortprog-hint">A shortcut to walk the rest of each category will unlock as you go. Matched pairs leave Assets &minus; Liabilities unmoved; reasons are the changes that moved it ('+signed(reasonsTotal())+' so far).</p>'+
    '<div class="sortprog-grid">'+
    '<div class="sortprog-box shop"><div class="sortprog-label">Matched</div><div class="sortprog-num">'+matchedCount()+'</div></div>'+
    '<div class="sortprog-box personal"><div class="sortprog-label">Reasons</div><div class="sortprog-num">'+reasonsCreated.length+'</div></div>'+
    '<div class="sortprog-box'+(un===0?' done':'')+'"><div class="sortprog-label">Unwalked</div><div class="sortprog-num">'+un+'</div></div>'+
    '</div>'+btn+'</div>';
}

/* ===== sheets ===== */
function changeState(c){
  if(!explained[c.id]) return null;
  return explained[c.id];
}
function questionHtml(c){
  var att = attempts[c.id]||0;
  var h = '<div class="stmt-expand-info">'+c.label.replace(/<[^>]*>/g,'')+' ('+signed(c.delta)+') &mdash; what <em>else</em> moved?</div>'+
    '<div class="classify-row"><span class="classify-label">Classify:</span>'+
      '<button class="classify-btn" onclick="answer(\'card\')">The Credit Card &mdash; by the same amount</button>'+
      '<button class="classify-btn" onclick="answer(\'cash\')">Cash &mdash; by the same amount</button>'+
      '<button class="classify-btn" onclick="answer(\'promise\')">A promise &mdash; by the same amount</button>'+
      '<button class="classify-btn" onclick="answer(\'none\')">Nothing else moved &mdash; write a reason</button>'+
      (c.group?'<button class="btn-hint" onclick="openReceipt(\''+c.group+'\')"><i data-lucide="receipt" class="licon"></i> See the evidence</button>':'')+
    '</div>';
  if(nudgeItem===c.id && att<3){
    h+='<div class="sort-msg warn">&ldquo;Hint '+att+'/2: '+(att===1?'open the evidence &mdash; it shows what moved with this one.':'a Visa charge means the card moved; a debit or check means Cash moved; no purchase at all means nothing else moved.')+'&rdquo;</div>';
  }
  return h;
}
function walkRow(c, alt){
  var st = changeState(c);
  var b = beat();
  var act = b && (c.cat===b.key);
  var canClick = act && !st && !autoActive;
  var sel = (activeChange===c.id);
  var click = canClick ? ' onclick="clickChange(\''+c.id+'\')" style="cursor:pointer;"' : '';
  var chev = canClick
    ? '<button class="stmt-info-btn'+(sel?' open':'')+'" aria-label="'+(sel?'Close this change':'Walk this change')+'"><i data-lucide="'+(sel?'chevron-up':'chevron-down')+'" class="licon"></i></button>'
    : '<span></span>';
  var stripeCls = st==='match' ? 'shop' : (st==='reason' ? 'personal' : '');
  var tag = st==='match' ? '<span class="stmt-tag shop">Match</span>' : (st==='reason' ? '<span class="stmt-tag personal">Reason</span>' : '');
  var h = '<div class="stmt-row stmt-grid-sort'+(sel?' selected':(alt?' alt':''))+'"'+click+'>'+chev+
    '<div class="stmt-stripe '+stripeCls+'"></div>'+
    '<span>'+c.label+tag+'</span>'+
    '<span class="stmt-num">'+signed(c.delta)+'</span></div>';
  if(sel && !autoActive){
    h += '<div class="stmt-expand" onclick="event.stopPropagation()">'+questionHtml(c)+'</div>';
  }
  if(!sel && lastFlash && lastFlash.id===c.id){
    h += '<div class="stmt-expand">'+flashHtml()+'</div>';
  }
  return h;
}
function assetsSheet(){
  var CATS = ['EQUIPMENT','COMPUTER EQUIPMENT','SUPPLIES','FIXTURES','RIGHT OF USE','CASH'];
  var html='<div class="stmt-colhead stmt-grid-sort"><span></span><span></span><span>Asset</span><span class="stmt-num">Value</span></div>';
  var alt = 0;
  CATS.forEach(function(cat){
    var rows = CHANGES.filter(function(c){ return c.cat===cat && (!c.hidden || coverFound); });
    var amount = rows.reduce(function(s,c){ return s+c.delta; },0);
    var open=!!assetsOpen[cat];
    var done = ORDERED_KEYS.indexOf(cat)>=0 && beatDone(cat) && (cat!=='CASH' || coverFound);
    var lbl = catLabel(cat) + (done?' <span class="stmt-dep">&#10003;</span>':'');
    html+='<div class="stmt-row stmt-grid-sort">'+
      '<button class="stmt-info-btn'+(open?' open':'')+'" onclick="toggleCat(\''+cat+'\')" aria-label="'+(open?'Collapse':'Expand')+'"><i data-lucide="'+(open?'chevron-up':'chevron-down')+'" class="licon"></i></button>'+
      '<div class="stmt-stripe"></div>'+
      '<span><strong>'+lbl+'</strong></span>'+
      '<span class="stmt-num">'+dol(amount)+'</span></div>';
    if(open) rows.forEach(function(c){ html+=walkRow(c, (alt++)%2); });
  });
  html+='<div class="stmt-balrow bottom"><span>TOTAL</span><span class="stmt-num">'+dol(3410)+'</span></div>';
  return html;
}
function liabilitiesSheet(){
  var b = beat();
  var html='<div class="stmt-colhead stmt-grid-sort"><span></span><span></span><span>Liability</span><span class="stmt-num">Amount</span></div>';
  /* the card: every row is the other line of an asset-side transaction */
  var cardOpen = !!assetsOpen['CARD'];
  html+='<div class="stmt-row stmt-grid-sort">'+
    '<button class="stmt-info-btn'+(cardOpen?' open':'')+'" onclick="toggleCat(\'CARD\')" aria-label="'+(cardOpen?'Collapse':'Expand')+'"><i data-lucide="'+(cardOpen?'chevron-up':'chevron-down')+'" class="licon"></i></button>'+
    '<div class="stmt-stripe"></div>'+
    '<span><strong>Credit Card &mdash; still owed on the bike-repair card</strong></span>'+
    '<span class="stmt-num">'+dol(2030)+'</span></div>';
  if(cardOpen) CARD_ROWS.forEach(function(r, i){
    var m = matchedPairs[r.pair];
    html+='<div class="stmt-row stmt-grid-sort'+(i%2?' alt':'')+'"><span></span><div class="stmt-stripe '+(m?'shop':'')+'"></div>'+
      '<span>'+r.label+(m?'<span class="stmt-tag shop">Match</span>':'')+'</span>'+
      '<span class="stmt-num">'+signed(r.amt)+'</span></div>';
  });
  /* Smith */
  var smith = BY_ID['smith'];
  var st = changeState(smith);
  var canClick = b && b.key==='SMITH' && !st && !autoActive;
  var click = canClick ? ' onclick="clickChange(\'smith\')" style="cursor:pointer;"' : '';
  var sel = activeChange==='smith';
  var smithChev = canClick ? '<button class="stmt-info-btn'+(sel?' open':'')+'" aria-label="'+(sel?'Close this change':'Walk this change')+'"><i data-lucide="'+(sel?'chevron-up':'chevron-down')+'" class="licon"></i></button>' : '<span></span>';
  html+='<div class="stmt-row stmt-grid-sort'+(sel?' selected':'')+'"'+click+'>'+smithChev+
    '<div class="stmt-stripe '+(st?'shop':'')+'"></div>'+
    '<span><strong>'+smith.label+'</strong>'+(st?'<span class="stmt-tag shop">Match</span>':'')+'</span>'+
    '<span class="stmt-num">'+dol(220)+'</span></div>';
  if(sel && !autoActive){
    html += '<div class="stmt-expand" onclick="event.stopPropagation()">'+questionHtml(smith)+'</div>';
  }
  if(!sel && lastFlash && lastFlash.id===smith.id){
    html += '<div class="stmt-expand">'+flashHtml()+'</div>';
  }
  html+='<div class="stmt-balrow bottom"><span>TOTAL</span><span class="stmt-num">'+dol(2250)+'</span></div>';
  return html;
}
function reasonsSheet(){
  var html='<div class="stmt-colhead stmt-grid-sort"><span></span><span></span><span>Reason &mdash; the changes with no match</span><span class="stmt-num"></span></div>';
  if(reasonsCreated.length===0){
    html+='<div class="stmt-row stmt-grid-sort"><span></span><div class="stmt-stripe"></div><span><em>No reasons yet &mdash; every change so far had a match.</em></span><span></span></div>';
    return html;
  }
  reasonsCreated.forEach(function(id, i){
    var c=BY_ID[id];
    html+='<div class="stmt-row stmt-grid-sort'+(i%2?' alt':'')+'"><span></span><div class="stmt-stripe personal"></div>'+
      '<span>'+c.reason+' <span class="stmt-tag personal">'+catLabel(c.cat==='SMITH'?'LIABILITIES':c.cat)+'</span></span>'+
      '<span class="stmt-num">'+signed(c.delta)+'</span></div>';
  });
  html+='<div class="stmt-balrow bottom"><span>The difference has moved</span><span class="stmt-num">'+signed(reasonsTotal())+'</span></div>';
  return html;
}

/* ===== a pane = a window of the workbook, with tabs ===== */
function renderPane(side){
  var tab=paneTab[side];
  var body = tab==='assets'?assetsSheet():(tab==='liabilities'?liabilitiesSheet():reasonsSheet());
  var activeLabel=TABS.filter(function(t){return t.id===tab;})[0].label;
  var tabsHtml=TABS.map(function(t){ return '<button class="xlwb-tab'+(t.id===tab?' active':'')+'" onclick="setPaneTab(\''+side+'\',\''+t.id+'\')">'+t.label+(t.isNew?' <span class="xl-new">new</span>':'')+'</button>'; }).join('');
  return '<div class="stmt">'+
    '<div class="stmt-head"><div><div class="stmt-bank">Bike-Repair.xlsx</div><div class="stmt-acct">'+activeLabel+' sheet</div></div>'+
    '<div><div class="stmt-period-label">Period</div><div class="stmt-period">May 2026</div></div></div>'+
    body+
    '<div class="xlwb-tabs">'+tabsHtml+'<span class="xlwb-tab-add"><i data-lucide="plus" class="licon"></i></span></div></div>';
}

/* ===== the flash: what the last answer did to the difference ===== */
function flashHtml(){
  if(!lastFlash) return '';
  return '<div class="sort-msg '+(lastFlash.kind==='reason'?'warn':'')+'" style="margin-bottom:10px">'+lastFlash.text+'</div>';
}
function flashFor(c, matchTag){
  if(c.ans==='card') return c.label.replace(/<[^>]*>/g,'')+' '+signed(Math.abs(c.delta))+' &middot; <strong>Credit Card up with it</strong> &mdash; an Asset up and a Liability up, same transaction. Assets &minus; Liabilities didn&rsquo;t move.';
  if(c.ans==='cash'){
    if(c.side==='l') return 'A promise up $220 &middot; <strong>Cash up $220</strong> &mdash; an Asset and a Liability up together. Assets &minus; Liabilities didn&rsquo;t move.';
    if(c.cat==='CASH') return 'This row is the <strong>match</strong> of a change you already walked. Nothing new moved.';
    return c.label.replace(/<[^>]*>/g,'')+' '+signed(c.delta)+' &middot; <strong>Cash '+signed(-c.delta)+'</strong> &mdash; one Asset up, another Asset down. Assets &minus; Liabilities didn&rsquo;t move.';
  }
  return c.label.replace(/<[^>]*>/g,'')+' '+signed(c.delta)+' &mdash; <strong>no match anywhere</strong>. The difference itself moved '+signed(c.delta)+'. Written on the Reasons tab.';
}

/* ===== controls ===== */
function controls(){
  var b = beat();
  if(!b){ return finishedControls(); }
  var changes = beatChanges(b.key);
  var recCount = changes.filter(function(c){ return explained[c.id]; }).length;
  var allRec = recCount===changes.length;
  var hasM = changes.some(function(c){ return explained[c.id]==='match'; });
  var hasR = changes.some(function(c){ return explained[c.id]==='reason'; });
  var mixed = changes.some(function(c){ return c.ans==='none'; }) && changes.some(function(c){ return c.ans!=='none'; });
  var trigger = !allRec && !activeChange && !autoActive && recCount>=3 && (!mixed || (hasM && hasR));

  if(allRec){
    if(b.key==='CASH'){ return coverFound ? tallyControls() + finishedControls() : tallyControls(); }
    var nextLbl = beatIndex<BEATS.length-1 ? catLabel(BEATS[beatIndex+1].key==='SMITH'?'LIABILITIES':BEATS[beatIndex+1].key) : null;
    var btn = nextLbl ? '<button class="btn-continue btn-block" onclick="advanceBeat()">Next &mdash; '+nextLbl+' &rarr;</button>' : '';
    var note = b.key==='SMITH'
      ? insightBox('Same rule, forward in time', '<p>'+b.done+'</p>')
      : (b.done ? insightBox('Done: '+catLabel(b.key==='SMITH'?'LIABILITIES':b.key), '<p>'+b.done+'</p>') : '');
    return note + btn;
  }
  if(activeChange && !autoActive){
    return '';   /* the question and feedback open inline under the row */
  }
  if(autoActive){ return '<div class="system-banner"><div class="system-banner-title"><i data-lucide="settings" class="licon"></i> Walking the rest&hellip;</div></div>'; }
  return '';
}

/* ===== the Cash tally discovery ===== */
var TALLY_OPTS = [
  { id:'a', text:'A customer must have paid $160 that never got written down',
    fb:'&ldquo;Every customer payment has a row &mdash; and a reason already. Look at where the money would have to come <em>from</em>.&rdquo;' },
  { id:'b', text:'The card must have covered it',
    fb:'&ldquo;The card&rsquo;s charges are all on the Liabilities tab, and every one is matched. This $160 wasn&rsquo;t borrowed.&rdquo;' },
  { id:'c', text:'It came from outside the repair work &mdash; you covered it yourself, without noticing',
    fb:'From your personal self +$160 &mdash; <strong>no match</strong>: it came from outside the repair work. The last reason. Found only by tallying.' }
];
function tallyControls(){
  var h = insightBox('The ledger doesn&rsquo;t reach the sheet',
    '<p>Every row is explained &mdash; and they sum to <strong>&minus;$160</strong>. But the Cash line reads <strong>$0</strong>: the account never went negative. $160 arrived with no receipt and no row.</p>');
  var right = tallySubmitted && TALLY_OPTS[tallySel].id==='c';
  h += '<div class="mc-card"><div class="mc-q">Where did the $160 come from?</div><div class="mc-opts">';
  TALLY_OPTS.forEach(function(o, oi){
    var cls = 'mc-opt' + (!tallySubmitted && tallySel===oi ? ' selected' : '')
      + (tallySubmitted && tallySel===oi ? (o.id==='c'?' correct':' wrong') : '')
      + (tallySubmitted ? ' locked' : '');
    h += '<div class="'+cls+'" onclick="selectTally('+oi+')"><div class="mc-letter">'+String.fromCharCode(65+oi)+'</div><div>'+o.text+'</div></div>';
  });
  h += '</div>';
  if(tallySubmitted) h += '<div class="feedback '+(right?'ok':'err')+' show">'+(right?'Right. ':'Not quite. ')+TALLY_OPTS[tallySel].fb+'</div>';
  h += '<div class="btn-row">'+(tallySubmitted
    ? '<button class="btn-reset" onclick="resetTally()" style="margin-left:auto;">Reset</button>'
    : '<button class="btn-continue" onclick="submitTally()"'+(tallySel===null?' disabled':'')+'>Submit</button>')+'</div>';
  h += '</div>';
  return h;
}
function selectTally(i){
  if(tallySubmitted) return;
  tallySel = i; render();
}
function submitTally(){
  if(tallySel===null || tallySubmitted) return;
  tallySubmitted = true;
  if(TALLY_OPTS[tallySel].id==='c'){
    playSuccess();
    coverFound = true;
    var c = BY_ID['cover'];
    explainedAt[c.id]=beatIndex; explained[c.id]='reason'; if(reasonsCreated.indexOf(c.id)<0) reasonsCreated.push(c.id);
    lastFlash = { kind:'reason', text:'From your personal self +$160 &mdash; <strong>no match</strong>: it came from outside the repair work. The last reason. Found only by tallying.', id:'cover' };
  } else {
    playNope();
  }
  render();
}
function resetTally(){
  playClick();
  tallySel = null; tallySubmitted = false;
  if(coverFound){
    coverFound = false;
    delete explained['cover']; delete explainedAt['cover'];
    var ri = reasonsCreated.indexOf('cover'); if(ri>=0) reasonsCreated.splice(ri,1);
    lastFlash = null;
  }
  render();
}

/* ===== the close ===== */
function finishedControls(){
  return insightBox('The reasons are the record of the difference',
      '<p>Every change in an Asset or a Liability got a <strong>match or a reason</strong>. The matched pairs explained themselves &mdash; an Asset up with a Liability up, or one Asset up and another down &mdash; and <strong>Assets &minus; Liabilities never moved</strong>. The changes with <strong>no match</strong> are the ones that moved it &mdash; and every one of them is written on the Reasons tab, with its why.</p>')+
    insightBox('Two kinds, coming up',
      '<p>Read the Reasons tab once more. Some of these you <em>put in</em> from outside. The rest came from <em>doing the work</em>. That split is next.</p>');
}

/* ===== render ===== */
function render(){
  var b = beat();
  var closing = !b || (b.key==='CASH' && coverFound);
  document.getElementById('walkAnna').innerHTML = closing ? annaBox('Every change explained. Look at what the walk left behind.') : annaBox(b.anna);
  document.getElementById('ruleStrip').innerHTML = ruleStrip();
  document.getElementById('paneLeft').innerHTML = renderPane('left');
  document.getElementById('paneRight').innerHTML = renderPane('right');
  var backRow = (beatIndex > 0 && !autoActive)
    ? '<div class="btn-row" style="margin-bottom:12px;"><button class="btn-reset" onclick="beatBack()"><i data-lucide="arrow-left" class="licon"></i> Back</button></div>' : '';
  document.getElementById('walkControls').innerHTML = backRow + controls();
  var beatDirty = Object.keys(explainedAt).some(function(id){ return explainedAt[id]===beatIndex; }) || (b && b.key==='CASH' && (tallySubmitted || tallySel!==null));
  document.getElementById('beatResetRow').style.display = beatDirty ? '' : 'none';
  if (window.renderStepProgress) renderStepProgress('stepProg', Math.min(beatIndex + 1, BEATS.length), BEATS.length);
  if(window.lucide) lucide.createIcons();
}

/* ===== gesture ===== */
var nudgeItem = null;
function clickChange(id){
  if(explained[id]||autoActive) return;
  playClick();
  if(activeChange===id){ activeChange=null; nudgeItem=null; render(); return; }   /* chevron toggles closed */
  var c = BY_ID[id];
  paneTab.left = (c.side==='l') ? 'liabilities' : 'assets';
  activeChange=id; nudgeItem=null; render();
}
function recordChange(c){
  if(c.ans==='none'){
    if(!explained[c.id]) explainedAt[c.id]=beatIndex;
    explained[c.id]='reason'; if(reasonsCreated.indexOf(c.id)<0) reasonsCreated.push(c.id);
  } else {
    if(!explained[c.id]) explainedAt[c.id]=beatIndex;
    explained[c.id]='match';
    if(c.pair){ matchedPairs[c.pair]=true; CHANGES.forEach(function(x){ if(x.pair===c.pair){ if(!explained[x.id]) explainedAt[x.id]=beatIndex; explained[x.id]='match'; } }); }
  }
}
function answer(a){
  if(!activeChange||autoActive) return;
  var c = BY_ID[activeChange];
  var correct = (a===c.ans) || (c.side==='l' && c.ans==='cash' && a==='cash');
  if(correct){
    playSuccess();
    lastFlash = { kind: c.ans==='none'?'reason':'match', text: flashFor(c), id: c.id };
    recordChange(c);
    activeChange=null; nudgeItem=null;
  } else {
    var n=(attempts[activeChange]||0)+1; attempts[activeChange]=n; playNope();
    if(n>=3){ lastFlash={ kind:c.ans==='none'?'reason':'match', text: flashFor(c), id: c.id }; recordChange(c); activeChange=null; nudgeItem=null; }
    else nudgeItem=activeChange;
  }
  render();
}
function recordRest(){
  if(autoActive) return; playClick(); autoActive=true; activeChange=null; nudgeItem=null; render();
  var remaining = beatChanges(beat().key).filter(function(c){ return !explained[c.id]; });
  remaining.forEach(function(c,i){
    setTimeout(function(){
      recordChange(c);
      lastFlash=null;
      if(i===remaining.length-1) setTimeout(function(){ autoActive=false; playSuccess(); render(); }, 220);
      else render();
    }, i*150);
  });
}
function beatBack(){
  if(beatIndex===0 || autoActive) return;
  playClick();
  var b = beat();
  if(b && b.tab==='assets') assetsOpen[b.key]=false;
  beatIndex--;
  b = beat();
  lastFlash=null; activeChange=null; nudgeItem=null;
  if(b.tab==='assets'){ paneTab.left='assets'; assetsOpen[b.key]=true; }
  else { paneTab.left='liabilities'; assetsOpen['CARD']=true; }
  if(b.key==='CASH'){ assetsOpen['CASH']=true; }
  render();
}
function advanceBeat(){
  playClick();
  var b = beat();
  if(b && b.tab==='assets') assetsOpen[b.key]=false;
  beatIndex++;
  b = beat();
  lastFlash=null;
  if(b){
    if(b.tab==='assets'){ paneTab.left='assets'; assetsOpen[b.key]=true; }
    else { paneTab.left='liabilities'; assetsOpen['CARD']=true; }
    if(b.key==='CASH'){ assetsOpen['CASH']=true; }
  }
  activeChange=null; nudgeItem=null; autoActive=false;
  window.scrollTo(0,0);
  render();
}

/* ===== tabs / expand ===== */
function setPaneTab(side,id){ playClick(); paneTab[side]=id; render(); }
function toggleCat(cat){ playClick(); assetsOpen[cat]=!assetsOpen[cat]; render(); }

/* ===== receipt modal ===== */
function openReceipt(group){
  playClick();
  var g=GROUPS[group];
  document.getElementById('receiptKind').textContent = g.kind==='ebay' ? 'Evidence — market value' : 'Evidence — receipt';
  var html='<div class="glossary-entry"><div class="glossary-entry-term">'+g.vendor+'</div><div class="glossary-entry-def">'+g.meta+'</div></div>';
  g.items.forEach(function(it){ html+='<div class="xl-row xl-item"><div class="xl-gutter"></div><div class="xl-rownum"></div><div class="xl-c">'+it.name+'</div><div class="xl-v">'+dol(it.amt)+'</div></div>'; });
  html+='<div class="xl-row xl-total"><div class="xl-gutter"></div><div class="xl-rownum"></div><div class="xl-c">Total</div><div class="xl-v">'+dol(g.total)+'</div></div>';
  html+='<div class="glossary-entry"><div class="glossary-entry-def"><strong>Paid:</strong> '+g.paid+'</div></div>';
  document.getElementById('receiptBody').innerHTML=html;
  document.getElementById('receiptOverlay').classList.add('open');
  if(window.lucide) lucide.createIcons();
}
function closeReceipt(){ document.getElementById('receiptOverlay').classList.remove('open'); }

/* ===== glossary ===== */
function openGlossary(){ m1GlossaryOpen('14-2'); }
function closeGlossary(){ m1GlossaryClose(); }
function resetBeat(){
  playClick();
  Object.keys(explainedAt).forEach(function(id){
    if(explainedAt[id]!==beatIndex) return;
    var c = BY_ID[id];
    delete explained[id]; delete explainedAt[id]; delete attempts[id];
    var ri = reasonsCreated.indexOf(id); if(ri>=0) reasonsCreated.splice(ri,1);
    if(c.pair) delete matchedPairs[c.pair];
  });
  var b = beat();
  if(b && b.key==='CASH'){ coverFound=false; tallySel=null; tallySubmitted=false; }
  activeChange=null; nudgeItem=null; lastFlash=null; autoActive=false;
  render();
}
function restart(){ window.location.reload(); }
document.addEventListener('keydown', function(e){ if(e.key==='Escape'){ closeGlossary(); closeReceipt(); } });

/* ===== init ===== */
window.devFill = function(){
  CHANGES.forEach(function(c){ if(!c.hidden) recordChange(c); });
  coverFound = true;
  var cov = BY_ID['cover']; explained[cov.id]='reason'; if(reasonsCreated.indexOf('cover')<0) reasonsCreated.push('cover');
  beatIndex = BEATS.length; lastFlash=null; activeChange=null; autoActive=false;
  render();
};
render();
