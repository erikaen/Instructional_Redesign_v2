<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light dark">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tutorial 1.3 — Name the Lists</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Open+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="page">
  <div class="prework-wrap">

    <div class="tut-header">
      <div class="tut-header-main">
        <h1>Tutorial 1.3: Anna and the Bank Statement</h1>
        <p class="tut-header-sub">Bicycle repair shop &middot; ~20 min</p>
      </div>
      <div class="tut-header-actions">
        <button class="icon-btn" title="Glossary" aria-label="Open glossary" onclick="openGlossary()"><i data-lucide="book-open"></i></button>
        <button class="icon-btn" title="Restart" aria-label="Restart this section" onclick="restart()"><i data-lucide="rotate-ccw"></i></button>
      </div>
    </div>
    <div class="seg-progress" id="segProgress"></div>
    <div class="phase-title" id="phaseTitle"></div>

    <div class="narrative-block"><p>Late afternoon. You and Anna have been at it for hours, and your workbook has a few tabs now &mdash; what you have, what you owe, and the cash you pulled. Time to give the have-and-owe lists their proper names.</p></div>
    <div id="nameWb"></div>
    <div id="nameSteps"></div>

  </div>
</div>

<!-- ===== Glossary overlay ===== -->
<div class="glossary-overlay" id="glossaryOverlay" onclick="if(event.target===this) closeGlossary()">
  <div class="glossary-panel">
    <div class="glossary-panel-head">
      <div class="glossary-panel-title"><i data-lucide="book-open" class="licon"></i> Glossary</div>
      <button class="glossary-close-btn" aria-label="Close" onclick="closeGlossary()">&times;</button>
    </div>
    <div class="glossary-list" id="glossaryList"></div>
  </div>
</div>

<script src="https://unpkg.com/lucide@latest"></script>
<script>
if (window.lucide) lucide.createIcons();

var PHASE_INDEX = 7;
var PHASE_TITLE = 'Name the Lists';

/* ===== sound ===== */
var audioCtx = null;
function ac(){ if(!audioCtx){ try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return audioCtx; }
function tone(f,d,t,v){ var c=ac(); if(!c)return; var o=c.createOscillator(),g=c.createGain(); o.type=t||'sine'; o.frequency.value=f; o.connect(g); g.connect(c.destination); g.gain.setValueAtTime(v||0.05,c.currentTime); g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+d); o.start(); o.stop(c.currentTime+d); }
function playSuccess(){ tone(523,0.12); setTimeout(function(){tone(659,0.12);},90); setTimeout(function(){tone(784,0.16);},180); }
function playNope(){ tone(400,0.12,'sine',0.05); setTimeout(function(){tone(300,0.12,'sine',0.05);},120); }
function playClick(){ tone(600,0.08,'sine',0.04); }

/* ===== data ===== */
var THINGS_CATS = [
  { cat:'EQUIPMENT', items:[
    {name:'Park Tool repair stand',amount:200},{name:'Cone wrench set',amount:65},{name:'Torque wrench',amount:95},{name:'Hex / Allen key set',amount:45},{name:'Cable cutters',amount:40},{name:'Chain breaker',amount:35},{name:'Tire levers',amount:20},{name:'Air compressor',amount:180},{name:'Parts washer',amount:130},{name:'Wheel-truing stand',amount:170},{name:'Bench grinder',amount:90},{name:'Headset press',amount:70},{name:'Shop vacuum',amount:60} ] },
  { cat:'COMPUTER EQUIPMENT', items:[ {name:'Laptop',amount:610} ] },
  { cat:'SUPPLIES', items:[ {name:'Box of chains (on shelf)',amount:50},{name:'Box of brake pads (on shelf)',amount:40},{name:'Box of derailleur cables (on shelf)',amount:20},{name:'Cassettes (on shelf)',amount:40},{name:'Bottom brackets (on shelf)',amount:20},{name:'Spokes (on shelf)',amount:20},{name:'Tubes (on shelf)',amount:10} ] },
  { cat:'FIXTURES', items:[ {name:'Desk',amount:250},{name:'Shelving units',amount:200},{name:'Display rack',amount:180},{name:'Pegboard + hooks',amount:120} ] }
];
var ROU_CAT = { cat:'RIGHT OF USE', items:[ {name:'Right to occupy the space — last month, prepaid',amount:650} ] };
THINGS_CATS.concat([ROU_CAT]).forEach(function(c){ c.subtotal = c.items.reduce(function(s,i){return s+i.amount;},0); });
var ASSETS_TOTAL = 3410, LIABILITIES_TOTAL = 1450;

var bikeRepairCashFlows = [
  { date:'May 1', desc:'Rent check — Westville Properties', amount:-1300 },
  { date:'May 3', desc:'Park Tool stand — Cyclesport Supply', amount:-200 },
  { date:'May 7', desc:'Customer payment — Venmo', amount:340 },
  { date:'May 10', desc:'Customer payment — Venmo', amount:180 },
  { date:'May 12', desc:'Customer payment — Venmo', amount:80 },
  { date:'May 14', desc:'Customer payment — Venmo', amount:140 },
  { date:'May 16', desc:'Card paydown — Harborline Visa', amount:-400 },
  { date:'May 19', desc:'Customer payment — Venmo', amount:130 },
  { date:'May 22', desc:'Smith deposit — frame build', amount:220 },
  { date:'May 23', desc:'Customer payment — Venmo', amount:100 },
  { date:'May 27', desc:'Customer payment — Venmo', amount:150 },
  { date:'May 28', desc:'Card paydown — Harborline Visa', amount:-400 }
];

var glossaryTerms = [
  { term:'Asset', def:"Something you have — a present right to something useful. Everything on your 'have' list: the gear, the parts, the prepaid month, cash." },
  { term:'Liability', def:"Something you owe — a present obligation to pay or do something later. Everything on your 'owe' (Promises) list: the card balance, Smith's frame." },
  { term:'Prepaid rent', def:"Rent paid ahead for a month you haven't used yet — a future benefit you still hold, so it counts as an asset." },
  { term:'Promise', def:'Something you have agreed to do or pay, where the doing or paying comes later.' },
  { term:'Bill', def:'A statement of money you owe to someone.' },
  { term:'Deposit', def:'Money paid in advance for something you will receive or have done.' },
  { term:'Customer', def:'Someone who pays you for goods or services.' },
  { term:'Supplier', def:'A company you buy from.' },
  { term:'Withdrawal', def:'Money taken out of a bank account.' }
];

function fmt(n){ return Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function dollars(n){ return '$' + Number(n).toLocaleString('en-US'); }

/* ===== state ===== */
var excelTab = 'things', thingsExpanded = {};
var assetsNamed = false, rouRevealed = false, liabilitiesNamed = false;
var curWb = null;

/* ===== Excel workbook ===== */
function renderOutlineSheet(cats, colA, totalLabel, newCat){
  var total = cats.reduce(function(s,c){return s+c.subtotal;},0);
  var html = '<div class="xl-row xl-head"><div class="xl-gutter"></div><div class="xl-rownum"></div><div class="xl-c">A&nbsp;&nbsp;'+colA+'</div><div class="xl-v">B&nbsp;&nbsp;Value</div></div>';
  var n = 0;
  cats.forEach(function(cat){
    var label = cat.cat==='RIGHT OF USE' ? 'Right of Use' : (cat.cat.charAt(0)+cat.cat.slice(1).toLowerCase());
    var open = !!thingsExpanded[cat.cat];
    var isNew = cat.cat===newCat;
    n++;
    html += '<div class="xl-row xl-cat'+(isNew?' new':'')+'">'+
      '<div class="xl-gutter"><button class="xl-toggle" onclick="toggleCat(\''+cat.cat+'\')" aria-expanded="'+open+'">'+(open?'&minus;':'+')+'</button></div>'+
      '<div class="xl-rownum">'+n+'</div>'+
      '<div class="xl-c">'+label+(isNew?'<span class="xl-new-tag">new</span>':'')+'</div>'+
      '<div class="xl-v">'+dollars(cat.subtotal)+'</div></div>';
    if(open){
      cat.items.forEach(function(it){ n++;
        html += '<div class="xl-row xl-item"><div class="xl-gutter"></div><div class="xl-rownum">'+n+'</div><div class="xl-c">'+it.name+'</div><div class="xl-v">'+dollars(it.amount)+'</div></div>';
      });
    }
  });
  html += '<div class="xl-row xl-total"><div class="xl-gutter"></div><div class="xl-rownum"></div><div class="xl-c">'+totalLabel+'</div><div class="xl-v">'+dollars(total)+'</div></div>';
  return html;
}
function assetsSheet(){ return renderOutlineSheet(rouRevealed ? THINGS_CATS.concat([ROU_CAT]) : THINGS_CATS, 'Asset', 'TOTAL — what I have', rouRevealed ? 'RIGHT OF USE' : null); }
function thingsSheet(){ return renderOutlineSheet(THINGS_CATS, 'Thing', 'TOTAL — what I have'); }
function promisesSheet(){
  var rows = [ {label:"Smith's frame — paid $220 up front, not built yet", amount:220}, {label:'What you owe on the bike-repair credit card', amount:1230} ];
  var total = 1450;
  var html = '<div class="xl-row xl-head"><div class="xl-gutter"></div><div class="xl-rownum"></div><div class="xl-c">A&nbsp;&nbsp;Promise (what I owe)</div><div class="xl-v">B&nbsp;&nbsp;Amount</div></div>';
  rows.forEach(function(r,i){
    html += '<div class="xl-row xl-item"><div class="xl-gutter"></div><div class="xl-rownum">'+(i+1)+'</div><div class="xl-c">'+r.label+'</div><div class="xl-v">'+dollars(r.amount)+'</div></div>';
  });
  html += '<div class="xl-row xl-total"><div class="xl-gutter"></div><div class="xl-rownum"></div><div class="xl-c">TOTAL — what I owe</div><div class="xl-v">'+dollars(total)+'</div></div>';
  return html;
}
function cashSheet(){
  var inflows = bikeRepairCashFlows.filter(function(f){return f.amount>0;});
  var outflows = bikeRepairCashFlows.filter(function(f){return f.amount<0;});
  var totalIn = inflows.reduce(function(s,f){return s+f.amount;},0);
  var totalOut = outflows.reduce(function(s,f){return s+f.amount;},0);
  var net = totalIn+totalOut;
  var html = '<div class="cash-sheet-head"><div class="cash-sheet-title">Bike-repair cash flows — May</div><div class="cash-sheet-sub">Pulled from the repair-flagged rows of the personal bank statement.</div></div>';
  html += '<div class="cash-group in"><div class="cash-group-label">Cash in</div>';
  inflows.forEach(function(f){ html += '<div class="cash-line"><span><span class="cash-line-date">'+f.date+'</span>'+f.desc+'</span><span class="cash-line-amt">+'+dollars(f.amount)+'</span></div>'; });
  html += '<div class="cash-subtotal"><span>Total in</span><span class="cash-line-amt">'+dollars(totalIn)+'</span></div></div>';
  html += '<div class="cash-group out"><div class="cash-group-label">Cash out</div>';
  outflows.forEach(function(f){ html += '<div class="cash-line"><span><span class="cash-line-date">'+f.date+'</span>'+f.desc+'</span><span class="cash-line-amt">&minus;'+dollars(Math.abs(f.amount))+'</span></div>'; });
  html += '<div class="cash-subtotal"><span>Total out</span><span class="cash-line-amt">&minus;'+dollars(Math.abs(totalOut))+'</span></div></div>';
  html += '<div class="cash-net"><span class="cash-net-label">NET CASH (May)</span><span class="cash-net-val">'+(net<0?'&minus;':'+')+dollars(Math.abs(net))+'</span></div>';
  html += "<div class=\"cash-foot\">That's the month's <strong>flow</strong> — money in minus money out — not a balance.</div>";
  return html;
}
function renderWorkbook(containerId, phaseKey){
  curWb = { container: containerId, phase: phaseKey };
  var tabs=[{id:'things',label:assetsNamed?'Assets':'Things'},{id:'promises',label:liabilitiesNamed?'Liabilities':'Promises'},{id:'cash',label:'Cash'}];
  if(!tabs.some(function(t){return t.id===excelTab;})) excelTab = tabs[0].id;
  var body;
  if(excelTab==='cash') body = cashSheet();
  else if(excelTab==='promises') body = promisesSheet();
  else body = (phaseKey==='name' && assetsNamed) ? assetsSheet() : thingsSheet();
  var activeLabel = tabs.find(function(t){return t.id===excelTab;}).label;
  var tabsHtml = tabs.map(function(t){ return '<button class="xlwb-tab'+(t.id===excelTab?' active':'')+'" onclick="setTab(\''+t.id+'\')">'+t.label+'</button>'; }).join('');
  var html = '<div class="xlwb">'+
    '<div class="xlwb-bar"><span class="xlwb-bar-title"><i data-lucide="file-spreadsheet" class="licon"></i> <span class="mono">Bike-Repair.xlsx</span></span><span class="xlwb-bar-sheet">'+activeLabel+' sheet</span></div>'+
    '<div>'+body+'</div>'+
    '<div class="xlwb-tabs">'+tabsHtml+'<span class="xlwb-tab-add"><i data-lucide="plus" class="licon"></i></span></div></div>';
  document.getElementById(containerId).innerHTML = html;
  if(window.lucide) lucide.createIcons();
}
function setTab(tabId){ playClick(); excelTab = tabId; if(curWb) renderWorkbook(curWb.container, curWb.phase); }
function toggleCat(cat){ playClick(); thingsExpanded[cat] = !thingsExpanded[cat]; if(curWb) renderWorkbook(curWb.container, curWb.phase); }

/* ===== name-it ===== */
function renderNameSteps(){
  var html='';
  if(!assetsNamed){
    html = '<div class="dialog-box anna"><div class="dialog-label">ANNA</div><div class="dialog-text">&ldquo;Start with this first sheet &mdash; everything you have, priced. Accountants have a word for that whole list: your <strong>Assets</strong>.&rdquo;</div></div>'+
      '<button class="btn-continue btn-block" onclick="nameAssets()">Rename the Things tab &ldquo;Assets&rdquo; &rarr;</button>';
  } else if(!rouRevealed){
    html = '<div class="dialog-box anna"><div class="dialog-label">ANNA</div><div class="dialog-text">&ldquo;Now &mdash; accountants think about assets more expansively than just <em>things</em>. An asset is a <strong>present right to an economic benefit</strong> &mdash; anything that will do you economic good down the road, whether or not you can put your hands on it. By that definition, your list is missing one.&rdquo;</div></div>'+
      '<button class="btn-continue btn-block" onclick="revealRou()">What&rsquo;s missing? &rarr;</button>';
  } else if(!liabilitiesNamed){
    html = '<div class="dialog-box anna"><div class="dialog-label">ANNA</div><div class="dialog-text">&ldquo;There it is. Remember the last month of rent you already paid? You can&rsquo;t touch it &mdash; but you hold the <strong>right to occupy the space</strong> that month. That&rsquo;s a real economic benefit coming to you, so it counts as an asset. It isn&rsquo;t a thing, though, so it gets its own category: <strong>Right of Use</strong>. With that, your assets come to <strong>'+dollars(ASSETS_TOTAL)+'</strong>. Now the other sheet &mdash; your Promises. Accountants call those <strong>Liabilities</strong>.&rdquo;</div></div>'+
      '<button class="btn-continue btn-block" onclick="nameLiabilities()">Rename the Promises tab &ldquo;Liabilities&rdquo; &rarr;</button>';
  } else {
    html = '<div class="insight-box"><div class="insight-label"><i data-lucide="check" class="licon"></i> Two sheets, two names</div><p><strong>Assets</strong> ('+dollars(ASSETS_TOTAL)+') &mdash; everything you have, including the right to that prepaid month. <strong>Liabilities</strong> ('+dollars(LIABILITIES_TOTAL)+') &mdash; everything you owe. And you learned an asset is a <em>right to an economic benefit</em>, not just a thing.</p></div>'+
      '<div class="next-phase-msg">You&rsquo;ve finished this section &mdash; click <strong>Next</strong> to continue.</div>';
  }
  document.getElementById('nameSteps').innerHTML = html;
  if(window.lucide) lucide.createIcons();
}
function nameAssets(){ playClick(); assetsNamed=true; excelTab='things'; renderWorkbook('nameWb','name'); renderNameSteps(); }
function revealRou(){ playClick(); rouRevealed=true; thingsExpanded['RIGHT OF USE']=true; excelTab='things'; renderWorkbook('nameWb','name'); renderNameSteps(); }
function nameLiabilities(){ playClick(); liabilitiesNamed=true; excelTab='promises'; renderWorkbook('nameWb','name'); renderNameSteps(); }

/* ===== restart ===== */
function restart(){
  excelTab='things'; thingsExpanded={}; assetsNamed=false; rouRevealed=false; liabilitiesNamed=false;
  renderWorkbook('nameWb','name'); renderNameSteps(); scrollTo(0,0);
}

/* ===== glossary ===== */
function openGlossary(){
  document.getElementById('glossaryList').innerHTML = glossaryTerms.map(function(g){
    return '<div class="glossary-entry"><div class="glossary-entry-term">'+g.term+'</div><div class="glossary-entry-def">'+g.def+'</div></div>';
  }).join('');
  document.getElementById('glossaryOverlay').classList.add('open');
}
function closeGlossary(){ document.getElementById('glossaryOverlay').classList.remove('open'); }

/* ===== progress ===== */
function renderSegProgress(){
  var html = '';
  for(var i = 0; i < 9; i++){
    var state = i < PHASE_INDEX ? 'done' : (i === PHASE_INDEX ? 'active' : 'locked');
    html += '<div class="seg-step ' + state + '"><div class="seg-step-num">' + (i+1) + '</div><div class="seg-step-bar"></div></div>';
  }
  document.getElementById('segProgress').innerHTML = html;
  document.getElementById('phaseTitle').textContent = PHASE_TITLE;
}

/* ===== init ===== */
renderSegProgress();
renderWorkbook('nameWb','name');
renderNameSteps();
</script>
</body>
</html>
