<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light dark">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Releases and the Endowment</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=Open+Sans:wght@400;600;700;800&amp;family=JetBrains+Mono:wght@400;500;700&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    .m6-scope {
      --m6-paper:#ffffff;
      --m6-panel:#f8fafc;
      --m6-ink:#263746;
      --m6-muted:#657583;
      --m6-primary:#155b86;
      --m6-rule:#c8d4dc;
      --m6-rule-strong:#708592;
      --m6-warm:#fff8df;
      --m6-accent:#d5a528;
      --m6-success:#167447;
      --m6-hover:#f1f5f8;
      --m6-shadow:rgba(32,55,72,0.09);
    }
    .m6-doc-wrap, .m6-snapshot-wrap, .m6-architecture-wrap { min-width:0; overflow-x:auto; padding:2px 2px 8px; }
    .m6-doc-card, .m6-snapshot, .m6-reference-strip, .m6-release-callout, .m6-question-card {
      background:var(--m6-paper);
      color:var(--m6-ink);
      border:1px solid var(--m6-rule);
      border-radius:12px;
      box-shadow:0 8px 24px var(--m6-shadow);
    }
    .m6-kicker { margin:0 0 5px; color:var(--m6-muted); font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; }
    .m6-doc-title, .m6-snapshot-title { margin:0; color:var(--m6-primary); }
    .m6-doc-title { font-size:20px; }
    .m6-snapshot-title { font-size:16px; }
    .m6-subline { margin:3px 0 0; color:var(--m6-muted); font-size:12px; font-style:italic; }
    .m6-value { text-align:right; font-family:"JetBrains Mono",monospace; font-variant-numeric:tabular-nums; }
    .m6-reference-strip {
      display:grid;
      grid-template-columns:.9fr 1fr 1fr 1fr;
      max-width:1020px;
      margin:0 auto 14px;
      padding:12px;
      box-sizing:border-box;
    }
    .m6-reference-cell { min-width:0; padding:3px 11px; }
    .m6-reference-cell + .m6-reference-cell { border-left:1px solid var(--m6-rule); }
    .m6-reference-lead { display:flex; flex-direction:column; justify-content:center; }
    .m6-reference-label { margin:0; color:var(--m6-primary); font-size:10px; font-weight:800; letter-spacing:.07em; text-transform:uppercase; }
    .m6-reference-copy { margin:4px 0 0; color:var(--m6-muted); font-size:10px; font-style:italic; line-height:1.4; }
    .m6-reference-range { margin:4px 0 0; color:var(--m6-ink); font:500 11px/1.4 "JetBrains Mono",monospace; }
    .m6-reference-delta { margin:2px 0 0; color:var(--m6-success); font:700 11px/1.4 "JetBrains Mono",monospace; }
    .m6-doc-card { max-width:1020px; min-width:680px; margin:0 auto; padding:24px; box-sizing:border-box; }
    .m6-soa-table { margin-top:18px; font-size:12px; }
    .m6-soa-row {
      display:grid;
      grid-template-columns:minmax(300px,1fr) repeat(3,7rem);
      column-gap:9px;
      align-items:baseline;
      padding:3px 5px;
      border-left:3px solid transparent;
    }
    .m6-soa-head { padding-bottom:7px; border-bottom:1px solid var(--m6-rule); color:var(--m6-primary); font-size:10px; font-weight:700; line-height:1.2; }
    .m6-soa-label { color:var(--m6-ink); line-height:1.35; }
    .m6-soa-section { margin-top:11px; color:var(--m6-primary); font-size:14px; font-weight:800; }
    .m6-soa-subsection { margin-top:6px; color:var(--m6-muted); font-style:italic; font-weight:600; }
    .m6-soa-subtotal { margin-top:3px; padding-top:6px; border-top:1px solid var(--m6-rule-strong); font-weight:600; }
    .m6-soa-major, .m6-soa-total { margin-top:5px; padding-top:7px; border-top:3px double var(--m6-rule-strong); color:var(--m6-primary); font-weight:800; }
    .m6-soa-highlight { border-left-color:var(--m6-accent); border-radius:3px; background:var(--m6-warm); font-weight:700; }
    .m6-release-callout { max-width:720px; margin:14px auto 0; padding:15px 18px; box-sizing:border-box; border-left:4px solid var(--m6-accent); background:var(--m6-warm); }
    .m6-release-line { display:grid; grid-template-columns:1fr; padding:2px 0; color:var(--m6-primary); font:600 12px/1.45 "JetBrains Mono",monospace; }
    .m6-release-total { margin-top:5px; padding-top:7px; border-top:1px solid var(--m6-rule-strong); font-weight:800; }
    .m6-release-close { margin:9px 0 0; color:var(--m6-muted); font-size:11px; font-style:italic; }
    .m6-trace-card { max-width:820px; }
    .m6-trace-row { display:grid; grid-template-columns:minmax(280px,1fr) repeat(3,6rem); column-gap:8px; align-items:baseline; padding:4px 5px; }
    .m6-trace-head { padding-bottom:7px; border-bottom:1px solid var(--m6-rule); color:var(--m6-primary); font-size:10px; font-weight:700; }
    .m6-trace-opening { padding-top:8px; color:var(--m6-primary); font-weight:800; }
    .m6-trace-movement { opacity:0; transform:translateY(4px); }
    .m6-trace-movement.m6-visible { opacity:1; transform:none; transition:opacity .3s ease-out,transform .3s ease-out; }
    .m6-running { margin-top:9px; padding-top:8px; border-top:2px dashed var(--m6-accent); color:var(--m6-primary); font-weight:800; }
    .m6-running > div:first-child { color:var(--m6-accent); font-style:italic; }
    .m6-target { margin-top:4px; color:var(--m6-muted); font-size:11px; font-style:italic; }
    .m6-rounding-note { margin:9px 5px 0; color:var(--m6-muted); font-size:10px; font-style:italic; line-height:1.5; }
    .m6-architecture.main-grid { grid-template-columns:minmax(255px,.92fr) minmax(390px,1.35fr) minmax(255px,.92fr); align-items:stretch; min-width:950px; }
    .m6-architecture.main-grid > * { min-width:0; }
    .m6-snapshot { min-width:255px; height:100%; padding:17px; box-sizing:border-box; }
    .m6-snapshot-table { margin-top:14px; font-size:11px; }
    .m6-compact-row { display:grid; grid-template-columns:minmax(155px,1fr) 5.2rem; gap:7px; align-items:baseline; padding:4px 5px; border-left:3px solid transparent; }
    .m6-compact-lit { border-left-color:var(--m6-accent); border-radius:3px; background:var(--m6-warm); color:var(--m6-primary); font-weight:700; }
    .m6-compact-total { margin-top:3px; padding-top:6px; border-top:1px solid var(--m6-rule-strong); color:var(--m6-primary); font-weight:800; }
    .m6-compact-gap { height:8px; }
    .m6-compact-sub { padding-top:1px; padding-bottom:1px; padding-left:16px; color:var(--m6-muted); font-size:9px; font-style:italic; }
    .m6-identity-note { margin:11px 2px 0; color:var(--m6-muted); font:italic 9px/1.4 "JetBrains Mono",monospace; text-align:right; }
    .m6-center-card { min-width:390px; height:100%; padding:18px; }
    .m6-center-grid { margin-top:14px; }
    .m6-center-row { display:grid; grid-template-columns:18px minmax(145px,1fr) repeat(3,4.5rem); gap:5px; align-items:baseline; padding:5px 4px; border-bottom:1px solid var(--m6-rule); font-size:11px; }
    .m6-center-head { padding-bottom:6px; color:var(--m6-muted); font-size:9px; font-weight:700; }
    .m6-center-opening { color:var(--m6-primary); font-weight:800; }
    .m6-center-section { font-weight:600; }
    .m6-center-releases { color:var(--m6-muted); font-style:italic; }
    .m6-center-closing { margin-top:5px; padding-top:7px; border-top:2px solid var(--m6-primary); border-bottom:0; color:var(--m6-primary); font-weight:800; }
    .m6-center-foot { margin:10px 4px 0; color:var(--m6-muted); font-size:9px; font-style:italic; line-height:1.45; }
    .m6-expandable-row { cursor:pointer; user-select:none; border-radius:5px; }
    .m6-expandable-row:hover, .m6-expandable-row:focus { background:var(--m6-hover); outline:2px solid var(--m6-accent); outline-offset:-2px; }
    .m6-chevron { color:var(--m6-muted); font-size:10px; }
    .m6-hint-pulse { animation:m6-hint-pulse 1.3s ease-in-out 2; }
    @keyframes m6-hint-pulse { 0%,100% { box-shadow:none; } 50% { box-shadow:inset 0 0 0 2px var(--m6-accent); } }
    .m6-detail-panel { padding:6px 5px 8px 27px; border-bottom:1px solid var(--m6-rule); background:var(--m6-panel); animation:m6-detail-open .18s ease-out; }
    @keyframes m6-detail-open { from { opacity:0; } to { opacity:1; } }
    .m6-detail-row { display:grid; grid-template-columns:minmax(135px,1fr) repeat(3,4.5rem); gap:5px; padding:3px 0; color:var(--m6-ink); font-size:9px; line-height:1.35; }
    .m6-detail-total { margin-top:4px; padding-top:6px; border-top:1px solid var(--m6-rule-strong); color:var(--m6-primary); font-weight:800; }
    .m6-question-card { max-width:820px; margin:0 auto; padding:28px; box-sizing:border-box; border:2px dashed var(--m6-accent); background:var(--m6-warm); }
    .m6-question-card h2 { margin:3px 0 17px; color:var(--m6-primary); font-size:25px; text-align:center; }
    .m6-question-card > .m6-kicker { text-align:center; }
    .m6-liquidity-table { margin:0 auto; font:11px/1.45 "JetBrains Mono",monospace; }
    .m6-liquidity-row { display:grid; grid-template-columns:minmax(320px,1fr) 7rem; gap:14px; align-items:baseline; padding:7px 4px; }
    .m6-liquidity-row + .m6-liquidity-row { border-top:1px solid var(--m6-rule); }
    .m6-liquidity-key { color:var(--m6-primary); font-weight:800; }
    .m6-liquidity-notes { margin:18px 0 0; padding-top:13px; border-top:1px solid var(--m6-rule-strong); }
    .m6-liquidity-notes p { margin:4px 0; color:var(--m6-ink); font-size:12px; font-style:italic; line-height:1.5; }
    .m6-question-footer { margin:16px 0 0; color:var(--m6-primary); font-size:12px; font-weight:800; text-align:center; }
    @media (max-width:900px) {
      .m6-reference-strip { grid-template-columns:1fr 1fr; }
      .m6-reference-cell:nth-child(3) { border-left:0; }
      .m6-reference-cell:nth-child(n+3) { margin-top:9px; padding-top:9px; border-top:1px solid var(--m6-rule); }
    }
    @media (max-width:620px) {
      .m6-reference-strip { grid-template-columns:1fr; }
      .m6-reference-cell + .m6-reference-cell { margin-top:8px; padding-top:8px; border-top:1px solid var(--m6-rule); border-left:0; }
      .m6-trace-row { grid-template-columns:minmax(190px,1fr) repeat(3,4.8rem); }
      .m6-liquidity-row { grid-template-columns:1fr; gap:3px; }
      .m6-liquidity-row .m6-value { text-align:left; }
    }
    @media (prefers-reduced-motion:reduce) { .m6-hint-pulse, .m6-detail-panel, .m6-trace-movement.m6-visible { animation:none; transition:none; } }
    @media (prefers-color-scheme:dark) {
      .m6-scope {
        --m6-paper:#26242e;
        --m6-panel:#211f28;
        --m6-ink:#e8edf1;
        --m6-muted:#b4c0c8;
        --m6-primary:#7dc8f3;
        --m6-rule:#4b5361;
        --m6-rule-strong:#8797a2;
        --m6-warm:#332f20;
        --m6-accent:#d8ad3e;
        --m6-success:#70d6a3;
        --m6-hover:#34333d;
        --m6-shadow:rgba(0,0,0,0.28);
      }
    }
  </style>
</head>
<body>
<div class="page">
  <div class="prework-wrap">
    <div class="tut-header">
      <div class="tut-header-main">
        <h1>Releases and the Endowment</h1>
        <p class="tut-header-sub">Module 6 &middot; ~7 min</p>
      </div>
      <div class="tut-header-actions">
        <button class="icon-btn" title="Glossary" aria-label="Open glossary" onclick="openGlossary()"><i data-lucide="book-open"></i></button>
        <button class="icon-btn" title="Reset this phase" aria-label="Reset this phase" onclick="restart()"><i data-lucide="rotate-ccw"></i></button>
      </div>
    </div>
    <div class="phase-title" id="phaseTitle">Releases and the Endowment</div>
    <div id="beats"></div>
    <div id="mainGrid"></div>
    <div id="tail"></div>
    <div id="controls"></div>
  </div>
</div>

<div class="glossary-overlay" id="glossaryOverlay" onclick="if(event.target===this) closeGlossary()">
  <div class="glossary-panel">
    <div class="glossary-panel-head">
      <div class="glossary-panel-title"><i data-lucide="book-open" class="licon"></i> Glossary</div>
      <button class="glossary-close-btn" aria-label="Close" onclick="closeGlossary()">&times;</button>
    </div>
    <div class="glossary-list" id="glossaryList"></div>
  </div>
</div>

<script src="yale-fy2025-data.js"></script>
<script src="shared.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script>
if(window.lucide) lucide.createIcons();

var audioCtx=null;
function ac(){ if(!audioCtx){ try{ audioCtx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return audioCtx; }
function tone(f,d,t,v){ var c=ac(); if(!c) return; var o=c.createOscillator(),g=c.createGain(); o.type=t||'sine'; o.frequency.value=f; o.connect(g); g.connect(c.destination); g.gain.setValueAtTime(v||0.05,c.currentTime); g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+d); o.start(); o.stop(c.currentTime+d); }
function playSuccess(){ tone(523,0.12); setTimeout(function(){tone(659,0.12);},90); setTimeout(function(){tone(784,0.16);},180); }
function playClick(){ tone(600,0.08,'sine',0.04); }
function nav(url){ window.location.href = url; }

var step=0;
var TOTAL_STEPS=5;
var revealN=0;
var revealVisited=false;
var revealTimer=null;
var expansionEncountered=false;
var openSections={operating:false,nonoperating:false,nci:false};

function escapeHTML(value){ return String(value).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function fmt(v){ if(v===0) return '&mdash;'; var a=Math.abs(v).toLocaleString('en-US'); return v<0?'('+a+')':a; }
function dollars(v){ return '$'+Math.abs(v).toLocaleString('en-US'); }
function data(){ return window.YALE_FY2025; }
function sfp(year){ return data().compactSFP[year]; }
function soa(){ return data().soaRows; }
function rowByRole(role){ var rows=soa(); for(var i=0;i<rows.length;i++) if(rows[i].role===role) return rows[i]; return null; }
function rowsByRole(role){ return soa().filter(function(row){ return row.role===role; }); }
function rowByLabel(label){ var rows=soa(); for(var i=0;i<rows.length;i++) if(rows[i].label===label) return rows[i]; return null; }
function totalFor(row){ return (row.wo||0)+(row.wi||0); }

function referenceCell(label,beg,end){
  return '<div class="m6-reference-cell"><p class="m6-reference-label">'+label+'</p><p class="m6-reference-range">'+fmt(beg)+' &rarr; '+fmt(end)+'</p><p class="m6-reference-delta">&Delta; '+fmt(end-beg)+'</p></div>';
}
function referenceStrip(){
  var beginning=sfp('y2024'),ending=sfp('y2025');
  return '<div class="m6-reference-strip"><div class="m6-reference-cell m6-reference-lead"><p class="m6-reference-label">What the SoA explains</p><p class="m6-reference-copy">net asset changes between Jun 30, 2024 and Jun 30, 2025</p></div>'
    +referenceCell('Without donor restrictions',beginning.naWithout,ending.naWithout)
    +referenceCell('With donor restrictions',beginning.naWith,ending.naWith)
    +referenceCell('Total net assets',beginning.totalNA,ending.totalNA)+'</div>';
}
function soaCell(value){ return '<div class="m6-value">'+fmt(value)+'</div>'; }
function soaDocumentRow(row){
  var cls='m6-soa-row';
  if(row.type==='section-header') cls+=' m6-soa-section';
  else if(row.type==='subsection-header') cls+=' m6-soa-subsection';
  else if(row.type==='subtotal') cls+=' m6-soa-subtotal';
  else if(row.type==='subtotal-major') cls+=' m6-soa-major';
  else if(row.type==='total') cls+=' m6-soa-total';
  if(row.role==='op-releases' || row.role==='nonop-releases') cls+=' m6-soa-highlight';
  if(row.type==='section-header' || row.type==='subsection-header') return '<div class="'+cls+'"><div>'+escapeHTML(row.label)+'</div><div></div><div></div><div></div></div>';
  return '<div class="'+cls+'"><div class="m6-soa-label">'+escapeHTML(row.label)+'</div>'+soaCell(row.wo)+soaCell(row.wi)+soaCell(totalFor(row))+'</div>';
}
function releaseCallout(){
  var op=rowByRole('op-releases'),nonop=rowByRole('nonop-releases');
  return '<div class="m6-release-callout"><p class="m6-kicker">The reclassification</p>'
    +'<div class="m6-release-line">+'+dollars(op.wo)+'M operating, +'+dollars(nonop.wo)+'M non-operating &rarr; Without</div>'
    +'<div class="m6-release-line">&minus;'+dollars(Math.abs(op.wi))+'M, &minus;'+dollars(Math.abs(nonop.wi))+'M &rarr; With</div>'
    +'<div class="m6-release-line m6-release-total">Total change: '+dollars(totalFor(op)+totalFor(nonop))+'</div>'
    +'<p class="m6-release-close">No new resources &mdash; constraints lift on resources already held.</p></div>';
}
function releaseDocument(){
  var rows=soa(),h='<div class="m6-scope">'+referenceStrip()+'<div class="m6-doc-wrap"><div class="m6-doc-card"><p class="m6-kicker">Yale University &middot; from the report &middot; page 22</p><h2 class="m6-doc-title">Consolidated Statement of Activities</h2><p class="m6-subline">for the year ended June 30, 2025 &middot; in $ millions</p><div class="m6-soa-table"><div class="m6-soa-row m6-soa-head"><div></div><div class="m6-value">Without Donor Restrictions</div><div class="m6-value">With Donor Restrictions</div><div class="m6-value">2025 Total</div></div>';
  for(var i=0;i<rows.length;i++) h+=soaDocumentRow(rows[i]);
  return h+'</div></div></div>'+releaseCallout()+'</div>';
}
function traceRow(label,wo,wi,cls){ return '<div class="m6-trace-row'+(cls?' '+cls:'')+'"><div>'+escapeHTML(label)+'</div>'+soaCell(wo)+soaCell(wi)+soaCell((wo||0)+(wi||0))+'</div>'; }
function runningTotals(){
  var beg=rowByRole('balance-beg'),end=rowByRole('balance-end'),moves=data().soaMovements2025;
  var accWO=beg.wo,accWI=beg.wi;
  for(var i=0;i<Math.min(revealN,moves.length);i++){ accWO+=moves[i].wo||0; accWI+=moves[i].wi||0; }
  var h='<div class="m6-scope">'+referenceStrip()+'<div class="m6-doc-wrap"><div class="m6-doc-card m6-trace-card"><p class="m6-kicker">Trace each bucket&rsquo;s change</p><h2 class="m6-doc-title">Movements summing to the bucket changes</h2><p class="m6-subline">year ended June 30, 2025 &middot; in $ millions</p><div class="m6-soa-table"><div class="m6-trace-row m6-trace-head"><div></div><div class="m6-value">Without</div><div class="m6-value">With</div><div class="m6-value">Total</div></div>';
  h+=traceRow('Net assets, beginning of year (June 30, 2024)',beg.wo,beg.wi,'m6-trace-opening');
  for(i=0;i<moves.length;i++) h+=traceRow(moves[i].label,moves[i].wo,moves[i].wi,'m6-trace-movement'+(i<revealN?' m6-visible':''));
  h+='<div class="m6-trace-row m6-running"><div>Running total ('+revealN+' of '+moves.length+')</div>'+soaCell(accWO)+soaCell(accWI)+soaCell(accWO+accWI)+'</div>';
  h+=traceRow('Target: Net assets, end of year',end.wo,end.wi,'m6-target');
  return h+'</div><p class="m6-rounding-note">Small ($1&ndash;2M) gaps between the landed running totals and the target are rounding to millions &mdash; the report&rsquo;s thousands tie exactly.</p></div></div></div>';
}
function compactRow(label,value,extraClass){ return '<div class="m6-compact-row'+(extraClass?' '+extraClass:'')+'"><div>'+label+'</div><div class="m6-value">'+fmt(value)+'</div></div>'; }
function compactSnapshot(year,label){
  var d=sfp(year),yearText=year==='y2025'?'2025':'2024',noncash=d.totalAssets-d.cash;
  var rows=compactRow('Cash and cash equivalents',d.cash,'')
    +compactRow('Noncash assets <em>(incl. '+fmt(d.investments)+' investments)</em>',noncash,'')
    +compactRow('Total assets',d.totalAssets,'m6-compact-total')+'<div class="m6-compact-gap"></div>'
    +compactRow('&minus; Total liabilities',d.totalLiab,'')
    +compactRow('= NA without donor restrictions',d.naWithout,'m6-compact-total m6-compact-lit')
    +compactRow('&#8627; of which Yale University',d.naWithoutYale,'m6-compact-sub')
    +compactRow('&#8627; of which noncontrolling interests',d.naWithoutNCI,'m6-compact-sub')
    +compactRow('+ NA with donor restrictions',d.naWith,'m6-compact-lit')
    +compactRow('= Total net assets',d.totalNA,'m6-compact-total m6-compact-lit');
  return '<div class="m6-snapshot-wrap"><div class="m6-snapshot"><p class="m6-kicker">'+label+'</p><h3 class="m6-snapshot-title">Statement of Financial Position</h3><p class="m6-subline">June 30, '+yearText+' &middot; in $ millions</p><div class="m6-snapshot-table">'+rows+'</div><p class="m6-identity-note">'+fmt(d.totalAssets)+' &minus; '+fmt(d.totalLiab)+' = '+fmt(d.totalNA)+' &#10003;</p></div></div>';
}
function centerCells(wo,wi){ return soaCell(wo)+soaCell(wi)+soaCell((wo||0)+(wi||0)); }
function sectionData(){
  var op=rowByRole('op-net'),nonop=rowByRole('nonop-net'),nci=rowByRole('nci');
  var opRev=rowByRole('op-rev-subtotal'),opExp=rowByRole('op-exp-subtotal'),opRel=rowByRole('op-releases');
  var contribution=null,endowment=rowByLabel('Total endowment return'),allocation=rowByLabel('Allocation of endowment spending to operations'),nonopRel=rowByRole('nonop-releases');
  var nonops=rowsByRole('nonop'),otherWO=0,otherWI=0;
  for(var i=0;i<nonops.length;i++){
    if(nonops[i].label==='Contributions') contribution=nonops[i];
    else if(nonops[i].label!=='Total endowment return' && nonops[i].label!=='Allocation of endowment spending to operations'){ otherWO+=nonops[i].wo||0; otherWI+=nonops[i].wi||0; }
  }
  return [
    {key:'operating',label:'Operating activities',subtotal:op,items:[{label:'Operating revenues',row:opRev},{label:'Operating expenses',row:{wo:-opExp.wo,wi:-opExp.wi}},{label:'Releases (operating)',row:opRel}]},
    {key:'nonoperating',label:'Non-operating activities',subtotal:nonop,items:[{label:'Contributions',row:contribution},{label:'Total endowment return',row:endowment},{label:'Allocation to operations',row:allocation},{label:'Other non-operating',row:{wo:otherWO,wi:otherWI}},{label:'Releases (non-operating)',row:nonopRel}]},
    {key:'nci',label:'NCI change',subtotal:nci,items:[{label:'Change in noncontrolling interests',row:nci}]}
  ];
}
function detailPanel(section){
  if(!openSections[section.key]) return '';
  var h='<div class="m6-detail-panel">';
  for(var i=0;i<section.items.length;i++){ var item=section.items[i]; h+='<div class="m6-detail-row"><div>'+escapeHTML(item.label)+'</div>'+centerCells(item.row.wo,item.row.wi)+'</div>'; }
  h+='<div class="m6-detail-row m6-detail-total"><div>'+escapeHTML(section.subtotal.label)+'</div>'+centerCells(section.subtotal.wo,section.subtotal.wi)+'</div></div>';
  return h;
}
function centerSection(section,expandable){
  var open=openSections[section.key],pulse=expandable&&!expansionEncountered?' m6-hint-pulse':'';
  var attrs=expandable?' role="button" tabindex="0" aria-expanded="'+(open?'true':'false')+'" onclick="toggleSection(\''+section.key+'\')" onkeydown="handleSectionKey(event,\''+section.key+'\')"':'';
  var h='<div class="m6-center-row m6-center-section'+(expandable?' m6-expandable-row':'')+pulse+'"'+attrs+'><div class="m6-chevron">'+(expandable?(open?'&#9660;':'&#9654;'):'')+'</div><div>'+escapeHTML(section.label)+'</div>'+centerCells(section.subtotal.wo,section.subtotal.wi)+'</div>';
  return h+(expandable?detailPanel(section):'');
}
function soaCenter(expandable){
  var beg=rowByRole('balance-beg'),end=rowByRole('balance-end'),opRel=rowByRole('op-releases'),nonopRel=rowByRole('nonop-releases');
  var releasesWO=opRel.wo+nonopRel.wo,releasesWI=opRel.wi+nonopRel.wi,sections=sectionData();
  var h='<div class="m6-doc-card m6-center-card"><p class="m6-kicker">From the report &middot; page 22</p><h2 class="m6-doc-title">Statement of Activities</h2><p class="m6-subline">Year ended June 30, 2025 &middot; bucketed &middot; in $ millions</p><div class="m6-center-grid"><div class="m6-center-row m6-center-head"><div></div><div></div><div class="m6-value">Without</div><div class="m6-value">With</div><div class="m6-value">Total</div></div><div class="m6-center-row m6-center-opening"><div></div><div>Net assets, June 30, 2024</div>'+centerCells(beg.wo,beg.wi)+'</div>';
  for(var i=0;i<sections.length;i++) h+=centerSection(sections[i],expandable);
  h+='<div class="m6-center-row m6-center-releases"><div></div><div>Informational: releases reclass</div>'+centerCells(releasesWO,releasesWI)+'</div>';
  h+='<div class="m6-center-row m6-center-closing"><div></div><div>Net assets, June 30, 2025</div>'+centerCells(end.wo,end.wi)+'</div></div><p class="m6-center-foot">Closing balances match the Ending SFP&rsquo;s buckets.</p></div>';
  return h;
}
function architectureView(expandable){ return '<div class="m6-scope"><div class="m6-architecture-wrap"><div class="main-grid m6-architecture">'+compactSnapshot('y2024','Beginning')+soaCenter(expandable)+compactSnapshot('y2025','Ending')+'</div></div></div>'; }
function liquidityCard(){
  var total=sfp('y2025').totalNA,assets=sfp('y2025').totalAssets,available=data().liquidity.financialAssetsAvailableWithinOneYear.y2025,designated=data().liquidity.boardDesignatedEndowment.y2025;
  return '<div class="m6-scope"><div class="m6-question-card"><p class="m6-kicker">The question people bring to the total</p><h2>How much can Yale actually spend?</h2><div class="m6-liquidity-table">'
    +'<div class="m6-liquidity-row"><div>Net assets, June 30, 2025</div><div class="m6-value">'+fmt(total)+'</div></div>'
    +'<div class="m6-liquidity-row m6-liquidity-key"><div>Financial assets available within one year for general expenditure (liquidity footnote, report p.25)</div><div class="m6-value">'+fmt(available)+'</div></div>'
    +'<div class="m6-liquidity-row"><div>of which the board has designated as endowment &mdash; intent, not restriction (stays Without Donor Restrictions)</div><div class="m6-value">'+fmt(designated)+'</div></div></div>'
    +'<div class="m6-liquidity-notes"><p>A net-asset total is a classification, not a bank balance.</p><p>Liquidity is an asset-side question, answered in the footnote: '+dollars(available)+'M available within one year, against '+dollars(assets)+'M of total assets.</p><p>Only donors can bind &mdash; the board can change its mind.</p></div><p class="m6-question-footer">The walk closes next with the whole architecture on one screen.</p></div></div>';
}
function renderBeats(currentStep){
  var opRel=rowByRole('op-releases'),nonopRel=rowByRole('nonop-releases'),beg=rowByRole('balance-beg'),end=rowByRole('balance-end');
  var released=opRel.wo+nonopRel.wo,totalNA=sfp('y2025').totalNA,available=data().liquidity.financialAssetsAvailableWithinOneYear.y2025,assets=sfp('y2025').totalAssets,designated=data().liquidity.boardDesignatedEndowment.y2025;
  var texts=[
    'The most distinctively nonprofit move on the statement. When a donor&rsquo;s time or purpose restriction is met, net assets are <em>reclassified</em> from With Donor Restrictions to Without &mdash; <strong>released from restrictions</strong>. In FY2025 Yale released '+dollars(opRel.wo)+'M through operating and '+dollars(nonopRel.wo)+'M through non-operating: '+dollars(released)+'M in total. The With column DECREASES by '+dollars(released)+'M; the Without column INCREASES by '+dollars(released)+'M; the total changes by exactly zero. No new resources arrive &mdash; donor constraints lift on resources already held. The rows exist because the statement tracks both classes; without them, the bucket columns could not tie to the Statement of Financial Position.',
    'Now trace every bucket&rsquo;s change. Starting from the June 30, 2024 balances &mdash; '+dollars(beg.wo)+'M Without, '+dollars(beg.wi)+'M With &mdash; the movements fire one at a time: operating revenues, operating expenses, the releases reclass, non-operating contributions, the endowment return net of its spending allocation, other non-operating items, and the noncontrolling-interests change. The running totals land at the June 30, 2025 balances: '+dollars(end.wo)+'M Without, '+dollars(end.wi)+'M With. (Rounding to $ millions moves the landing by a dollar-million or two against the target &mdash; the report&rsquo;s thousands tie exactly.)',
    'Architecture restored. The 2025 Statement of Activities slots between the two Statements of Financial Position, bucketed exactly as their net-asset rows are. The Cash Flow Statement explored earlier still belongs in this middle column &mdash; but the Statement of Activities is the focus now: it explains the change in each bucket.',
    'Each section is now expandable &mdash; click one to see the movements that compose it. Operating breaks into revenues, expenses, and the operating releases. Non-operating exposes the endowment return, the allocation back to operations, contributions, and the other items. Together the statement explains every dollar of net-asset change between June 30, 2024 and June 30, 2025.',
    'One question is left, and it is the one outsiders most often get wrong. Net assets stand at '+dollars((totalNA/1000).toFixed(1))+' billion &mdash; so how much can Yale actually spend? A net-asset total is a classification of the difference between recorded assets and recorded liabilities. It is not a bank balance. The answer to the spending question is on the ASSET side, in a required liquidity footnote: financial assets available within one year for general expenditure &mdash; '+dollars(available)+'M, against $'+Math.round(assets/1000)+' billion of total assets. The footnote also names '+dollars(designated)+'M of board-designated endowment: amounts the board <em>intends</em> to treat as endowment. A board designation is a statement of intent, not a donor restriction &mdash; the board can change its mind, so those amounts stay in <em>Without Donor Restrictions</em>. Only donors can bind.'
  ];
  document.getElementById('beats').innerHTML='<div class="narrative-block"><p>'+texts[currentStep]+'</p></div>';
}
function renderGrid(currentStep){
  var h=currentStep===0?releaseDocument():currentStep===1?runningTotals():currentStep===2?architectureView(false):currentStep===3?architectureView(true):liquidityCard();
  document.getElementById('mainGrid').innerHTML=h;
}
function renderTail(currentStep){ document.getElementById('tail').innerHTML=currentStep===4?'<div class="insight-box">Restriction status and spendability are different questions &mdash; the statement answers the first; the footnote answers the second.</div>':''; }
function renderControls(currentStep){
  var h='<div class="nav-buttons">';
  if(currentStep>0) h+='<button class="btn-back" onclick="back()">&larr; Back</button>';
  if(currentStep<TOTAL_STEPS-1) h+='<button class="btn-next" onclick="advance()">Next &rarr;</button>';
  else h+='<button class="btn-continue" onclick="playClick();nav(\'63-6-The-Full-Architecture.html\')">The Full Architecture &rarr;</button>';
  h+='</div>'; document.getElementById('controls').innerHTML=h;
}
function clearRevealTimer(){ if(revealTimer){ clearTimeout(revealTimer); revealTimer=null; } }
function scheduleReveal(){
  clearRevealTimer();
  if(step!==1 || revealN>=data().soaMovements2025.length) return;
  revealTimer=setTimeout(function(){ revealTimer=null; if(step!==1) return; revealN++; render(); if(revealN===data().soaMovements2025.length) playSuccess(); },650);
}
function render(){ renderBeats(step); renderGrid(step); renderTail(step); renderControls(step); if(window.lucide) lucide.createIcons(); scheduleReveal(); }
function enterStep(target){
  clearRevealTimer(); step=target;
  if(step===1){ if(revealVisited) revealN=data().soaMovements2025.length; else { revealVisited=true; revealN=0; } }
  render(); window.scrollTo(0,0);
}
function advance(){ playClick(); enterStep(Math.min(step+1,TOTAL_STEPS-1)); }
function back(){ playClick(); enterStep(Math.max(step-1,0)); }
function toggleSection(key){ expansionEncountered=true; openSections[key]=!openSections[key]; playClick(); render(); }
function handleSectionKey(event,key){ if(event.key==='Enter' || event.key===' '){ event.preventDefault(); toggleSection(key); } }

var glossaryTerms=[
  {term:'Released from restrictions',def:'A transfer from With Donor Restrictions to Without Donor Restrictions after a donor&rsquo;s time or purpose condition has been met.'},
  {term:'Reclassification',def:'A move between net-asset classes that changes each class but does not change total net assets.'},
  {term:'Board-designated endowment',def:'Amounts the board intends to treat as endowment; the designation can be changed and is not a donor restriction.'},
  {term:'Liquidity',def:'The availability of financial assets to meet near-term general expenditures.'},
  {term:'Financial assets available within one year',def:'The liquidity-footnote amount available for general expenditure within the next year.'}
];
function openGlossary(){ document.getElementById('glossaryList').innerHTML=glossaryTerms.map(function(item){ return '<div class="glossary-entry"><div class="glossary-entry-term">'+item.term+'</div><div class="glossary-entry-def">'+item.def+'</div></div>'; }).join(''); document.getElementById('glossaryOverlay').classList.add('open'); }
function closeGlossary(){ document.getElementById('glossaryOverlay').classList.remove('open'); }
function restart(){ window.location.reload(); }
document.addEventListener('keydown',function(event){ if(event.key==='Escape') closeGlossary(); });
window.devFill=function(){ clearRevealTimer(); step=TOTAL_STEPS-1; revealVisited=true; revealN=data().soaMovements2025.length; expansionEncountered=true; openSections={operating:true,nonoperating:true,nci:true}; render(); };
render();
</script>
<script src="dev.js"></script>
