<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light dark">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Draw Question</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=Open+Sans:wght@400;600;700;800&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    .m7-draw-stage{display:grid;grid-template-columns:minmax(230px,270px) minmax(0,1fr) minmax(230px,270px);gap:14px;align-items:start;margin-top:16px}
    .m7-draw-stage>*{min-width:0}.m7-board-wrap{overflow-x:auto;border:1px solid #cbd5e1;border-radius:10px;background:#f0f4f8;box-shadow:0 7px 20px rgba(32,55,72,.08)}
    .m7-board-wrap #board{display:block;width:100%;min-width:650px;height:auto}.m7-draw-stage .gl-col{width:100%;box-shadow:0 7px 20px rgba(32,55,72,.08)}
    .m7-stage-center{min-width:0}.m7-world-toggle{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin:0 0 10px}.m7-world-toggle button{border:1px solid #94a3b8;border-radius:999px;padding:8px 14px;background:#fff;color:#334155;font:700 .76rem/1.2 Inter,sans-serif;cursor:pointer}
    .m7-world-toggle button.active{border-color:#6750a4;background:#6750a4;color:#fff;box-shadow:0 3px 10px rgba(103,80,164,.24)}
    .m7-progress{margin:8px 0 0;color:#64748b;font:700 .72rem/1.3 Inter,sans-serif;letter-spacing:.08em;text-align:center;text-transform:uppercase}
    .m7-predict,.m7-whatif{margin:18px auto 0;max-width:860px;border:1px solid #cbd5e1;border-radius:12px;background:#f8fafc;padding:18px;box-shadow:0 7px 20px rgba(32,55,72,.07)}
    .m7-predict h2,.m7-whatif h2{margin:0 0 4px;font:800 1.05rem/1.3 Inter,sans-serif;color:#1e293b}.m7-panel-kicker{margin:0 0 16px;color:#64748b;font:700 .72rem/1.3 Inter,sans-serif;letter-spacing:.08em;text-transform:uppercase}
    .m7-predict-row{padding:14px 0;border-top:1px solid #dbe3ec}.m7-predict-row:first-of-type{border-top:0;padding-top:0}.m7-prompt{margin:0 0 9px;font-weight:700;color:#1e293b}
    .m7-choices{display:flex;gap:8px;flex-wrap:wrap}.m7-choice{border:1px solid #94a3b8;border-radius:7px;padding:8px 11px;background:#fff;color:#334155;font:700 .82rem/1.25 Inter,sans-serif;cursor:pointer}.m7-choice:hover{border-color:#6750a4}.m7-choice:disabled{cursor:default;opacity:.74}
    .m7-choice.chosen-right{border-color:#23835d;background:#e7f7ef;color:#145a40;opacity:1}.m7-choice.chosen-wrong{border-color:#c2413b;background:#fff0ef;color:#8d2926;opacity:1}.m7-choice.answer-reveal{border-color:#23835d;box-shadow:inset 0 0 0 1px #23835d;color:#145a40;opacity:1}
    .m7-explain{margin:10px 0 0;border-left:4px solid #23835d;padding:8px 11px;background:#edf9f3;color:#184b38;font-size:.9rem}.m7-explain.wrong{border-left-color:#c2413b;background:linear-gradient(90deg,#fff0ef 0 8px,#edf9f3 8px);color:#35433c}
    .m7-statements{margin:18px auto 0;max-width:820px;overflow-x:auto}.m7-statements table{width:100%;border-collapse:separate;border-spacing:0;border:1px solid #cbd5e1;border-radius:10px;overflow:hidden;background:#fff;font-variant-numeric:tabular-nums}.m7-statements caption{text-align:left;padding:0 0 9px;font:800 1rem Inter,sans-serif;color:#1e293b}
    .m7-statements th,.m7-statements td{padding:9px 12px;border-bottom:1px solid #e2e8f0}.m7-statements tr:last-child th,.m7-statements tr:last-child td{border-bottom:0}.m7-statements thead th{background:#e9eef5;font:800 .78rem Inter,sans-serif;letter-spacing:.05em;text-transform:uppercase}.m7-statements tbody th{text-align:left;font-weight:600;color:#334155}.m7-statements td{text-align:right;color:#334155}.m7-statements .active-world{background:#f1edff;color:#4d3786;font-weight:800}
    .m7-whatif-form{display:flex;gap:10px;align-items:end;flex-wrap:wrap}.m7-field{display:flex;flex-direction:column;gap:5px;color:#334155;font:700 .82rem Inter,sans-serif}.m7-money-input{display:flex;align-items:center;border:1px solid #94a3b8;border-radius:7px;background:#fff;overflow:hidden}.m7-money-input span{padding-left:10px;color:#64748b}.m7-money-input input{width:130px;border:0;padding:9px 10px 9px 3px;background:transparent;color:#172033;font:700 1rem JetBrains Mono,monospace;outline:none}.m7-recompute{border:0;border-radius:7px;padding:10px 14px;background:#6750a4;color:#fff;font:800 .82rem Inter,sans-serif;cursor:pointer}
    .m7-live-output{margin-top:16px;border-top:1px solid #dbe3ec;padding-top:12px}.m7-output-line{display:flex;justify-content:space-between;gap:18px;padding:6px 0;color:#334155}.m7-output-line strong{font-family:JetBrains Mono,monospace;color:#172033}.m7-output-line.loss strong{color:#a8322d}.m7-loss-flag{display:inline-block;margin-left:7px;border-radius:999px;padding:2px 7px;background:#fee2e2;color:#991b1b;font:800 .68rem Inter,sans-serif;text-transform:uppercase}.m7-whatif-note{margin:12px 0 0;color:#64748b;font-size:.86rem}
    #tail{margin-top:16px}#controls{margin-top:18px}.m7-glossary-dismiss{border:0;padding:2px 7px;background:transparent;color:inherit;cursor:pointer;font-size:1.7rem;line-height:1}
    @media(max-width:980px){.m7-draw-stage{grid-template-columns:1fr}.m7-draw-stage>:nth-child(1){order:1}.m7-draw-stage>:nth-child(2){order:2}.m7-draw-stage>:nth-child(3){order:3}.m7-draw-stage .gl-col{max-width:none}}
    @media(max-width:680px){.m7-board-wrap #board{min-width:610px}.m7-output-line{display:block}.m7-output-line strong{display:block;margin-top:4px}.m7-choice{flex:1 1 100%}}
    @media(prefers-color-scheme:dark){.m7-board-wrap{border-color:#4b5567;background:#211f28;box-shadow:0 7px 20px rgba(0,0,0,.28)}.m7-draw-stage .gl-col{border-color:#4b5567;box-shadow:0 7px 20px rgba(0,0,0,.28)}.m7-draw-stage{--gl-panel:#26242e;--gl-ink:#e7eef9;--gl-region-line:#8996aa;--gl-accent:#e6ae4f;--gl-pulse:#a96915}.m7-progress{color:#aebbd0}.m7-predict,.m7-whatif{border-color:#4b5567;background:#26242e}.m7-predict h2,.m7-whatif h2,.m7-prompt,.m7-statements caption{color:#edf3fb}.m7-predict-row,.m7-live-output{border-color:#4b5567}.m7-choice,.m7-world-toggle button,.m7-money-input{border-color:#64748b;background:#302e38;color:#e7eef9}.m7-world-toggle button.active{background:#8b72c8}.m7-statements table{border-color:#4b5567;background:#26242e}.m7-statements th,.m7-statements td{border-color:#464352}.m7-statements thead th{background:#33313c}.m7-statements tbody th,.m7-statements td,.m7-output-line,.m7-field{color:#d9e2ef}.m7-statements .active-world{background:#3b3155;color:#f2eaff}.m7-money-input input,.m7-output-line strong{color:#f4f7fb}.m7-panel-kicker,.m7-whatif-note{color:#aebbd0}}
  </style>
</head>
<body>
<div class="page"><div class="prework-wrap">
  <div class="tut-header">
    <div class="tut-header-main"><h1>The Draw Question</h1><p class="tut-header-sub">Module 7 &middot; ~6 min</p></div>
    <div class="tut-header-actions">
      <button class="icon-btn" title="Glossary" aria-label="Open glossary" onclick="openGlossary()"><i data-lucide="book-open"></i></button>
      <button class="icon-btn" title="Reset this phase" aria-label="Reset this phase" onclick="restart()"><i data-lucide="rotate-ccw"></i></button>
    </div>
  </div>
  <div class="phase-title" id="phaseTitle">The Draw Question</div>
  <div id="beats"></div>
  <div class="m7-draw-stage" id="mainGrid">
    <div id="beginningColumn" aria-label="Beginning balance sheet"></div>
    <div class="m7-stage-center"><div id="worldControls"></div><div class="m7-board-wrap"><svg id="board" viewBox="0 0 1000 660" role="img" aria-label="Two lawful pictures of the bike-repair season"></svg></div></div>
    <div id="endingColumn" aria-label="Ending balance sheet"></div>
  </div>
  <div id="task"></div><div id="tail"></div><div id="controls"></div>
</div></div>

<div class="glossary-overlay" id="glossaryOverlay" onclick="if(event.target===this) dismissGlossary()">
  <div class="glossary-panel"><div class="glossary-panel-head"><div class="glossary-panel-title"><i data-lucide="book-open" class="licon"></i> Glossary</div><button class="m7-glossary-dismiss" aria-label="Dismiss" onclick="dismissGlossary()">&times;</button></div><div class="glossary-list" id="glossaryList"></div></div>
</div>

<script src="bike-graph-data.js?v=4"></script>
<script src="graph-lab.js?v=4"></script>
<script src="shared.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script>
if(window.lucide) lucide.createIcons();
var audioCtx=null;
function ac(){if(!audioCtx){try{audioCtx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}return audioCtx;}
function tone(f,d,t,v){var c=ac();if(!c)return;var o=c.createOscillator(),g=c.createGain();o.type=t||'sine';o.frequency.value=f;o.connect(g);g.connect(c.destination);g.gain.setValueAtTime(v||0.05,c.currentTime);g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}
function playSuccess(){tone(523,0.12);setTimeout(function(){tone(659,0.12);},90);setTimeout(function(){tone(784,0.16);},180);}
function playClick(){tone(600,0.08,'sine',0.04);}

var step=0;
var TOTAL_STEPS=5;
var data=window.M7_GRAPH;
var world='D';
var predictions=[null,null,null,null];
var boardSvg=document.getElementById('board');
var board=GraphLab.createBoard(boardSvg,data,{interactive:true});
var leftEl=document.getElementById('beginningColumn');
var rightEl=document.getElementById('endingColumn');
var marketWage=entryAmount('rentx')*2;

function entryAmount(id){for(var i=0;i<data.entries.length;i++){if(data.entries[i].id===id)return data.entries[i].w;}return 0;}
function money(n){return Math.round(Math.abs(n)).toLocaleString('en-US');}
function plainMoney(n){return (n<0?'−':'')+money(n);}
function parenMoney(n){return n<0?'('+money(n)+')':money(n);}
function signedMoney(n){return n<0?'−'+money(n):'+'+money(n);}
function dashMoney(n){return n==null?'&mdash;':parenMoney(n);}
function allPredicted(){return predictions.every(function(x){return x!==null;});}

function setBoardWorld(next){world=next==='W'?'W':'D';board.setWorld(world).setRecognized('season');}
function worldFocus(){return world==='D'?{nodes:['cash','wd'],pairs:['cash>wd']}:{nodes:['cash','wage'],pairs:['cash>wage']};}
function renderColumns(){
  GraphLab.renderColumn(leftEl,data,board,{side:'beg',title:'Balance Sheet',sub:'June 1, 2026'});
  var leftTitle=leftEl.querySelector('.gl-col-title');if(leftTitle)leftTitle.textContent='Balance Sheet';
  GraphLab.renderColumn(rightEl,data,board,{side:'end',christened:true,title:'Balance Sheet — August 31, 2026 · world '+world,sub:world==='D'?'the take, as reported':'the owner-wage recast'});
}
function configureBoard(){
  if(step===0){setBoardWorld('D');board.setFocus({nodes:['cash','wd'],pairs:['cash>wd']});}
  else if(step===1){setBoardWorld('D');board.setFocus(null).clearHighlight();}
  else if(step===3||step===4){setBoardWorld('W');board.setFocus(null).clearHighlight();}
  else{board.setWorld(world).setRecognized('season').setFocus(worldFocus()).clearHighlight();}
}
function render(){configureBoard();renderBeats();renderWorldControls();renderColumns();renderTask();renderTail();renderControls();if(window.lucide)lucide.createIcons();}

function renderBeats(){
  var text='';
  if(step===0)text='One number will not leave the summer alone. The shop &ldquo;earned&rdquo; $'+money(data.recon.ni)+' &mdash; and the only money the bike-fixing owner received is a $'+money(entryAmount('draw'))+' take, which never touched the income statement. Nobody paid the mechanic. There is another lawful way to draw the same summer: call the same $'+money(entryAmount('wagex'))+' an <b>owner&rsquo;s wage</b> &mdash; pay for bench work, an expense of the shop like rent or parts. Before the arrow moves, commit to your predictions.';
  else if(step===1)text='Four figures. For each, say what happens when the $'+money(entryAmount('wagex'))+' take is recast as a $'+money(entryAmount('wagex'))+' owner&rsquo;s wage.';
  else if(step===2)text='Toggle the worlds and watch. In world W the arrow from Cash lands inside Generated &mdash; an Owner&rsquo;s Wage &mdash; and Withdrawn never appears. Generated ends at '+money(data.worldW.gen)+' instead of '+money(data.bs.gen.end)+'; Member&rsquo;s Capital ends at '+money(memberCapitalEnd())+' either way. The ending balance sheet re-draws itself; the statements below re-read themselves. Same summer, different pictures, all of it lawful.';
  else if(step===3)text='The recast used the same $'+money(entryAmount('wagex'))+' the owner took. But $'+money(entryAmount('wagex'))+' for a summer at the bench is not a market wage. Type any wage and read the summer again: at $'+money(marketWage)+' &mdash; a modest market rate &mdash; the profitable summer runs at a <b>loss</b>. What the shop &ldquo;really earned&rdquo; depends on a representational choice the statements were never required to disclose. The picture would redraw the same way &mdash; only the number on one arrow changes.';
  else text='Module 1 taught you to draw a boundary. Module 7 ends with its mirror: even inside an honest boundary, with every walk tying and the accounting identity holding at every date, the same summer supports more than one lawful picture &mdash; and the picture chosen changes what &ldquo;the shop earned&rdquo; means. A reader of statements looks for the choices. You now know where they hide: in the arrows an outsider must tag, in the aggregates a statement folds away, and in the labels a representation quietly picks.';
  document.getElementById('beats').innerHTML='<div class="narrative-block"><h2>'+stepTitle(step)+'</h2><p>'+text+'</p></div><p class="m7-progress">Question '+(step+1)+' of '+TOTAL_STEPS+'</p>';
}
function stepTitle(n){return ['Who paid the mechanic?','Predict.','One arrow moved, two worlds.','What would a mechanic actually cost?','Representation is a choice.'][n];}
function memberCapitalEnd(){return data.bs.contrib.end+data.bs.gen.end-data.bs.wd.end;}

function renderWorldControls(){
  document.getElementById('worldControls').innerHTML=step===2?'<div class="m7-world-toggle" role="group" aria-label="Choose a lawful picture"><button class="'+(world==='D'?'active':'')+'" aria-pressed="'+(world==='D')+'" onclick="chooseWorld(\'D\')">World D &middot; the take</button><button class="'+(world==='W'?'active':'')+'" aria-pressed="'+(world==='W')+'" onclick="chooseWorld(\'W\')">World W &middot; the wage</button></div>':'';
}
function chooseWorld(next){playClick();setBoardWorld(next);board.setFocus(worldFocus());renderWorldControls();renderColumns();renderStatements();}

function predictionRows(){
  var wage=entryAmount('wagex'),ni=data.recon.ni,mc=memberCapitalEnd(),net=data.cfs.net,cfo=data.cfs.cfo;
  return [
    {prompt:'Net income (now '+money(ni)+') will&hellip;',choices:['fall to '+money(data.worldW.ni),'stay '+money(ni),'rise'],right:0,explain:'A wage is an expense of the shop: income absorbs the $'+money(wage)+' the take kept outside the income statement.'},
    {prompt:'Ending Member&rsquo;s Capital (now '+money(mc)+') will&hellip;',choices:['fall to '+money(mc-wage),'stay '+money(mc),'rise'],right:1,explain:'Invariant. In world D capital loses '+money(wage)+' through Withdrawn; in world W it earns '+money(wage)+' less into Generated. Different doors, same room.'},
    {prompt:'The change in Cash (now '+signedMoney(net)+') will&hellip;',choices:['fall','stay '+signedMoney(data.worldW.netCash),'rise'],right:1,explain:'Invariant. The same $'+money(wage)+' left the same bank account either way &mdash; a relabeling moves no money.'},
    {prompt:'Operating cash (now '+signedMoney(cfo)+') will&hellip;',choices:['fall to '+signedMoney(data.worldW.cfo),'stay '+signedMoney(cfo),'rise'],right:0,explain:'A wage is an operating payment: the $'+money(wage)+' moves from the financing channel into operating. The cash statement is not immune to the choice.'}
  ];
}
function renderTask(){
  var el=document.getElementById('task');
  if(step===1){var rows=predictionRows();el.innerHTML='<section class="m7-predict" aria-labelledby="predictTitle"><h2 id="predictTitle">Predict before you verify</h2><p class="m7-panel-kicker">Choose once in every row</p>'+rows.map(function(row,ri){var picked=predictions[ri];return '<div class="m7-predict-row"><p class="m7-prompt">'+row.prompt+'</p><div class="m7-choices">'+row.choices.map(function(choice,ci){var cls='m7-choice';if(picked!==null){if(ci===picked)cls+=ci===row.right?' chosen-right':' chosen-wrong';if(ci===row.right&&picked!==row.right)cls+=' answer-reveal';}return '<button class="'+cls+'" '+(picked!==null?'disabled':'')+' onclick="pickPrediction('+ri+','+ci+')">'+choice+'</button>';}).join('')+'</div>'+(picked!==null?'<p class="m7-explain '+(picked===row.right?'':'wrong')+'">'+row.explain+'</p>':'')+'</div>';}).join('')+'</section>';}
  else if(step===2)renderStatements();
  else if(step===3)renderWhatIf();
  else el.innerHTML='';
}
function pickPrediction(row,choice){if(predictions[row]!==null)return;playClick();predictions[row]=choice;renderTask();renderControls();}

function renderStatements(){
  var el=document.getElementById('task'),wage=entryAmount('wagex'),draw=entryAmount('draw');
  var d={ni:data.recon.ni,wage:null,gen:data.bs.gen.end,wd:-draw,mc:memberCapitalEnd(),cfo:data.cfs.cfo,cff:data.cfs.cff,net:data.cfs.net};
  var w={ni:data.worldW.ni,wage:-wage,gen:data.worldW.gen,wd:null,mc:data.bs.contrib.end+data.worldW.gen,cfo:data.worldW.cfo,cff:data.cfs.cff+draw,net:data.worldW.netCash};
  var rows=[['Net income','ni',false],['Owner&rsquo;s wage','wage',false],['Generated, ending','gen',false],['Withdrawn','wd',false],['Member&rsquo;s Capital, ending','mc',false],['Operating cash','cfo',true],['Financing','cff',false],['Change in Cash','net',false]];
  el.innerHTML='<div class="m7-statements"><table><caption>Same events, two statement readings</caption><thead><tr><th scope="col">Figure</th><th scope="col" class="'+(world==='D'?'active-world':'')+'">D</th><th scope="col" class="'+(world==='W'?'active-world':'')+'">W</th></tr></thead><tbody>'+rows.map(function(r){return '<tr><th scope="row">'+r[0]+'</th><td class="'+(world==='D'?'active-world':'')+'">'+formatStatement(d[r[1]],r[2])+'</td><td class="'+(world==='W'?'active-world':'')+'">'+formatStatement(w[r[1]],r[2])+'</td></tr>';}).join('')+'</tbody></table></div>';
}
function formatStatement(value,showPlus){if(value==null)return '&mdash;';if(showPlus&&value>0)return '+'+money(value);return parenMoney(value);}

function renderWhatIf(){
  var el=document.getElementById('task');
  el.innerHTML='<section class="m7-whatif" aria-labelledby="whatifTitle"><h2 id="whatifTitle">The what-if wage</h2><p class="m7-panel-kicker">A what-if reading, not a recorded season</p><div class="m7-whatif-form"><label class="m7-field">Wage for the summer<span class="m7-money-input"><span aria-hidden="true">$</span><input id="wageInput" type="number" min="0" step="50" value="'+marketWage+'" inputmode="decimal" onkeydown="if(event.key===\'Enter\'){event.preventDefault();recomputeWage();}"></span></label><button class="m7-recompute" onclick="recomputeWage()">Recompute</button></div><div class="m7-live-output" id="wageOutput" aria-live="polite"></div><p class="m7-whatif-note">(the extra cash actually paid out would change the cash walk too &mdash; this panel reads income only)</p></section>';
  recomputeWage();
}
function recomputeWage(){var input=document.getElementById('wageInput');if(!input)return;var wage=Math.max(0,Number(input.value)||0),income=data.recon.ni-wage,startingCapital=data.bs.contrib.beg+data.bs.gen.beg,endingCapital=startingCapital+income;input.value=wage;document.getElementById('wageOutput').innerHTML='<div class="m7-output-line '+(income<0?'loss':'')+'"><span>Income for the summer: '+money(data.recon.ni)+' &minus; '+money(wage)+'</span><strong>'+parenMoney(income)+(income<0?'<span class="m7-loss-flag">a loss</span>':'')+'</strong></div><div class="m7-output-line"><span>Ending Member&rsquo;s Capital: '+money(startingCapital)+' + income</span><strong>'+plainMoney(endingCapital)+'</strong></div>';}

function renderTail(){document.getElementById('tail').innerHTML=step===4?'<div class="insight-box">One shop. One summer. One identity. Many lawful pictures. Read the labels, walk the accounts, name the assumptions &mdash; that is the whole craft.</div>':'';}
function renderControls(){var html='<div class="nav-buttons">';if(step>0)html+='<button class="btn-back" onclick="back()">&larr; Back</button>';if(step<TOTAL_STEPS-1)html+='<button class="btn-next" '+(step===1&&!allPredicted()?'disabled aria-disabled="true"':'')+' onclick="advance()">Next &rarr;</button>';html+='</div>';document.getElementById('controls').innerHTML=html;}
function advance(){if(step===1&&!allPredicted())return;playClick();step=Math.min(step+1,TOTAL_STEPS-1);if(step===2)world='D';render();window.scrollTo(0,0);}
function back(){playClick();step=Math.max(step-1,0);render();window.scrollTo(0,0);}
function restart(){playClick();step=0;world='D';predictions=[null,null,null,null];render();window.scrollTo(0,0);}

var glossaryTerms=[
  {term:'World D / World W',def:'Two lawful pictures of the same recorded season: D shows the owner&rsquo;s take in Withdrawn; W shows that payment as an Owner&rsquo;s Wage inside Generated.'},
  {term:'Owner&rsquo;s wage vs the take',def:'A wage pays for bench work and enters the shop&rsquo;s expenses. The take is recorded in Withdrawn and stays outside income.'},
  {term:'Invariant',def:'A figure that stays the same when the same events are represented another lawful way.'},
  {term:'Representation',def:'A choice about how recorded events are tagged, grouped, and labeled for a reader.'}
];
function openGlossary(){document.getElementById('glossaryList').innerHTML=glossaryTerms.map(function(item){return '<div class="glossary-entry"><div class="glossary-entry-term">'+item.term+'</div><div class="glossary-entry-def">'+item.def+'</div></div>';}).join('');document.getElementById('glossaryOverlay').classList.add('open');if(window.lucide)lucide.createIcons();}
function dismissGlossary(){document.getElementById('glossaryOverlay').classList.remove('open');}
document.addEventListener('keydown',function(e){if(e.key==='Escape')dismissGlossary();});
window.devFill=function(){predictions=[0,1,1,0];step=TOTAL_STEPS-1;world='W';render();};
render();
</script>
<script src="dev.js"></script>
</body>
</html>
