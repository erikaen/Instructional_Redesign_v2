<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Statement Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Open+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    .main-grid > *, .map-center { min-width:0; }
    .map-center .statement-panel { margin:4px 0 10px; overflow-x:auto; background:white; }
    .map-center .wb-grid-wrap { padding:6px; overflow-x:auto; background:white; }
    .map-center .brw-row { grid-template-columns:minmax(0,1fr) 2rem 6rem; min-width:0; }
    .map-center .brw-row > .brw-cell:nth-child(n+4) { display:none; }
    .map-center .brw-cell { min-width:0; }
    .map-center .brw-cell { padding:4px 6px; font-size:11px; }
    .map-center .sce-is-nested { margin-top:8px; }
      </style>
</head>
<body>
<div class="page">
  <div class="prework-wrap">

    <div class="phase-title-row">
      <div class="phase-title"></div>
      <button class="icon-btn" title="Glossary" aria-label="Open glossary" onclick="openGlossary()"><i data-lucide="book-open"></i></button>
    </div>

    <div id="beats"></div>
    <div id="mainGrid"></div>
    <div id="tail"></div>
    <div id="controls"></div>

  </div>
</div>

<!-- ===== Glossary overlay ===== -->
<div class="glossary-overlay" id="glossaryOverlay" onclick="if(event.target===this) closeGlossary()">
  <div class="glossary-panel">
    <div class="glossary-panel-head">
      <div class="glossary-panel-title"><i data-lucide="book-open" class="licon"></i> Glossary</div>
      <button class="glossary-close-btn" aria-label="Close" onclick="closeGlossary()">&times;</button>
    </div>
    <div class="glossary-list" id="glossaryList"></div>
  </div>
</div>

<script src="bike-repair-job-records.js"></script>
<script src="bike-repair-parts-purchases.js"></script>
<script src="bike-repair-workbook.js"></script>
<script src="shared.js"></script>
<script src="bike-repair-statement-steps.generated.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script>
(function normalizeCapitalLabels(){
  var books=BR_STMT_DATA.workbooks;
  Object.keys(books).forEach(function(key){
    books[key].sheets.forEach(function(sheet){
      sheet.cells.forEach(function(cell){
        if(typeof cell.value==='string') cell.value=cell.value.replace(/Members['’] Capital/g,"Member’s Capital");
      });
    });
  });
  /* TEMPORARY SHIM: Bike-Repair-End.xlsx 'Balance Sheet' D19/D21 carry stale cached
     values (their formulas =Reasons!D66/=SUM(..D20) point one row short after the
     depreciation split). Mirror the intended values (Generated Aug-31 2,810; Total
     4,500) until Rick fixes the source and re-extracts; the guards make this a
     no-op once the source is fixed. */
  books['bike-repair-end'].sheets.forEach(function(sheet){
    if(sheet.name!=='Balance Sheet') return;
    sheet.cells.forEach(function(cell){
      if(cell.r===19&&cell.c===4&&cell.value===-30) cell.value=2810;
      if(cell.r===21&&cell.c===4&&cell.value===1660) cell.value=4500;
    });
  });
})();
if (window.lucide) lucide.createIcons();

/* ===== sound ===== */
var audioCtx=null;
function ac(){ if(!audioCtx){ try{audioCtx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } return audioCtx; }
function tone(f,d,t,v){ var c=ac(); if(!c)return; var o=c.createOscillator(),g=c.createGain(); o.type=t||'sine'; o.frequency.value=f; o.connect(g); g.connect(c.destination); g.gain.setValueAtTime(v||0.05,c.currentTime); g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+d); o.start(); o.stop(c.currentTime+d); }
function playSuccess(){ tone(523,0.12); setTimeout(function(){tone(659,0.12);},90); setTimeout(function(){tone(784,0.16);},180); }
function playClick(){ tone(600,0.08,'sine',0.04); }

/* ===== extracted workbook helpers ===== */
function sheetOf(name){
  var sheets=BR_STMT_DATA.workbooks['bike-repair-end'].sheets;
  for(var i=0;i<sheets.length;i++) if(sheets[i].name===name) return sheets[i];
  return null;
}
function cellAt(sheet,row,col){
  var cells=sheet && sheet.cells ? sheet.cells : [];
  for(var i=0;i<cells.length;i++) if(cells[i].r===row && cells[i].c===col) return cells[i];
  return null;
}
function cellValue(sheet,row,col){
  var cell=cellAt(sheet,row,col);
  return cell ? cell.value : '';
}
function escapeHTML(value){
  return String(value).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function formatMoney(value){
  var amount=Number(value);
  if(!isFinite(amount)) amount=0;
  var digits=Math.abs(amount).toLocaleString('en-US',{maximumFractionDigits:0});
  return amount<0 ? '($'+digits+')' : '$'+digits;
}

var OPENING_SPEC=[
  {sec:'Assets',rows:[{id:'cash',r:5},{id:'rou',r:7},{id:'parts',r:8},{id:'tre',r:9},{id:'fix',r:10},{id:'laptop',r:11}],total:{id:'ta',r:12}},
  {sec:'Liabilities',rows:[{id:'cc',r:14},{id:'dep',r:15}],total:{id:'tl',r:16}},
  {sec:'Member&rsquo;s Capital',rows:[{id:'contrib',r:18},{id:'gen',r:19}],total:{id:'mc',r:21}}
];
var CLOSING_SPEC=[
  {sec:'Assets',rows:[{id:'cash',r:5},{id:'ar',r:6},{id:'rou',r:7},{id:'parts',r:8},{id:'tre',r:9},{id:'fix',r:10},{id:'laptop',r:11}],total:{id:'ta',r:12}},
  {sec:'Liabilities',rows:[{id:'cc',r:14},{id:'dep',r:15}],total:{id:'tl',r:16}},
  {sec:'Member&rsquo;s Capital',rows:[{id:'contrib',r:18},{id:'gen',r:19},{id:'wd',r:20}],total:{id:'mc',r:21}}
];
function buildSections(sheet,col,spec){
  return spec.map(function(section){
    return {
      sec:section.sec,
      rows:section.rows.map(function(row){
        return {id:row.id,label:escapeHTML(cellValue(sheet,row.r,2)),val:formatMoney(cellValue(sheet,row.r,col))};
      }),
      total:{id:section.total.id,label:escapeHTML(cellValue(sheet,section.total.r,2)),val:formatMoney(cellValue(sheet,section.total.r,col))}
    };
  });
}

/* unfaded === null means that every balance-sheet line remains at full opacity. */
function renderCol(title,date,sections,unfaded){
  var fade=!!unfaded;
  var h='<div class="acct-col">';
  h+='<div class="bs-header"><div class="bs-header-title">'+title+'</div><div class="bs-header-date">'+date+'</div></div>';
  sections.forEach(function(section){
    h+='<h4'+(fade?' class="acct-fade-50"':'')+'>'+section.sec+'</h4>';
    section.rows.forEach(function(row){
      var cls='acct-line'+(fade && unfaded.indexOf(row.id)===-1?' acct-fade-40':'');
      h+='<div class="'+cls+'" data-bs="'+row.id+'"><span>'+row.label+'</span><span class="acct-val">'+row.val+'</span></div>';
    });
    var totalClass='acct-total'+(fade && unfaded.indexOf(section.total.id)===-1?' acct-fade-40':'');
    h+='<div class="'+totalClass+'" data-bs="'+section.total.id+'"><span>'+section.total.label+'</span><span>'+section.total.val+'</span></div>';
  });
  return h+'</div>';
}

function identityHTML(sheet){
  function group(label,row,col){
    return '<div class="dib-group"><span class="dib-label">'+label+'</span><span class="dib-val">'+formatMoney(cellValue(sheet,row,col))+'</span></div>';
  }
  return '<div class="dual-identity-bar">'
    +'<div class="dib-side"><span class="dib-tag">Opening &mdash; June 1</span><div class="dib-eq">'
      +group('Assets',12,3)+'<span class="dib-op">&minus;</span>'+group('Liabilities',16,3)+'<span class="dib-op">=</span>'+group('Member&rsquo;s Capital',21,3)
    +'</div></div><div class="dib-divider"></div>'
    +'<div class="dib-side"><span class="dib-tag">August 31 &mdash;</span><div class="dib-eq">'
      +group('Assets',12,4)+'<span class="dib-op">&minus;</span>'+group('Liabilities',16,4)+'<span class="dib-op">=</span>'+group('Member&rsquo;s Capital',21,4)
    +'</div></div></div>';
}

var step=0;
var TOTAL_STEPS=5;
var incomeOpen=false;
var incomeSeen=false;
var gridSeq=0;
var UNFADED={0:null,1:['cash','ta'],2:['contrib','gen','wd','mc'],3:['contrib','gen','wd','mc'],4:null};

function statementPanelHTML(containerId,title){
  return '<div class="sce-is-panel statement-panel"><div class="sce-is-title">'+title+'</div><div class="wb-grid-wrap"><div id="'+containerId+'"></div></div></div>';
}
function mountStatement(containerId,sheetName,key){
  BRW.mountGrid(containerId,sheetOf(sheetName),{gridId:'statement-map-'+key+'-'+(++gridSeq)});
}

/* Wires the capital statement's Net income row after the extracted grid mounts.
   The existing clickable-row idiom supplies the cursor, chevron, and open state. */
function wireCapitalRow(containerId, clickable){
  var container = document.getElementById(containerId);
  if(!container) return;
  var rows = container.querySelectorAll('.brw-row');
  rows.forEach(function(row){
    var c = row.querySelector('.brw-label');
    if(!c || c.textContent.indexOf('Net income') === -1) return;
    if(!clickable) return;
    row.classList.add('sce-ni-clickable');
    if(incomeOpen) row.classList.add('sce-ni-open');
    row.setAttribute('role','button');
    row.setAttribute('tabindex','0');
    row.setAttribute('aria-expanded', incomeOpen ? 'true':'false');
    var icon = document.createElement('span');
    icon.className = 'sce-expand-icon' + (incomeSeen ? '' : ' hint-pulse');
    icon.innerHTML = '<i data-lucide="' + (incomeOpen ? 'chevron-up' : 'chevron-down') + '" class="licon"></i>';
    c.appendChild(icon);
    row.onclick = function(){ toggleIncome(); };
    row.onkeydown = function(e){ if(e.key==='Enter' || e.key===' '){ e.preventDefault(); toggleIncome(); } };
  });
}

function nestedIncomeHTML(containerId){
  if(!incomeOpen) return '';
  return '<div class="sce-is-nested"><p class="sce-is-intro">The Income Statement says more about this Net income amount: Revenue $6,020 minus Expenses $3,380.</p>'
    +statementPanelHTML(containerId,'Income Statement')+'</div>';
}
function toggleIncome(){
  playClick();
  incomeOpen=!incomeOpen;
  if(incomeOpen) incomeSeen=true;
  render();
}

function render(){
  renderBeats();
  renderGrid();
  renderTail();
  renderControls();
  if(window.lucide) lucide.createIcons();
}

function renderBeats(){
  var h='';
  if(step===0){
    h='<div class="narrative-block"><p>Here are two balance-sheet snapshots: June 1 and August 31. The opening identity is <strong>$4,710 &minus; $2,250 = $2,460</strong>; the closing identity is <strong>$4,500 &minus; $0 = $4,500</strong>. Follow Cash, Member&rsquo;s Capital, and the Net income within its detail to see how one snapshot became the other.</p></div>';
  } else if(step===1){
    h='<div class="narrative-block"><p>Cash fell from <strong>$1,300</strong> to <strong>$620</strong> &mdash; down <strong>$680</strong>. The <strong>Cash Flow Statement</strong> walks that path: Operating <strong>+$2,350</strong>, Investing <strong>&minus;$400</strong>, and Financing <strong>&minus;$2,630</strong>. Financing includes both the card payoff (repaying a borrowing) and the owner&rsquo;s draw.</p></div>';
  } else if(step===2){
    h='<div class="narrative-block"><p>Member&rsquo;s Capital rose from <strong>$2,460</strong> to <strong>$4,500</strong> &mdash; up <strong>$2,040</strong>. The <strong>Statement of Changes in Member&rsquo;s Capital</strong> tells it pile by pile. <strong>Contributed</strong>: Beginning $2,290, no changes, Ending $2,290. <strong>Generated</strong>: Beginning $170, plus Net income $2,640 from the Income Statement, Ending $2,810. <strong>Withdrawn</strong>: Beginning &mdash;, Owner&rsquo;s draw ($600), Ending ($600). The draw is recorded separately, and the totals tie.</p></div>';
  } else if(step===3){
    h='<div class="narrative-block"><p>Net income is the largest change within the statement. Click the <strong>Net income</strong> line below to open the <strong>Income Statement</strong> behind it.</p></div>';
  } else if(step===4){
    h='<div class="narrative-block"><p>There is a word for the way these statements tie to each other: <strong>articulation</strong>. The accounting identity holds in both snapshots; the change between them appears on the other statements.</p></div>';
  }
  document.getElementById('beats').innerHTML=h;
}

function renderGrid(){
  var balanceSheet=sheetOf('Balance Sheet');
  var opening=buildSections(balanceSheet,3,OPENING_SPEC);
  var closing=buildSections(balanceSheet,4,CLOSING_SPEC);
  var unfaded=UNFADED[step];
  var center='<div class="map-center">';

  if(step===0){
    center+='<div class="center-card"><div class="stage-card-title">The Question</div><div class="stage-text"><p class="activity-desc">Two snapshots. The identity holds at both dates &mdash; but standing alone, they don&rsquo;t say how one became the other.</p></div></div>';
  } else if(step===1){
    center+=statementPanelHTML('cashGrid','Cash Flow Statement');
  } else if(step===2){
    center+=statementPanelHTML('capitalGrid','Statement of Changes in Member&rsquo;s Capital');
  } else if(step===3){
    center+=statementPanelHTML('capitalGrid','Statement of Changes in Member&rsquo;s Capital')+nestedIncomeHTML('incomeGrid');
    if(incomeOpen){
      center+='<p class="stage-text"><span class="activity-desc">In financial reporting these are two distinct statements: the Income Statement details the Net income line that appears in the Statement of Changes in Member&rsquo;s Capital.</span></p>';
    }
  } else if(step===4){
    center+=statementPanelHTML('cashGridFinal','Cash Flow Statement')
      +'<p class="panel-footnote">Explains the Cash line: $1,300 &rarr; $620.</p>'
      +statementPanelHTML('capitalGridFinal','Statement of Changes in Member&rsquo;s Capital')
      +nestedIncomeHTML('incomeGridFinal')
      +'<p class="panel-footnote">Explains Member&rsquo;s Capital ($2,460 &rarr; $4,500) and, nested inside it, Net income ($2,640).</p>';
  }
  center+='</div>';

  var h='<div class="main-grid"><div>'+renderCol('Opening Balance Sheet','June 1, 2026',opening,unfaded)+'</div>'
    +center+'<div>'+renderCol('August 31 Balance Sheet','August 31, 2026',closing,unfaded)+'</div></div>';
  if(step===0 || step===4) h+=identityHTML(balanceSheet);
  document.getElementById('mainGrid').innerHTML=h;

  if(step===1){
    mountStatement('cashGrid','Cash_Flow_Statement','cash');
  } else if(step===2){
    mountStatement('capitalGrid','St_Members_Capital','capital');
  } else if(step===3){
    mountStatement('capitalGrid','St_Members_Capital','capital');
    if(incomeOpen) mountStatement('incomeGrid','Income Statement','income');
    wireCapitalRow('capitalGrid',true);
  } else if(step===4){
    mountStatement('cashGridFinal','Cash_Flow_Statement','cash-final');
    mountStatement('capitalGridFinal','St_Members_Capital','capital-final');
    mountStatement('incomeGridFinal','Income Statement','income-final');
    wireCapitalRow('capitalGridFinal',false);
  }
}

function renderTail(){
  var h='';
  if(step===4){
    h='<div class="insight-box"><div class="insight-label"><i data-lucide="lightbulb" class="licon"></i> The rest of the map</div>'
      +'<p>The same statements explain every other line that moved. The Credit Card fell to $0 &mdash; a borrowing repaid in Financing. The Customer Deposit fell to $0 &mdash; Smith&rsquo;s frame was delivered, inside Revenue. Accounts Receivable appeared &mdash; work finished, not yet collected, inside Revenue.</p></div>'
      +'<div class="narrative-block"><p>The balance-sheet snapshots show where things stand; the flow statements explain the changes between them.</p></div>';
  }
  document.getElementById('tail').innerHTML=h;
}

function renderControls(){
  var nextDisabled=(step===3 && !incomeSeen);
  var h=nextDisabled?'<div class="next-phase-msg">Open the Net income line to unlock Next.</div>':'';
  h+='<div class="nav-buttons">';
  if(step>0) h+='<button class="btn-back" onclick="back()">&larr; Back</button>';
  if(step<TOTAL_STEPS-1) h+='<button class="btn-next"'+(nextDisabled?' disabled':'')+' onclick="advance()">Next &rarr;</button>';
  else h+='<button class="btn-next" onclick="playClick();window.location.href=\'53-1-Two-Balance-Sheets.html\'">Next: The CVS Statement Walk &rarr;</button>';
  h+='</div>';
  document.getElementById('controls').innerHTML=h;
}

function advance(){
  if(step===3 && !incomeSeen) return;
  playClick();
  step=Math.min(step+1,TOTAL_STEPS-1);
  if(step===4) incomeOpen=true;
  render();
  window.scrollTo(0,0);
}
function back(){
  playClick();
  step=Math.max(step-1,0);
  render();
  window.scrollTo(0,0);
}

var glossaryTerms=[
  {term:'Articulation',def:'The figures on the statements tie to each other: each balance-sheet change has an explanation in one of the flow statements.'},
  {term:'Cash Flow Statement',def:'The statement says how Cash changed across Operating, Investing, and Financing. Here: +$2,350, &minus;$400, &minus;$2,630 = &minus;$680, tying $1,300 to $620.'},
  {term:'Statement of Changes in Member&rsquo;s Capital',def:'The statement tells how Member&rsquo;s Capital changed pile by pile: Contributed (Beginning $2,290, no changes, Ending $2,290), Generated (Beginning $170 + Net income $2,640 = Ending $2,810), Withdrawn (Beginning &mdash;, Owner&rsquo;s draw ($600), Ending ($600)). Totals: $2,460 to $4,500.'},
  {term:'Income Statement',def:'Revenue minus Expenses for the season. Here: $6,020 &minus; $3,380 = $2,640 net income &mdash; the same figure that enters the Statement of Changes in Member&rsquo;s Capital.'}
];
function openGlossary(){
  document.getElementById('glossaryList').innerHTML=glossaryTerms.map(function(item){
    return '<div class="glossary-entry"><div class="glossary-entry-term">'+item.term+'</div><div class="glossary-entry-def">'+item.def+'</div></div>';
  }).join('');
  document.getElementById('glossaryOverlay').classList.add('open');
}
function closeGlossary(){ document.getElementById('glossaryOverlay').classList.remove('open'); }
function restart(){ window.location.reload(); }
document.addEventListener('keydown',function(e){ if(e.key==='Escape') closeGlossary(); });

window.devFill=function(){
  step=TOTAL_STEPS-1;
  incomeOpen=true;
  incomeSeen=true;
  render();
};
render();
</script>
<script src="dev.js"></script>
</body>
</html>
