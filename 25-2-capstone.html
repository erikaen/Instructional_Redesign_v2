<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light dark">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activity 2.5: The LLC's Balance Sheet &middot; The LLC's Balance Sheet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Open+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="page">
  <div class="prework-wrap">

    <!-- ===== Header ===== -->
    <div class="tut-header">
      <div class="tut-header-main">
        <h1>Activity 2.5: The LLC&rsquo;s Balance Sheet</h1>
        <p class="tut-header-sub">Module 2 &middot; Getting Formal &middot; ~8 min &middot; Phase 2 of 3</p>
      </div>
      <div class="tut-header-actions">
        <button class="icon-btn" title="Glossary" aria-label="Open glossary" onclick="openGlossary()"><i data-lucide="book-open"></i></button>
        <button class="icon-btn" title="Reset this phase" aria-label="Reset this phase" onclick="restart()"><i data-lucide="rotate-ccw"></i></button>
      </div>
    </div>
    <div class="phase-title" id="phaseTitle">The LLC&rsquo;s Balance Sheet</div>

    <!-- ===== capstone ===== -->
    <div class="phase active" id="phase-capstone">
      <div id="capstoneArea"></div>
    </div>

  </div>
</div>

<!-- ===== Glossary overlay ===== -->
<div class="glossary-overlay" id="glossaryOverlay" onclick="if(event.target===this) closeGlossary()">
  <div class="glossary-panel">
    <div class="glossary-panel-head">
      <div class="glossary-panel-title"><i data-lucide="book-open" class="licon"></i> Glossary</div>
      <button class="glossary-close-btn" aria-label="Close" onclick="closeGlossary()">&times;</button>
    </div>
    <div class="glossary-list" id="glossaryList"></div>
  </div>
</div>

<script src="https://unpkg.com/lucide@latest"></script>
<script>
if (window.lucide) lucide.createIcons();

/* ===== sound ===== */
var audioCtx = null;
function ac(){ if(!audioCtx){ try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return audioCtx; }
function tone(f,d,t,v){ var c=ac(); if(!c)return; var o=c.createOscillator(),g=c.createGain(); o.type=t||'sine'; o.frequency.value=f; o.connect(g); g.connect(c.destination); g.gain.setValueAtTime(v||0.05,c.currentTime); g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+d); o.start(); o.stop(c.currentTime+d); }
function playSuccess(){ tone(523,0.12); setTimeout(function(){tone(659,0.12);},90); setTimeout(function(){tone(784,0.16);},180); }
function playClick(){ tone(600,0.08,'sine',0.04); }

/* ===== glossary (shared across all phases of 2.5) ===== */
var glossaryTerms = [
  { term:"Balance sheet", def:"A snapshot of what the entity holds and owes at one moment: Assets &minus; Liabilities = the residual (here, members&rsquo; equity)." },
  { term:"Members&rsquo; equity", def:"The LLC&rsquo;s residual, A &minus; L. A definitional difference &mdash; never &ldquo;what&rsquo;s left for the owner.&rdquo; Split into contributed ($2,290) and retained ($170)." },
  { term:"Accounting entity", def:"The boundary your books are drawn around. It can exist with or without a legal body &mdash; and here it has existed since 1.1, long before the LLC." },
  { term:"Legal entity", def:"A creature of statute &mdash; the LLC. Days old. Distinct from the accounting entity it now wraps." }
];
function openGlossary(){
  document.getElementById('glossaryList').innerHTML = glossaryTerms.map(function(g){
    return '<div class="glossary-entry"><div class="glossary-entry-term">'+g.term+'</div><div class="glossary-entry-def">'+g.def+'</div></div>';
  }).join('');
  document.getElementById('glossaryOverlay').classList.add('open');
}
function closeGlossary(){ document.getElementById('glossaryOverlay').classList.remove('open'); }

/* ===== navigation / reset ===== */
function nav(url){ playClick(); window.location.href = url; }
function restart(){ window.location.reload(); }

/* ===== member name ===== */
var memberName = '';
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function memberDisplay(){ return memberName.trim() || "[Your Name]"; }
function llcName(){ return memberDisplay() + "’s Bike Repairs, LLC"; }

/* [label, M1 ending, LLC opening] — a row is a diff iff M1 !== LLC */
var assetRows = [['Cash','0','500'],['Prepaid rent','650','650'],['Parts on the shelf','200','200'],['Tools &amp; equipment','1,200','1,200'],['Fixtures','750','750'],['Laptop','610','610']];

/* ===== state (phase-local) ===== */
var opened = false;
var compared = false;

/* ===== the balance sheet + the comparison ===== */
function sectionLabel(t){
  return '<div style="font-size:var(--font-xs);font-weight:700;text-transform:uppercase;letter-spacing:0.04em;color:var(--primary);margin:10px 0 2px">'+t+'</div>';
}
function bsRow(label, m1, llc, opts){
  opts = opts || {};
  var diff = m1 !== llc;
  var rowBg = (compared && diff) ? 'background:var(--warn-bg);border-radius:3px;' : '';
  var top = opts.rule ? 'border-top:2px solid var(--border-strong);margin-top:2px;' : '';
  var rowWeight = opts.bold ? '700' : '400';
  var m1col = compared
    ? '<span class="mono" style="width:70px;text-align:right;opacity:'+(diff?'0.8':'0.45')+'">'+m1+'</span>'
    : '';
  var llcColor = (compared && diff) ? 'var(--accent)' : 'inherit';
  var llcWeight = (compared && diff) ? '700' : (opts.bold ? '700' : '400');
  var llccol = '<span class="mono" style="width:70px;text-align:right;color:'+llcColor+';font-weight:'+llcWeight+'">'+llc+'</span>';
  return '<div style="display:flex;align-items:baseline;font-size:var(--font-s);padding:3px 4px;'+top+rowBg+'font-weight:'+rowWeight+'"><span style="flex:1">'+label+'</span>'+m1col+llccol+'</div>';
}
function buildSheet(){
  var en = esc(llcName());
  var h = '<div class="section-card">';
  h += '<div style="text-align:center;font-size:var(--font-xs);font-weight:700;text-transform:uppercase;letter-spacing:0.04em;color:var(--primary)">'+en+'</div>';
  h += '<div class="section-sub" style="text-align:center;margin-bottom:12px">Opening balance sheet &middot; June 1, 2026</div>';
  if(compared){
    h += '<div style="display:flex;font-size:var(--font-xs);text-transform:uppercase;letter-spacing:0.04em;opacity:0.6;margin-bottom:2px;padding:0 4px"><span style="flex:1"></span><span style="width:70px;text-align:right">M1 end</span><span style="width:70px;text-align:right">LLC</span></div>';
  }
  h += sectionLabel('Assets');
  assetRows.forEach(function(r){ h += bsRow(r[0], r[1], r[2], {}); });
  h += bsRow('Assets','3,410','3,910',{bold:true,rule:true});
  h += sectionLabel('Liabilities');
  h += bsRow('Credit card (business)','1,230','1,230',{});
  h += bsRow('Customer advance &mdash; Smith','220','220',{});
  h += bsRow('Liabilities','1,450','1,450',{bold:true,rule:true});
  h += sectionLabel('Members&rsquo; equity');
  h += bsRow('Members&rsquo; capital &mdash; contributed','1,790','2,290',{});
  h += bsRow('Retained earnings','170','170',{});
  h += bsRow('Members&rsquo; equity (A &minus; L)','1,960','2,460',{bold:true,rule:true});
  h += '</div>';
  return h;
}
function renderCapstone(){
  var area = document.getElementById('capstoneArea');
  var en = esc(llcName());
  if(!opened){
    area.innerHTML = '<div style="text-align:center;padding:24px 0">'+
      '<p style="font-size:var(--font-s);opacity:0.8;margin-bottom:16px">The books for '+en+' are ready to open.</p>'+
      '<button class="btn-continue" onclick="openBooks()">Lay out the balance sheet &rarr;</button></div>';
    return;
  }
  var html = buildSheet();
  if(!compared){
    html += '<p style="font-size:var(--font-s);margin-top:14px">There it is &mdash; the LLC&rsquo;s own sheet: <span class="mono">A 3,910 &minus; L 1,450 = 2,460</span>. Now the real question:</p>'+
      '<p style="font-size:var(--font-s);font-weight:600;color:var(--primary);margin-top:4px;margin-bottom:10px">How much of this did <em>forming the LLC</em> actually change?</p>'+
      '<button class="btn-continue btn-block" onclick="doCompare()">Hold it against your Module 1 sheet &rarr;</button>';
  } else {
    html += '<div style="background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:8px;padding:14px 16px;margin-top:14px;color:var(--warn-text);font-size:var(--font-s);line-height:1.65">'+
      '<p style="margin-bottom:8px"><strong>Look what moved.</strong> Two lines &mdash; Cash (<span class="mono">0 &rarr; 500</span>) and members&rsquo; capital &mdash; contributed (<span class="mono">1,790 &rarr; 2,290</span>). Both by your <strong>$500</strong>. <strong>Everything else is identical.</strong></p>'+
      '<p>Filing the certificate, signing the agreement, contributing the business, getting the EIN, moving the card &mdash; the entire legal formation changed the recorded economics by <strong>exactly nothing</strong>. The one thing that moved your balance sheet was a decision <em>you</em> made: putting in $500. <strong>Legal form is not economic substance.</strong></p></div>';
    html += '<div class="insight-box" style="margin-top:14px"><div class="insight-label"><i data-lucide="key-round" class="licon"></i> The keystone, settled</div>'+
      '<p style="font-weight:700;color:var(--primary);font-size:var(--font-m);margin-bottom:6px">The accounting entity has been here since 1.1. The legal one is days old.</p>'+
      '<p>This sheet describes a boundary you drew <em>for information</em> back in Module 1 &mdash; years, in a real firm, before any legal body existed. The LLC is a wrapper around it. <strong>Accounting&#8209;entity &ne; legal&#8209;entity</strong>, made concrete: the wrapper changed who can be pursued and whose name is on the account &mdash; not what the records show.</p></div>';
    html += '<button class="btn-continue btn-block" onclick="nav(\'25-3-complete.html\')">Finish Module 2 &rarr;</button>';
  }
  area.innerHTML = html;
  if(window.lucide) lucide.createIcons();
}
function openBooks(){ opened=true; playSuccess(); renderCapstone(); if(window.lucide) lucide.createIcons(); }
function doCompare(){ compared=true; playSuccess(); renderCapstone(); if(window.lucide) lucide.createIcons(); }

document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeGlossary(); });

/* ===== init ===== */
try{ var n = localStorage.getItem('m2Member'); if(n) memberName = n; }catch(e){}
renderCapstone();
</script>
</body>
</html>
