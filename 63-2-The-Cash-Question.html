<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light dark">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Cash Question</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=Open+Sans:wght@400;600;700;800&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    .m6-scope {
      --m6-paper:#ffffff;
      --m6-panel:#f8fafc;
      --m6-ink:#263746;
      --m6-muted:#657583;
      --m6-primary:#155b86;
      --m6-error:#b43b3b;
      --m6-rule:#c8d4dc;
      --m6-rule-strong:#708592;
      --m6-warm:#fff8df;
      --m6-cash:#e7f1fb;
      --m6-accent:#d5a528;
      --m6-shadow:rgba(32,55,72,0.09);
    }
    .m6-doc-wrap, .m6-snapshot-wrap { min-width:0; overflow-x:auto; padding:2px 2px 8px; }
    .m6-doc-card, .m6-snapshot, .m6-reference-strip {
      background:var(--m6-paper);
      color:var(--m6-ink);
      border:1px solid var(--m6-rule);
      border-radius:12px;
      box-shadow:0 8px 24px var(--m6-shadow);
    }
    .m6-doc-card { max-width:820px; min-width:650px; margin:0 auto; padding:24px; }
    .m6-kicker {
      margin:0 0 5px;
      color:var(--m6-muted);
      font-size:11px;
      font-weight:700;
      letter-spacing:.1em;
      text-transform:uppercase;
    }
    .m6-doc-title, .m6-snapshot-title { margin:0; color:var(--m6-primary); }
    .m6-doc-title { font-size:20px; }
    .m6-snapshot-title { font-size:17px; }
    .m6-subline { margin:3px 0 0; color:var(--m6-muted); font-size:12px; font-style:italic; }
    .m6-cash-grid.main-grid { grid-template-columns:minmax(0,1fr) minmax(0,1.18fr) minmax(0,1fr); align-items:stretch; }
    .m6-cash-grid.main-grid > * { min-width:0; }
    .m6-snapshot { min-width:285px; height:100%; padding:18px; box-sizing:border-box; }
    .m6-snapshot-table { margin-top:15px; font-size:12px; }
    .m6-compact-row {
      display:grid;
      grid-template-columns:minmax(178px,1fr) 5.5rem;
      column-gap:8px;
      align-items:baseline;
      padding:4px 5px;
      border-left:3px solid transparent;
      color:var(--m6-ink);
    }
    .m6-compact-lit {
      border-left-color:var(--m6-accent);
      border-radius:3px;
      background:var(--m6-cash);
      color:var(--m6-primary);
      font-weight:700;
    }
    .m6-compact-total { margin-top:3px; padding-top:6px; border-top:1px solid var(--m6-rule-strong); color:var(--m6-primary); font-weight:800; }
    .m6-compact-gap { height:8px; }
    .m6-compact-sub { padding-top:1px; padding-bottom:1px; padding-left:17px; color:var(--m6-muted); font-size:10px; font-style:italic; }
    .m6-value { text-align:right; font-family:"JetBrains Mono",monospace; font-variant-numeric:tabular-nums; }
    .m6-identity-note { margin:12px 2px 0; color:var(--m6-muted); font:italic 10px/1.4 "JetBrains Mono",monospace; text-align:right; }
    .m6-question-card {
      min-height:100%;
      box-sizing:border-box;
      display:flex;
      flex-direction:column;
      padding:22px;
      border:2px dashed var(--m6-accent);
      border-radius:12px;
      background:var(--m6-warm);
      color:var(--m6-ink);
      box-shadow:0 8px 24px var(--m6-shadow);
    }
    .m6-question-title { margin:0; color:var(--m6-primary); font-size:18px; }
    .m6-question-lead { margin:17px 0 0; font-size:13px; line-height:1.5; }
    .m6-question-figure { margin:14px 0 5px; color:var(--m6-error); font:700 27px/1.2 "JetBrains Mono",monospace; text-align:center; }
    .m6-question-range { margin:0 0 18px; color:var(--m6-muted); font:12px/1.4 "JetBrains Mono",monospace; text-align:center; }
    .m6-question-setup { margin:0; color:var(--m6-ink); font-size:13px; font-style:italic; line-height:1.55; }
    .m6-question-foot { margin:auto 0 0; padding-top:18px; border-top:1px solid var(--m6-rule); color:var(--m6-muted); font-size:11px; font-style:italic; line-height:1.45; }
    .m6-reference-strip {
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:8px;
      align-items:center;
      max-width:820px;
      margin:0 auto 16px;
      padding:12px;
      box-sizing:border-box;
    }
    .m6-reference-cell { padding:2px 8px; text-align:center; }
    .m6-reference-cell + .m6-reference-cell { border-left:1px solid var(--m6-rule); }
    .m6-reference-label { margin:0; color:var(--m6-muted); font-size:10px; letter-spacing:.08em; text-transform:uppercase; }
    .m6-reference-date { margin:2px 0 0; color:var(--m6-ink); font-size:11px; }
    .m6-reference-value { margin:5px 0 0; color:var(--m6-primary); font:700 13px/1.35 "JetBrains Mono",monospace; }
    .m6-reference-question .m6-reference-label, .m6-reference-question .m6-reference-value { color:var(--m6-error); }
    .m6-reference-question .m6-reference-date { color:var(--m6-muted); font-style:italic; }
    .m6-table { margin-top:18px; font-size:13px; }
    .m6-row {
      display:grid;
      grid-template-columns:minmax(330px,1fr) 7rem 7rem;
      column-gap:10px;
      align-items:baseline;
      padding:3px 0;
    }
    .m6-row-head { padding-bottom:5px; border-bottom:1px solid var(--m6-rule); color:var(--m6-primary); font-weight:700; }
    .m6-section { margin-top:12px; color:var(--m6-primary); font-weight:800; }
    .m6-item-label { color:var(--m6-ink); font-size:12px; line-height:1.35; }
    .m6-subtotal { margin-top:4px; padding-top:5px; border-top:1px solid var(--m6-rule-strong); font-weight:600; }
    .m6-reconciliation { margin-top:18px; padding-top:7px; border-top:2px solid var(--m6-primary); }
    .m6-net-change { padding-top:5px; border-top:3px double var(--m6-rule-strong); font-weight:700; }
    .m6-ending { color:var(--m6-primary); font-weight:700; }
    .m6-dim { opacity:.18; }
    @media (max-width:760px) {
      .m6-cash-grid.main-grid { grid-template-columns:1fr; }
      .m6-question-card { min-height:260px; }
      .m6-reference-strip { grid-template-columns:1fr; }
      .m6-reference-cell + .m6-reference-cell { padding-top:10px; border-top:1px solid var(--m6-rule); border-left:0; }
    }
    @media (prefers-color-scheme:dark) {
      .m6-scope {
        --m6-paper:#26242e;
        --m6-panel:#211f28;
        --m6-ink:#e8edf1;
        --m6-muted:#b4c0c8;
        --m6-primary:#7dc8f3;
        --m6-error:#ff8f8f;
        --m6-rule:#4b5361;
        --m6-rule-strong:#8797a2;
        --m6-warm:#332f20;
        --m6-cash:#263847;
        --m6-accent:#d8ad3e;
        --m6-shadow:rgba(0,0,0,0.28);
      }
    }
  </style>
</head>
<body>
<div class="page">
  <div class="prework-wrap">
    <div class="tut-header">
      <div class="tut-header-main">
        <h1>The Cash Question</h1>
        <p class="tut-header-sub">Module 6 &middot; ~6 min</p>
      </div>
      <div class="tut-header-actions">
        <button class="icon-btn" title="Glossary" aria-label="Open glossary" onclick="openGlossary()"><i data-lucide="book-open"></i></button>
        <button class="icon-btn" title="Reset this phase" aria-label="Reset this phase" onclick="restart()"><i data-lucide="rotate-ccw"></i></button>
      </div>
    </div>
    <div class="phase-title" id="phaseTitle">The Cash Question</div>

    <div id="beats"></div>
    <div id="mainGrid"></div>
    <div id="tail"></div>
    <div id="controls"></div>
  </div>
</div>

<div class="glossary-overlay" id="glossaryOverlay" onclick="if(event.target===this) closeGlossary()">
  <div class="glossary-panel">
    <div class="glossary-panel-head">
      <div class="glossary-panel-title"><i data-lucide="book-open" class="licon"></i> Glossary</div>
      <button class="glossary-close-btn" aria-label="Close" onclick="closeGlossary()">&times;</button>
    </div>
    <div class="glossary-list" id="glossaryList"></div>
  </div>
</div>

<script src="yale-fy2025-data.js"></script>
<script src="shared.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script>
if(window.lucide) lucide.createIcons();

var audioCtx=null;
function ac(){ if(!audioCtx){ try{audioCtx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } return audioCtx; }
function tone(f,d,t,v){ var c=ac(); if(!c)return; var o=c.createOscillator(),g=c.createGain(); o.type=t||'sine'; o.frequency.value=f; o.connect(g); g.connect(c.destination); g.gain.setValueAtTime(v||0.05,c.currentTime); g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+d); o.start(); o.stop(c.currentTime+d); }
function playClick(){ tone(600,0.08,'sine',0.04); }

var step=0;
var TOTAL_STEPS=5;

function escapeHTML(value){
  return String(value).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function fmt(v){
  if(v===0) return '&mdash;';
  var a=Math.abs(v).toLocaleString('en-US');
  return v<0 ? '('+a+')' : a;
}
function money(v){ return '$'+Math.abs(v).toLocaleString('en-US'); }
function hasYear(list,year){
  if(!list) return false;
  for(var i=0;i<list.length;i++) if(list[i]===year) return true;
  return false;
}
function displayValue(row,year){
  if(hasYear(row.dashFor,year)) return '&mdash;';
  return fmt(row[year]);
}
function compactRow(label,value,extraClass){
  return '<div class="m6-compact-row'+(extraClass?' '+extraClass:'')+'"><div>'+label+'</div><div class="m6-value">'+fmt(value)+'</div></div>';
}
function compactSnapshot(year,label){
  var d=window.YALE_FY2025.compactSFP[year];
  var yearText=year==='y2025'?'2025':'2024';
  var noncash=d.totalAssets-d.cash;
  var rows=compactRow('Cash and cash equivalents',d.cash,'m6-compact-lit')
    +compactRow('Noncash assets <em>(incl. '+fmt(d.investments)+' investments)</em>',noncash,'')
    +compactRow('Total assets',d.totalAssets,'m6-compact-total')
    +'<div class="m6-compact-gap"></div>'
    +compactRow('&minus; Total liabilities',d.totalLiab,'')
    +compactRow('= NA without donor restrictions',d.naWithout,'m6-compact-total')
    +compactRow('&#8627; of which Yale University',d.naWithoutYale,'m6-compact-sub')
    +compactRow('&#8627; of which noncontrolling interests',d.naWithoutNCI,'m6-compact-sub')
    +compactRow('+ NA with donor restrictions',d.naWith,'')
    +compactRow('= Total net assets',d.totalNA,'m6-compact-total');
  return '<div class="m6-snapshot-wrap"><div class="m6-snapshot"><p class="m6-kicker">'+label+'</p>'
    +'<h3 class="m6-snapshot-title">Statement of Financial Position</h3>'
    +'<p class="m6-subline">June 30, '+yearText+' &middot; in $ millions</p>'
    +'<div class="m6-snapshot-table">'+rows+'</div>'
    +'<p class="m6-identity-note">'+fmt(d.totalAssets)+' &minus; '+fmt(d.totalLiab)+' = '+fmt(d.totalNA)+' &#10003;</p></div></div>';
}
function questionCard(){
  var beginning=window.YALE_FY2025.compactSFP.y2024;
  var ending=window.YALE_FY2025.compactSFP.y2025;
  var decrease=beginning.cash-ending.cash;
  var assetsBillions=Math.round(ending.totalAssets/1000);
  var investmentsBillions=(ending.investments/1000).toFixed(1);
  return '<div class="m6-question-card"><p class="m6-kicker">The question</p>'
    +'<h3 class="m6-question-title">What happened to cash?</h3>'
    +'<p class="m6-question-lead">Cash and cash equivalents decreased by</p>'
    +'<p class="m6-question-figure">$'+decrease.toLocaleString('en-US')+' million</p>'
    +'<p class="m6-question-range">'+money(beginning.cash)+' &rarr; '+money(ending.cash)+'</p>'
    +'<p class="m6-question-setup">Out of $'+assetsBillions+' billion in recorded assets &mdash; $'+investmentsBillions+' billion of it in the endowment&rsquo;s investments &mdash; Cash on the Statement of Financial Position moved a few hundred million. Where did money come from, and where did it go?</p>'
    +'<p class="m6-question-foot">The Cash Flow Statement is the explanatory statement that traces what happened to cash.</p></div>';
}
function cashQuestionView(){
  return '<div class="m6-scope"><div class="main-grid m6-cash-grid">'
    +compactSnapshot('y2024','Beginning')+questionCard()+compactSnapshot('y2025','Ending')+'</div></div>';
}
function referenceStrip(){
  var beginning=window.YALE_FY2025.compactSFP.y2024.cash;
  var ending=window.YALE_FY2025.compactSFP.y2025.cash;
  var delta=ending-beginning;
  return '<div class="m6-reference-strip">'
    +'<div class="m6-reference-cell"><p class="m6-reference-label">Beginning SFP</p><p class="m6-reference-date">June 30, 2024</p><p class="m6-reference-value">Cash '+fmt(beginning)+'</p></div>'
    +'<div class="m6-reference-cell m6-reference-question"><p class="m6-reference-label">Question</p><p class="m6-reference-value">'+fmt(delta)+'</p><p class="m6-reference-date">What happened to cash?</p></div>'
    +'<div class="m6-reference-cell"><p class="m6-reference-label">Ending SFP</p><p class="m6-reference-date">June 30, 2025</p><p class="m6-reference-value">Cash '+fmt(ending)+'</p></div></div>';
}
function cfsCell(row,year,dimPrior){
  return '<div class="m6-value'+(dimPrior && year==='y2024'?' m6-dim':'')+'">'+displayValue(row,year)+'</div>';
}
function cfsRow(row,type,dimPrior){
  var cls='m6-row';
  if(type==='subtotal') cls+=' m6-subtotal';
  if(type==='net') cls+=' m6-net-change';
  if(type==='ending') cls+=' m6-ending';
  return '<div class="'+cls+'"><div class="'+(type==='line'?'m6-item-label':'')+'">'+escapeHTML(row.label)+'</div>'
    +cfsCell(row,'y2025',dimPrior)+cfsCell(row,'y2024',dimPrior)+'</div>';
}
function reconciliationRows(data,dimPrior){
  return '<div class="m6-reconciliation">'
    +cfsRow({label:'Net (decrease) increase in cash and cash equivalents',y2025:data.netChange.y2025,y2024:data.netChange.y2024},'net',dimPrior)
    +cfsRow({label:'Cash and cash equivalents, beginning of year',y2025:data.beginning.y2025,y2024:data.beginning.y2024},'line',dimPrior)
    +cfsRow({label:'Cash and cash equivalents, end of year',y2025:data.ending.y2025,y2024:data.ending.y2024},'ending',dimPrior)
    +'</div>';
}
function cfsDocument(currentStep){
  var data=window.YALE_FY2025.socf2Year;
  var dimPrior=currentStep>=2;
  var showSections=currentStep<4;
  var showItems=currentStep<3;
  var keys=['operating','investing','financing'];
  var sectionHeaders={operating:'Operating activities:',investing:'Investing activities:',financing:'Financing activities:'};
  var rows=currentStep===4?'':'<div class="m6-row m6-row-head"><div></div><div class="m6-value">2025</div><div class="m6-value'+(dimPrior?' m6-dim':'')+'">2024</div></div>';
  if(showSections){
    keys.forEach(function(key){
      var section=data[key];
      rows+='<div class="m6-section">'+sectionHeaders[key]+'</div>';
      if(showItems){
        section.items.forEach(function(item){ rows+=cfsRow(item,'line',dimPrior); });
      }
      rows+=cfsRow({label:section.label,y2025:section.subtotal.y2025,y2024:section.subtotal.y2024},'subtotal',dimPrior);
    });
  }
  rows+=reconciliationRows(data,dimPrior);
  return '<div class="m6-scope">'+referenceStrip()+'<div class="m6-doc-wrap"><div class="m6-doc-card">'
    +'<p class="m6-kicker">Yale University &middot; from the report &middot; page 23</p>'
    +'<h2 class="m6-doc-title">Consolidated Statements of Cash Flows</h2>'
    +'<p class="m6-subline">for the years ended June 30, 2025 and 2024</p>'
    +'<p class="m6-subline">In $ millions</p>'
    +'<div class="m6-table">'+rows+'</div></div></div></div>';
}
function render(){
  renderBeats(step);
  renderGrid(step);
  renderTail(step);
  renderControls(step);
  if(window.lucide) lucide.createIcons();
}
function renderBeats(currentStep){
  var text='';
  if(currentStep===0){
    text='Both Statements of Financial Position collapse to a compact form, and Net Assets expands into its two donor-restriction buckets &mdash; <strong>Without donor restrictions</strong> (with a small noncontrolling-interests sub-line: $5M of the $10,762M total) and <strong>With donor restrictions</strong> ($38,609M &mdash; 78% of the difference; most of Yale&rsquo;s net assets are restricted by donor intent). Cash is highlighted on both dates. It decreased by $293 million across the year. What happened?';
  } else if(currentStep===1){
    text='Here is Yale&rsquo;s Cash Flow Statement, as it appears on page 23 of the report. The Statements of Financial Position step aside; the cash question stays in the strip above. Two year-columns &mdash; 2025 and 2024 &mdash; three sections (Operating, Investing, Financing), plus a reconciliation footer. Yale uses the <strong>indirect method</strong>: Operating opens with Change in net assets ($3,334M) and reverses out non-cash items to arrive at Net cash used in operating activities of $(500)M. A nonprofit twist: contributions for the endowment are treated as <strong>Financing</strong>, not Operating &mdash; they are permanent capital, closer in kind to what owners contribute at a company.';
  } else if(currentStep===2){
    text='The 2025 column covers exactly the period between the two Statements of Financial Position &mdash; July 1, 2024 to June 30, 2025 &mdash; the year being explained. The 2024 column reports an earlier period that connects neither snapshot. Set it aside.';
  } else if(currentStep===3){
    text='Inside the 2025 column, the line items collapse. What remains is the skeleton: Net cash used in operating activities $(500)M, net cash used in investing activities $(602)M, net cash provided by financing activities $722M, plus the reconciliation footer. The three sections sum to a single net change in cash: $(380)M.';
  } else if(currentStep===4){
    text='Even the section subtotals fall away. What is left is the Cash Flow Statement&rsquo;s bottom-line answer to the cash question: cash &mdash; in the CFS&rsquo;s scope &mdash; decreased by $380 million for the year, from $1,205M to $825M. Hold on: the Statement of Financial Position said cash fell $293 million. The next page takes up exactly that.';
  }
  document.getElementById('beats').innerHTML='<div class="narrative-block"><p>'+text+'</p></div>';
}
function renderGrid(currentStep){
  document.getElementById('mainGrid').innerHTML=currentStep===0?cashQuestionView():cfsDocument(currentStep);
}
function renderTail(currentStep){
  document.getElementById('tail').innerHTML=currentStep===4
    ? '<div class="insight-box">Two cash answers &mdash; $(293)M on the Statements of Financial Position and $(380)M here &mdash; and the difference is the next page&rsquo;s subject.</div>'
    : '';
}
function renderControls(currentStep){
  var h='<div class="nav-buttons">';
  if(currentStep>0) h+='<button class="btn-back" onclick="back()">&larr; Back</button>';
  if(currentStep<TOTAL_STEPS-1) h+='<button class="btn-next" onclick="advance()">Next &rarr;</button>';
  else h+='<button class="btn-continue" onclick="playClick();nav(\'63-3-Read-the-Labels.html\')">Read the Labels &rarr;</button>';
  h+='</div>';
  document.getElementById('controls').innerHTML=h;
}
function advance(){
  playClick();
  step=Math.min(step+1,TOTAL_STEPS-1);
  render();
  window.scrollTo(0,0);
}
function back(){
  playClick();
  step=Math.max(step-1,0);
  render();
  window.scrollTo(0,0);
}

var glossaryTerms=[
  {term:'Indirect method',def:'A presentation that begins with change in net assets and adjusts for non-cash items and changes in operating assets and liabilities to reach operating cash flow.'},
  {term:'Operating / Investing / Financing activities',def:'The three Cash Flow Statement sections: mission-related operations, purchases and sales of long-lived assets and investments, and transactions involving long-term funding.'},
  {term:'Net change in cash',def:'The combined cash effect of Operating, Investing, and Financing activities during the period.'},
  {term:'Endowment contributions as Financing',def:'Gifts restricted for Yale&rsquo;s endowment are permanent capital, so Yale classifies their cash effect as Financing rather than Operating.'}
];
function openGlossary(){
  document.getElementById('glossaryList').innerHTML=glossaryTerms.map(function(item){
    return '<div class="glossary-entry"><div class="glossary-entry-term">'+item.term+'</div><div class="glossary-entry-def">'+item.def+'</div></div>';
  }).join('');
  document.getElementById('glossaryOverlay').classList.add('open');
}
function closeGlossary(){ document.getElementById('glossaryOverlay').classList.remove('open'); }
function restart(){ window.location.reload(); }
document.addEventListener('keydown',function(e){ if(e.key==='Escape') closeGlossary(); });

window.devFill=function(){
  step=TOTAL_STEPS-1;
  render();
};
render();
</script>
<script src="dev.js"></script>
</body>
</html>
