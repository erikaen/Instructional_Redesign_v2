<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light dark">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tutorial 1.4 · Walk Liabilities</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Open+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="page">
  <div class="prework-wrap">

    <div class="tut-header">
      <div class="tut-header-main">
        <h1>Tutorial 1.4: Keeping the Reasons</h1>
        <div class="tut-header-sub">Phase 7 of 11 — Walk Liabilities</div>
      </div>
      <div class="tut-header-actions">
        <button class="icon-btn" title="Glossary" aria-label="Open glossary" onclick="openGlossary()"><i data-lucide="book-open"></i></button>
      </div>
    </div>

    <div class="phase active" id="phase-walk-liab"></div>

  </div>
</div>

<div class="glossary-overlay" id="glossaryOverlay" onclick="if(event.target===this) closeGlossary()">
  <div class="glossary-panel">
    <div class="glossary-panel-head">
      <div class="glossary-panel-title"><i data-lucide="book-open" class="licon"></i> Glossary</div>
      <button class="glossary-close-btn" aria-label="Close" onclick="closeGlossary()">&times;</button>
    </div>
    <div class="glossary-list" id="glossaryList"></div>
  </div>
</div>

<div class="glossary-overlay" id="evidenceOverlay" onclick="if(event.target===this) closeEvidence()">
  <div class="glossary-panel" id="evidencePanel"></div>
</div>

<script src="14-shared.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script>
window.WB_PHASE = 'walk-liab';
window.WB_WC_ANSWERED = true;
window.WB_ASSETS_EXPANDED = { CARD: true };
window.WB_ACTIVE_TAB = 'liabilities';

/* ===== Cumulative reasons carried in from prior phases =====
   Equipment(6) + Computer(1) + Supplies(2) + Fixtures(1) + RoU(2) = 12 */
var r3Created = ['e_stand','e_tools','e_comp','e_wash','e_tru','e_gear','e_laptop','e_parts','e_partsused','e_fix','e_rent','e_rentused'];
var r3Paired = {};      /* event id -> true once its second half is found (⟷) */

/* ===== Phase state ===== */
var LIAB_WALK_ROWS = ['w_li_tools','w_li_fix','w_li_comp','w_li_wash','w_li_tru','w_li_parts','w_li_pay1','w_li_pay2','w_li_smith'];
var rowActive = null;
var rowAtt = {};
var rowNudge = null;
var rowAuto = null;     /* 'liab' while autocompleting */
var cardExpanded = true;

function createReason(id){ if(r3Created.indexOf(id) === -1) r3Created.push(id); }

function rowDone(rowId){
  var re = ROW_EVENT[rowId];
  if(!re) return false;
  return re.side === 1 ? r3Created.indexOf(re.id) !== -1 : !!r3Paired[re.id];
}

function recordRow(rowId){
  var re = ROW_EVENT[rowId];
  if(re.side === 1) createReason(re.id);
  else r3Paired[re.id] = true;
}

function handleRowClick(rowId, ev){
  if(ev && ev.target && ev.target.closest && ev.target.closest('.xl-info, .xl-toggle')) return;
  if(!ROW_EVENT[rowId] || rowDone(rowId) || rowAuto) return;
  playClick();
  rowActive = rowId;
  rowNudge = null;
  render();
}

function handleRowAnswer(rowId, ok){
  if(ok){
    playSuccess(); recordRow(rowId);
    rowActive = null; rowNudge = null;
  } else {
    var n = (rowAtt[rowId] || 0) + 1;
    rowAtt[rowId] = n; playNope();
    if(n >= 3){ recordRow(rowId); rowActive = null; rowNudge = null; }
    else rowNudge = rowId;
  }
  render();
}

function handleRowAutocomplete(){
  if(rowAuto) return;
  playClick(); rowAuto = 'liab'; rowActive = null; rowNudge = null;
  render();
  var remaining = LIAB_WALK_ROWS.filter(function(id){ return !rowDone(id); });
  remaining.forEach(function(id, i){
    setTimeout(function(){
      recordRow(id); render();
      if(i === remaining.length - 1){
        setTimeout(function(){ rowAuto = null; playSuccess(); render(); }, 300);
      }
    }, i * 180);
  });
}

function toggleCard(){
  playClick();
  cardExpanded = !cardExpanded;
  render();
}

/* Stable reuse candidates: correct reason + 2 others, in r3Created order */
function reuseCandidates(correctId){
  var others = r3Created.filter(function(id){
    return id !== correctId && EV_BY_ID[id].otherWin && !r3Paired[id];
  });
  if(others.length < 2){
    others = others.concat(r3Created.filter(function(id){
      return id !== correctId && others.indexOf(id) === -1;
    }).slice(0, 2 - others.length));
  }
  others = others.slice(0, 2);
  var pool = others.concat([correctId]);
  pool.sort(function(a, b){ return r3Created.indexOf(a) - r3Created.indexOf(b); });
  return pool;
}

function showLiabReceipt(kind, evt){
  if(evt && evt.stopPropagation) evt.stopPropagation();
  var html = '';
  if(kind === 'card'){
    var rows = CARD_EV.items.map(function(it){
      return '<tr><td>'+esc(it.name)+'</td><td class="num">$'+it.amt.toLocaleString('en-US')+'</td></tr>';
    }).join('');
    html =
      '<div class="glossary-panel-head"><div class="glossary-panel-title"><i data-lucide="credit-card" class="licon"></i> Evidence &mdash; card statement</div><button class="glossary-close-btn" aria-label="Close" onclick="closeEvidence()">&times;</button></div>'+
      '<div class="dep-receipt">'+
        '<div class="dep-receipt-head"><span class="dep-receipt-label">'+esc(CARD_EV.vendor)+'</span><span class="dep-receipt-meta">'+esc(CARD_EV.meta)+'</span></div>'+
        '<table class="dep-receipt-table"><tbody>'+rows+
          '<tr class="total"><td>Total charged</td><td class="num">$'+CARD_EV.charges.toLocaleString('en-US')+'</td></tr>'+
          '<tr><td>Paid this period</td><td class="num">&minus;$'+CARD_EV.payments.toLocaleString('en-US')+'</td></tr>'+
          '<tr class="total"><td>Balance owed</td><td class="num">$'+CARD_EV.balance.toLocaleString('en-US')+'</td></tr>'+
        '</tbody></table>'+
      '</div>';
  } else { /* smith */
    html =
      '<div class="glossary-panel-head"><div class="glossary-panel-title"><i data-lucide="file-text" class="licon"></i> Evidence &mdash; Smith&rsquo;s deposit</div><button class="glossary-close-btn" aria-label="Close" onclick="closeEvidence()">&times;</button></div>'+
      '<div class="dep-receipt">'+
        '<p class="prose">'+esc(SMITH_EV.note)+'</p>'+
      '</div>';
  }
  document.getElementById('evidencePanel').innerHTML = html;
  document.getElementById('evidenceOverlay').classList.add('open');
  if(window.lucide) lucide.createIcons();
}

/* ===== Renderers ===== */
function renderLiabSheet(){
  var html = '<div class="xlwb">'+
    '<div class="xlwb-bar"><span class="xlwb-bar-title"><i data-lucide="file-spreadsheet" class="licon"></i> <span class="mono">Bike-Repair.xlsx:1</span></span><span class="xlwb-bar-sheet">Liabilities</span></div>'+
    '<div>';
  html += '<div class="xl-row xl-head"><div class="xl-gutter"></div><div class="xl-rownum"></div><div class="xl-c">A&nbsp;&nbsp;Liability (what I owe)</div><div class="xl-v">B&nbsp;&nbsp;Amount</div></div>';

  var n = 0;

  /* Smith row */
  var smithRec = rowDone('w_li_smith');
  var smithAct = rowActive === 'w_li_smith';
  var smithClickable = !smithRec && !rowAuto;
  n++;
  var smithRowClass = 'xl-row xl-item' + (smithAct ? ' selected' : '');
  var smithOnclick = smithClickable ? ' onclick="handleRowClick(\'w_li_smith\', event)"' : '';
  html += '<div class="'+smithRowClass+'"'+smithOnclick+'>'+
    '<div class="xl-gutter"></div>'+
    '<div class="xl-rownum">'+n+'</div>'+
    '<div class="xl-c">'+(smithRec?'<i data-lucide="check" class="licon"></i> ':'')+esc(LIABILITIES_SNAPSHOT[0].label)+
      ' <button class="xl-info" title="See the receipt" onclick="showLiabReceipt(\'smith\', event)"><i data-lucide="info" class="licon"></i></button></div>'+
    '<div class="xl-v">'+xlDollars(LIABILITIES_SNAPSHOT[0].amount)+'</div></div>';

  /* Card category row (expandable) */
  n++;
  html += '<div class="xl-row xl-cat">'+
    '<div class="xl-gutter"><button class="xl-toggle" onclick="toggleCard()" aria-expanded="'+cardExpanded+'">'+(cardExpanded?'−':'+')+'</button></div>'+
    '<div class="xl-rownum">'+n+'</div>'+
    '<div class="xl-c">'+esc(LIABILITIES_SNAPSHOT[1].label)+'</div>'+
    '<div class="xl-v">'+xlDollars(LIABILITIES_SNAPSHOT[1].amount)+'</div></div>';

  /* Card statement rows */
  if(cardExpanded){
    var cardRows = PAIRS_WINDOWS.liab.rows.filter(function(r){ return r.id !== 'w_li_smith'; });
    cardRows.forEach(function(r){
      n++;
      var rRec = rowDone(r.id);
      var rAct = rowActive === r.id;
      var canClick = !rRec && !rowAuto;
      var rowClass = 'xl-row xl-item' + (rAct ? ' selected' : '');
      var onclick = canClick ? ' onclick="handleRowClick(\''+r.id+'\', event)"' : '';
      html += '<div class="'+rowClass+'"'+onclick+'>'+
        '<div class="xl-gutter"></div>'+
        '<div class="xl-rownum">'+n+'</div>'+
        '<div class="xl-c">'+(rRec?'<i data-lucide="check" class="licon"></i> ':'')+esc(r.label)+'</div>'+
        '<div class="xl-v">'+signedDollars(r.delta)+'</div></div>';
    });
    n++;
    html += '<div class="xl-row xl-item"><div class="xl-gutter"></div><div class="xl-rownum">'+n+'</div><div class="xl-c"><em>From the statement (Doc 6): $2,030 charged &minus; $800 repaid</em></div><div class="xl-v"><em>= $1,230</em></div></div>';
  }

  html += '<div class="xl-row xl-total"><div class="xl-gutter"></div><div class="xl-rownum"></div><div class="xl-c">TOTAL &mdash; what I owe</div><div class="xl-v">'+xlDollars(LIABILITIES_TOTAL)+'</div></div>';
  html += '</div>';
  html += '<div class="xlwb-tabs">'+
    '<button class="xlwb-tab" type="button">Assets</button>'+
    '<button class="xlwb-tab active" type="button">Liabilities</button>'+
    '<button class="xlwb-tab" type="button">Cash</button>'+
    '<button class="xlwb-tab" type="button">Reasons <span class="xl-new-tag">new</span></button>'+
  '</div>';
  html += '</div>';
  return html;
}

function renderReasonsWindowHTML(){
  var html = '<div class="xlwb">'+
    '<div class="xlwb-bar"><span class="xlwb-bar-title"><i data-lucide="file-spreadsheet" class="licon"></i> <span class="mono">Bike-Repair.xlsx:2</span></span><span class="xlwb-bar-sheet">Reasons &mdash; side by side</span></div>'+
    '<div>';
  html += '<div class="xl-row xl-head"><div class="xl-gutter"></div><div class="xl-rownum"></div><div class="xl-c">Reason</div><div class="xl-v">Δ</div></div>';
  r3Created.forEach(function(id){
    var e = EV_BY_ID[id];
    var d = WINROW_BY_ID[e.rowId].delta;
    var paired = !!r3Paired[id];
    var pairBadge = paired && e.otherWin ? ' <span class="reason-pair-badge">&lrarr; '+LIST_LABEL[e.otherWin]+'</span>' : '';
    html += '<div class="xl-row xl-item">'+
      '<div class="xl-gutter"></div>'+
      '<div class="xl-rownum"></div>'+
      '<div class="xl-c"><strong>'+LIST_LABEL[e.win]+'</strong> &mdash; '+esc(e.reason)+pairBadge+'</div>'+
      '<div class="xl-v">'+signedDollars(d)+'</div></div>';
  });
  html += '<div class="xl-row xl-total"><div class="xl-gutter"></div><div class="xl-rownum"></div><div class="xl-c">'+r3Created.length+' '+(r3Created.length === 1 ? 'reason' : 'reasons')+' so far</div><div class="xl-v"></div></div>';
  html += '</div></div>';
  return html;
}

function renderReuseCard(rowId){
  var re = ROW_EVENT[rowId];
  var row = WINROW_BY_ID[rowId];
  var att = rowAtt[rowId] || 0;
  var html = '<div class="mcq-card">'+
    '<div class="mcq-question"><span>'+esc(row.label)+' ('+signedDollars(row.delta)+')</span> &mdash; you&rsquo;ve seen this event before. Which reason already explains it?</div>'+
    '<div class="mcq-choices">';
  reuseCandidates(re.id).forEach(function(cid){
    var ok = cid === re.id;
    html += '<button class="mcq-choice" onclick="handleRowAnswer(\''+rowId+'\', '+ok+')">'+esc(EV_BY_ID[cid].reason)+'</button>';
  });
  html += '<button class="mcq-choice" onclick="showLiabReceipt(\'card\', event)"><i data-lucide="info" class="licon"></i> See the statement</button>';
  html += '</div>';
  if(rowNudge === rowId && att < 3){
    html += '<div class="mcq-fb err show"><strong>Hint '+att+'/2:</strong> '+(att === 1
      ? 'Read the row &mdash; vendor, date, amount &mdash; then scan your Reasons window for the same event.'
      : 'Match the amount: this row moved '+signedDollars(row.delta)+'. Only one reason moved exactly that much.')+'</div>';
  }
  html += '</div>';
  return html;
}

function renderPaydownCard(rowId){
  var att = rowAtt[rowId] || 0;
  var label = WINROW_BY_ID[rowId].label;
  var html = '<div class="mcq-card">'+
    '<div class="mcq-question"><span>'+esc(label)+' (&minus;$400)</span> &mdash; this one&rsquo;s new. What happened?</div>'+
    '<div class="mcq-choices">'+
      '<button class="mcq-choice" onclick="handleRowAnswer(\''+rowId+'\', true)">Paid the card down &mdash; what you owe shrank by $400</button>'+
      '<button class="mcq-choice" onclick="handleRowAnswer(\''+rowId+'\', false)">Bought something more on the card</button>'+
      '<button class="mcq-choice" onclick="handleRowAnswer(\''+rowId+'\', false)">The card company charged a fee</button>'+
      '<button class="mcq-choice" onclick="showLiabReceipt(\'card\', event)"><i data-lucide="info" class="licon"></i> See the statement</button>'+
    '</div>';
  if(rowNudge === rowId && att < 3){
    html += '<div class="mcq-fb err show"><strong>Hint '+att+'/2:</strong> '+(att === 1
      ? 'The statement calls it a payment &mdash; money went TO the card company, and the minus sign says what you owe went down.'
      : 'A payment shrinks the balance: $2,030 charged &minus; $800 paid = $1,230 owed.')+'</div>';
  }
  html += '</div>';
  return html;
}

function renderSmithCard(){
  var att = rowAtt['w_li_smith'] || 0;
  var html = '<div class="mcq-card">'+
    '<div class="mcq-question">Smith paid you <strong>$220</strong> up front for a frame you haven&rsquo;t built. What do you owe him?</div>'+
    '<div class="mcq-choices">'+
      '<button class="mcq-choice" onclick="handleRowAnswer(\'w_li_smith\', true)">Work &mdash; the frame he already paid for</button>'+
      '<button class="mcq-choice" onclick="handleRowAnswer(\'w_li_smith\', false)">Money &mdash; you&rsquo;ll repay him a loan</button>'+
      '<button class="mcq-choice" onclick="handleRowAnswer(\'w_li_smith\', false)">Nothing &mdash; the $220 is simply yours</button>'+
      '<button class="mcq-choice" onclick="showLiabReceipt(\'smith\', event)"><i data-lucide="info" class="licon"></i> See the receipt</button>'+
    '</div>';
  if(rowNudge === 'w_li_smith' && att < 3){
    html += '<div class="mcq-fb err show"><strong>Hint '+att+'/2:</strong> '+(att === 1
      ? 'Smith bought a frame, not lent you money &mdash; and the $220 isn&rsquo;t free: it binds you to something.'
      : 'You owe him the work &mdash; or his money back if you never do it. An obligation to hand over cash or work.')+'</div>';
  }
  html += '</div>';
  return html;
}

function render(){
  var doneCount = LIAB_WALK_ROWS.filter(rowDone).length;
  var allDone = doneCount === LIAB_WALK_ROWS.length;
  var activeRe = rowActive && LIAB_WALK_ROWS.indexOf(rowActive) !== -1 ? ROW_EVENT[rowActive] : null;
  var triggerMet = doneCount >= 3 && !allDone && !rowActive && !rowAuto;

  var html = '';
  html += annaBox(
    'Flip to <strong>Liabilities</strong> (what you owe). I expanded the card so you can see the <em>statement&rsquo;s</em> rows. Now read the first charge &hellip; Cyclesport, May 5, $300. <strong>You&rsquo;ve seen that event before.</strong> Work down the list: click each item, and then check the Reasons tab on the right window. If a reason already explains a row, find it; if a row is truly new, write it into the Reasons tab. Once a row is worked, a checkmark appears, and you can move on to the next one.',
    true
  );

  html += '<div class="walk-pane">'+renderLiabSheet()+renderReasonsWindowHTML()+'</div>';

  if(activeRe){
    if(activeRe.side === 2){
      html += renderReuseCard(rowActive);
    } else if(rowActive === 'w_li_pay1' || rowActive === 'w_li_pay2'){
      html += renderPaydownCard(rowActive);
    } else if(rowActive === 'w_li_smith'){
      html += renderSmithCard();
    }
  }

  if(triggerMet){
    html += '<div class="gate-armed">'+
      '<p><strong>You&rsquo;ve got the rhythm.</strong> Work through the rest of the statement?</p>'+
      '<button class="btn-continue btn-block" onclick="handleRowAutocomplete()">Do the rest &rarr;</button>'+
    '</div>';
  } else if(rowAuto === 'liab'){
    html += '<div class="system-banner"><div class="system-banner-title"><i data-lucide="settings" class="licon"></i> Matching reasons, writing the new ones&hellip;</div></div>';
  } else if(doneCount > 0 && !activeRe && !allDone){
    html += '<p class="prose"><em>Click the next row on the Liabilities tab to record it.</em></p>';
  }

  if(allDone && !rowAuto){
    html += insightBox('Two kinds of owing &mdash; and six rows that needed no new reason.',
      '<p>You&rsquo;ll settle the card with <strong>money</strong>; you&rsquo;ll settle Smith with <strong>work</strong>. A liability is a present obligation to hand over one or the other. And notice: six of the statement&rsquo;s rows were <em>already explained</em>: the <strong>same reason</strong> now touches two lists (that&rsquo;s the <strong>&lrarr;</strong> badge). The card company kept that record <em>for</em> you.</p>'
    );
  }

  /* Proceed button — non-navigating per standalone-file design */
  html += '<button class="btn-continue btn-block" type="button">Next &mdash; Cash &rarr;</button>';

  document.getElementById('phase-walk-liab').innerHTML = html;
  if(window.lucide) lucide.createIcons();
}

render();
if(window.lucide) lucide.createIcons();
</script>
</body>
</html>
