<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light dark">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tutorial 1.4 · Walk Fixtures</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Open+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="page">
  <div class="prework-wrap">

    <div class="tut-header">
      <div class="tut-header-main">
        <h1>Tutorial 1.4: Keeping the Reasons</h1>
        <div class="tut-header-sub">Phase 5 of 11 — Walk Fixtures</div>
      </div>
      <div class="tut-header-actions">
        <button class="icon-btn" title="Glossary" aria-label="Open glossary" onclick="openGlossary()"><i data-lucide="book-open"></i></button>
      </div>
    </div>

    <div class="phase active" id="phase-walk-fixtures"></div>

  </div>
</div>

<div class="glossary-overlay" id="glossaryOverlay" onclick="if(event.target===this) closeGlossary()">
  <div class="glossary-panel">
    <div class="glossary-panel-head">
      <div class="glossary-panel-title"><i data-lucide="book-open" class="licon"></i> Glossary</div>
      <button class="glossary-close-btn" aria-label="Close" onclick="closeGlossary()">&times;</button>
    </div>
    <div class="glossary-list" id="glossaryList"></div>
  </div>
</div>

<div class="glossary-overlay" id="evidenceOverlay" onclick="if(event.target===this) closeEvidence()">
  <div class="glossary-panel" id="evidencePanel"></div>
</div>

<script src="14-shared.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script>
window.WB_PHASE = 'walk-fixtures';
window.WB_WC_ANSWERED = true;
window.WB_ASSETS_EXPANDED = { FIXTURES: true };

var eqItemRecorded = {};
var eqActiveItem = null;
var eqItemAttempts = {};
var eqItemNudge = null;
/* Reasons recorded in prior phases: equipment (6) + computer (1) + supplies (2) = 9 */
var r3Created = ['e_stand','e_tools','e_comp','e_wash','e_tru','e_gear','e_laptop','e_parts','e_partsused'];

function recordGroup(groupId){
  var members = [].concat(EQUIP_ITEMS, COMP_ITEMS, FIX_ITEMS).filter(function(it){ return it.group === groupId; });
  members.forEach(function(it){ eqItemRecorded[it.name] = it.source; });
  var eid = GROUP_TO_EVENT[groupId];
  if(eid && r3Created.indexOf(eid) === -1) r3Created.push(eid);
}

function handleEqItemClick(name, ev){
  if(ev && ev.target && ev.target.closest && ev.target.closest('.xl-info, .xl-toggle')) return;
  if(eqItemRecorded[name]) return;
  playClick();
  eqActiveItem = name;
  eqItemNudge = null;
  render();
}

function handleEqItemAnswer(name, source){
  var item = ITEM_BY_NAME[name];
  if(source === item.source){
    playSuccess();
    recordGroup(item.group);
    eqActiveItem = null;
    eqItemNudge = null;
  } else {
    var n = (eqItemAttempts[name] || 0) + 1;
    eqItemAttempts[name] = n;
    playNope();
    if(n >= 3){
      recordGroup(item.group);
      eqActiveItem = null;
      eqItemNudge = null;
    } else {
      eqItemNudge = { item: name, attempted: source };
    }
  }
  render();
}

function showReceipt(groupId, evt){
  if(evt && evt.stopPropagation) evt.stopPropagation();
  var g = EQUIP_GROUPS.filter(function(x){ return x.id === groupId; })[0];
  if(!g) return;
  var ev = g.ev;
  var itemsRows = ev.items.map(function(it){
    return '<tr><td>'+esc(it.name)+'</td><td class="num">$'+it.amt.toLocaleString('en-US')+'</td></tr>';
  }).join('');
  document.getElementById('evidencePanel').innerHTML =
    '<div class="glossary-panel-head">'+
      '<div class="glossary-panel-title"><i data-lucide="receipt" class="licon"></i> Evidence &mdash; receipt</div>'+
      '<button class="glossary-close-btn" aria-label="Close" onclick="closeEvidence()">&times;</button>'+
    '</div>'+
    '<div class="dep-receipt">'+
      '<div class="dep-receipt-head">'+
        '<span class="dep-receipt-label">'+esc(ev.vendor)+'</span>'+
        '<span class="dep-receipt-meta">'+esc(ev.meta)+'</span>'+
      '</div>'+
      '<table class="dep-receipt-table"><tbody>'+itemsRows+
        '<tr class="total"><td>Total</td><td class="num">$'+g.amount.toLocaleString('en-US')+'</td></tr>'+
      '</tbody></table>'+
      '<div class="dep-receipt-note"><strong>Paid:</strong> '+esc(ev.paid)+'</div>'+
    '</div>';
  document.getElementById('evidenceOverlay').classList.add('open');
  if(window.lucide) lucide.createIcons();
}

function renderAssetsSheetWithInteractive(interactiveCat){
  var html = '<div class="xlwb">'+
    '<div class="xlwb-bar"><span class="xlwb-bar-title"><i data-lucide="file-spreadsheet" class="licon"></i> <span class="mono">Bike-Repair.xlsx:1</span></span><span class="xlwb-bar-sheet">Assets sheet</span></div>'+
    '<div>';
  html += '<div class="xl-row xl-head"><div class="xl-gutter"></div><div class="xl-rownum"></div><div class="xl-c">A&nbsp;&nbsp;Asset</div><div class="xl-v">B&nbsp;&nbsp;Value</div></div>';
  var n = 0;
  ASSETS_SNAPSHOT.forEach(function(cat){
    if(cat.cat === 'CASH') return;
    var label = cat.cat === 'RIGHT OF USE' ? 'Right of Use' : (cat.cat.charAt(0) + cat.cat.slice(1).toLowerCase());
    var open = (cat.cat === interactiveCat);
    n++;
    html += '<div class="xl-row xl-cat"><div class="xl-gutter"></div><div class="xl-rownum">'+n+'</div><div class="xl-c">'+label+'</div><div class="xl-v">'+xlDollars(cat.subtotal)+'</div></div>';
    if(open){
      cat.items.forEach(function(it){
        n++;
        var rec = !!eqItemRecorded[it.name];
        var act = eqActiveItem === it.name;
        var canClick = !rec;
        var rowClass = 'xl-row xl-item' + (act ? ' selected' : '');
        var rowOnclick = canClick ? ' onclick="handleEqItemClick(\''+it.name.replace(/'/g, "\\'")+'\', event)"' : '';
        var checkPrefix = rec ? '<i data-lucide="check" class="licon"></i> ' : '';
        var grp = (ITEM_BY_NAME[it.name] || {}).group || '';
        var infoBtn = '<button type="button" class="xl-info" title="See the receipt" onclick="event.stopPropagation(); showReceipt(\''+grp+'\');"><i data-lucide="info" class="licon"></i></button>';
        html += '<div class="'+rowClass+'"'+rowOnclick+'>'+
          '<div class="xl-gutter"></div>'+
          '<div class="xl-rownum">'+n+'</div>'+
          '<div class="xl-c">'+checkPrefix+'<span class="xl-item-name">'+esc(it.name)+'</span>'+infoBtn+'</div>'+
          '<div class="xl-v">'+xlDollars(it.amount)+'</div></div>';
      });
    }
  });
  n++;
  html += '<div class="xl-row xl-item"><div class="xl-gutter"></div><div class="xl-rownum">'+n+'</div><div class="xl-c"><strong>Cash</strong> &mdash; repair cash on hand (May 31) &nbsp;<i data-lucide="alert-triangle" class="licon"></i> <em>shouldn&rsquo;t be possible</em></div><div class="xl-v">'+xlDollars(CASH_NET)+'</div></div>';
  var total = ASSETS_TOTAL + CASH_NET;
  html += '<div class="xl-row xl-total"><div class="xl-gutter"></div><div class="xl-rownum"></div><div class="xl-c">TOTAL — what I have</div><div class="xl-v">'+xlDollars(total)+'</div></div>';
  html += '</div>';
  html += '<div class="xlwb-tabs">'+
    '<button class="xlwb-tab active" type="button">Assets</button>'+
    '<button class="xlwb-tab" type="button">Liabilities</button>'+
    '<button class="xlwb-tab" type="button">Cash</button>'+
    '<button class="xlwb-tab" type="button">Reasons <span class="xl-new-tag">new</span></button>'+
  '</div>';
  html += '</div>';
  return html;
}

function renderReasonsWindowHTML(){
  var html = '<div class="xlwb">'+
    '<div class="xlwb-bar"><span class="xlwb-bar-title"><i data-lucide="file-spreadsheet" class="licon"></i> <span class="mono">Bike-Repair.xlsx:2</span></span><span class="xlwb-bar-sheet">Reasons &mdash; side by side</span></div>'+
    '<div>';
  html += '<div class="xl-row xl-head"><div class="xl-gutter"></div><div class="xl-rownum"></div><div class="xl-c">Reason</div><div class="xl-v">Δ</div></div>';
  r3Created.forEach(function(id){
    var e = EV_BY_ID[id];
    var d = WINROW_BY_ID[e.rowId].delta;
    html += '<div class="xl-row xl-item">'+
      '<div class="xl-gutter"></div>'+
      '<div class="xl-rownum"></div>'+
      '<div class="xl-c"><strong>'+LIST_LABEL[e.win]+'</strong> &mdash; '+esc(e.reason)+'</div>'+
      '<div class="xl-v">'+signedDollars(d)+'</div></div>';
  });
  html += '<div class="xl-row xl-total"><div class="xl-gutter"></div><div class="xl-rownum"></div><div class="xl-c">'+r3Created.length+' '+(r3Created.length === 1 ? 'reason' : 'reasons')+' so far</div><div class="xl-v"></div></div>';
  html += '</div></div>';
  return html;
}

function render(){
  var recordedCount = FIX_ITEMS.filter(function(it){ return eqItemRecorded[it.name]; }).length;
  var allRecorded = recordedCount === FIX_ITEMS.length;
  var active = eqActiveItem ? ITEM_BY_NAME[eqActiveItem] : null;
  var attempts = eqActiveItem ? (eqItemAttempts[eqActiveItem] || 0) : 0;

  var html = '';
  html += annaBox(
    'Same gesture for <strong>Fixtures</strong>: the desk, shelving, display rack, pegboard. Click any part and and scroll down the page to record how it came in. All four rode in on a single invoice, so one reason covers the lot &mdash; the receipt (<i data-lucide="info" class="licon"></i>) is right there if you want to check.',
    true
  );

  html += '<div class="walk-pane">'+renderAssetsSheetWithInteractive('FIXTURES')+renderReasonsWindowHTML()+'</div>';

  if(active){
    html += '<div class="mcq-card">'+
      '<div class="mcq-question">How did <strong>'+esc(active.name)+' ($'+active.amt+')</strong> come in?</div>'+
      '<div class="mcq-choices">';
    ['card','cash','home'].forEach(function(opt){
      html += '<button class="mcq-choice" onclick="handleEqItemAnswer(\''+active.name.replace(/'/g, "\\'")+'\', \''+opt+'\')">'+SOURCE_LABEL[opt]+'</button>';
    });
    html += '<button class="mcq-choice" onclick="showReceipt(\''+active.group+'\', event)"><i data-lucide="info" class="licon"></i> See the receipt</button>';
    html += '</div>';
    if(eqItemNudge && eqItemNudge.item === active.name && attempts < 3){
      html += '<div class="mcq-fb err show"><strong>Hint '+attempts+'/2:</strong> '+(attempts === 1
        ? 'Open the receipt &mdash; it shows how this was paid.'
        : 'The Workspace Outfitters invoice was billed to the Harborline Visa.')+'</div>';
    }
    html += '</div>';
  }

  if(allRecorded){
    html += insightBox('Four things, one purchase, one reason.',
      '<p>All the fixtures arrived on a single card purchase &mdash; one event, one reason, four lines checked off at once. The list shows the <em>four</em> things; the Reasons tab shows the <em>one</em> way they came in.</p>'
    );
  }

  html += '<button class="btn-continue btn-block" type="button">Next &mdash; Right of Use &rarr;</button>';

  document.getElementById('phase-walk-fixtures').innerHTML = html;
  if(window.lucide) lucide.createIcons();
}

render();
if(window.lucide) lucide.createIcons();
</script>
</body>
</html>
