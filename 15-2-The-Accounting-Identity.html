<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Module 5 — The Accounting Identity</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Open+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="page">
  <div class="prework-wrap">

    <div class="phase-title-row">
      <div class="phase-title" id="phaseTitle"></div>
      <button class="icon-btn" title="Glossary" aria-label="Open glossary" onclick="openGlossary()"><i data-lucide="book-open"></i></button>
    </div>

    <div id="stepProg"></div>

    <div id="identityBody"></div>

  </div>
</div>

<!-- ===== Glossary overlay ===== -->
<div class="glossary-overlay" id="glossaryOverlay" onclick="if(event.target===this) closeGlossary()">
  <div class="glossary-panel">
    <div class="glossary-panel-head">
      <div class="glossary-panel-title"><i data-lucide="book-open" class="licon"></i> Glossary</div>
      <button class="glossary-close-btn" aria-label="Close" onclick="closeGlossary()"><i data-lucide="x"></i></button>
    </div>
    <div class="glossary-list" id="glossaryList"></div>
  </div>
</div>

<script src="shared.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script>
if (window.lucide) lucide.createIcons();

var PHASE_INDEX = 1;
var PHASE_TITLE = '';

/* ===== sound ===== */
var audioCtx = null;
function ac(){ if(!audioCtx){ try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return audioCtx; }
function tone(f,d,t,v){ var c=ac(); if(!c)return; var o=c.createOscillator(),g=c.createGain(); o.type=t||'sine'; o.frequency.value=f; o.connect(g); g.connect(c.destination); g.gain.setValueAtTime(v||0.05,c.currentTime); g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+d); o.start(); o.stop(c.currentTime+d); }
function playSuccess(){ tone(523,0.12); setTimeout(function(){tone(659,0.12);},90); setTimeout(function(){tone(784,0.16);},180); }
function playClick(){ tone(600,0.08,'sine',0.04); }

/* ===== data ===== */
var ASSETS_SNAPSHOT = [
  { cat:'EQUIPMENT', items:[
    { name:'Park Tool repair stand', amount:200 },{ name:'Cone wrench set', amount:65 },{ name:'Torque wrench', amount:95 },
    { name:'Hex / Allen key set', amount:45 },{ name:'Cable cutters', amount:40 },{ name:'Chain breaker', amount:35 },
    { name:'Tire levers', amount:20 },{ name:'Air compressor', amount:180 },{ name:'Parts washer', amount:130 },
    { name:'Wheel-truing stand', amount:170 },{ name:'Bench grinder', amount:90 },{ name:'Headset press', amount:70 },{ name:'Shop vacuum', amount:60 } ] },
  { cat:'COMPUTER EQUIPMENT', items:[ { name:'Laptop', amount:610 } ] },
  { cat:'SUPPLIES', items:[
    { name:'Box of chains (on shelf)', amount:50 },{ name:'Box of brake pads (on shelf)', amount:40 },{ name:'Box of derailleur cables (on shelf)', amount:20 },
    { name:'Cassettes (on shelf)', amount:40 },{ name:'Bottom brackets (on shelf)', amount:20 },{ name:'Spokes (on shelf)', amount:20 },{ name:'Tubes (on shelf)', amount:10 } ] },
  { cat:'FIXTURES', items:[
    { name:'Desk', amount:250 },{ name:'Shelving units', amount:200 },{ name:'Display rack', amount:180 },{ name:'Pegboard + hooks', amount:120 } ] },
  { cat:'CASH', note:'Repair cash on hand (May 31)', items:[] },
  { cat:'RIGHT OF USE', items:[ { name:'Right to occupy the space — last month, prepaid', amount:650 } ] }
].map(function(c){ c.subtotal = c.items.reduce(function(s,i){return s+i.amount;},0); return c; });
var ASSETS_TOTAL = ASSETS_SNAPSHOT.reduce(function(s,c){return s+c.subtotal;},0); // 3410

var LIABILITIES_SNAPSHOT = [
  { key:'smith', label:"Smith's frame — paid $220 up front, not built yet", amount:220, items:[
    { name:'Check deposit, May 22 &mdash; a custom frame build, 4&ndash;6 weeks', amt:220 } ] },
  { key:'card', label:'Still owed on the bike-repair credit card', amount:2030, items:[
    { name:'Hand tools', amt:300 }, { name:'Air compressor', amt:180 }, { name:'Parts washer', amt:130 },
    { name:'Wheel-truing stand', amt:170 }, { name:'Fixtures (desk, shelving, racks)', amt:750 }, { name:'Parts (QBP order)', amt:500 } ] }
];
var LIABILITIES_TOTAL = LIABILITIES_SNAPSHOT.reduce(function(s,l){return s+l.amount;},0); // 2250
var NET = ASSETS_TOTAL - LIABILITIES_TOTAL; // 1160

var CONTRIBUTED_ROWS = [
  { account:'Cash',      delta:160, reason:'My personal self covered what the work drew down — I only see it now, tallying up.' },
  { account:'Laptop',    delta:610, reason:'You brought your laptop from home.' },
  { account:'Equipment', delta:90,  reason:'Brought the bench grinder from home.' },
  { account:'Equipment', delta:70,  reason:'Brought the headset press from home.' },
  { account:'Equipment', delta:60,  reason:'Brought the shop vacuum from home.' }
];
var GENERATED_ROWS = [
  { account:'Cash', delta:340, reason:'Finished a repair — customer paid $340.' },
  { account:'Cash', delta:180, reason:'Finished a repair — customer paid $180.' },
  { account:'Cash', delta:80,  reason:'Finished a repair — customer paid $80.' },
  { account:'Cash', delta:140, reason:'Finished a repair — customer paid $140.' },
  { account:'Cash', delta:130, reason:'Finished a repair — customer paid $130.' },
  { account:'Cash', delta:100, reason:'Finished a repair — customer paid $100.' },
  { account:'Cash', delta:150, reason:'Finished a repair — customer paid $150.' },
  { account:'Supplies', delta:-70, reason:'Used $70 of chains finishing customer jobs.' },
  { account:'Supplies', delta:-50, reason:'Used $50 of brake pads finishing customer jobs.' },
  { account:'Supplies', delta:-30, reason:'Used $30 of derailleur cables finishing customer jobs.' },
  { account:'Supplies', delta:-50, reason:'Used $50 of cassettes finishing customer jobs.' },
  { account:'Supplies', delta:-30, reason:'Used $30 of bottom brackets finishing customer jobs.' },
  { account:'Supplies', delta:-30, reason:'Used $30 of spokes finishing customer jobs.' },
  { account:'Supplies', delta:-40, reason:'Used $40 of tubes finishing customer jobs.' },
  { account:'Right of Use', delta:-650, reason:'Used the space for May ($650).' }
];
var CONTRIBUTED_TOTAL = CONTRIBUTED_ROWS.reduce(function(s,r){return s+r.delta;},0); // 990
var GENERATED_TOTAL = GENERATED_ROWS.reduce(function(s,r){return s+r.delta;},0);     // 170
var REASONS_TOTAL = CONTRIBUTED_TOTAL + GENERATED_TOTAL;                             // 1160

var CASH_FLOWS = [
  { date:'May 1',  desc:'Rent paid in advance', amount:-1300 },
  { date:'May 3',  desc:'Park Tool stand', amount:-200 },
  { date:'May 7',  desc:'Repair finished — customer paid', amount:340 },
  { date:'May 10', desc:'Repair finished — customer paid', amount:180 },
  { date:'May 12', desc:'Repair finished — customer paid', amount:80 },
  { date:'May 14', desc:'Repair finished — customer paid', amount:140 },
  { date:'May 19', desc:'Repair finished — customer paid', amount:130 },
  { date:'May 22', desc:'Smith deposit', amount:220 },
  { date:'May 23', desc:'Repair finished — customer paid', amount:100 },
  { date:'May 27', desc:'Repair finished — customer paid', amount:150 },
  { date:'—',      desc:'From your personal self — covering what the work drew down', amount:160 }
];

/* ===== formatters ===== */
function d(v){ return (v<0?'−$':'$') + Math.abs(v).toLocaleString('en-US'); }
function sd(v){ return (v>=0?'+$':'−$') + Math.abs(v).toLocaleString('en-US'); }
function catLabel(cat){ return cat==='RIGHT OF USE' ? 'Right of Use' : (cat.charAt(0)+cat.slice(1).toLowerCase()); }

/* ===== state ===== */
var excelTab = 'reasons';
var reasonsExpanded = { contributed:false, generated:false };
var cashOpen = false;
var assetsExpanded = {};
var liabExpanded = {};
var curWbContainer = null;
var idStage = 0;

/* ===== Excel workbook ===== */
function assetsSheet(){
  var html = '<div class="xl-row xl-head"><div class="xl-gutter"></div><div class="xl-rownum"></div><div class="xl-c">Assets</div><div class="xl-v">Value</div></div>';
  var n=0;
  ASSETS_SNAPSHOT.forEach(function(c){
    if(c.cat==='CASH'){
      // Cash folded into Assets: an expandable line (same idiom as the Reasons groups);
      // open it to reveal May's flows via the existing cash sheet.
      html += '<div class="xl-row xl-cat"><div class="xl-gutter"><button class="xl-toggle" onclick="toggleCash()" aria-expanded="'+cashOpen+'">'+(cashOpen?'−':'+')+'</button></div><div class="xl-rownum"></div><div class="xl-c">'+catLabel(c.cat)+' &mdash; '+c.note+'</div><div class="xl-v">'+d(c.subtotal)+'</div></div>';
      if(cashOpen) html += cashSheet();
    } else {
      var open = !!assetsExpanded[c.cat]; n++;
      html += '<div class="xl-row xl-cat"><div class="xl-gutter"><button class="xl-toggle" onclick="toggleAssetCat(\''+c.cat+'\')" aria-expanded="'+open+'">'+(open?'−':'+')+'</button></div><div class="xl-rownum">'+n+'</div><div class="xl-c">'+catLabel(c.cat)+'</div><div class="xl-v">'+d(c.subtotal)+'</div></div>';
      if(open){ c.items.forEach(function(it){ n++; html += '<div class="xl-row xl-item"><div class="xl-gutter"></div><div class="xl-rownum">'+n+'</div><div class="xl-c">'+it.name+'</div><div class="xl-v">'+d(it.amount)+'</div></div>'; }); }
    }
  });
  html += '<div class="xl-row xl-total"><div class="xl-gutter"></div><div class="xl-rownum"></div><div class="xl-c">Total Assets — what the records show</div><div class="xl-v">'+d(ASSETS_TOTAL)+'</div></div>';
  return html;
}
function liabilitiesSheet(){
  var html = '<div class="xl-row xl-head"><div class="xl-gutter"></div><div class="xl-rownum"></div><div class="xl-c">Liabilities</div><div class="xl-v">Amount</div></div>';
  var n = 0;
  LIABILITIES_SNAPSHOT.forEach(function(l){
    var open = !!liabExpanded[l.key]; n++;
    html += '<div class="xl-row xl-cat"><div class="xl-gutter"><button class="xl-toggle" onclick="toggleLiabCat(\''+l.key+'\')" aria-expanded="'+open+'">'+(open?'−':'+')+'</button></div><div class="xl-rownum">'+n+'</div><div class="xl-c">'+l.label+'</div><div class="xl-v">'+d(l.amount)+'</div></div>';
    if(open){ l.items.forEach(function(it){ n++; html += '<div class="xl-row xl-item"><div class="xl-gutter"></div><div class="xl-rownum">'+n+'</div><div class="xl-c">'+it.name+'</div><div class="xl-v">'+d(it.amt)+'</div></div>'; }); }
  });
  html += '<div class="xl-row xl-total"><div class="xl-gutter"></div><div class="xl-rownum"></div><div class="xl-c">Total Liabilities — what the records show</div><div class="xl-v">'+d(LIABILITIES_TOTAL)+'</div></div>';
  return html;
}
function cashSheet(){
  // Cash is folded into Assets — its expanded detail is the ledger, rendered in the
  // same xl-item idiom as every other drill-down (dates via .cash-line-date).
  var onHand = CASH_FLOWS.reduce(function(s,f){return s+f.amount;},0);
  var html = '';
  CASH_FLOWS.forEach(function(f){
    html += '<div class="xl-row xl-item"><div class="xl-gutter"></div><div class="xl-rownum"></div><div class="xl-c"><span class="cash-line-date">'+f.date+'</span>'+f.desc+'</div><div class="xl-v">'+sd(f.amount)+'</div></div>';
  });
  html += '<div class="xl-row xl-item"><div class="xl-gutter"></div><div class="xl-rownum"></div><div class="xl-c"><strong>Cash on hand (May 31)</strong></div><div class="xl-v"><strong>'+d(onHand)+'</strong></div></div>';
  return html;
}
function reasonsGroup(key, title, rows, total){
  var open = reasonsExpanded[key];
  var html = '<div class="xl-row xl-cat"><div class="xl-gutter"><button class="xl-toggle" onclick="toggleReasonsCat(\''+key+'\')" aria-expanded="'+open+'">'+(open?'−':'+')+'</button></div><div class="xl-rownum"></div><div class="xl-c">'+title+' ('+rows.length+')</div><div class="xl-v">'+sd(total)+'</div></div>';
  if(open){
    rows.forEach(function(r){
      html += '<div class="xl-row xl-item"><div class="xl-gutter"></div><div class="xl-rownum"></div><div class="xl-c">'+r.account+' &mdash; '+r.reason+'</div><div class="xl-v">'+sd(r.delta)+'</div></div>';
    });
  }
  return html;
}
function reasonsSheet(){
  var html = '<div class="xl-row xl-head"><div class="xl-gutter"></div><div class="xl-rownum"></div><div class="xl-c">Reasons — why the difference moved (two kinds)</div><div class="xl-v">Change</div></div>';
  html += reasonsGroup('contributed', 'CONTRIBUTED', CONTRIBUTED_ROWS, CONTRIBUTED_TOTAL);
  html += reasonsGroup('generated', 'GENERATED', GENERATED_ROWS, GENERATED_TOTAL);
  html += '<div class="xl-row xl-total"><div class="xl-gutter"></div><div class="xl-rownum"></div><div class="xl-c">TOTAL — the reasons</div><div class="xl-v">'+sd(REASONS_TOTAL)+'</div></div>';
  return html;
}
function renderWorkbook(containerId){
  curWbContainer = containerId;
  var tabs = [{id:'assets',label:'Assets'},{id:'liabilities',label:'Liabilities'},{id:'reasons',label:'Reasons'}];
  var body;
  if(excelTab==='assets') body = assetsSheet();
  else if(excelTab==='liabilities') body = liabilitiesSheet();
  else body = reasonsSheet();
  var activeLabel = tabs.find(function(t){return t.id===excelTab;}).label;
  var tabsHtml = tabs.map(function(t){ return '<button class="xlwb-tab'+(t.id===excelTab?' active':'')+'" onclick="setTab(\''+t.id+'\')">'+t.label+'</button>'; }).join('');
  var html = '<div class="xlwb">'+
    '<div class="xlwb-bar"><span class="xlwb-bar-title"><i data-lucide="file-spreadsheet" class="licon"></i> <span class="mono">Bike-Repair.xlsx</span></span><span class="xlwb-bar-sheet">'+activeLabel+' sheet</span></div>'+
    '<div>'+body+'</div>'+
    '<div class="xlwb-tabs">'+tabsHtml+'<span class="xlwb-tab-add"><i data-lucide="plus" class="licon"></i></span></div></div>';
  document.getElementById(containerId).innerHTML = html;
  if(window.lucide) lucide.createIcons();
}
function setTab(id){ playClick(); excelTab = id; if(curWbContainer) renderWorkbook(curWbContainer); }
function toggleReasonsCat(k){ playClick(); reasonsExpanded[k] = !reasonsExpanded[k]; if(curWbContainer) renderWorkbook(curWbContainer); }
function toggleCash(){ playClick(); cashOpen = !cashOpen; if(curWbContainer) renderWorkbook(curWbContainer); }
function toggleLiabCat(key){ playClick(); liabExpanded[key] = !liabExpanded[key]; if(curWbContainer) renderWorkbook(curWbContainer); }
function toggleAssetCat(cat){ playClick(); assetsExpanded[cat] = !assetsExpanded[cat]; if(curWbContainer) renderWorkbook(curWbContainer); }

/* ===== identity (staged reveal) ===== */
function annaBox(inner){ return '<div class="dialog-box anna"><div class="dialog-label">ANNA</div><div class="dialog-text">'+inner+'</div></div>'; }
function insightBox(label, inner){ return '<div class="insight-box"><div class="insight-label"><i data-lucide="lightbulb" class="licon"></i> '+label+'</div>'+inner+'</div>'; }
function continueBtn(label){
  if(idStage === 0) return '<button class="btn-continue btn-block" onclick="identityNext()">'+label+' &rarr;</button>';
  return '<div class="btn-row"><button class="btn-reset" onclick="identityBack()"><i data-lucide="arrow-left" class="licon"></i> Back</button><button class="btn-continue" style="margin-left:auto" onclick="identityNext()">'+label+' &rarr;</button></div>';
}
function identityBack(){ if(idStage<=0) return; playClick(); idStage--; window.scrollTo(0,0); renderIdentity(); }

function matchDisplay(){
  return '<div class="identity-bar">'+
    '<div class="id-group"><span class="id-label">Assets &minus; Liabilities</span><span class="id-num">'+d(NET)+'</span></div>'+
    '<span class="id-op">=</span>'+
    '<div class="id-group"><span class="id-label">Contributed + Generated</span><span class="id-num">'+d(CONTRIBUTED_TOTAL)+' + '+d(GENERATED_TOTAL)+'</span></div>'+
    '<span class="id-op">=</span>'+
    '<div class="id-group"><span class="id-num">'+d(REASONS_TOTAL)+' <i data-lucide="check" class="licon"></i></span></div>'+
    '</div>';
}
function identityFormula(){
  return '<div class="eq-compare"><div class="eq-panel">'+
    '<div class="eq-panel-tag">The accounting identity</div>'+
    '<div class="eq-panel-row"><span class="eq-term a">Assets</span><span class="eq-op">&minus;</span><span class="eq-term l">Liabilities</span><span class="eq-op">=</span><span class="eq-term e">?</span></div>'+
    '<div class="eq-panel-caption">An identity, not an equation. You don&rsquo;t solve it &mdash; it holds by definition, for every entity, every time.</div>'+
    '</div></div>';
}
function balanceSheet(){
  return '<div class="acct-col">'+
    '<div class="bs-header"><div class="bs-header-title">THE BALANCE SHEET</div><div class="bs-header-date">The repair work &middot; May 31</div></div>'+
    '<div class="acct-line"><span>Assets</span><span class="acct-val">'+d(ASSETS_TOTAL)+'</span></div>'+
    '<div class="acct-line"><span>&minus; Liabilities</span><span class="acct-val">'+d(LIABILITIES_TOTAL)+'</span></div>'+
    '<div class="acct-total"><span>= the difference</span><span>'+d(NET)+'</span></div>'+
    '<div class="acct-line"><span>Contributed &mdash; brought in from outside</span><span class="acct-val">'+d(CONTRIBUTED_TOTAL)+'</span></div>'+
    '<div class="acct-line"><span>Generated &mdash; what the work made</span><span class="acct-val">'+d(GENERATED_TOTAL)+'</span></div>'+
    '</div>';
}

function renderIdentity(){
  if (window.renderStepProgress) renderStepProgress('stepProg', Math.min(idStage + 1, 5), 5);
  var c = document.getElementById('identityBody');
  var html = '';
  if(idStage===0){
    html += annaBox('You found the difference two ways waiting to happen. One: Assets minus Liabilities, '+d(NET)+'. Now the other: total the <strong>Reasons</strong> that moved it &mdash; the contributed pile and the generated pile. Add them up.');
    html += '<div id="identityWb"></div>';
    html += continueBtn('Total the Reasons');
    c.innerHTML = html;
    excelTab = 'reasons'; reasonsExpanded = { contributed:true, generated:true };
    renderWorkbook('identityWb');
    if(window.lucide) lucide.createIcons();
    return;
  }
  html += matchDisplay();
  if(idStage===1){
    html += insightBox('They match &mdash; and they always will', '<p>No coincidence &mdash; <strong>you arranged it</strong>. Back in Module 4, every change got a match or a reason: a match explained itself right there on the Assets and Liabilities sheets, and never needed a row here. A reason was the ones with no match &mdash; and every one of those got written down. Keep books by that rule and the reasons <em>must</em> add up to the difference &mdash; a choice paying off, not a fact of nature.</p>');
    html += continueBtn('Name what you just matched');
  } else if(idStage===2){
    html += annaBox('That number &mdash; Assets minus Liabilities &mdash; doesn&rsquo;t have one name here yet, and that&rsquo;s deliberate. Different kinds of entities call it different things, and even for one kind of entity the name has changed over the years. The names are local; the difference is universal. If you&rsquo;ve heard a name for it, hold it loosely &mdash; it belongs to one kind of entity, one era. That name arrives once you form your work into a legal entity of its own. For now, what matters is what it <em>is</em>: a difference, not a thing anyone could pocket &mdash; just recorded Assets minus recorded Liabilities, gaps and all.');
    html += '<div class="rabbit-hole"><button class="rabbit-hole-trigger" onclick="toggleRabbitHole(this)"><span class="rh-icon"><i data-lucide="compass" class="licon"></i></span><span>Already know some accounting? Read this.</span><span class="rh-chevron">&rsaquo;</span></button><div class="rabbit-hole-body">'+
      '<p>If you&rsquo;ve taken an accounting class before, you already have a word in your head for this difference. That word isn&rsquo;t being kept from you &mdash; it&rsquo;s being withheld on purpose, for now.</p>'+
      '<p>Here&rsquo;s why: Assets and Liabilities have stayed remarkably stable terms across the whole history of accounting. The difference between them hasn&rsquo;t. Luca Pacioli, writing down double-entry in 1494, called it <em>capitale</em> &mdash; capital. American accounting theory a few centuries later called it <em>proprietorship</em>. Modern for-profit accounting has its own word for it. Nonprofit accounting, describing the very same kind of difference, uses a different word entirely. One relationship, several names across history, none of them universal.</p>'+
      '<p>That pattern is the tell: a term that keeps getting renamed isn&rsquo;t naming an independent thing &mdash; it&rsquo;s naming whatever is left over once two stable things, Assets and Liabilities, are defined. So if you already have a name for this sitting in your head, hold it loosely for now. Nothing here contradicts it. But nothing here needs it yet, either &mdash; keep an open mind, and more about naming this difference will be revealed as you work through the rest of this prework.</p>'+
    '</div></div>';
    html += continueBtn('Write it down');
  } else if(idStage===3){
    html += identityFormula();
    html += balanceSheet();
    html += insightBox('This page is the balance sheet', '<p>It&rsquo;s built <em>around</em> the identity, not assembled to satisfy one. You list Assets, subtract Liabilities, and the difference follows by definition &mdash; and because you kept the reasons that moved it, you can show where it came from: <strong>contributed</strong> and <strong>generated</strong>. It lines up because you built it to.</p>');
    html += continueBtn('Now read it honestly');
  } else if(idStage===4){
    html += balanceSheet();
    html += annaBox('Before you trust this page, one honest thing. Everything on it earned its place with <strong>evidence</strong> &mdash; a receipt, a statement, a price you could point to. That&rsquo;s what makes it a <strong>record</strong>. And a record only holds what clears that bar.');
    html += insightBox('The records show less than there is', '<p>Look at what&rsquo;s <em>not</em> on the page: your skill at the bench, the regulars who keep coming back, the name you&rsquo;re building on Whalley Ave. All real, all worth something to the work &mdash; none of it with a receipt, so none of it on the list.</p>'+
      '<p>So read &ldquo;Assets, '+d(ASSETS_TOTAL)+'&rdquo; as <strong>what the records show</strong> &mdash; not everything the work is worth. The list shows what it can; there is <strong>more</strong> than it shows. That isn&rsquo;t a hole to plug. It&rsquo;s what a record <em>is</em>.</p>'+
      '<p>It&rsquo;s also why the difference isn&rsquo;t a net-worth figure: it&rsquo;s the gap between two <em>recorded</em> lists, everything they leave out baked in.</p>');
    html += '<div class="btn-row"><button class="btn-reset" onclick="identityBack()"><i data-lucide="arrow-left" class="licon"></i> Back</button></div>';
  }
  c.innerHTML = html;
  if(window.lucide) lucide.createIcons();
}
function identityNext(){
  idStage++;
  if(idStage===1) playSuccess(); else playClick();
  window.scrollTo(0,0);
  renderIdentity();
}

/* ===== restart ===== */
function restart(){
  idStage=0; excelTab='reasons'; reasonsExpanded={ contributed:false, generated:false }; cashOpen=false; assetsExpanded={};
  renderIdentity();
  window.scrollTo(0,0);
}

/* ===== glossary ===== */
function openGlossary(){ m1GlossaryOpen('15-2'); }
function closeGlossary(){ m1GlossaryClose(); }

/* ===== progress ===== */
function renderSegProgress(){
  document.getElementById('phaseTitle').textContent = PHASE_TITLE;
}

/* ===== init ===== */
renderSegProgress();
idStage = 0;
renderIdentity();
</script>
  <script src="dev.js"></script>
</body>
</html>
