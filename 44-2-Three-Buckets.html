<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sort the Cash Flows</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Open+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    .wb-grid-wrap { padding:8px; background:white; }
    .page-nav { margin-top:14px; }
    #sorterPanel { margin:18px 0 14px; }
      </style>
</head>
<body>
<div class="page">
  <div class="prework-wrap">
    <div class="phase-title-row">
      <div class="phase-title"></div>
      <button class="icon-btn" title="Glossary" aria-label="Open glossary" onclick="openGlossary()"><i data-lucide="book-open"></i></button>
    </div>

    <div class="narrative-block">
      <p>Start with the Cash account&rsquo;s season slice on <strong>Assets</strong>: the rows between <strong>Balance, June 1</strong> and <strong>Balance, August 31</strong>. Copy that slice to a temporary sheet; the original rows stay where they are.</p>
    </div>
    <div id="annaIntro"></div>

    <!-- The thinking panel stays outside the workbook facsimile. -->
    <div id="sorterPanel" hidden></div>

    <div class="xlwb" id="workbookShell">
      <div class="xlwb-bar">
        <div class="xlwb-bar-title"><i data-lucide="sheet" class="licon"></i> <span class="mono">Bike-Repair.xlsx</span></div>
        <div class="xlwb-bar-sheet" id="sheetLabel">Assets &middot; Cash</div>
      </div>
      <div class="wb-grid-wrap">
        <div id="assetsGrid"></div>
        <div id="statementBuild" hidden></div>
        <div id="sorterGrid" hidden></div>
      </div>
      <div class="xlwb-tabs" id="workbookTabs" aria-label="Workbook tabs"></div>
    </div>

    <div id="statementBuild-controls"></div>

    <div id="missFeedback"></div>
    <div id="gate"></div>
    <div id="anna"></div>
    <div id="controls"></div>
    <div class="btn-row page-nav"></div>
  </div>
</div>

<div class="glossary-overlay" id="glossaryOverlay" onclick="if(event.target===this) closeGlossary()">
  <div class="glossary-panel">
    <div class="glossary-panel-head">
      <div class="glossary-panel-title"><i data-lucide="book-open" class="licon"></i> Glossary</div>
      <button class="glossary-close-btn" aria-label="Close" onclick="closeGlossary()">&times;</button>
    </div>
    <div class="glossary-list" id="glossaryList"></div>
  </div>
</div>

<script src="bike-repair-job-records.js"></script>
<script src="bike-repair-parts-purchases.js"></script>
<script src="bike-repair-workbook.js"></script>
<script src="shared.js"></script>
<script src="bike-repair-statement-steps.generated.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script>
if(window.lucide) lucide.createIcons();

var audioCtx=null;
function ac(){ if(!audioCtx){ try{audioCtx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } return audioCtx; }
function tone(f,d,t,v){ var c=ac(); if(!c)return; var o=c.createOscillator(),g=c.createGain(); o.type=t||'sine'; o.frequency.value=f; o.connect(g); g.connect(c.destination); g.gain.setValueAtTime(v||0.05,c.currentTime); g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+d); o.start(); o.stop(c.currentTime+d); }
function playSuccess(){ tone(523,0.12); setTimeout(function(){tone(659,0.12);},90); setTimeout(function(){tone(784,0.16);},180); }
function playSoftNope(){ tone(360,0.10,'sine',0.04); setTimeout(function(){tone(280,0.10,'sine',0.04);},110); }
function playClick(){ tone(600,0.08,'sine',0.04); }

function annaBox(inner){ return '<div class="dialog-box anna"><div class="dialog-label">ANNA</div><div class="dialog-text">'+inner+'</div></div>'; }
function insightBox(label,inner){ return '<div class="insight-box"><div class="insight-label"><i data-lucide="lightbulb" class="licon"></i> '+label+'</div>'+inner+'</div>'; }
function sheetOf(workbookKey,namePart){
  var sheets=BR_STMT_DATA.workbooks[workbookKey].sheets;
  for(var i=0;i<sheets.length;i++) if(sheets[i].name.indexOf(namePart)>=0) return sheets[i];
  return null;
}
function rowsByLabel(sheet,pattern){
  var rows=[];
  (sheet.cells||[]).forEach(function(cell){ if(cell.c===2&&pattern.test(String(cell.value||''))) rows.push(cell.r); });
  return rows;
}
function rowByExactLabel(sheet,label){
  var rows=rowsByLabel(sheet,new RegExp('^'+label.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'$'));
  return rows.length?rows[0]:null;
}
function filteredPickSheet(sheet){
  var headerRows={};
  (sheet.cells||[]).forEach(function(cell){
    if(cell.c===3&&/^(Activity|Category)$/i.test(String(cell.value||'').trim())) headerRows[cell.r]=true;
  });
  var copy={};
  Object.keys(sheet).forEach(function(key){ copy[key]=sheet[key]; });
  /* Drop header cells (Item/Activity/Amount) but KEEP column-F guidance — the
     Operating definition shares the header row in Cash-Flow-Steps sheet 1. */
  copy.cells=(sheet.cells||[]).filter(function(cell){ return !headerRows[cell.r] || cell.c===6; });
  return copy;
}
function setAdvanceLabel(label){
  var button=document.querySelector('#statementBuild-controls .brw-step-advance');
  if(button) button.innerHTML=label;
  return button;
}

var copied=false;
var cashSortState={};
function setWorkbookChrome(activeKey){
  var tabs=[
    {key:'Assets',label:'Assets'},
    {key:'Liabilities',label:'Liabilities'},
    {key:'Reasons',label:'Reasons'},
    {key:'Balance Sheet',label:'Balance Sheet'},
    {key:'Income Statement',label:'Income Statement'},
    {key:'Statement of Member Capital',label:"Statement of Member's Capital"}
  ];
  if(copied) tabs.push({key:'working',label:'Working Tab'});
  document.getElementById('workbookTabs').innerHTML=tabs.map(function(tab){
    var active=tab.key===activeKey;
    var kind=tab.key==='working'?' tk-temp':'';
    return '<button class="xlwb-tab'+kind+(active?' active':'')+'" type="button"'
      +(active?' aria-current="page"':' aria-disabled="true"')+'>'+tab.label+'</button>';
  }).join('');
}
function copyCashRows(){
  if(copied) return;
  copied=true;
  playSuccess();
  document.getElementById('assetsGrid').hidden=true;
  document.getElementById('statementBuild').hidden=false; var _c=document.getElementById('statementBuild-controls'); if(_c) _c.hidden=false;
  document.getElementById('sheetLabel').textContent='Working Tab';
  setWorkbookChrome('working');
  document.getElementById('annaIntro').innerHTML=annaBox('The seventh tab is born as an amber <strong>Working Tab</strong>. It holds a copy of the Cash account&rsquo;s season rows; Assets stays unchanged. Now pick an activity for each cash row.');
  setAdvanceLabel('Pick the activities &rarr;');
  document.getElementById('workbookShell').scrollIntoView({behavior:'smooth',block:'start'});
}

document.getElementById('annaIntro').innerHTML=annaBox('Copy the <strong>Cash account&rsquo;s season rows</strong> to a temporary sheet. That copy will become the Cash Flow Statement only after it has been sorted and formatted.')
  +'<button class="btn-continue btn-block" type="button" onclick="copyCashRows()">Copy the season slice to a Working Tab &rarr;</button>';

var sortComplete=false;
var cashFlowTitleRows=rowsByLabel(sheetOf('cash-flow-steps','0 '),/^Cash Flow Statement$/i);
var buildOptions={
  startAt:0,
  stopAt:2,
  gridOpts:{gridId:'cash-flow-build-grid',hiddenRows:cashFlowTitleRows},
  gateAdvance:function(order){ return order!==1||sortComplete; },
  onStep:function(order){
    document.getElementById('missFeedback').innerHTML='';
    document.getElementById('gate').innerHTML='';
    document.getElementById('anna').innerHTML='';
    document.getElementById('controls').innerHTML='';
    var sorterPanel=document.getElementById('sorterPanel');
    var sorterGrid=document.getElementById('sorterGrid');
    if(order===1){
      sortComplete=false;
      sorterPanel.hidden=false;
      sorterGrid.hidden=false;
      var buildGrid=document.querySelector('#statementBuild .brw-grid');
      if(buildGrid) buildGrid.style.display='none';
      var advance=setAdvanceLabel('Show the sorted view &rarr;');
      if(advance) advance.disabled=true;
      var pick=filteredPickSheet(sheetOf('cash-flow-steps','1 '));
      var card=rowByExactLabel(pick,'Credit card paid off');
      var draw=rowByExactLabel(pick,'Money taken out for personal use');
      document.getElementById('sorterPanel').classList.remove('brw-sort-done');
      BRW.mountCanonSort('sorterPanel',pick,{
        title:'Sort the cash rows by activity',
        categoryOrder:['Operating','Investing','Financing'],
        instruction:'Sort each featured cash row by activity. The remaining rows follow the same patterns once these are sorted.',
        showRows:[
          rowByExactLabel(pick,'Repair collected — Dana R.'),
          rowByExactLabel(pick,'Parts bought — June'),
          rowByExactLabel(pick,'Rent paid — June'),
          rowByExactLabel(pick,'New repair tool'),
          card,
          draw
        ],
        onWrong:function(row){
          var message=(row===card)
            ? 'The $2,030 card payoff settled a liability. Repaying that borrowing is <strong>Financing</strong>.'
            : (row===draw)
              ? 'The $600 owner&rsquo;s draw moves cash between the shop and its owner, so it is <strong>Financing</strong>.'
              : 'Repairs collected, parts bought, and rent paid are <strong>Operating</strong>. The tools purchase is <strong>Investing</strong>.';
          document.getElementById('missFeedback').innerHTML=annaBox(message);
        },
        onComplete:function(){
          sortComplete=true;
          var next=setAdvanceLabel('Show the sorted view &rarr;');
          if(next) next.disabled=false;
          document.getElementById('gate').innerHTML='<div class="gate-card gate-armed-maria"><div class="gate-card-title">Every cash row is sorted by activity. Continue to read the three totals.</div></div>';
          if(window.lucide) lucide.createIcons();
        }
      });
      sorterPanel.scrollIntoView({behavior:'smooth',block:'start'});
    } else if(order===2){
      sorterPanel.hidden=true;
      sorterGrid.hidden=true;
      var sortedBuildGrid=document.querySelector('#statementBuild .brw-grid');
      if(sortedBuildGrid) sortedBuildGrid.style.display='';
      renderSortedPayoff();
      document.getElementById('anna').scrollIntoView({behavior:'smooth',block:'start'});
    }
    if(window.lucide) lucide.createIcons();
  }
};

function renderSortedPayoff(){
  document.getElementById('anna').innerHTML=annaBox('There is Freddie&rsquo;s answer: <strong>Operating $2,350</strong>; <strong>Investing ($400)</strong>; <strong>Financing ($2,630)</strong>. The $2,030 card payoff is Financing because it settled a liability, and the $600 owner&rsquo;s draw is Financing too.');
  document.getElementById('controls').innerHTML=insightBox('The Cash decrease is fully explained','<p><strong>$2,350 &minus; $400 &minus; $2,630 = &minus;$680.</strong> Apply that change to Cash of $1,300 on June 1 and the result is $620 on August 31. Depreciation is not a cash flow.</p><p>One thread remains: net income was <strong>$2,640</strong>, but operating cash is <strong>$2,350</strong> &mdash; a <strong>$290</strong> gap. You&rsquo;ll compare those two honest answers cleanly after formatting.</p>')
    +'';
}

function devPlaceCashRows(){
  /* drives the canonical sort: classify every shown row, then Sort-the-rest + Check */
  for(var i=0;i<30;i++){
    var pending=null;
    document.querySelectorAll('#sorterPanel .stmt-row').forEach(function(r){
      if(pending) return;
      var t=r.querySelector('[data-canon-toggle]');
      if(t && !r.querySelector('.stmt-tag')) pending=t;
    });
    if(!pending) break;
    pending.click();
    var text=pending.closest('.stmt-row').textContent||'';
    var category=/New repair tool/.test(text)?'Investing':(/Credit card paid off|personal use/.test(text)?'Financing':'Operating');
    var btns=document.querySelectorAll('#sorterPanel [data-canon-classify]');
    var hit=null;
    btns.forEach(function(b){ if(!hit && b.textContent.trim()===category) hit=b; });
    (hit||btns[0]).click();
  }
  var rest=document.querySelector('#sorterPanel [data-canon-rest]');
  if(rest) rest.click();
  var chk=document.querySelector('#sorterPanel [data-canon-check]');
  if(chk) chk.click();
}

var glossaryTerms=[
  {term:'Operating',def:'Cash collected and paid while running the shop: repairs collected, parts bought, and rent paid. Net cash from operating activities is $2,350.'},
  {term:'Investing',def:'Cash used to buy tools and equipment. The new repair tool is a $400 investing outflow.'},
  {term:'Financing',def:'Cash moving between the shop and its funders. The $2,030 card payoff settled a liability, and the $600 owner&rsquo;s draw moved cash to the owner. Net financing cash flow is negative $2,630.'}
];
function openGlossary(){ document.getElementById('glossaryList').innerHTML=glossaryTerms.map(function(item){return '<div class="glossary-entry"><div class="glossary-entry-term">'+item.term+'</div><div class="glossary-entry-def">'+item.def+'</div></div>';}).join(''); document.getElementById('glossaryOverlay').classList.add('open'); }
function closeGlossary(){ document.getElementById('glossaryOverlay').classList.remove('open'); }
function nav(url){ playClick(); window.location.href=url; }
function restart(){ window.location.reload(); }
document.addEventListener('keydown',function(event){ if(event.key==='Escape')closeGlossary(); });

window.devFill=function(){
  if(!copied) copyCashRows();
  var advance=document.querySelector('#statementBuild-controls .brw-step-advance');
  if(advance) advance.click();
  devPlaceCashRows();
  advance=document.querySelector('#statementBuild-controls .brw-step-advance');
  if(advance){ advance.disabled=false; advance.click(); }
};
BR_WB.mountStatementBuild('statementBuild','cash-flow-steps',buildOptions);
BRW.mountGrid('assetsGrid',sheetOf('bike-repair-end','Assets'),{gridId:'cash-flow-source-assets-grid'});
setWorkbookChrome('Assets');
if(window.lucide) lucide.createIcons();
</script>
<script src="dev.js"></script>
</body>
</html>
