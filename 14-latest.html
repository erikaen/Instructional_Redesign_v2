var audioCtx = null;
function ac(){ if(!audioCtx){ try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return audioCtx; }
function playSuccess(){
  var c = ac(); if(!c) return;
  [523.25, 659.25, 783.99].forEach(function(f, i){
    var o = c.createOscillator(), g = c.createGain();
    o.connect(g); g.connect(c.destination);
    o.frequency.value = f; o.type = 'sine';
    var t = c.currentTime + i*0.1;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.3, t+0.02);
    g.gain.exponentialRampToValueAtTime(0.01, t+0.15);
    o.start(t); o.stop(t+0.25);
  });
}
function playNope(){
  var c = ac(); if(!c) return;
  [400, 300].forEach(function(f, i){
    var o = c.createOscillator(), g = c.createGain();
    o.connect(g); g.connect(c.destination);
    o.frequency.value = f; o.type = 'sine';
    var t = c.currentTime + i*0.12;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.2, t+0.02);
    g.gain.exponentialRampToValueAtTime(0.01, t+0.12);
    o.start(t); o.stop(t+0.17);
  });
}
function playClick(){
  var c = ac(); if(!c) return;
  var o = c.createOscillator(), g = c.createGain();
  o.connect(g); g.connect(c.destination);
  o.frequency.value = 600; o.type = 'sine';
  var t = c.currentTime;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.15, t+0.01);
  g.gain.exponentialRampToValueAtTime(0.01, t+0.08);
  o.start(t); o.stop(t+0.1);
}

var LIST_LABEL = { equipment:'Equipment', computer:'Computer Equip.', supplies:'Supplies', fixtures:'Fixtures', rou:'Right of Use', liab:'Liabilities', cash:'Cash' };

var glossaryTerms = [
  { term:'Asset', def:'Something you have — a present right to something useful. The gear, the parts, the prepaid month, cash.' },
  { term:'Liability', def:"Something you owe — a present obligation to pay or do something later. The card balance, Smith's frame." },
  { term:'Reason', def:'The why behind a change to one of your lists. You jot it next to the change — it lives on its own tab, one row per side.' },
  { term:'Net', def:'What you have minus what you owe. The bottom-line number a reason either moves or leaves alone.' },
  { term:'Contributed', def:'A net-mover where you put something in from outside the repair work — your own cash, gear you already owned.' },
  { term:'Generated', def:'A net-mover that came from doing the repair work — what customers paid, less what the work used up.' },
  { term:'Right of Use', def:"A month of space you've paid for but haven't used yet — a future benefit you still hold, so it counts as an asset." }
];

/* ===== formatters ===== */
function xlDollars(v){ return (v<0?'−$':'$') + Math.abs(v).toLocaleString('en-US'); }
function signedDollars(v){ return (v>=0?'+':'−') + '$' + Math.abs(v).toLocaleString('en-US'); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ===== state ===== */
var phaseOrder = ['welcome','walk-equipment','walk-computer','walk-supplies','walk-fixtures','walk-rou','walk-liab','walk-cash','crossout','sort','complete'];
var phase = 'welcome';
var activeTab = 'assets';
var assetsExpanded = {};

/* welcome — Cash MCQ */
var wcAnswered = false;
var wcAtt = 0;
var wcNudge = false;

/* render container ref for tabbed workbook (for tab clicks to know what to redraw) */
var curWbContainer = null;

/* ===== Workbook (the persistent Excel-style sidebar) =====
   Tabs:
     welcome (pre-MCQ):  assets, liabilities, cash
     welcome (post-MCQ): assets (with Cash folded in showing −$960), liabilities
     later phases:       assets, liabilities, cash, reasons
*/
function getTabs(){
  if(phase === 'welcome'){
    if(wcAnswered) return [{id:'assets',label:'Assets'},{id:'liabilities',label:'Liabilities'}];
    return [{id:'assets',label:'Assets'},{id:'liabilities',label:'Liabilities'},{id:'cash',label:'Cash'}];
  }
  return [{id:'assets',label:'Assets'},{id:'liabilities',label:'Liabilities'},{id:'cash',label:'Cash'},{id:'reasons',label:'Reasons',isNew:true}];
}

function assetsSheet(){
  /* Pre-MCQ: hide Cash row (still its own tab). Post-MCQ: show Cash as a folded line. */
  var cats = ASSETS_SNAPSHOT.filter(function(c){
    if(phase === 'welcome' && !wcAnswered && c.cat === 'CASH') return false;
    return true;
  });
  var foldedCash = (phase === 'welcome' && wcAnswered);
  var total = ASSETS_TOTAL + (foldedCash ? CASH_NET : 0); // 3410 − 960 = 2450 after fold
  var html = '<div class="xl-row xl-head"><div class="xl-gutter"></div><div class="xl-rownum"></div><div class="xl-c">A&nbsp;&nbsp;Asset</div><div class="xl-v">B&nbsp;&nbsp;Value</div></div>';
  var n = 0;
  cats.forEach(function(cat){
    var label = cat.cat === 'RIGHT OF USE' ? 'Right of Use' : (cat.cat.charAt(0) + cat.cat.slice(1).toLowerCase());
    /* Replace the static CASH category row with the folded Cash row (−$960) once the MCQ is answered. */
    if(cat.cat === 'CASH' && foldedCash){
      n++;
      html += '<div class="xl-row xl-item"><div class="xl-gutter"></div><div class="xl-rownum">'+n+'</div><div class="xl-c"><strong>Cash</strong> &mdash; repair cash on hand (May 31) &nbsp;<i data-lucide="alert-triangle" class="licon"></i> <em>shouldn&rsquo;t be possible</em></div><div class="xl-v">'+xlDollars(CASH_NET)+'</div></div>';
      return;
    }
    var open = !!assetsExpanded[cat.cat]; n++;
    html += '<div class="xl-row xl-cat"><div class="xl-gutter"><button class="xl-toggle" onclick="toggleAssetCat(\''+cat.cat+'\')" aria-expanded="'+open+'">'+(open?'−':'+')+'</button></div><div class="xl-rownum">'+n+'</div><div class="xl-c">'+label+'</div><div class="xl-v">'+xlDollars(cat.subtotal)+'</div></div>';
    if(open){
      cat.items.forEach(function(it){
        n++;
        html += '<div class="xl-row xl-item"><div class="xl-gutter"></div><div class="xl-rownum">'+n+'</div><div class="xl-c">'+esc(it.name)+'</div><div class="xl-v">'+xlDollars(it.amount)+'</div></div>';
      });
    }
  });
  html += '<div class="xl-row xl-total"><div class="xl-gutter"></div><div class="xl-rownum"></div><div class="xl-c">TOTAL — what I have</div><div class="xl-v">'+xlDollars(total)+'</div></div>';
  return html;
}

function liabilitiesSheet(){
  var html = '<div class="xl-row xl-head"><div class="xl-gutter"></div><div class="xl-rownum"></div><div class="xl-c">A&nbsp;&nbsp;Liability (what I owe)</div><div class="xl-v">B&nbsp;&nbsp;Amount</div></div>';
  LIABILITIES_SNAPSHOT.forEach(function(l, i){
    html += '<div class="xl-row xl-item"><div class="xl-gutter"></div><div class="xl-rownum">'+(i+1)+'</div><div class="xl-c">'+esc(l.label)+'</div><div class="xl-v">'+xlDollars(l.amount)+'</div></div>';
  });
  html += '<div class="xl-row xl-total"><div class="xl-gutter"></div><div class="xl-rownum"></div><div class="xl-c">TOTAL — what I owe</div><div class="xl-v">'+xlDollars(LIABILITIES_TOTAL)+'</div></div>';
  return html;
}

function cashSheet(){
  var inflows = CASH_FLOWS.filter(function(f){ return f.amount > 0; });
  var outflows = CASH_FLOWS.filter(function(f){ return f.amount < 0; });
  var totalIn = inflows.reduce(function(s,f){ return s+f.amount; }, 0);
  var totalOut = outflows.reduce(function(s,f){ return s+f.amount; }, 0);
  var net = totalIn + totalOut;
  var html = '<div class="cash-sheet-head"><div class="cash-sheet-title">Repair cash — May</div><div class="cash-sheet-sub">pulled from the bank statement</div></div>';
  html += '<div class="cash-group in"><div class="cash-group-label">Cash in</div>';
  inflows.forEach(function(f){ html += '<div class="cash-line"><span><span class="cash-line-date">'+f.date+'</span>'+esc(f.desc)+'</span><span class="cash-line-amt">+'+xlDollars(f.amount)+'</span></div>'; });
  html += '<div class="cash-subtotal"><span>Total in</span><span class="cash-line-amt">+'+xlDollars(totalIn)+'</span></div></div>';
  html += '<div class="cash-group out"><div class="cash-group-label">Cash out</div>';
  outflows.forEach(function(f){ html += '<div class="cash-line"><span><span class="cash-line-date">'+f.date+'</span>'+esc(f.desc)+'</span><span class="cash-line-amt">'+xlDollars(f.amount)+'</span></div>'; });
  html += '<div class="cash-subtotal"><span>Total out</span><span class="cash-line-amt">'+xlDollars(totalOut)+'</span></div></div>';
  html += '<div class="cash-net"><span class="cash-net-label">Net repair cash — May</span><span class="cash-net-val">'+xlDollars(net)+'</span></div>';
  return html;
}

function reasonsSheetEmpty(){
  /* Placeholder for passes 2+ — for welcome phase, never shown. */
  return '<div class="cash-sheet-head"><div class="cash-sheet-title">Reasons — one row per change</div><div class="cash-sheet-sub">Empty for now. Walk through the month to fill it in.</div></div><div class="bs-empty-msg">No reasons recorded yet.</div>';
}

function renderWorkbook(containerId){
  curWbContainer = containerId;
  var tabs = getTabs();
  if(!tabs.some(function(t){ return t.id === activeTab; })) activeTab = tabs[0].id;
  var body;
  if(activeTab === 'assets')      body = assetsSheet();
  else if(activeTab === 'liabilities') body = liabilitiesSheet();
  else if(activeTab === 'cash')   body = cashSheet();
  else                            body = reasonsSheetEmpty();
  var activeLabel = tabs.find(function(t){ return t.id === activeTab; }).label;
  var tabsHtml = tabs.map(function(t){
    return '<button class="xlwb-tab'+(t.id===activeTab?' active':'')+'" onclick="setTab(\''+t.id+'\')">'+t.label+(t.isNew?' <span class="xl-new-tag">new</span>':'')+'</button>';
  }).join('');
  var html = '<div class="xlwb">'+
    '<div class="xlwb-bar"><span class="xlwb-bar-title"><i data-lucide="file-spreadsheet" class="licon"></i> <span class="mono">Bike-Repair.xlsx</span></span><span class="xlwb-bar-sheet">'+activeLabel+' sheet</span></div>'+
    '<div>'+body+'</div>'+
    '<div class="xlwb-tabs">'+tabsHtml+'<span class="xlwb-tab-add"><i data-lucide="plus" class="licon"></i></span></div></div>';
  document.getElementById(containerId).innerHTML = html;
  if(window.lucide) lucide.createIcons();
}

function setTab(id){ playClick(); activeTab = id; if(curWbContainer) renderWorkbook(curWbContainer); }
function toggleAssetCat(cat){ playClick(); assetsExpanded[cat] = !assetsExpanded[cat]; if(curWbContainer) renderWorkbook(curWbContainer); }

/* ===== shared builders ===== */
function annaBox(inner, quoted){
  var text = quoted ? '&ldquo;'+inner+'&rdquo;' : inner;
  return '<div class="dialog-box anna"><div class="dialog-label">ANNA</div><div class="dialog-text">'+text+'</div></div>';
}
function insightBox(label, inner){
  return '<div class="insight-box"><div class="insight-label"><i data-lucide="lightbulb" class="licon"></i> '+label+'</div>'+inner+'</div>';
}
function warnMsg(text){ return '<div class="sort-msg warn">'+text+'</div>'; }
function contBtn(label, onclick){ return '<button class="btn-continue btn-block" onclick="'+onclick+'">'+label+' &rarr;</button>'; }

/* ===== Phase nav ===== */
function goto(p){
  playClick();
  phase = p;
  phaseOrder.forEach(function(ph){
    var el = document.getElementById('phase-'+ph);
    if(el) el.classList.toggle('active', ph === p);
  });
  window.scrollTo(0, 0);
  if(p === 'welcome') renderWelcome();
  else if(p === 'walk-equipment') renderPlaceholder('walk-equipment', 'Equipment walk', 'Pass 2 will land this phase.');
  else if(p === 'walk-computer')  renderPlaceholder('walk-computer',  'Computer-Equipment walk', 'Pass 2 will land this phase.');
  else if(p === 'walk-supplies')  renderPlaceholder('walk-supplies',  'Supplies walk', 'Pass 2 will land this phase.');
  else if(p === 'walk-fixtures')  renderPlaceholder('walk-fixtures',  'Fixtures walk', 'Pass 2 will land this phase.');
  else if(p === 'walk-rou')       renderPlaceholder('walk-rou',       'Right-of-Use walk', 'Pass 2 will land this phase.');
  else if(p === 'walk-liab')      renderPlaceholder('walk-liab',      'Liabilities walk', 'Pass 3 will land this phase.');
  else if(p === 'walk-cash')      renderPlaceholder('walk-cash',      'Cash walk + discovery', 'Pass 3 will land this phase.');
  else if(p === 'crossout')       renderPlaceholder('crossout',       'Crossout (matched pairs)', 'Pass 4 will land this phase.');
  else if(p === 'sort')           renderPlaceholder('sort',           'Sort (Contributed vs. Generated)', 'Pass 4 will land this phase.');
  else if(p === 'complete')       renderComplete();
  if(window.lucide) lucide.createIcons();
}
function restart(){
  wcAnswered = false; wcAtt = 0; wcNudge = false;
  assetsExpanded = {};
  activeTab = 'assets';
  goto('welcome');
}

/* ===== Welcome ===== */
function renderWelcome(){
  var html = '';
  html += '<div class="narrative-block">'+
    '<p>Anna&rsquo;s back, coffee in hand. Your workbook is open to the two lists that earned their names in your last sit-down: <strong>Assets</strong> (what you have &mdash; $3,410) and <strong>Liabilities</strong> (what you owe &mdash; $1,450). And off to the side, still its own tab: <strong>Cash</strong> &mdash; the repair flows you pulled out of the bank statement together, netting <strong>&minus;$960</strong> for the month.</p>'+
    '<p>She studies the tab strip for a moment, then taps the screen. &ldquo;That Cash tab has been bugging me since we built it. It&rsquo;s just&hellip; sitting there, off to the side.&rdquo;</p>'+
    '</div>';

  html += '<div id="wbWelcome"></div>';

  if(!wcAnswered){
    html += '<div class="mcq-card">'+
      '<div class="dialog-label">ANNA</div>'+
      '<div class="mcq-question">&ldquo;Everything on the Assets list earned its place by being useful to the work &mdash; remember, an asset is a <em>right to a benefit</em>, not just a thing. So: the money on that Cash tab. Does cash belong on the Assets list itself?&rdquo;</div>'+
      '<div class="mcq-choices">'+
        '<button class="mcq-choice" onclick="handleWcAnswer(\'notbenefit\')">No &mdash; money isn&rsquo;t a benefit. It&rsquo;s just money.</button>'+
        '<button class="mcq-choice" onclick="handleWcAnswer(\'benefit\')">Yes &mdash; it&rsquo;s a right to future benefits. It gets me the next box of parts.</button>'+
      '</div>'+
      (wcNudge && wcAtt < 3
        ? '<div class="mcq-fb err show"><strong>Hint '+wcAtt+'/2:</strong> '+(wcAtt===1
            ? 'Think back to the lease: the prepaid month was an asset before you ever used the space &mdash; because of what it would do for you later. What does cash do for you later?'
            : 'The bills themselves aren&rsquo;t the benefit. What they can get you is &mdash; parts, rent, tools. A right to future benefits, held now.')+'</div>'
        : '')+
    '</div>';
  } else {
    html += annaBox(
      '&ldquo;Right. Money isn&rsquo;t useful by itself &mdash; it&rsquo;s useful for what it gets you <em>later</em>. A right to future benefits, held now. So it doesn&rsquo;t belong off to the side.&rdquo; She drags the Cash tab into the Assets list. &ldquo;There &mdash; the tab&rsquo;s gone. Cash is a line like everything else now, with the bank&rsquo;s rows tucked under it.&rdquo;'+
      '<br><br>'+
      '&ldquo;But now look at it. <strong>&minus;$960</strong> &mdash; the same number we pulled out of the bank statement, but it&rsquo;s sitting <em>on a list of things you have</em>. Rights to benefits. You can&rsquo;t hold a <em>negative</em> right. That line can&rsquo;t be right as it stands.&rdquo; She frowns at it, then shrugs. &ldquo;Leave it. The minus sign is trying to tell us something &mdash; by the end of today you&rsquo;ll know what.&rdquo;',
      false
    );

    html += '<div class="section-card">'+
      '<div class="card-title">What You&rsquo;ll Discover</div>'+
      '<ul class="bullet-list">'+
        '<li>The amount tells you what moved; only the <em>reason</em> tells you what happened.</li>'+
        '<li>Once the reasons are written down, a pattern shows up on its own: most of them touch <em>two</em> lists.</li>'+
        '<li>And that <strong>&minus;$960</strong> that shouldn&rsquo;t be able to exist? No amount on these lists can explain it &mdash; but a reason can.</li>'+
      '</ul>'+
    '</div>';

    html += contBtn('Keep the reasons &mdash; add a tab', 'startWalk()');
  }

  document.getElementById('phase-welcome').innerHTML = html;
  /* Cash tab defaults to visible in pre-MCQ welcome; after MCQ, switch to assets so the fold is visible. */
  if(wcAnswered && activeTab === 'cash') activeTab = 'assets';
  if(!wcAnswered && activeTab !== 'cash' && activeTab !== 'assets' && activeTab !== 'liabilities') activeTab = 'cash';
  if(!wcAnswered) {
    /* Open with Cash tab front-and-center so learner sees the −$960 mystery. */
    if(activeTab !== 'cash') activeTab = 'cash';
  }
  renderWorkbook('wbWelcome');
  if(window.lucide) lucide.createIcons();
}

function handleWcAnswer(choice){
  if(wcAnswered) return;
  if(choice === 'benefit'){
    playSuccess();
    wcAnswered = true;
    /* Auto-expand Cash + open Assets tab so the −$960 fold is visible. */
    activeTab = 'assets';
    renderWelcome();
  } else {
    wcAtt++;
    wcNudge = true;
    if(wcAtt >= 3){
      /* On third miss, accept and move on (matches Rick's "auto-advance" pattern). */
      playSuccess();
      wcAnswered = true;
      activeTab = 'assets';
    } else {
      playNope();
    }
    renderWelcome();
  }
}

function startWalk(){
  /* Equipment is the first walk — auto-expand the Equipment category in Assets. */
  assetsExpanded.EQUIPMENT = true;
  goto('walk-equipment');
}

/* ===== Placeholder renderer (passes 2-4 will replace) ===== */
function renderPlaceholder(phaseId, title, note){
  var el = document.getElementById('phase-'+phaseId);
  el.innerHTML =
    annaBox('Placeholder &mdash; this phase is not built yet.', true)+
    '<div class="section-card"><div class="card-title">'+title+'</div>'+
      '<p class="prose">'+note+'</p>'+
      '<p class="prose">For now, you can jump to the next phase to keep exploring the skeleton.</p>'+
    '</div>'+
    '<div class="btn-row">'+
      '<button class="btn-back" onclick="goto(\'welcome\')">&larr; Back to welcome</button>'+
      jumpButtonsAround(phaseId)+
    '</div>';
}
function jumpButtonsAround(phaseId){
  var idx = phaseOrder.indexOf(phaseId);
  var next = phaseOrder[idx+1];
  if(!next) return '';
  return '<button class="btn-continue" onclick="goto(\''+next+'\')">Jump to '+next+' &rarr;</button>';
}

/* ===== Complete (real, not placeholder) ===== */
function renderComplete(){
  var el = document.getElementById('phase-complete');
  el.innerHTML =
    '<div class="complete-head">'+
      '<div class="trophy-badge"><i data-lucide="trophy"></i></div>'+
      '<div class="complete-title">Tutorial 1.4 complete</div>'+
    '</div>'+
    '<div class="section-card">'+
      '<div class="card-title">What You Discovered</div>'+
      '<ul class="bullet-list check">'+
        '<li>You kept a <strong>Reasons</strong> tab &mdash; one row for the why behind each change to a list.</li>'+
        '<li>Most reasons came in <strong>pairs</strong> &mdash; same event, two changes. You didn&rsquo;t arrange that; it showed up on its own.</li>'+
        '<li>The matched pairs just <strong>shuffle</strong> &mdash; have and owe move together, so your <strong>net</strong> doesn&rsquo;t budge.</li>'+
        '<li>The reasons that <strong>move your net</strong> are two plain kinds: what you <strong>contributed</strong> and what the work <strong>generated</strong>.</li>'+
      '</ul>'+

    '<div class="next-card">'+
      '<div class="next-card-label">Coming Next</div>'+

      '<p><strong>Next: Tutorial 1.5 &mdash; Naming What You Built</strong></p>'+
    '</div>'+
    '<a class="btn-continue btn-block" href="15-naming-what-you-built.html">Continue to Tutorial 1.5 &rarr;</a>'+
    '<div class="btn-row">'+
      '<button class="btn-reset" onclick="restart()"><i data-lucide="rotate-ccw" class="licon"></i> Restart</button>'+
    '</div>';
}

/* ===== Glossary ===== */
function openGlossary(){
  document.getElementById('glossaryList').innerHTML = glossaryTerms.map(function(g){
    return '<div class="glossary-entry"><div class="glossary-entry-term">'+g.term+'</div><div class="glossary-entry-def">'+g.def+'</div></div>';
  }).join('');
  document.getElementById('glossaryOverlay').classList.add('open');
}
function closeGlossary(){ document.getElementById('glossaryOverlay').classList.remove('open'); }

/* ===== Evidence modal (passes 2-3 will populate) ===== */
function closeEvidence(){ document.getElementById('evidenceOverlay').classList.remove('open'); }

/* ===== Dev bar (triple-click title) ===== */
(function(){
  var clicks = 0, timer = null;
  var el = document.getElementById('headerTitle');
  if(!el) return;
  el.addEventListener('click', function(){
    clicks++;
    clearTimeout(timer);
    timer = setTimeout(function(){ clicks = 0; }, 600);
    if(clicks >= 3){
      clicks = 0;
      var bar = document.getElementById('devBar');
      bar.hidden = !bar.hidden;
      if(!bar.hidden && !document.getElementById('devBtns').children.length){
        document.getElementById('devBtns').innerHTML = phaseOrder.map(function(p){
          return '<button class="dev-bar-btn" onclick="goto(\''+p+'\')">'+p+'</button>';
        }).join('');
      }
    }
  });
})();

/* ===== Init ===== */
activeTab = 'cash'; // welcome opens on Cash (pre-MCQ) so the mystery is front-and-center
renderWelcome();
if(window.lucide) lucide.createIcons();
</script>
