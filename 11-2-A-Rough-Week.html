<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light dark">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Module 1 — A Rough Week</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="page">
  <div class="prework-wrap">

    <div class="phase-title-row">
      <div class="phase-title" id="phaseTitle"></div>
      <button class="icon-btn" title="Glossary" aria-label="Open glossary" onclick="openGlossary()"><i data-lucide="book-open"></i></button>
    </div>

    <div class="narrative-block"><p>Three things happened this week. None of them went smoothly.</p></div>
    <div class="loc-stack" id="scenarioList"></div>
    <div id="scenariosTail" hidden>
      <div class="callout">Three different moments, one realization: it&rsquo;s too much to keep in your head. If you&rsquo;re going to get a grip on this, the first step is to write down <strong>what you&rsquo;ve got</strong>.</div>
      <div class="next-phase-msg">You&rsquo;ve finished this section &mdash; click <strong>Next -&gt;</strong> to continue.</div>
    </div>

  </div>
</div>

<!-- ===== Glossary overlay ===== -->
<div class="glossary-overlay" id="glossaryOverlay" onclick="if(event.target===this) closeGlossary()">
  <div class="glossary-panel">
    <div class="glossary-panel-head">
      <div class="glossary-panel-title"><i data-lucide="book-open" class="licon"></i> Glossary</div>
      <button class="glossary-close-btn" aria-label="Close" onclick="closeGlossary()"><i data-lucide="x"></i></button>
    </div>
    <div class="glossary-list" id="glossaryList"></div>
  </div>
</div>

<script src="https://unpkg.com/lucide@latest"></script>
<script>
if (window.lucide) lucide.createIcons();

var PHASE_INDEX = 1;
var PHASE_TITLE = '';

/* ===== sound ===== */
var audioCtx = null;
function ac() { if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){} } return audioCtx; }
function tone(f, d, t, v) { var c = ac(); if(!c) return; var o = c.createOscillator(), g = c.createGain(); o.type = t||'sine'; o.frequency.value = f; o.connect(g); g.connect(c.destination); g.gain.setValueAtTime(v||0.05, c.currentTime); g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + d); o.start(); o.stop(c.currentTime + d); }
function playClick(){ tone(330,0.08,'sine',0.04); }

/* ===== data ===== */
var scenarios = [
  { label: 'A customer asks', content: 'A customer rolls in with a broken derailleur. “Got a 24mm cone wrench? I left mine at home.” You think you do, probably somewhere in that toolbox under the bench, or maybe the drawer. You start digging.' },
  { label: 'It’s not all in your head anymore', content: 'Tonight you unwrapped a chain whip you bought last week and found another one already in the drawer, still in its package. Third time this month you’ve reordered something you already had. The “keep it all in your head” system isn’t working.' },
  { label: 'What if something happened?', content: 'A fire two blocks over last night gets you thinking: you should have insurance, and you don’t really know what’s at risk. The repair stand, the parts, all the tools and the laptop add up to a lot, and you couldn’t list everything from memory if you tried.' }
];

var glossaryGroups = [
  { module:'Module 2: Insurance and Maria', terms:[
    { term:'Property Policy', def:'Insurance that pays out if covered things are damaged or destroyed. Doesn&rsquo;t cover cash, or things you don&rsquo;t own (like the rented space).' },
    { term:'Market Value', def:'What it would fetch &mdash; what a comparable one sells for today (e.g. recent used &ldquo;eBay comp&rdquo; prices); the basis used to value the pre-owned laptop. One way to arrive at an asset&rsquo;s value &mdash; a choice, not the only one.' }
  ] },
  { module:'Module 3: Anna and the Bank Statement', terms:[
    { term:'Asset', def:'Something you have &mdash; a present right to an economic benefit (the gear, the parts, the prepaid month, cash). &ldquo;Right to,&rdquo; not &ldquo;owns&rdquo;: a leased item is an asset.' },
    { term:'Noncash Asset', def:'An asset that isn&rsquo;t cash: equipment, parts on the shelf, fixtures, or a future right like prepaid rent.' },
    { term:'Liability', def:'Something you owe &mdash; a present obligation to transfer an economic benefit later (the card balance; Smith&rsquo;s deposit, where what&rsquo;s owed is the work, not money).' },
    { term:'Prepaid Rent', def:'Rent already paid for a future month; a present right (an asset) until the month is used, then it becomes a cost.' },
    { term:'Promise', def:'Something you&rsquo;ve agreed to do or pay later. The plain word used before the term &ldquo;Liability.&rdquo;' },
    { term:'Deposit', def:'Money paid in advance for something not yet received. For the receiver it&rsquo;s a liability (you owe the goods/work, or the money back), not earnings yet.' }
  ] },
  /* Module 4 & 5 glossary hidden in Module 1 for now

  { module:'Module 4: Keeping the Reasons', terms:[
    { term:'Reason', def:'The why behind a change in a Noncash Asset, Liability, or Cash. One row per side of the change; every change has two sides (the felt beginning of double-entry).' },
    { term:'Contributed', def:'Resources that came into the entity from outside its own repair work (owner cash, equipment, items from home). Formal name later: Contributed Capital.' },
    { term:'Generated', def:'What the repair work produced, net of its costs (from running the repair work). Formal name later: Retained Earnings.' },
    { term:'Cost of Repairs Done', def:'The value of parts/resources consumed in finished customer jobs; a reason that makes parts-on-the-shelf go down.' }
  ] },
  { module:'Module 5: Naming What You Built', terms:[
    { term:'Entity', def:'A perspective you adopt by deciding what counts as &ldquo;in&rdquo; (your repair work) vs. &ldquo;out&rdquo; (your personal life), for a purpose. The line is drawn, not found.' },
    { term:'Accounting Identity', def:'Assets &minus; Liabilities = Equities. An identity, not an equation; it holds by definition for every entity.' },
    { term:'Equities', def:'The definitional residual for a for-profit: A &minus; L = Equities. Plural by choice. Not &ldquo;net worth,&rdquo; not &ldquo;what the owner would walk away with,&rdquo; not the value of the business &mdash; a computed difference, not a pot of cash.' },
    { term:'Net Assets', def:'The residual for an entity with no owners (charity, university): A &minus; L = Net Assets; split by donor-restriction status. Same &ldquo;definitional difference, not net worth&rdquo; caution as Equities.' },
    { term:'Donor Restrictions', def:'For a nonprofit, strings a donor attaches to a gift. Not liabilities; recorded inside Net Assets.' }
  ] }
  */
];

/* ===== state ===== */
var revealed = 1;

/* ===== scenarios ===== */
function renderScenarios() {
  var list = document.getElementById('scenarioList');
  list.innerHTML = '';
  scenarios.forEach(function(s, i) {
    var el = document.createElement('div');
    if (i < revealed) {
      el.className = 'scenario-card';
      el.innerHTML = '<div class="scenario-card-label">' + s.label + '</div><div class="scenario-card-text">' + s.content + '</div>';
    } else if (i === revealed) {
      el.innerHTML = '<button class="reveal-next" onclick="revealNext()">Then what happened next &rarr;</button>';
    } else {
      return;
    }
    list.appendChild(el);
  });
  document.getElementById('scenariosTail').hidden = revealed < scenarios.length;
}
function revealNext() { playClick(); revealed++; renderScenarios(); }

/* ===== glossary ===== */
function openGlossary() {
  document.getElementById('glossaryList').innerHTML = glossaryGroups.map(function(grp){
    return '<div class="glossary-group"><div class="glossary-module">'+grp.module+'</div>'+grp.terms.map(function(g){
      return '<div class="glossary-entry"><div class="glossary-entry-term">'+g.term+'</div><div class="glossary-entry-def">'+g.def+'</div></div>';
    }).join('')+'</div>';
  }).join('');
  document.getElementById('glossaryOverlay').classList.add('open');
}
function closeGlossary() { document.getElementById('glossaryOverlay').classList.remove('open'); }

/* ===== progress ===== */
function renderSegProgress(){
  document.getElementById('phaseTitle').textContent = PHASE_TITLE;
}

/* ===== init ===== */
renderSegProgress();
renderScenarios();
</script>
</body>
</html>
