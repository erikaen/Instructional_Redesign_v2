<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Cash Question</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=Open+Sans:wght@400;600;700;800&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    .cvs-scope {
      --cvs-paper:#ffffff;
      --cvs-panel:#f8fafc;
      --cvs-ink:#263746;
      --cvs-muted:#657583;
      --cvs-primary:#155b86;
      --cvs-rule:#c8d4dc;
      --cvs-rule-strong:#708592;
      --cvs-warm:#fff8df;
      --cvs-accent:#d5a528;
      --cvs-shadow:rgba(32,55,72,0.09);
    }
    .cvs-doc-wrap { overflow-x:auto; padding:2px 2px 8px; }
    .cvs-doc-card, .cvs-snapshot {
      background:var(--cvs-paper);
      color:var(--cvs-ink);
      border:1px solid var(--cvs-rule);
      border-radius:12px;
      box-shadow:0 8px 24px var(--cvs-shadow);
    }
    .cvs-doc-card { max-width:820px; min-width:610px; margin:0 auto; padding:24px; }
    .cvs-kicker {
      margin:0 0 5px;
      color:var(--cvs-muted);
      font-size:11px;
      font-weight:700;
      letter-spacing:.1em;
      text-transform:uppercase;
    }
    .cvs-doc-title, .cvs-snapshot-title { margin:0; color:var(--cvs-primary); }
    .cvs-doc-title { font-size:20px; }
    .cvs-snapshot-title { font-size:17px; }
    .cvs-subline { margin:3px 0 0; color:var(--cvs-muted); font-size:12px; font-style:italic; }
    .cvs-table { margin-top:18px; font-size:13px; }
    .cvs-row {
      display:grid;
      grid-template-columns:minmax(300px,1fr) 7rem 7rem;
      column-gap:10px;
      align-items:baseline;
      padding:3px 0;
    }
    .cvs-row-head { border-bottom:1px solid var(--cvs-rule); color:var(--cvs-primary); font-weight:700; }
    .cvs-value { text-align:right; font-family:"JetBrains Mono",monospace; font-variant-numeric:tabular-nums; }
    .cvs-section { grid-column:1 / -1; margin-top:10px; color:var(--cvs-primary); font-weight:800; }
    .cvs-subtotal { font-weight:600; }
    .cvs-total { margin-top:4px; padding-top:6px; border-top:1px solid var(--cvs-rule-strong); color:var(--cvs-primary); font-weight:800; }
    .cvs-identity {
      margin-top:18px;
      padding:13px 15px;
      border:1px solid var(--cvs-accent);
      border-radius:9px;
      background:var(--cvs-warm);
      color:var(--cvs-ink);
    }
    .cvs-identity-title { margin:0 0 6px; font-weight:800; }
    .cvs-identity-line { margin:3px 0; font-family:"JetBrains Mono",monospace; font-size:12px; }
    .cvs-split.main-grid { align-items:stretch; }
    .cvs-split.main-grid > * { min-width:0; }
    .cvs-snapshot-wrap { min-width:0; overflow-x:auto; padding:2px 2px 8px; }
    .cvs-snapshot { min-width:285px; height:100%; padding:18px; box-sizing:border-box; }
    .cvs-snapshot-table { margin-top:15px; font-size:12px; }
    .cvs-snapshot-row {
      display:grid;
      grid-template-columns:minmax(185px,1fr) 6rem;
      column-gap:8px;
      align-items:baseline;
      padding:3px 0;
    }
    .cvs-snapshot-row.cvs-section { display:block; }
    .cvs-gap {
      min-height:230px;
      display:flex;
      align-items:center;
      justify-content:center;
      box-sizing:border-box;
      padding:24px 18px;
      border:2px dashed var(--cvs-accent);
      border-radius:12px;
      background:var(--cvs-warm);
      color:var(--cvs-muted);
      text-align:center;
      font-size:13px;
      font-style:italic;
      line-height:1.55;
    }
    .cvs-cash-grid.main-grid { grid-template-columns:minmax(0,1fr) minmax(0,1.18fr) minmax(0,1fr); align-items:stretch; }
    .cvs-cash-grid.main-grid > * { min-width:0; }
    .cvs-compact-row {
      display:grid;
      grid-template-columns:minmax(178px,1fr) 5.5rem;
      column-gap:8px;
      align-items:baseline;
      padding:4px 5px;
      border-left:3px solid transparent;
      color:var(--cvs-ink);
    }
    .cvs-compact-gap { height:8px; }
    .cvs-compact-total { margin-top:3px; padding-top:6px; border-top:1px solid var(--cvs-rule-strong); color:var(--cvs-primary); font-weight:800; }
    .cvs-compact-lit { border-left-color:var(--cvs-accent); background:var(--cvs-warm); color:var(--cvs-primary); font-weight:700; }
    .cvs-restricted-note { margin:1px 5px 3px 17px; color:var(--cvs-primary); font-size:10px; font-style:italic; font-family:"JetBrains Mono",monospace; }
    .cvs-identity-note { margin:12px 2px 0; color:var(--cvs-muted); font-size:10px; font-style:italic; text-align:right; font-family:"JetBrains Mono",monospace; }
    .cvs-question-card {
      min-height:100%;
      box-sizing:border-box;
      display:flex;
      flex-direction:column;
      padding:22px;
      border:2px dashed var(--cvs-accent);
      border-radius:12px;
      background:var(--cvs-warm);
      color:var(--cvs-ink);
      box-shadow:0 8px 24px var(--cvs-shadow);
    }
    .cvs-question-title { margin:0; color:var(--cvs-primary); font-size:18px; }
    .cvs-question-figure { margin:22px 0 5px; color:var(--cvs-primary); font:700 27px/1.2 "JetBrains Mono",monospace; text-align:center; }
    .cvs-question-range { margin:0 0 18px; color:var(--cvs-muted); font:12px/1.4 "JetBrains Mono",monospace; text-align:center; }
    .cvs-question-setup { margin:0; color:var(--cvs-ink); font-size:13px; font-style:italic; line-height:1.55; }
    .cvs-question-foot { margin:auto 0 0; padding-top:18px; border-top:1px solid var(--cvs-rule); color:var(--cvs-muted); font-size:11px; font-style:italic; line-height:1.45; }
    .cvs-summary-card { max-width:720px; min-width:0; }
    .cvs-running-row {
      display:grid;
      grid-template-columns:minmax(260px,1fr) 7rem;
      column-gap:10px;
      align-items:baseline;
      padding:8px 0;
      border-bottom:1px solid var(--cvs-rule);
      color:var(--cvs-ink);
    }
    .cvs-running-row:last-child { border-bottom:0; }
    .cvs-recon { margin-top:20px; padding-top:12px; border-top:2px solid var(--cvs-primary); }
    .cvs-bottom-line { max-width:680px; min-width:0; text-align:center; padding:34px 28px; }
    .cvs-bottom-label { margin:18px auto 0; max-width:510px; color:var(--cvs-ink); font-size:14px; line-height:1.5; }
    .cvs-bottom-figure { margin:10px 0 3px; color:var(--cvs-primary); font:800 38px/1.2 "JetBrains Mono",monospace; }
    @media (max-width:760px) {
      .cvs-split.main-grid { grid-template-columns:1fr; }
      .cvs-gap { min-height:170px; }
      .cvs-cash-grid.main-grid { grid-template-columns:1fr; }
      .cvs-question-card { min-height:260px; }
    }
      </style>
</head>
<body>
<div class="page">
  <div class="prework-wrap">

    <div class="phase-title-row">
      <div class="phase-title"></div>
      <button class="icon-btn" title="Glossary" aria-label="Open glossary" onclick="openGlossary()"><i data-lucide="book-open"></i></button>
    </div>

    <div id="beats"></div>
    <div id="mainGrid"></div>
    <div id="tail"></div>
    <div id="controls"></div>

  </div>
</div>

<!-- ===== Glossary overlay ===== -->
<div class="glossary-overlay" id="glossaryOverlay" onclick="if(event.target===this) closeGlossary()">
  <div class="glossary-panel">
    <div class="glossary-panel-head">
      <div class="glossary-panel-title"><i data-lucide="book-open" class="licon"></i> Glossary</div>
      <button class="glossary-close-btn" aria-label="Close" onclick="closeGlossary()">&times;</button>
    </div>
    <div class="glossary-list" id="glossaryList"></div>
  </div>
</div>

<script src="cvs-10k-data.js"></script>
<script src="shared.js"></script>
<script src="course-m5.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script>
if(window.lucide) lucide.createIcons();

/* ===== sound ===== */
var audioCtx=null;
function ac(){ if(!audioCtx){ try{audioCtx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } return audioCtx; }
function tone(f,d,t,v){ var c=ac(); if(!c)return; var o=c.createOscillator(),g=c.createGain(); o.type=t||'sine'; o.frequency.value=f; o.connect(g); g.connect(c.destination); g.gain.setValueAtTime(v||0.05,c.currentTime); g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+d); o.start(); o.stop(c.currentTime+d); }
function playSuccess(){ tone(523,0.12); setTimeout(function(){tone(659,0.12);},90); setTimeout(function(){tone(784,0.16);},180); }
function playClick(){ tone(600,0.08,'sine',0.04); }

var step=0;
var TOTAL_STEPS=5;

function escapeHTML(value){
  return String(value).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function fmt(v){
  if(v===0) return '—';
  var a=Math.abs(v).toLocaleString('en-US');
  return v<0 ? '('+a+')' : a;
}
function hasYear(list,year){
  if(!list) return false;
  for(var i=0;i<list.length;i++) if(list[i]===year) return true;
  return false;
}
function displayValue(row,year){
  if(hasYear(row.dashFor,year)) return '—';
  return fmt(row[year]);
}
function compactRow(label,value,extraClass){
  return '<div class="cvs-compact-row'+(extraClass?' '+extraClass:'')+'"><div>'+label+'</div><div class="cvs-value">'+fmt(value)+'</div></div>';
}
function compactSnapshot(year,label,equityMode,highlights){
  var d=window.CVS_10K.compactBS[year];
  var yearText=year==='y2025'?'2025':'2024';
  var allOther=d.totalAssets-d.cash-d.otherCurrent-d.otherAssets;
  var cashLit=highlights.cash?' cvs-compact-lit':'';
  var currentLit=highlights.restricted?' cvs-compact-lit':'';
  var otherLit=highlights.restricted?' cvs-compact-lit':'';
  var rows=compactRow('Cash and cash equivalents',d.cash,cashLit)
    +compactRow('Other current assets',d.otherCurrent,currentLit);
  if(highlights.restricted) rows+='<div class="cvs-restricted-note">&#8627; of which restricted cash: '+fmt(d.restrCurr)+'</div>';
  rows+=compactRow('Other assets',d.otherAssets,otherLit);
  if(highlights.restricted) rows+='<div class="cvs-restricted-note">&#8627; of which restricted cash: '+fmt(d.restrOther)+'</div>';
  rows+=compactRow('All other noncash assets',allOther,'')
    +compactRow('Total assets',d.totalAssets,'cvs-compact-total')
    +'<div class="cvs-compact-gap"></div>'
    +compactRow('&minus; Total liabilities',d.totalLiab,'');
  if(equityMode==='bucketed'){
    rows+=compactRow('= Contributed',d.contributed,'cvs-compact-total')
      +compactRow('+ Earned and retained',d.earnedRetained,'')
      +compactRow('+ Noncontrolling interests',d.nci,'')
      +compactRow('= Total shareholders&rsquo; equity',d.totalEq,'cvs-compact-total');
  } else {
    rows+=compactRow('= Total shareholders&rsquo; equity',d.totalEq,'cvs-compact-total');
  }
  return '<div class="cvs-snapshot-wrap"><div class="cvs-snapshot"><p class="cvs-kicker">'+label+'</p>'
    +'<h3 class="cvs-snapshot-title">Balance Sheet</h3>'
    +'<p class="cvs-subline">December 31, '+yearText+' &middot; in $ millions</p>'
    +'<div class="cvs-snapshot-table">'+rows+'</div>'
    +'<p class="cvs-identity-note">'+fmt(d.totalAssets)+' &minus; '+fmt(d.totalLiab)+' = '+fmt(d.totalEq)+' &#10003;</p></div></div>';
}
function questionCard(){
  var beginning=window.CVS_10K.compactBS.y2024.cash;
  var ending=window.CVS_10K.compactBS.y2025.cash;
  var delta=ending-beginning;
  return '<div class="cvs-question-card"><p class="cvs-kicker">The question</p>'
    +'<h3 class="cvs-question-title">What happened to cash?</h3>'
    +'<p class="cvs-question-figure">'+(delta<0?'&minus;':'')+'$'+Math.abs(delta).toLocaleString('en-US')+' million</p>'
    +'<p class="cvs-question-range">$'+beginning.toLocaleString('en-US')+' &rarr; $'+ending.toLocaleString('en-US')+'</p>'
    +'<p class="cvs-question-setup">CVS earned roughly $400 billion in revenue this year, and cash on the Balance Sheet barely moved &mdash; where did money come from, and where did it go?</p>'
    +'<p class="cvs-question-foot">The Cash Flow Statement traces what happened to cash.</p></div>';
}
function cashQuestionView(){
  return '<div class="cvs-scope"><div class="main-grid cvs-cash-grid">'
    +compactSnapshot('y2024','Beginning','single',{cash:true,restricted:false})
    +questionCard()
    +compactSnapshot('y2025','Ending','single',{cash:true,restricted:false})+'</div></div>';
}
function cfsGridStyle(yearCount){
  var columns='minmax(300px,1fr)';
  for(var i=0;i<yearCount;i++) columns+=' 7rem';
  return columns;
}
function cfsCells(row,years){
  return years.map(function(year){
    return '<div class="cvs-value">'+displayValue(row,year)+'</div>';
  }).join('');
}
function cfsRow(row,years,type){
  var cls='cvs-row';
  if(type==='subtotal') cls+=' cvs-subtotal';
  if(type==='total') cls+=' cvs-total';
  return '<div class="'+cls+'" style="grid-template-columns:'+cfsGridStyle(years.length)+'"><div>'+escapeHTML(row.label)+'</div>'+cfsCells(row,years)+'</div>';
}
function cfsDocument(years){
  var data=window.CVS_10K.cfs3Year;
  var labels={y2025:'2025',y2024:'2024',y2023:'2023'};
  var rows='<div class="cvs-row cvs-row-head" style="grid-template-columns:'+cfsGridStyle(years.length)+'"><div></div>'
    +years.map(function(year){ return '<div class="cvs-value">'+labels[year]+'</div>'; }).join('')+'</div>';
  data.sections.forEach(function(section){
    rows+='<div class="cvs-section">'+escapeHTML(section.header)+'</div>';
    section.items.forEach(function(item){ rows+=cfsRow(item,years,'line'); });
    rows+=cfsRow(section.subtotal,years,'subtotal');
  });
  rows+=cfsRow(data.netChange,years,'total')+cfsRow(data.beginning,years,'line')+cfsRow(data.ending,years,'subtotal');
  return '<div class="cvs-scope"><div class="cvs-doc-wrap"><div class="cvs-doc-card">'
    +'<p class="cvs-kicker">Index to Consolidated Financial Statements</p>'
    +'<h2 class="cvs-doc-title">Consolidated Statements of Cash Flows</h2>'
    +'<p class="cvs-subline">For the Years Ended December 31,</p>'
    +'<p class="cvs-subline">In millions</p>'
    +'<div class="cvs-table">'+rows+'</div></div></div></div>';
}
function cfsSummary(){
  var data=window.CVS_10K.cfs2025;
  var keys=['operating','investing','financing'];
  var body=keys.map(function(key){
    var section=data[key];
    return '<div class="cvs-running-row"><div>'+escapeHTML(section.label)+'</div><div class="cvs-value">'+fmt(section.subtotal)+'</div></div>';
  }).join('');
  body+='<div class="cvs-recon">'
    +'<div class="cvs-running-row"><div>Cash, cash equivalents and restricted cash at the beginning of the period</div><div class="cvs-value">'+fmt(data.beginning)+'</div></div>'
    +'<div class="cvs-running-row cvs-total"><div>Net increase (decrease) in cash, cash equivalents and restricted cash</div><div class="cvs-value">'+fmt(data.netChange)+'</div></div>'
    +'<div class="cvs-running-row cvs-subtotal"><div>Cash, cash equivalents and restricted cash at the end of the period</div><div class="cvs-value">'+fmt(data.ending)+'</div></div></div>';
  return '<div class="cvs-scope"><div class="cvs-doc-wrap"><div class="cvs-doc-card cvs-summary-card">'
    +'<p class="cvs-kicker">From the 10-K &middot; page 96</p>'
    +'<h2 class="cvs-doc-title">Cash Flow Statement</h2>'
    +'<p class="cvs-subline">Year ended December 31, 2025 &middot; in $ millions</p>'
    +'<div class="cvs-table">'+body+'</div></div></div></div>';
}
function bottomLine(){
  var change=window.CVS_10K.cfs2025.netChange;
  return '<div class="cvs-scope"><div class="cvs-doc-wrap"><div class="cvs-doc-card cvs-bottom-line">'
    +'<p class="cvs-kicker">The Cash Flow Statement&rsquo;s answer</p>'
    +'<h2 class="cvs-doc-title">Change in cash, cash equivalents and restricted cash</h2>'
    +'<p class="cvs-bottom-figure">'+(change<0?'&minus;':'')+'$'+Math.abs(change).toLocaleString('en-US')+' million</p>'
    +'<p class="cvs-bottom-label">Cash, cash equivalents and restricted cash decreased during 2025.</p>'
    +'</div></div></div>';
}
function render(){
  renderBeats(step);
  renderGrid(step);
  renderTail(step);
  renderControls(step);
  if(window.lucide) lucide.createIcons();
}
function renderBeats(currentStep){
  var text='';
  if(currentStep===0){
    text='A new question. CVS&rsquo;s recorded cash went down by $133 million. Out of nearly $254 billion in recorded assets, where did the cash go? To focus, compact both Balance Sheets to four asset lines &mdash; Cash, Other current assets, Other assets, and All other noncash assets &mdash; with Total liabilities and Total shareholders&rsquo; equity below. The identity still holds. Cash is highlighted on both dates.';
  } else if(currentStep===1){
    text='Here is the Cash Flow Statement, as it appears on page 96 of the 10-K. The Balance Sheets step aside for a moment. CVS reports three years of cash-flow activity &mdash; three columns, three full sets of operating, investing, and financing line items. Each column is its own story. Look at the structure.';
  } else if(currentStep===2){
    text='Each CFS column covers one fiscal year &mdash; a span from one fiscal-year-end to the next. The 2025 column covers January 1 through December 31, 2025: exactly the span between our two Balance Sheets at December 31, 2024 and December 31, 2025. The other two columns cover earlier spans that don&rsquo;t connect anything we&rsquo;re holding. Drop them out of the picture.';
  } else if(currentStep===3){
    text='Inside the 2025 column, the line items collapse away. Only the section subtotals remain &mdash; Net cash from Operating, from Investing, from Financing &mdash; plus the reconciliation footer. The architecture of the Cash Flow Statement is three sections that sum to a single change in cash.';
  } else if(currentStep===4){
    text='Even the section subtotals fall away. What remains is the Cash Flow Statement&rsquo;s bottom-line answer to the cash question: cash, cash equivalents and restricted cash decreased by $172 million during 2025.';
  }
  document.getElementById('beats').innerHTML='<div class="narrative-block"><p>'+text+'</p></div>';
}
function renderGrid(currentStep){
  var visual='';
  if(currentStep===0) visual=cashQuestionView();
  else if(currentStep===1) visual=cfsDocument(['y2025','y2024','y2023']);
  else if(currentStep===2) visual=cfsDocument(['y2025']);
  else if(currentStep===3) visual=cfsSummary();
  else visual=bottomLine();
  document.getElementById('mainGrid').innerHTML=visual;
}
function renderTail(currentStep){ document.getElementById('tail').innerHTML=''; }
function renderControls(currentStep){
  var h='<div class="nav-buttons">';
  if(step>0) h+='<button class="btn-back" onclick="back()">&larr; Back</button>';
  if(step<TOTAL_STEPS-1) h+='<button class="btn-next" onclick="advance()">Next &rarr;</button>';
  else h+='<button class="btn-next" onclick="playClick();window.location.href=\'53-3-Read-the-Labels.html\'">Next: Read the Labels &rarr;</button>';
  h+='</div>';
  document.getElementById('controls').innerHTML=h;
}
function advance(){
  playClick();
  step=Math.min(step+1,TOTAL_STEPS-1);
  render();
  window.scrollTo(0,0);
}
function back(){
  playClick();
  step=Math.max(step-1,0);
  render();
  window.scrollTo(0,0);
}

var glossaryTerms=[
  {term:'Cash Flow Statement',def:'The statement that accounts for how cash changed across Operating, Investing, and Financing activities during a period.'},
  {term:'Operating activities',def:'Cash from the core business &mdash; receipts from customers, payments to suppliers and employees, interest, and taxes.'},
  {term:'Direct method',def:'A Cash Flow Statement that lists actual cash receipts and payments by category. About 98% of US public companies use the indirect method instead; CVS is unusual.'},
  {term:'Restricted cash',def:'Cash the company holds but cannot freely spend; it sits inside other Balance Sheet lines, not in Cash and cash equivalents.'}
];
function openGlossary(){
  document.getElementById('glossaryList').innerHTML=glossaryTerms.map(function(item){
    return '<div class="glossary-entry"><div class="glossary-entry-term">'+item.term+'</div><div class="glossary-entry-def">'+item.def+'</div></div>';
  }).join('');
  document.getElementById('glossaryOverlay').classList.add('open');
}
function closeGlossary(){ document.getElementById('glossaryOverlay').classList.remove('open'); }
function restart(){ window.location.reload(); }
document.addEventListener('keydown',function(e){ if(e.key==='Escape') closeGlossary(); });

window.devFill=function(){
  step=TOTAL_STEPS-1;
  render();
};
render();
</script>
<script src="dev.js"></script>
</body>
</html>
