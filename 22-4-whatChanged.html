<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tutorial 2: Filing for a Legal Body &middot; What Changed?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Open+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="page">
  <div class="prework-wrap">

    <!-- ===== Header ===== -->
    <div class="phase-title-row">
      <div class="phase-title" id="phaseTitle">What Changed?</div>
      <button class="icon-btn" title="Glossary" aria-label="Open glossary" onclick="openGlossary()"><i data-lucide="book-open"></i></button>
    </div>


    <!-- ===== whatChanged ===== -->
    <div class="phase active" id="phase-whatChanged">
      <div class="narrative-block">
        <p>The Certificate of Organization has been filed. <strong>The LLC now exists.</strong> That is a real legal change. But before you assume everything changed, check <strong>what changed because of the filing &mdash; and what did not</strong>.</p>
        <p>Drag each card into the zone where it belongs.</p>
      </div>
      <div id="whatChangedArea"></div>
    </div>

  </div>
</div>

<!-- ===== Glossary overlay ===== -->
<div class="glossary-overlay" id="glossaryOverlay" onclick="if(event.target===this) closeGlossary()">
  <div class="glossary-panel">
    <div class="glossary-panel-head">
      <div class="glossary-panel-title"><i data-lucide="book-open" class="licon"></i> Glossary</div>
      <button class="glossary-close-btn" aria-label="Close" onclick="closeGlossary()">&times;</button>
    </div>
    <div class="glossary-list" id="glossaryList"></div>
  </div>
</div>

<script src="shared.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script>
if (window.lucide) lucide.createIcons();

/* ===== sound ===== */
var audioCtx = null;
function ac(){ if(!audioCtx){ try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return audioCtx; }
function tone(f,d,t,v){ var c=ac(); if(!c)return; var o=c.createOscillator(),g=c.createGain(); o.type=t||'sine'; o.frequency.value=f; o.connect(g); g.connect(c.destination); g.gain.setValueAtTime(v||0.05,c.currentTime); g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+d); o.start(); o.stop(c.currentTime+d); }
function playSuccess(){ tone(523,0.12); setTimeout(function(){tone(659,0.12);},90); setTimeout(function(){tone(784,0.16);},180); }
function playNope(){ tone(400,0.12,'sine',0.05); setTimeout(function(){tone(300,0.12,'sine',0.05);},120); }
function playClick(){ tone(600,0.08,'sine',0.04); }

/* ===== glossary (shared across all phases of 2.2) ===== */
var glossaryTerms = [
  { term:"Certificate of Organization", def:"In Connecticut, the one-page filing that brings a limited liability company (LLC) into legal existence. (Delaware calls its version a &ldquo;Certificate of Formation.&rdquo;)" },
  { term:"Legal entity", def:"A &ldquo;person&rdquo; in the eyes of the law that can own things, owe debts, sign contracts, and be sued &mdash; separate from the human beings behind it. An LLC is one." },
  { term:"Registered agent", def:"The person or office an LLC names to receive legal mail at a real in-state address. A small owner often serves as their own." },
  { term:"LLC", def:"Limited Liability Company &mdash; a legal form that holds the operation and stands as a wall between a claim and the owner&rsquo;s personal life." }
];
function openGlossary(){
  document.getElementById('glossaryList').innerHTML = glossaryTerms.map(function(g){
    return '<div class="glossary-entry"><div class="glossary-entry-term">'+g.term+'</div><div class="glossary-entry-def">'+g.def+'</div></div>';
  }).join('');
  document.getElementById('glossaryOverlay').classList.add('open');
}
function closeGlossary(){ document.getElementById('glossaryOverlay').classList.remove('open'); }

/* ===== navigation / reset (each phase is its own file) ===== */
function nav(url){ playClick(); window.location.href = url; }
function restart(){
  playClick();
  placed={};
  figStage=0;
  renderWhatChanged();
  var role=document.getElementById('figRole'), ring=document.getElementById('figRing');
  if(role) role.style.opacity='0';
  if(ring) ring.style.opacity='0';
  window.scrollTo(0,0);
}
/* Drag-scoped reset: clears ONLY the "Drag into a zone" answers (placed cards return to the
   bank) and re-renders the sort. Not the whole-page restart(). Button sits bottom-left of the sort. */
function resetSort(){ playClick(); placed = {}; figStage = 0; renderWhatChanged(); }

/* ===== member name (read from localStorage, set in the name phase) ===== */
var memberName = '';
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function memberDisplay(){ return memberName.trim() || "[Your Name]"; }
function llcName(){ return memberDisplay() + "’s Bike Repairs, LLC"; }
try{ var n = localStorage.getItem('m2Member'); if(n) memberName = n; }catch(e){}

/* ===== data ===== */
var movedItems = [
  { id:"legal", label:"The legal status of the repair work", changed:true, after:"Changed. A legal entity now exists: "+esc(llcName())+". It can own things, owe debts, sign contracts, and be sued in its own name." },
  { id:"ops",   label:"The tools, customers, and work today", changed:false, after:"Did not change. The tools did not move, the customers did not change, and the work in the shop is the same as before." },
  { id:"sheet", label:"The balance sheet", changed:false, after:"Did not change. The filing creates a legal entity, but by itself it does not change the recorded assets, the recorded liabilities, or the difference between them in the repair-work books." }
];

/* ===== the moving figure: separate out the bike-repair role, then formalize it =====
   Stage 0: one undivided life. Stage 1: the role's items gather inside the dashed
   accounting boundary (Module 1's recognition). Stage 2: a solid legal ring appears
   around the role (the filing). Chips animate via CSS transitions on style mutation. */
var figStage = 0;
var FIG = [
  { id:'figc0', t:'Groceries',           role:false, p:[[6,24],[6,20]] },
  { id:'figc1', t:'Paycheck',            role:false, p:[[34,72],[6,40]] },
  { id:'figc2', t:'Your car',            role:false, p:[[16,84],[6,60]] },
  { id:'figc3', t:'Apartment rent',      role:false, p:[[42,14],[6,80]] },
  { id:'figc4', t:'Repair stand',        role:true,  p:[[64,20],[59,36]] },
  { id:'figc5', t:'Parts shelf',         role:true,  p:[[10,50],[59,56]] },
  { id:'figc6', t:'Smith&rsquo;s frame', role:true,  p:[[70,76],[59,76]] },
  { id:'figc7', t:'Booking laptop',      role:true,  p:[[45,46],[78,56]] }
];
function figureHtml(){
  var h = '<div class="section-card" style="margin-top:16px"><div class="card-title" style="text-transform:uppercase;letter-spacing:0.04em;font-size:var(--font-xs)">Separating out the bike-repair role</div>';
  h += '<div style="position:relative;height:340px;border:2px solid var(--border-strong);border-radius:12px;margin-top:10px;overflow:hidden">';
  h += '<div id="figYouLbl" style="position:absolute;top:6px;left:10px;font-size:16px;font-weight:700;color:var(--primary)">You &mdash; one person, everything mingled</div>';
  h += '<div id="figRole" style="position:absolute;left:54%;top:16%;width:43%;height:72%;border:2px dashed var(--primary);border-radius:12px;opacity:0;transition:opacity .9s">'
     + '<div style="position:absolute;top:-12px;left:10px;right:10px;background:var(--page-bg);padding:0 6px;font-size:16px;font-weight:700;line-height:1.3;color:var(--primary)">your bike-repair role &mdash; the boundary you drew in your books</div></div>';
  h += '<div id="figRing" style="position:absolute;left:51.5%;top:11%;width:47%;height:82%;border:3px solid var(--accent);border-radius:14px;opacity:0;transition:opacity .9s">'
     + '<div id="figRingLbl" style="position:absolute;bottom:-12px;right:10px;background:var(--page-bg);padding:0 6px;font-size:16px;font-weight:700;white-space:nowrap;color:var(--accent)"></div></div>';
  FIG.forEach(function(c){
    h += '<div id="'+c.id+'" style="position:absolute;left:'+c.p[0][0]+'%;top:'+c.p[0][1]+'%;transition:left .9s ease,top .9s ease;font-size:16px;font-weight:600;padding:3px 9px;border-radius:999px;border:1px solid var(--border-strong);background:var(--primary-faint);white-space:nowrap">'+c.t+'</div>';
  });
  h += '</div>';
  h += '<div id="figCaption" style="font-size:var(--font-xs);margin-top:8px;opacity:0.85">Every item sits in one undivided life &mdash; exactly what the bank, the credit-card company, Smith, and the law have been seeing.</div>';
  h += '<button class="btn-continue btn-block" id="figBtn" onclick="figAdvance()" style="margin-top:10px">Recognize the role &rarr;</button>';
  h += '<div class="btn-row" id="figBackRow" style="margin-top:10px" hidden><button class="btn-reset" onclick="figBack()"><i data-lucide="arrow-left" class="licon"></i> Back</button></div>';
  h += '</div>';
  return h;
}
function figBack(){
  if(figStage===0) return;
  playClick();
  figStage--;
  var btn=document.getElementById('figBtn');
  if(figStage===0){
    FIG.forEach(function(c){ var el=document.getElementById(c.id); if(el){ el.style.left=c.p[0][0]+'%'; el.style.top=c.p[0][1]+'%'; } });
    document.getElementById('figRole').style.opacity='0';
    document.getElementById('figYouLbl').innerHTML = 'You &mdash; one person, everything mingled';
    document.getElementById('figCaption').innerHTML = 'Every item sits in one undivided life &mdash; exactly what the bank, the credit-card company, Smith, and the law have been seeing.';
    btn.innerHTML = 'Recognize the role &rarr;';
  } else if(figStage===1){
    document.getElementById('figRing').style.opacity='0';
    document.getElementById('figRingLbl').innerHTML = '';
    document.getElementById('figCaption').innerHTML = 'This is what you did in Module 1: you <strong>recognized</strong> the bike-repair role and drew a boundary around it in your books. Real &mdash; but only in your records.';
    btn.innerHTML = 'File the Certificate &rarr;';
    btn.style.display = '';
    var cont=document.getElementById('figCont'); if(cont) cont.hidden = true;
  }
  var bk=document.getElementById('figBackRow'); if(bk) bk.hidden = (figStage===0);
  var sr=document.getElementById('sortResetRow'); if(sr) sr.hidden = (figStage!==0);   // show the drag Reset again at the sort
}
function figAdvance(){
  figStage++;
  playClick();
  var bk=document.getElementById('figBackRow'); if(bk) bk.hidden = false;
  var sr=document.getElementById('sortResetRow'); if(sr) sr.hidden = true;   // hide the drag Reset once past the sort
  if(figStage===1){
    FIG.forEach(function(c){ var el=document.getElementById(c.id); if(el){ el.style.left=c.p[1][0]+'%'; el.style.top=c.p[1][1]+'%'; } });
    document.getElementById('figRole').style.opacity='1';
    document.getElementById('figYouLbl').innerHTML = 'You &mdash; two roles, one person';
    document.getElementById('figCaption').innerHTML = 'This is what you did in Module 1: you <strong>recognized</strong> the bike-repair role and drew a boundary around it in your books. Real &mdash; but only in your records.';
    document.getElementById('figBtn').innerHTML = 'File the Certificate &rarr;';
    playSuccess();
  } else if(figStage===2){
    document.getElementById('figRing').style.opacity='1';
    document.getElementById('figRingLbl').innerHTML = esc(llcName())+' &mdash; a legal body (June 1)';
    document.getElementById('figCaption').innerHTML = 'The filing <strong>formalized</strong> the role: a separate legal person now holds it. Same items, same amounts &mdash; recognized first (Module 1), formalized today. That is the order it always happens in.';
    document.getElementById('figBtn').style.display = 'none';
    var cont=document.getElementById('figCont'); if(cont) cont.hidden = false;
    playSuccess();
  }
}

/* ===== state (phase-local) ===== */
var placed = {};        /* movedItem id -> zone id, once correctly placed */

var zones = [
  { id:'changed',   label:'Changed when the Certificate was filed' },
  { id:'unchanged', label:'Did not change when the Certificate was filed' }
];
function correctZone(m){ return m.changed ? 'changed' : 'unchanged'; }

/* ===== whatChanged: drag each item into a zone ===== */
function chipBank(m){
  return '<div class="dnd-item" draggable="true"'+
    ' ondragstart="onDragStart(event,\''+m.id+'\')" ondragend="this.classList.remove(\'dragging\')">'+m.label+'</div>';
}
function chipPlaced(m){
  return '<div style="margin-bottom:8px">'+
    '<div class="dnd-item correct" style="cursor:default">'+m.label+'</div>'+
    '<div class="dnd-fb-soft" style="margin-top:6px">'+m.after+'</div></div>';
}
function renderWhatChanged(){
  var bank = movedItems.filter(function(m){ return !placed[m.id]; });
  var bankHtml = bank.length ? bank.map(chipBank).join('') : '<div class="dnd-zone-empty">All sorted</div>';
  var html = '<div class="dnd-bank-wrap" style="margin-bottom:20px"><div class="dnd-bank-label">Drag into a zone</div><div class="dnd-bank">'+bankHtml+'</div></div>';
  html += '<div class="dnd-zones-2col">';
  zones.forEach(function(z){
    var items = movedItems.filter(function(m){ return placed[m.id]===z.id; });
    var itemsHtml = items.length ? items.map(chipPlaced).join('') : '<div class="dnd-zone-empty">Drop here</div>';
    html += '<div class="dnd-zone-col" ondragover="event.preventDefault(); this.classList.add(\'over\')" ondragleave="this.classList.remove(\'over\')" ondrop="onDrop(event,\''+z.id+'\')">'+
      '<div class="dnd-zone-label">'+z.label+'</div>'+
      '<div class="dnd-zone-items">'+itemsHtml+'</div></div>';
  });
  html += '</div>';
  if(figStage===0 && Object.keys(placed).length > 0){
    html += '<div class="btn-row" id="sortResetRow" style="margin-top:14px; justify-content:flex-end"><button class="btn-reset" onclick="resetSort()">Reset</button></div>';
  }
  if(movedItems.every(function(m){ return placed[m.id]; })){
    html += '<div class="insight-box" style="margin-top:16px"><div class="insight-label"><i data-lucide="scale" class="licon"></i> Legal Change, Not an Economic Change</div>'+
      '<p>One thing changed today: <strong>the LLC now exists as a legal entity</strong>. That matters. But the filing, by itself, did <strong>not</strong> change the balance sheet. The recorded assets, recorded liabilities, and the difference between them are still the same. The operation is the same operation you were already tracking. What is new is its <strong>legal standing</strong>.</p></div>';
    html += figureHtml();
    html += '<p class="callout">Two different lines, drawn at different times, for different reasons: first you <strong>recognized</strong> the bike-repair role (Module 1, in the books), then you <strong>formalized</strong> it (today, at the state). The repair work was already operating before today. The legal body is new.</p>';
    html += '';
  }
  document.getElementById('whatChangedArea').innerHTML = html;
  if(window.lucide) lucide.createIcons();
}
function place(id, zone){
  var m = movedItems.find(function(x){ return x.id===id; });
  if(!m || placed[m.id]) return;
  if(correctZone(m)===zone){ placed[m.id]=zone; playSuccess(); }
  else { playNope(); }   /* wrong zone: chip just returns to the bank */
  renderWhatChanged();
}
function onDragStart(e, id){ if(placed[id]) return; e.dataTransfer.setData('text/plain', id); e.currentTarget.classList.add('dragging'); }
function onDrop(e, zone){ e.preventDefault(); e.currentTarget.classList.remove('over'); var id = e.dataTransfer.getData('text/plain'); if(id) place(id, zone); }

document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeGlossary(); });

/* ===== init ===== */
window.devFill = function(){
  movedItems.forEach(function(m){ placed[m.id]=correctZone(m); });
  renderWhatChanged();
  figAdvance(); figAdvance();
};
renderWhatChanged();
</script>
  <script src="dev.js"></script>
</body>
</html>
