<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Cash Flow Statement</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Open+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="page pg-44-3">
  <div class="prework-wrap">
    <div class="phase-title-row">
      <div class="phase-title"></div>
      <button class="icon-btn" title="Glossary" aria-label="Open glossary" onclick="openGlossary()"><i data-lucide="book-open"></i></button>
    </div>

    <div class="narrative-block">
      <p>The sorted <strong>Working Tab</strong> is ready. The copied rows are grouped and totaled; format the result, then give the finished statement its permanent name.</p>
    </div>

    <div class="xlwb" id="workbookShell">
      <div class="xlwb-bar">
        <div class="xlwb-bar-title"><i data-lucide="sheet" class="licon"></i> <span class="mono">Bike-Repair.xlsx</span></div>
        <div class="xlwb-bar-sheet" id="sheetLabel">Working Tab</div>
      </div>
      <div class="wb-grid-wrap"><div id="cashFlowGrid"></div></div>
      <div class="xlwb-tabs" id="workbookTabs" aria-label="Workbook tabs"></div>
    </div>

    <div id="anna"></div>
    <div id="controls"></div>
  </div>
</div>

<div class="glossary-overlay" id="glossaryOverlay" onclick="if(event.target===this) closeGlossary()">
  <div class="glossary-panel">
    <div class="glossary-panel-head">
      <div class="glossary-panel-title"><i data-lucide="book-open" class="licon"></i> Glossary</div>
      <button class="glossary-close-btn" aria-label="Close" onclick="closeGlossary()">&times;</button>
    </div>
    <div class="glossary-list" id="glossaryList"></div>
  </div>
</div>

<script src="bike-repair-job-records.js"></script>
<script src="bike-repair-parts-purchases.js"></script>
<script src="bike-repair-workbook.js"></script>
<script src="shared.js"></script>
<script src="bike-repair-statement-steps.generated.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script>
if(window.lucide) lucide.createIcons();

var audioCtx=null;
function ac(){ if(!audioCtx){ try{audioCtx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } return audioCtx; }
function tone(f,d,t,v){ var c=ac(); if(!c)return; var o=c.createOscillator(),g=c.createGain(); o.type=t||'sine'; o.frequency.value=f; o.connect(g); g.connect(c.destination); g.gain.setValueAtTime(v||0.05,c.currentTime); g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+d); o.start(); o.stop(c.currentTime+d); }
function playClick(){ tone(600,0.08,'sine',0.04); }
function annaBox(inner){ return '<div class="dialog-box anna"><div class="dialog-label">ANNA</div><div class="dialog-text">'+inner+'</div></div>'; }
function insightBox(label,inner){ return '<div class="insight-box"><div class="insight-label"><i data-lucide="lightbulb" class="licon"></i> '+label+'</div>'+inner+'</div>'; }
function sheetOf(workbookKey,namePart){
  var sheets=BR_STMT_DATA.workbooks[workbookKey].sheets;
  for(var i=0;i<sheets.length;i++) if(sheets[i].name.indexOf(namePart)>=0) return sheets[i];
  return null;
}

var completed=false;
function setWorkbookChrome(){
  var tabs=[
    {key:'Assets',label:'Assets'},
    {key:'Liabilities',label:'Liabilities'},
    {key:'Reasons',label:'Reasons'},
    {key:'Balance Sheet',label:'Balance Sheet'},
    {key:'Income Statement',label:'Income Statement'},
    {key:'Statement of Member Capital',label:"Statement of Member's Capital"},
    {key:'cashFlow',label:completed?'Cash Flow Statement':'Working Tab'}
  ];
  document.getElementById('workbookTabs').innerHTML=tabs.map(function(tab){
    var active=tab.key==='cashFlow';
    var kind=active?(completed?' tk-stmt':' tk-temp'):'';
    return '<button class="xlwb-tab'+kind+(active?' active':'')+'" type="button"'
      +(active?' aria-current="page"':' aria-disabled="true"')+'>'+tab.label+'</button>';
  }).join('');
}
function expandAllGroups(){
  Array.prototype.forEach.call(document.querySelectorAll('#cashFlowGrid .brw-og-toggle'),function(toggle){
    toggle.setAttribute('aria-expanded','true');
    toggle.textContent='−';
  });
  Array.prototype.forEach.call(document.querySelectorAll('#cashFlowGrid .brw-og-row'),function(row){
    row.classList.remove('is-collapsed');
  });
}
function christenStatement(){
  if(completed) return;
  completed=true;
  document.getElementById('sheetLabel').textContent='Cash Flow Statement';
  setWorkbookChrome();
  expandAllGroups();
  document.getElementById('anna').innerHTML=annaBox('Operating activities provided <strong>$2,350</strong>. Investing used <strong>$400</strong>. Financing used <strong>$2,630</strong>. Together they changed Cash by <strong>&minus;$680</strong>, taking the June 1 balance of <strong>$1,300</strong> to the August 31 balance of <strong>$620</strong>.');
  document.getElementById('controls').innerHTML=insightBox('The ending cash ties twice','<p><strong>Cash, August 31: $620</strong> matches both the <strong>Balance, August 31</strong> line in the Cash account on Assets and <strong>Cash $620</strong> on the Balance Sheet.</p><p>The workbook now has <strong>seven tabs</strong>: Assets, Liabilities, and Reasons are the three source-record tabs; Balance Sheet, Income Statement, Statement of Member&rsquo;s Capital, and Cash Flow Statement are the four statement tabs.</p>')
    +annaBox('Freddie called it <strong>&ldquo;same shop, two clocks.&rdquo;</strong> He had it right. Net income was <strong>$2,640</strong>; operating cash was <strong>$2,350</strong>. Now those two honest answers can be compared cleanly: the big non-operating cash move &mdash; the <strong>$2,030 credit-card payoff</strong> &mdash; sits under <strong>Financing</strong>, not between net income and operating cash. The <strong>$290</strong> that remains is only the timing items you already bridged in Module 3: the Ridgeline receivable, the Smith deposit, and depreciation added back.')
    +'<div class="btn-row" style="margin-top:12px"><button class="btn-reset" onclick="unChristen()"><i data-lucide="arrow-left" class="licon"></i> Back</button></div>';
  if(window.lucide) lucide.createIcons();
}
function renderStart(){
  document.getElementById('sheetLabel').textContent='Working Tab';
  setWorkbookChrome();
  document.getElementById('anna').innerHTML=annaBox('The grouped working view is finished. Format the rows, then christen the amber Working Tab as the fourth statement tab.');
  document.getElementById('controls').innerHTML='<button class="btn-continue btn-block" type="button" onclick="christenStatement()">Christen it the Cash Flow Statement &rarr;</button>'
    +'<div class="btn-row"></div>';
  if(window.lucide) lucide.createIcons();
}
function unChristen(){
  if(!completed) return;
  playClick(); completed=false;
  renderStart();
  window.scrollTo(0,0);
}

document.getElementById('anna').innerHTML=annaBox('The grouped working view is finished. Format the rows, then christen the amber Working Tab as the fourth statement tab.');
document.getElementById('controls').innerHTML='<button class="btn-continue btn-block" type="button" onclick="christenStatement()">Christen it the Cash Flow Statement &rarr;</button>'
  +'<div class="btn-row"></div>';

var glossaryTerms=[
  {term:'Cash Flow Statement',def:'A statement that groups cash flows into Operating, Investing, and Financing activities and reconciles the period&rsquo;s net change to ending Cash.'},
  {term:'Operating activities',def:'Cash from running the shop. Here, repairs collected minus parts bought and rent paid equals $2,350.'},
  {term:'Net change in cash',def:'Operating $2,350 minus Investing $400 minus Financing $2,630 equals negative $680. Cash moves from $1,300 to $620.'}
];
function openGlossary(){ document.getElementById('glossaryList').innerHTML=glossaryTerms.map(function(item){return '<div class="glossary-entry"><div class="glossary-entry-term">'+item.term+'</div><div class="glossary-entry-def">'+item.def+'</div></div>';}).join(''); document.getElementById('glossaryOverlay').classList.add('open'); }
function closeGlossary(){ document.getElementById('glossaryOverlay').classList.remove('open'); }
function nav(url){ playClick(); window.location.href=url; }
function restart(){ if(completed){ completed=false; } renderStart(); window.scrollTo(0,0); }
document.addEventListener('keydown',function(event){ if(event.key==='Escape')closeGlossary(); });

window.devFill=function(){ christenStatement(); expandAllGroups(); };
BRW.mountGrid('cashFlowGrid',sheetOf('cash-flow-steps','3 '),{gridId:'cash-flow-final-grid'});
expandAllGroups();
setWorkbookChrome();
if(window.lucide) lucide.createIcons();
</script>
<script src="dev.js"></script>
</body>
</html>
