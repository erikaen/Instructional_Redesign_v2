<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light dark">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Cash Flow Statement</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Open+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    .wb-grid-wrap { padding:8px; background:white; }
    @media (prefers-color-scheme:dark) { .wb-grid-wrap { background:#26242e; } }
  </style>
</head>
<body>
<div class="page">
  <div class="prework-wrap">
    <div class="tut-header">
      <div class="tut-header-main">
        <h1>The Cash Flow Statement</h1>
        <p class="tut-header-sub">The Angel Investor &middot; ~10 min &middot; Page 3 of 3</p>
      </div>
      <div class="tut-header-actions">
        <button class="icon-btn" title="Glossary" aria-label="Open glossary" onclick="openGlossary()"><i data-lucide="book-open"></i></button>
        <button class="icon-btn" title="Reset this page" aria-label="Reset this page" onclick="restart()"><i data-lucide="rotate-ccw"></i></button>
      </div>
    </div>
    <div class="phase-title" id="phaseTitle">The Cash Flow Statement</div>

    <div class="narrative-block">
      <p>The workbook opens directly on the completed <strong>Cash Flow Statement</strong>. The copied rows have been grouped, totaled, and formatted on the tab where they began.</p>
    </div>

    <div class="xlwb" id="workbookShell">
      <div class="xlwb-bar">
        <div class="xlwb-bar-title"><i data-lucide="sheet" class="licon"></i> <span class="mono">Bike-Repair.xlsx</span></div>
        <div class="xlwb-bar-sheet">Cash Flow Statement</div>
      </div>
      <div class="wb-grid-wrap"><div id="cashFlowGrid"></div></div>
      <div class="xlwb-tabs" aria-label="Workbook tabs">
        <button class="xlwb-tab" type="button" aria-disabled="true">Assets</button>
        <button class="xlwb-tab" type="button" aria-disabled="true">Liabilities</button>
        <button class="xlwb-tab" type="button" aria-disabled="true">Reasons</button>
        <button class="xlwb-tab" type="button" aria-disabled="true">Balance Sheet</button>
        <button class="xlwb-tab" type="button" aria-disabled="true">Income Statement</button>
        <button class="xlwb-tab" type="button" aria-disabled="true">Member&rsquo;s Capital</button>
        <button class="xlwb-tab active" type="button" aria-current="page">Cash Flow Statement</button>
      </div>
    </div>

    <div id="anna"></div>
    <div id="controls"></div>
  </div>
</div>

<div class="glossary-overlay" id="glossaryOverlay" onclick="if(event.target===this) closeGlossary()">
  <div class="glossary-panel">
    <div class="glossary-panel-head">
      <div class="glossary-panel-title"><i data-lucide="book-open" class="licon"></i> Glossary</div>
      <button class="glossary-close-btn" aria-label="Close" onclick="closeGlossary()">&times;</button>
    </div>
    <div class="glossary-list" id="glossaryList"></div>
  </div>
</div>

<script src="bike-repair-job-records.js"></script>
<script src="bike-repair-parts-purchases.js"></script>
<script src="bike-repair-workbook.js"></script>
<script src="shared.js"></script>
<script src="bike-repair-statement-steps.generated.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script>
if(window.lucide) lucide.createIcons();

var audioCtx=null;
function ac(){ if(!audioCtx){ try{audioCtx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } return audioCtx; }
function tone(f,d,t,v){ var c=ac(); if(!c)return; var o=c.createOscillator(),g=c.createGain(); o.type=t||'sine'; o.frequency.value=f; o.connect(g); g.connect(c.destination); g.gain.setValueAtTime(v||0.05,c.currentTime); g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+d); o.start(); o.stop(c.currentTime+d); }
function playClick(){ tone(600,0.08,'sine',0.04); }
function annaBox(inner){ return '<div class="dialog-box anna"><div class="dialog-label">ANNA</div><div class="dialog-text">&ldquo;'+inner+'&rdquo;</div></div>'; }
function insightBox(label,inner){ return '<div class="insight-box"><div class="insight-label"><i data-lucide="lightbulb" class="licon"></i> '+label+'</div>'+inner+'</div>'; }
function sheetOf(workbookKey,namePart){
  var sheets=BR_STMT_DATA.workbooks[workbookKey].sheets;
  for(var i=0;i<sheets.length;i++) if(sheets[i].name.indexOf(namePart)>=0) return sheets[i];
  return null;
}

document.getElementById('anna').innerHTML=annaBox('Operating activities provided <strong>$2,350</strong>. Investing used <strong>$400</strong>. Financing used <strong>$2,630</strong>. Together they changed Cash by <strong>&minus;$680</strong>, taking the June 1 balance of <strong>$1,300</strong> to the August 31 balance of <strong>$620</strong>.');
document.getElementById('controls').innerHTML=insightBox('The ending cash ties twice','<p>The statement&rsquo;s <strong>Cash, August 31: $620</strong> matches the <strong>Balance, August 31</strong> line in the Cash account on Assets and the <strong>Cash $620</strong> line on the Balance Sheet.</p><p>The workbook now has <strong>seven tabs</strong>. Four are statement tabs: <strong>Balance Sheet</strong>, <strong>Income Statement</strong>, <strong>Statement of Member&rsquo;s Capital</strong>, and <strong>Cash Flow Statement</strong>. Assets, Liabilities, and Reasons remain as the three source-record tabs.</p>')
  +'<div class="btn-row"><button class="btn btn-secondary" type="button" onclick="nav(\'44-2-Three-Buckets.html\')">&larr; Sort the Cash Flows</button><button class="btn-continue" type="button" onclick="nav(\'45-1-What-Cash-Missed.html\')">Reconcile profit and operating cash &rarr;</button></div>';

var glossaryTerms=[
  {term:'Cash Flow Statement',def:'A statement that groups cash flows into Operating, Investing, and Financing activities and reconciles the period&rsquo;s net change to ending Cash.'},
  {term:'Operating activities',def:'Cash from running the shop. Here, repairs collected minus parts bought and rent paid equals $2,350.'},
  {term:'Net change in cash',def:'Operating $2,350 minus Investing $400 minus Financing $2,630 equals negative $680. Cash moves from $1,300 to $620.'}
];
function openGlossary(){ document.getElementById('glossaryList').innerHTML=glossaryTerms.map(function(item){return '<div class="glossary-entry"><div class="glossary-entry-term">'+item.term+'</div><div class="glossary-entry-def">'+item.def+'</div></div>';}).join(''); document.getElementById('glossaryOverlay').classList.add('open'); }
function closeGlossary(){ document.getElementById('glossaryOverlay').classList.remove('open'); }
function nav(url){ playClick(); window.location.href=url; }
function restart(){ window.location.reload(); }
document.addEventListener('keydown',function(event){ if(event.key==='Escape')closeGlossary(); });

window.devFill=function(){};
BRW.mountGrid('cashFlowGrid',sheetOf('cash-flow-steps','3 '),{gridId:'cash-flow-final-grid'});
if(window.lucide) lucide.createIcons();
</script>
<script src="dev.js"></script>
</body>
</html>
