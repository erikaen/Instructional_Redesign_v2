<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activity 2.3: The Rules &middot; When Did It Become Real?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Open+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="page">
  <div class="prework-wrap">

    <!-- ===== Header ===== -->
    <div class="phase-title-row">
      <div class="phase-title" id="phaseTitle">When Did It Become Real?</div>
      <button class="icon-btn" title="Glossary" aria-label="Open glossary" onclick="openGlossary()"><i data-lucide="book-open"></i></button>
    </div>

    <!-- ===== keystone ===== -->
    <div class="phase active" id="phase-keystone">
      <div class="narrative-block">
        <p>A legal body. Rules. Your business inside it. A wall. It really feels like the repair work <em>became real</em> today. So, a question worth sitting with:</p>
        <p style="margin-top:8px;font-weight:600;color:var(--primary)">When did this entity actually become real?</p>
      </div>
      <div id="keystoneArea"></div>
    </div>

  </div>
</div>

<!-- ===== Glossary overlay ===== -->
<div class="glossary-overlay" id="glossaryOverlay" onclick="if(event.target===this) closeGlossary()">
  <div class="glossary-panel">
    <div class="glossary-panel-head">
      <div class="glossary-panel-title"><i data-lucide="book-open" class="licon"></i> Glossary</div>
      <button class="glossary-close-btn" aria-label="Close" onclick="closeGlossary()">&times;</button>
    </div>
    <div class="glossary-list" id="glossaryList"></div>
  </div>
</div>

<script src="shared.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script>
if (window.lucide) lucide.createIcons();

/* ===== sound ===== */
var audioCtx = null;
function ac(){ if(!audioCtx){ try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return audioCtx; }
function tone(f,d,t,v){ var c=ac(); if(!c)return; var o=c.createOscillator(),g=c.createGain(); o.type=t||'sine'; o.frequency.value=f; o.connect(g); g.connect(c.destination); g.gain.setValueAtTime(v||0.05,c.currentTime); g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+d); o.start(); o.stop(c.currentTime+d); }
function playSuccess(){ tone(523,0.12); setTimeout(function(){tone(659,0.12);},90); setTimeout(function(){tone(784,0.16);},180); }
function playNope(){ tone(400,0.12,'sine',0.05); setTimeout(function(){tone(300,0.12,'sine',0.05);},120); }
function playClick(){ tone(600,0.08,'sine',0.04); }

/* ===== glossary (shared across all phases of 2.3) ===== */
var glossaryTerms = [
  { term:"Operating Agreement", def:"An LLC&rsquo;s internal rulebook &mdash; who the members are, how it&rsquo;s managed, what was contributed, who bears its liabilities. Every LLC has one; you write your own." },
  { term:"Sole Member", def:"The single owner of a one-member LLC. Here, that&rsquo;s you &mdash; in your owner capacity." },
  { term:"Capital contribution", def:"What an owner puts into the company. Here it&rsquo;s the whole repair business, transferred at its existing book amounts &mdash; no revaluation, no new number." },
  { term:"Member&rsquo;s Capital", def:"The LLC&rsquo;s name for the difference Assets &minus; Liabilities. A definitional difference, not &ldquo;what&rsquo;s left for the owner.&rdquo; The contributed slice ($990) and the generated slice ($170) are kept separate." },
  { term:"Limited liability", def:"A legal fact: the member is not personally on the hook for the Company&rsquo;s debts. It changes who can be pursued &mdash; not what the records show." },
  { term:"Accounting entity", def:"The boundary you draw for information &mdash; the thing your books are about. It can exist with or without any legal body, and it came first here (1.1)." }
];
function openGlossary(){
  document.getElementById('glossaryList').innerHTML = glossaryTerms.map(function(g){
    return '<div class="glossary-entry"><div class="glossary-entry-term">'+g.term+'</div><div class="glossary-entry-def">'+g.def+'</div></div>';
  }).join('');
  document.getElementById('glossaryOverlay').classList.add('open');
}
function closeGlossary(){ document.getElementById('glossaryOverlay').classList.remove('open'); }

/* ===== navigation / reset ===== */
function nav(url){ playClick(); window.location.href = url; }
function restart(){ window.location.reload(); }

/* ===== state (phase-local) ===== */

/* ===== keystone: the question (canonical MCQ) ===== */
var OPTS = [
  { id:'cert', text:'When you filed the Certificate (2.2)',
    fb:'Not quite &mdash; that&rsquo;s the day it became a <em>legal</em> entity. But was that when it became real? Try again.' },
  { id:'oa', text:'When the Operating Agreement gets signed',
    fb:'No &mdash; the agreement is the Company&rsquo;s internal rulebook. It <em>governs</em> the entity; it doesn&rsquo;t create it. Legal existence came with the Certificate (2.2) &mdash; and the signing hasn&rsquo;t even happened yet. Try again.' },
  { id:'1.1', text:'Back in 1.1 &mdash; when you first drew the line in your books', ok:true,
    fb:'Right. The <strong>Certificate</strong> gave the operation a legal body, and the agreement you drafted today will govern it &mdash; but <strong>neither created the entity</strong>. You&rsquo;ve kept these books, this boundary, since <strong>1.1</strong>. The <strong>accounting</strong> line came first &mdash; by months, and in a real firm, by years.' }
];
var sel = null, submitted = false;
function renderKeystone(){
  var area = document.getElementById('keystoneArea');
  var right = submitted && OPTS[sel].ok;
  var html = '<div class="mc-card"><div class="mc-q">When did this entity actually become real?</div><div class="mc-opts">';
  OPTS.forEach(function(o, i){
    var cls = 'mc-opt' + (!submitted && sel===i ? ' selected' : '')
      + (submitted && sel===i ? (o.ok?' correct':' wrong') : '')
      + (submitted ? ' locked' : '');
    html += '<div class="'+cls+'" onclick="selectKeystone('+i+')"><div class="mc-letter">'+String.fromCharCode(65+i)+'</div><div>'+o.text+'</div></div>';
  });
  html += '</div>';
  if(submitted) html += '<div class="feedback '+(right?'ok':'err')+' show">'+OPTS[sel].fb+'</div>';
  html += '<div class="btn-row">'+(submitted
    ? '<button class="btn-reset" onclick="resetKeystone()" style="margin-left:auto;">Reset</button>'
    : '<button class="btn-continue" onclick="submitKeystone()"'+(sel===null?' disabled':'')+'>Submit</button>')+'</div>';
  html += '</div>';
  if(right){
    html += '<div class="insight-box"><div class="insight-label"><i data-lucide="key-round" class="licon"></i> The keystone</div>'+
      '<p style="font-size:var(--font-lg);font-weight:700;color:var(--primary);margin-bottom:6px">Accounting&#8209;entity &ne; legal&#8209;entity.</p>'+
      '<p>The accounting entity is a boundary you drew <em>for information</em> &mdash; it can exist with or without any legal body, and here it came first. The LLC is a legal wrapper placed around it. Getting an LLC didn&rsquo;t make the entity &ldquo;finally real&rdquo;; it was a real <em>accounting</em> entity all along.</p></div>';
  }
  area.innerHTML = html;
  if(window.lucide) lucide.createIcons();
}
function selectKeystone(i){ if(submitted) return; sel = i; renderKeystone(); }
function submitKeystone(){
  if(sel===null || submitted) return;
  submitted = true;
  if(OPTS[sel].ok) playSuccess(); else playNope();
  renderKeystone();
}
function resetKeystone(){ sel = null; submitted = false; renderKeystone(); }

document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeGlossary(); });

/* ===== init ===== */
renderKeystone();
</script>
  <script src="dev.js"></script>
</body>
</html>
